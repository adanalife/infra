apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-otlp
  namespace: development
spec:
  dataFrom:
    - extract:
        key: k8s/grafana-cloud-otlp
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager
  target:
    creationPolicy: Owner
    name: grafana-cloud-otlp
