apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-aws-credentials
  namespace: development
spec:
  data:
    - remoteRef:
        key: /k8s/external-dns/aws-credentials
        property: access-key
      secretKey: access-key-id
    - remoteRef:
        key: /k8s/external-dns/aws-credentials
        property: secret-key
      secretKey: secret-access-key
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-parameterstore
  target:
    name: cert-manager-aws-credentials
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-staging-route53
  namespace: development
spec:
  acme:
    email: danadotlol@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-route53-account
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          route53:
            accessKeyIDSecretRef:
              key: access-key-id
              name: cert-manager-aws-credentials
            region: us-east-1
            role: arn:aws:iam::413585268653:role/ExternalDNSRole
            secretAccessKeySecretRef:
              key: secret-access-key
              name: cert-manager-aws-credentials
---
