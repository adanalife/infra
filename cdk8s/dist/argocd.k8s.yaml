apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tripbot
  namespace: argocd
spec:
  description: tripbot app workloads (tripbot/vlc/onscreens/obs + identity), from the tripbot repo
  sourceRepos:
    - https://github.com/adanalife/tripbot.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod-1
    - server: https://kubernetes.default.svc
      namespace: stage-1
  clusterResourceWhitelist:
    - group: scheduling.k8s.io
      kind: PriorityClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: shared cluster infrastructure (postgres data + supporting), from the infra repo
  sourceRepos:
    - git@github.com:adanalife/infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod-1
    - server: https://kubernetes.default.svc
      namespace: stage-1
    - server: https://kubernetes.default.svc
      namespace: prod-1-data
    - server: https://kubernetes.default.svc
      namespace: stage-1-data
    - server: https://kubernetes.default.svc
      namespace: ups
    - server: https://kubernetes.default.svc
      namespace: arc-systems
    - server: https://kubernetes.default.svc
      namespace: arc-runners
  clusterResourceWhitelist:
    - group: ""
      kind: PersistentVolume
    - group: storage.k8s.io
      kind: StorageClass
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tripbot-console
  namespace: argocd
spec:
  description: tripbot-console admin dashboard, from the private tripbot-console repo
  sourceRepos:
    - git@github.com:adanalife/tripbot-console.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod-1
    - server: https://kubernetes.default.svc
      namespace: stage-1
    - server: https://kubernetes.default.svc
      namespace: prod-1-data
    - server: https://kubernetes.default.svc
      namespace: stage-1-data
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tripbot-console-argo
  namespace: argocd
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tripbot-console-argo
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tripbot-console-argo
subjects:
  - kind: ServiceAccount
    name: tripbot-console
    namespace: prod-1
  - kind: ServiceAccount
    name: tripbot-console
    namespace: stage-1
---
