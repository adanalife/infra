apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tripbot
  namespace: argocd
spec:
  description: adanalife app workloads synthesized by cdk8s
  sourceRepos:
    - git@github.com:adanalife/infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod-1
    - server: https://kubernetes.default.svc
      namespace: stage-1
    - server: https://kubernetes.default.svc
      namespace: prod-1-data
    - server: https://kubernetes.default.svc
      namespace: stage-1-data
  clusterResourceWhitelist:
    - group: ""
      kind: PersistentVolume
    - group: storage.k8s.io
      kind: StorageClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: prod-1
            app: tripbot-twitch
          - env: prod-1
            app: vlc-twitch
          - env: prod-1
            app: onscreens-twitch
          - env: prod-1
            app: obs-twitch
          - env: stage-1
            app: tripbot-twitch
          - env: stage-1
            app: vlc-twitch
          - env: stage-1
            app: onscreens-twitch
          - env: stage-1
            app: obs-twitch
          - env: stage-1
            app: tripbot-youtube
          - env: stage-1
            app: vlc-youtube
          - env: stage-1
            app: onscreens-youtube
          - env: stage-1
            app: obs-youtube
  template:
    metadata:
      name: "{{.env}}-{{.app}}"
    spec:
      project: tripbot
      source:
        repoURL: git@github.com:adanalife/infra.git
        targetRevision: master
        path: cdk8s/dist
        directory:
          include: "{{.env}}-{{.app}}.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
  templatePatch: |
    {{- if (eq .env "stage-1") }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-supporting
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: prod-1
          - env: stage-1
  template:
    metadata:
      name: "{{.env}}-supporting"
    spec:
      project: tripbot
      source:
        repoURL: git@github.com:adanalife/infra.git
        targetRevision: master
        path: cdk8s/dist
        directory:
          include: "{{.env}}-supporting.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-data
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: prod-1
            ns: prod-1-data
          - env: stage-1
            ns: stage-1-data
  template:
    metadata:
      name: "{{.env}}-data"
    spec:
      project: tripbot
      source:
        repoURL: git@github.com:adanalife/infra.git
        targetRevision: master
        path: cdk8s/dist
        directory:
          include: "{{.env}}-data.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.ns}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - Prune=false
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-tailscale
  namespace: argocd
spec:
  defaultBackend:
    service:
      name: argocd-server
      port:
        name: http
  ingressClassName: tailscale
  tls:
    - hosts:
        - argocd-prod
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: argocd.prod.whereisdana.today
  name: argocd-server-traefik
  namespace: argocd
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.prod.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: argocd-server
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - argocd.prod.whereisdana.today
      secretName: argocd-server-tls
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-infra
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: k8s/argocd/repo-ssh-key
      secretKey: sshPrivateKey
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-cluster
  target:
    creationPolicy: Owner
    name: argocd-repo-infra
    template:
      data:
        sshPrivateKey: "{{ .sshPrivateKey }}"
        type: git
        url: git@github.com:adanalife/infra.git
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
