apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/adanalife/tripbot.git
        revision: main
        files:
          - path: cdk8s/dist/apps/prod-1-*.json
          - path: cdk8s/dist/apps/stage-1-*.json
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy
  template:
    metadata:
      name: "{{.env}}-{{.app}}"
    spec:
      project: tripbot
      source:
        repoURL: https://github.com/adanalife/tripbot.git
        targetRevision: main
        path: cdk8s/dist
        directory:
          include: "{{.env}}-{{.app}}.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
  templatePatch: |
    {{- if or (eq .env "stage-1") (eq .env "prod-1") }}
    spec:
      syncPolicy:
        automated:
          prune: true
    {{- if (eq .env "stage-1") }}
          selfHeal: false
    {{- else }}
          selfHeal: true
    {{- end }}
    {{- end }}
---
