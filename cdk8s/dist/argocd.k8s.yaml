apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: playout
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: prod-1
            app: playout-twitch
            revision: main
          - env: prod-1
            app: playout-youtube
            revision: main
          - env: stage-1
            app: playout-youtube
            revision: main
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy
  template:
    metadata:
      name: "{{.env}}-{{.app}}"
    spec:
      project: playout
      source:
        repoURL: https://github.com/adanalife/playout.git
        targetRevision: "{{.revision}}"
        path: cdk8s/dist
        directory:
          include: "{{.env}}-{{.app}}.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
  syncPolicy:
    preserveResourcesOnDeletion: true
  templatePatch: |
    {{- if and (or (eq .env "stage-1") (eq .env "prod-1")) (not (or (and (eq .env "prod-1") (eq .app "playout-twitch")) (and (eq .env "prod-1") (eq .app "playout-youtube")))) }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}
