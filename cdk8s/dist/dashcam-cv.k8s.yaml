apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  labels:
    app.kubernetes.io/name: dashcam-cv
    app.kubernetes.io/part-of: tripbot
  name: dashcam-cv-low
  namespace: stage-1
description: Background dashcam-cv embedding — preemptible; never outranks live workloads.
globalDefault: false
value: -10
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: dashcam-cv
    app.kubernetes.io/part-of: tripbot
  name: dashcam-cv-models
  namespace: stage-1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: local-path
---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/name: dashcam-cv
    app.kubernetes.io/part-of: tripbot
  name: dashcam-cv-fill
  namespace: stage-1
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      completions: 2
      parallelism: 2
      template:
        spec:
          containers:
            - args:
                - embed
                - --random
                - "10"
                - --interval
                - "5"
                - --apply
              env:
                - name: DASHCAM_CV_CORPUS_DIR
                  value: /opt/data/Dashcam/_all
                - name: HOME
                  value: /tmp
                - name: USER
                  value: dashcam
              envFrom:
                - configMapRef:
                    name: tripbot-config
                - secretRef:
                    name: tripbot-database-creds
              image: adanalife/dashcam-cv:develop
              imagePullPolicy: Always
              name: embed
              resources:
                limits:
                  cpu: "4"
                  memory: 6Gi
                requests:
                  cpu: "1"
                  memory: 5Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - mountPath: /opt/data/Dashcam/_all
                  name: dashcam
                  readOnly: true
                - mountPath: /opt/models
                  name: models
          initContainers:
            - command:
                - sh
                - -c
                - until nc -z postgres 5432; do echo waiting; sleep 2; done
              image: busybox:1.36
              name: wait-for-postgres
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          priorityClassName: dashcam-cv-low
          restartPolicy: Never
          securityContext:
            fsGroup: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: dashcam
              persistentVolumeClaim:
                claimName: vlc-dashcam
            - name: models
              persistentVolumeClaim:
                claimName: dashcam-cv-models
      ttlSecondsAfterFinished: 3600
  schedule: "*/20 * * * *"
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  suspend: true
