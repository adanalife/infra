  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: tripbot
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: tripbot.dev.whereisdana.today
  labels:
    app.kubernetes.io/name: tripbot
    app.kubernetes.io/part-of: tripbot
  name: tripbot
  namespace: development
spec:
  ingressClassName: traefik
  rules:
    - host: tripbot.dev.whereisdana.today
      http:
        paths:
          - backend:
