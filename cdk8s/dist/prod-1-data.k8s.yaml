apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: prod-1-data
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: eso-aws-credentials
            key: AWS_ACCESS_KEY_ID
          secretAccessKeySecretRef:
            name: eso-aws-credentials
            key: AWS_SECRET_ACCESS_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: tripbot
  name: postgres-credentials
  namespace: prod-1-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: postgres-secret
    template:
      type: Opaque
      data:
        POSTGRES_USER: "{{ .user }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_DB: "{{ .db }}"
  data:
    - secretKey: user
      remoteRef:
        key: k8s/postgres/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: k8s/postgres/credentials
        property: password
    - secretKey: db
      remoteRef:
        key: k8s/postgres/credentials
        property: db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: tripbot
  name: postgres
  namespace: prod-1-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  serviceName: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - envFrom:
            - secretRef:
                name: postgres-secret
          image: ghcr.io/adanalife/mirror/pgvector:pg16
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          name: postgres
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 5
            tcpSocket:
              port: postgres
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
              subPath: pgdata
      securityContext:
        seccompProfile:
          type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: local-path-retain
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: tripbot
  name: postgres
  namespace: prod-1-data
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app: postgres
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path-retain
  namespace: prod-1-data
allowVolumeExpansion: false
provisioner: rancher.io/local-path
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-backup-s3-credentials
  namespace: prod-1-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: postgres-backup-s3
    template:
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        AWS_DEFAULT_REGION: "{{ .AWS_DEFAULT_REGION }}"
        S3_BUCKET: "{{ .S3_BUCKET }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: AWS_DEFAULT_REGION
    - secretKey: S3_BUCKET
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: S3_BUCKET
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: prod-1-data
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - args:
                - |
                  set -euo pipefail
                  apk add --no-cache aws-cli
                  TS=$(date -u +%Y%m%d-%H%M%SZ)
                  HOUR=$(date -u +%H)
                  DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
                  DUMP=/tmp/dump.pgcustom

                  echo "Dumping ${POSTGRES_DB}"
                  PGPASSWORD="$POSTGRES_PASSWORD" pg_dump \
                    --format=custom \
                    --host=postgres \
                    --username="$POSTGRES_USER" \
                    --exclude-table-data=frame_embeddings \
                    "$POSTGRES_DB" \
                    > "$DUMP"

                  echo "Uploading hourly/${TS}.dump"
                  aws s3 cp --no-progress "$DUMP" "s3://${S3_BUCKET}/hourly/${TS}.dump"

                  if [ "$HOUR" = "04" ]; then
                    echo "Uploading daily/${TS}.dump"
                    aws s3 cp --no-progress "$DUMP" "s3://${S3_BUCKET}/daily/${TS}.dump"
                  fi

                  if [ "$HOUR" = "04" ] && [ "$DOW" = "7" ]; then
                    echo "Uploading weekly/${TS}.dump"
                    aws s3 cp --no-progress "$DUMP" "s3://${S3_BUCKET}/weekly/${TS}.dump"
                  fi

                  rm -f "$DUMP"
                  echo "OK"
              command:
                - /bin/sh
                - -c
              envFrom:
                - secretRef:
                    name: postgres-secret
                - secretRef:
                    name: postgres-backup-s3
              image: postgres:16-alpine
              name: backup
              resources:
                limits:
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: Never
      ttlSecondsAfterFinished: 604800
  schedule: 0 * * * *
  successfulJobsHistoryLimit: 3
  suspend: false
  timeZone: Etc/UTC
