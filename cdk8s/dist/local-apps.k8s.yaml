apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tripbot
    app.kubernetes.io/part-of: tripbot
  name: tripbot
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripbot
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: b63d84cfa2
      labels:
        app: tripbot
    spec:
      containers:
        - env:
            - name: USER
              value: tripbot
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-secret
            - secretRef:
                name: grafana-cloud-otlp
            - secretRef:
                name: sentry-tripbot
            - secretRef:
                name: tripbot-twitch-creds
            - secretRef:
                name: tripbot-google-maps-api-key
            - secretRef:
                name: tripbot-discord-alerts-webhook
                optional: true
            - secretRef:
                name: tripbot-discord-bot-token
                optional: true
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: tripbot
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      initContainers:
        - args:
            - -path
            - /migrations
            - -database
            - postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable
            - up
          command:
            - migrate
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-secret
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          name: migrate
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: tripbot
    app.kubernetes.io/part-of: tripbot
  name: tripbot
  namespace: default
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: tripbot
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app.kubernetes.io/name: tripbot
    app.kubernetes.io/part-of: tripbot
  name: tripbot
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: tripbot.localhost
      http:
        paths:
          - backend:
              service:
                name: tripbot
                port:
                  name: http
            path: /
            pathType: Prefix
