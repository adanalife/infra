---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: vlc-server
    app.kubernetes.io/part-of: tripbot
  name: vlc-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vlc-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: 0990350df2
      labels:
        app: vlc-server
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: vlc-server-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          image: adanalife/vlc:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: vlc-server
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5900
              name: vnc
            - containerPort: 8554
              name: rtsp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/Dashcam/_all
              name: dashcam
              readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - hostPath:
            path: /host/dashcam
            type: Directory
          name: dashcam
---
