apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-seed
  namespace: prod-1
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
        - command:
            - /usr/local/bin/seed-db
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:3.1.0
          imagePullPolicy: IfNotPresent
          name: seed
      initContainers:
        - command:
            - sh
            - -c
            - until nc -z postgres.prod-1-data.svc.cluster.local 5432; do echo "waiting for postgres..."; sleep 2; done
          image: busybox:1.36
          name: wait-for-postgres
        - args:
            - -path
            - /migrations
            - -database
            - postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable
            - up
          command:
            - migrate
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:3.1.0
          imagePullPolicy: IfNotPresent
          name: migrate
      restartPolicy: Never
  ttlSecondsAfterFinished: 600
