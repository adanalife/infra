apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: dashcam-cv
    app.kubernetes.io/part-of: tripbot
  name: dashcam-cv-fill-once
  namespace: stage-1
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - args:
            - embed
            - --random
            - "1"
            - --interval
            - "5"
            - --apply
          env:
            - name: DASHCAM_CV_CORPUS_DIR
              value: /opt/data/Dashcam/_all
            - name: HOME
              value: /tmp
            - name: USER
              value: dashcam
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/dashcam-cv:develop
          imagePullPolicy: Always
          name: embed
          resources:
            limits:
              cpu: "4"
              memory: 6Gi
            requests:
              cpu: "1"
              memory: 5Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/Dashcam/_all
              name: dashcam
              readOnly: true
            - mountPath: /opt/models
              name: models
      initContainers:
        - command:
            - sh
            - -c
            - until nc -z postgres.stage-1-data.svc.cluster.local 5432; do echo waiting; sleep 2; done
          image: busybox:1.36
          name: wait-for-postgres
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      priorityClassName: dashcam-cv-low
      restartPolicy: Never
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: dashcam
          persistentVolumeClaim:
            claimName: vlc-dashcam
        - name: models
          persistentVolumeClaim:
            claimName: dashcam-cv-models
  ttlSecondsAfterFinished: 3600
---
