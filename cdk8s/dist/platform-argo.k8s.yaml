apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: shared cluster platform (Helm) reconciled by Argo CD
  sourceRepos:
    - git@github.com:adanalife/infra.git
    - https://argoproj.github.io/argo-helm
    - https://charts.external-secrets.io
    - https://charts.jetstack.io
    - https://grafana.github.io/helm-charts
    - https://helm.cilium.io
    - https://kubernetes-sigs.github.io/external-dns/
    - https://nats-io.github.io/k8s/helm/charts/
    - https://pkgs.tailscale.com/helmcharts
    - https://prometheus-community.github.io/helm-charts
    - https://traefik.github.io/charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: platform
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.6.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/k8s/external-secrets/values.yml
    - repoURL: git@github.com:adanalife/infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
spec:
  project: platform
  sources:
    - repoURL: https://pkgs.tailscale.com/helmcharts
      chart: tailscale-operator
      targetRevision: 1.98.3
      helm:
        releaseName: tailscale-operator
        valueFiles:
          - $values/k8s/tailscale-operator/values.yml
    - repoURL: git@github.com:adanalife/infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
