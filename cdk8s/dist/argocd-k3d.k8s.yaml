apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tripbot
  namespace: argocd
spec:
  description: adanalife app workloads synthesized by cdk8s
  sourceRepos:
    - git@github.com:adanalife/infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: development
  clusterResourceWhitelist:
    - group: ""
      kind: PersistentVolume
    - group: storage.k8s.io
      kind: StorageClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: development
            app: tripbot-twitch
          - env: development
            app: vlc-twitch
          - env: development
            app: onscreens-twitch
          - env: development
            app: obs-twitch
  template:
    metadata:
      name: "{{.env}}-{{.app}}"
    spec:
      project: tripbot
      source:
        repoURL: git@github.com:adanalife/infra.git
        targetRevision: master
        path: cdk8s/dist
        directory:
          include: "{{.env}}-{{.app}}.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
  templatePatch: |
    {{- if (eq .env "development") }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-supporting
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: development
  template:
    metadata:
      name: "{{.env}}-supporting"
    spec:
      project: tripbot
      source:
        repoURL: git@github.com:adanalife/infra.git
        targetRevision: master
        path: cdk8s/dist
        directory:
          include: "{{.env}}-supporting.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-data
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: development
            ns: development
  template:
    metadata:
      name: "{{.env}}-data"
    spec:
      project: tripbot
      source:
        repoURL: git@github.com:adanalife/infra.git
        targetRevision: master
        path: cdk8s/dist
        directory:
          include: "{{.env}}-data.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.ns}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - Prune=false
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-infra
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: k8s/argocd/repo-ssh-key
      secretKey: sshPrivateKey
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-cluster
  target:
    creationPolicy: Owner
    name: argocd-repo-infra
    template:
      data:
        sshPrivateKey: "{{ .sshPrivateKey }}"
        type: git
        url: git@github.com:adanalife/infra.git
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
