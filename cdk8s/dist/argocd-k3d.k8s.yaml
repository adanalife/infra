apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tripbot
  namespace: argocd
spec:
  description: tripbot app workloads (tripbot/vlc/onscreens/obs + identity), from the tripbot repo
  sourceRepos:
    - https://github.com/adanalife/tripbot.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: development
  clusterResourceWhitelist:
    - group: scheduling.k8s.io
      kind: PriorityClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: shared cluster infrastructure (postgres data + supporting), from the infra repo
  sourceRepos:
    - git@github.com:adanalife/infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: development
  clusterResourceWhitelist:
    - group: ""
      kind: PersistentVolume
    - group: storage.k8s.io
      kind: StorageClass
    - group: scheduling.k8s.io
      kind: PriorityClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: obs
  namespace: argocd
spec:
  description: OBS streaming encoder (live stream), from the public obs repo
  sourceRepos:
    - https://github.com/adanalife/obs.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: development
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tripbot-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/adanalife/tripbot.git
        revision: main
        files:
          - path: cdk8s/dist/apps/development-*.json
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy
  template:
    metadata:
      name: "{{.env}}-{{.app}}"
    spec:
      project: tripbot
      source:
        repoURL: https://github.com/adanalife/tripbot.git
        targetRevision: main
        path: cdk8s/dist
        directory:
          include: "{{.env}}-{{.app}}.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
  templatePatch: |
    {{- if (eq .env "development") }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
    {{- end }}
---
apiVersion: argoproj.io/v1alpha1
