apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: obs
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: development
            app: obs-twitch
            revision: main
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy
  template:
    metadata:
      name: "{{.env}}-{{.app}}"
    spec:
      project: obs
      source:
        repoURL: https://github.com/adanalife/obs.git
        targetRevision: "{{.revision}}"
        path: cdk8s/dist
        directory:
          include: "{{.env}}-{{.app}}.k8s.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.target.deletionPolicy
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.data[]?.remoteRef.nullBytePolicy
            - .spec.dataFrom[]?.extract.conversionStrategy
            - .spec.dataFrom[]?.extract.decodingStrategy
            - .spec.dataFrom[]?.extract.metadataPolicy
            - .spec.dataFrom[]?.extract.nullBytePolicy
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
  syncPolicy:
    preserveResourcesOnDeletion: true
  templatePatch: |
    {{- if and ((eq .env "development")) (not (or (and (eq .env "prod-1") (eq .app "obs-twitch")) (and (eq .env "prod-1") (eq .app "obs-youtube")))) }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: argocd.dev.whereisdana.today
  name: argocd-server-traefik
  namespace: argocd
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.dev.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: argocd-server
                port:
                  name: http
            path: /
            pathType: Prefix
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-infra
  namespace: argocd
spec:
  data:
    - remoteRef:
        key: /k8s/argocd/repo-ssh-key
      secretKey: sshPrivateKey
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-parameterstore-cluster
  target:
    creationPolicy: Owner
    name: argocd-repo-infra
    template:
      data:
        sshPrivateKey: "{{ .sshPrivateKey }}"
        type: git
        url: git@github.com:adanalife/infra.git
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
