metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch-config
  namespace: stage-1
data:
  DASHCAM_RTSP_URL: rtsp://vlc-twitch:8554/dashcam
  OBS_QUALITY_PRESET: low
  OBS_STREAM_ENCODER: ffmpeg_vaapi_tex
  OBS_WEBSOCKET_PASSWD: adanalife
  ONSCREENS_URL_BASE: http://onscreens-twitch:8080
  VLC_URL_BASE: http://vlc-twitch:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch
  namespace: stage-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obs-twitch
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: 4bf966a7f6
      labels:
        app: obs-twitch
        app.kubernetes.io/instance: obs-twitch
        app.kubernetes.io/name: obs
        app.kubernetes.io/part-of: tripbot
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: obs-twitch-config
            - secretRef:
                name: obs-stream-key
                optional: true
          image: adanalife/obs:develop
          imagePullPolicy: Always
          livenessProbe:
            exec:
              command:
                - /opt/obs/healthcheck.sh
            failureThreshold: 3
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          name: obs
          ports:
            - containerPort: 5900
              name: vnc
            - containerPort: 4455
              name: websocket
            - containerPort: 6080
              name: novnc
            - containerPort: 8080
              name: obs-server
          resources:
            limits:
              gpu.intel.com/i915: "1"
              memory: 3Gi
            requests:
              cpu: 200m
              gpu.intel.com/i915: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
