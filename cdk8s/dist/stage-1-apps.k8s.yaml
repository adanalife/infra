apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch-config
  namespace: stage-1
data:
  BOT_USERNAME: tripbot4001
  CHANNEL_NAME: adanalife_staging
  DATABASE_HOST: postgres
  DISCORD_GUILD_ID: "607964164220125258"
  ENV: staging
  EXTERNAL_URL: https://tripbot.stage.whereisdana.today
  GOOGLE_APPS_PROJECT_ID: tripbot-stage
  MAPS_OUTPUT_DIR: /opt/data/maps
  NATS_URL: nats://nats.stage-1-platform.svc.cluster.local:4222
  OBS_SERVER_HOST: obs-twitch:8080
  ONSCREENS_SERVER_HOST: onscreens-twitch:8080
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=stage-1,service.namespace=tripbot
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  READ_ONLY: "false"
  SENTRY_ENVIRONMENT: stage-1
  TRIPBOT_SERVER_PORT: "8080"
  VERBOSE: "false"
  VLC_SERVER_HOST: vlc-twitch:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch
  namespace: stage-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripbot-twitch
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: ba1111e92a
      labels:
        app: tripbot-twitch
    spec:
      containers:
        - env:
            - name: USER
              value: tripbot
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: grafana-cloud-otlp
            - secretRef:
                name: sentry-tripbot
            - secretRef:
                name: tripbot-twitch-creds
            - secretRef:
                name: tripbot-google-maps-api-key
            - secretRef:
                name: tripbot-discord-alerts-webhook
                optional: true
            - secretRef:
                name: tripbot-discord-bot-token
                optional: true
          image: adanalife/tripbot:develop
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: tripbot-twitch
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      initContainers:
        - args:
            - -path
            - /migrations
            - -database
            - postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable
            - up
          command:
            - migrate
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:develop
          imagePullPolicy: Always
          name: migrate
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch
  namespace: stage-1
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: tripbot-twitch
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: tripbot.stage.whereisdana.today
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch
  namespace: stage-1
spec:
  ingressClassName: traefik
  rules:
    - host: tripbot.stage.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: tripbot-twitch
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - tripbot.stage.whereisdana.today
      secretName: tripbot-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripbot-twitch-ts
  namespace: stage-1
spec:
  defaultBackend:
    service:
      name: tripbot-twitch
      port:
        number: 8080
  ingressClassName: tailscale
  tls:
    - hosts:
        - tripbot-twitch-stage
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch-config
  namespace: stage-1
data:
  DISPLAY: :0.0
  ENV: staging
  FONTCONFIG_PATH: /etc/fonts
  NATS_URL: nats://nats.stage-1-platform.svc.cluster.local:4222
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=stage-1,service.namespace=tripbot
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  SENTRY_ENVIRONMENT: stage-1
  VLC_SERVER_HOST: vlc-twitch:8080
  XDG_RUNTIME_DIR: /root/.cache/xdgr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch
  namespace: stage-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vlc-twitch
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: c6810dd968
      labels:
        app: vlc-twitch
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: vlc-twitch-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          image: adanalife/vlc:develop
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: vlc-twitch
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5900
              name: vnc
            - containerPort: 8554
              name: rtsp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              gpu.intel.com/i915: "1"
              memory: 2Gi
            requests:
              cpu: 200m
              gpu.intel.com/i915: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/Dashcam/_all
              name: dashcam
              readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: dashcam
          persistentVolumeClaim:
            claimName: vlc-dashcam
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch
