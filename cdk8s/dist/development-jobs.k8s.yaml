apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap-bot
  namespace: development
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - args:
            - --account=bot
          command:
            - /usr/local/bin/auth-bootstrap
          env:
            - name: EXTERNAL_URL
              value: http://localhost:8080
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: tripbot-twitch-creds
                optional: false
            - secretRef:
                name: tripbot-google-maps-api-key
                optional: false
          image: adanalife/tripbot:develop
          imagePullPolicy: Always
          name: auth-bootstrap
          ports:
            - containerPort: 8080
      restartPolicy: Never
  ttlSecondsAfterFinished: 600
---
apiVersion: batch/v1
kind: Job
