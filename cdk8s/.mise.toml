# Tooling for the cdk8s (Python) Kubernetes authoring layer.
# mise pins the interpreter + CLIs; uv handles project-local Python deps.
[tools]
python = "3.12"
# jsii (cdk8s's runtime) supports node ^24/^22/^20; pin 24 to avoid the
# "untested node" warning on the host's newer node.
node = "24"
"npm:cdk8s-cli" = "2.207.12"
# helm is needed only for the platform-chart phase (cdk8s.Helm renders via
# `helm template`); pin it now so it's ready. Bump to 4.x deliberately later.
helm = "3.16.4"
