version: '3'

tasks:
  # Terraform: tf:<env>:<verb>. Extra flags pass via the `--` separator,
  # e.g. `task tf:stage:init -- -upgrade` or `task tf:stage:plan -- -target=…`.
  tf:stage:apply:
    desc: terraform apply against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform apply {{.CLI_ARGS}}

  tf:stage:plan:
    desc: terraform plan against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform plan {{.CLI_ARGS}}

  tf:stage:init:
    desc: terraform init against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform init {{.CLI_ARGS}}

  tf:stage:destroy:
    desc: terraform destroy against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform destroy {{.CLI_ARGS}}

  tf:prod:apply:
    desc: terraform apply against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform apply {{.CLI_ARGS}}

  tf:prod:plan:
    desc: terraform plan against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform plan {{.CLI_ARGS}}

  tf:prod:init:
    desc: terraform init against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform init {{.CLI_ARGS}}

  tf:prod:destroy:
    desc: terraform destroy against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform destroy {{.CLI_ARGS}}

  # Core uses --no-session because session tokens can't make IAM changes.
  tf:core:apply:
    desc: terraform apply against core (no session token; IAM changes need full creds)
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform apply {{.CLI_ARGS}}

  tf:core:plan:
    desc: terraform plan against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform plan {{.CLI_ARGS}}

  tf:core:init:
    desc: terraform init against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform init {{.CLI_ARGS}}

  tf:core:destroy:
    desc: terraform destroy against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform destroy {{.CLI_ARGS}}

  # Append the host's current public IP (via ifconfig.me) to the
  # stage-1/allowlist-cidrs list in Secrets Manager, deduping with
  # jq. Use this when your home IP rotates and you're locked out of
  # tripbot.whalecore.com. terraform reads the updated value via
  # data source on the next `task tf:stage:apply`. To remove stale
  # entries or add a non-current CIDR, edit the secret directly:
  #   aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
  #     --secret-id stage-1/allowlist-cidrs --secret-string '["X.X.X.X/32", ...]'
  stage:allowlist:add-current-ip:
    desc: append your current public IP to stage-1/allowlist-cidrs
    cmds:
      - |
        ip=$(curl -fsS ifconfig.me) || { echo "could not detect public IP"; exit 1; }
        cidr="$ip/32"
        updated=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id stage-1/allowlist-cidrs --query SecretString --output text \
          | jq --arg c "$cidr" '. + [$c] | unique')
        aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
          --secret-id stage-1/allowlist-cidrs --secret-string "$updated" >/dev/null
        echo "allowlist-cidrs is now:"
        echo "$updated" | jq .
        echo "Run 'task tf:stage:apply' to apply."

  # `aws-vault login` opens the AWS web console in browser
  aws:login:stage:
    cmds:
      - aws-vault login adanalife-stage

  aws:login:prod:
    cmds:
      - aws-vault login adanalife-prod

  aws:login:core:
    cmds:
      - aws-vault login adanalife-core

  # GCP — single bootstrap helper today, used by the tripbot prod-1 Maps
  # credential mint (see vault/tripbot/credentials.md → Google Maps section).
  # If/when more GCP resources show up here, lift this to a hashicorp/google
  # provider in terraform/prod-1/; the migration TODO lives in vault/infra/TODO.md.
  # Pre-req: `gcloud auth login` once + billing attached to the target project.
  gcp:prod:mint-maps-key:
    desc: mint a fresh Maps API key on tripbot-prod (Geocoding + Maps JavaScript only) and print the keyString to stdout
    silent: true
    vars:
      PROJECT: tripbot-prod
      NAME: '{{.NAME | default "tripbot-prod-1"}}'
    cmds:
      - |
        set -euo pipefail
        echo "Enabling API Keys + Geocoding + Maps JavaScript APIs on {{.PROJECT}}..." >&2
        # apikeys.googleapis.com is the meta-API for managing API keys
        # (what the `api-keys create` subcommand below talks to). It's a
        # separate enablement from the Maps APIs the minted key actually uses.
        # Without it, the first run on a fresh project fails with
        # PERMISSION_DENIED / SERVICE_DISABLED.
        gcloud services enable \
          apikeys.googleapis.com \
          geocoding-backend.googleapis.com \
          maps-backend.googleapis.com \
          --project={{.PROJECT}} >&2
        echo "Minting API key '{{.NAME}}' on {{.PROJECT}}..." >&2
        KEY_RESOURCE=$(gcloud alpha services api-keys create \
          --display-name='{{.NAME}}' \
          --api-target=service=geocoding-backend.googleapis.com \
          --api-target=service=maps-backend.googleapis.com \
          --project={{.PROJECT}} \
          --format='value(response.name)' \
          --quiet)
        echo "Created key resource: $KEY_RESOURCE" >&2
        # The keyString is the ONLY line on stdout — capture with:
        #   export PROD_GOOGLE_MAPS_API_KEY=$(task gcp:prod:mint-maps-key)
        gcloud alpha services api-keys get-key-string "$KEY_RESOURCE" \
          --format='value(keyString)' \
          --quiet

  # k3d cluster lifecycle. Tasks are env-prefixed (k8s:stage:* / k8s:prod:*)
  # following the tf:stage:* / tf:prod:* pattern; the cluster name embedded
  # in each k3d-config is host-based (adanalife-bees, adanalife-empty) so
  # the cluster identity survives any future env-reassignment.
  #
  # Lifecycle verbs:
  #   up      → create the cluster (first time)
  #   down    → delete the cluster (full wipe)
  #   stop    → suspend the cluster (containers down, definition + state preserved)
  #   start   → resume a stopped cluster (counterpart to stop)
  #   rebuild → up + platform:up + apply, the canonical "cold-start to fully
  #             deployed" sequence; each step delegates to its canonical task
  k8s:stage:cluster:up:
    desc: "create the local k3d cluster on bees (stage-1) — prefers k8s/k3d-config.bees.local.yaml if present, else falls back to k8s/k3d-config.bees.yaml"
    cmds:
      # Prefer the gitignored local override (which adds host-specific
      # bind-mounts like the NAS dashcam share) when it exists; otherwise
      # use the committed base config. The override must be a full
      # superset because k3d doesn't merge config files — see
      # k3d-config.bees.local.yaml.example for the shape.
      - |
        if [ -f k8s/k3d-config.bees.local.yaml ]; then
          echo "using k8s/k3d-config.bees.local.yaml (local override)"
          k3d cluster create -c k8s/k3d-config.bees.local.yaml
        else
          echo "using k8s/k3d-config.bees.yaml (no local override present)"
          k3d cluster create -c k8s/k3d-config.bees.yaml
        fi

  k8s:stage:cluster:down:
    desc: tear down the local k3d cluster on bees (delete; use k8s:stage:cluster:stop to suspend without wipe)
    cmds:
      - k3d cluster delete adanalife-bees

  k8s:stage:cluster:stop:
    desc: suspend the local k3d cluster on bees (containers down, cluster definition + state preserved)
    cmds:
      - k3d cluster stop adanalife-bees

  k8s:stage:cluster:start:
    desc: resume a stopped local k3d cluster on bees (counterpart to k8s:stage:cluster:stop)
    cmds:
      - k3d cluster start adanalife-bees

  k8s:stage:cluster:rebuild:
    desc: Full bees-cluster rebuild — cluster + platform helm charts (which triggers ESO bootstrap secrets as a dep) + stage-1 app manifests. Each step is the canonical task; failures short-circuit the chain.
    cmds:
      - task: k8s:stage:cluster:up
      - task: k8s:stage:platform:up
      - task: k8s:stage:apply

  k8s:prod:cluster:up:
    desc: create the local k3d cluster on empty (prod-1)
    cmds:
      - k3d cluster create -c k8s/k3d-config.empty.yaml

  k8s:prod:cluster:down:
    desc: tear down the local k3d cluster on empty (delete; use k8s:prod:cluster:stop to suspend without wipe)
    cmds:
      - k3d cluster delete adanalife-empty

  k8s:prod:cluster:stop:
    desc: suspend the local k3d cluster on empty (containers down, cluster definition + state preserved)
    cmds:
      - k3d cluster stop adanalife-empty

  k8s:prod:cluster:start:
    desc: resume a stopped local k3d cluster on empty (counterpart to k8s:prod:cluster:stop)
    cmds:
      - k3d cluster start adanalife-empty

  k8s:prod:cluster:rebuild:
    desc: Full empty-cluster rebuild — cluster + platform helm charts + app overlays (shared-secrets, postgres, vlc-server; tripbot/obs when their overlays land).
    cmds:
      - task: k8s:prod:cluster:up
      - task: k8s:prod:platform:up
      - task: k8s:prod:apply

  k8s:import-images:
    desc: build the tripbot/vlc/obs images and import them into the local cluster
    dir: ../tripbot
    cmds:
      # --project-directory + --env-file mirror bin/devenv so build contexts
      # resolve relative to the tripbot repo root and ${VAR} substitutions in
      # the compose file pick up env.docker. Without these, compose resolves
      # `context: .` against the compose file's dir and the build fails with
      # `lstat .../infra/docker/infra: no such file or directory`.
      #
      # On arm64 hosts (Apple Silicon), layer docker-compose.arm64.yml so
      # the OBS service builds from Dockerfile.arm64 (compiles OBS + CEF
      # from source). Without it, the amd64 Dockerfile runs natively on
      # arm64, the OBS PPA has no arm64 packages, and apt silently falls
      # back to Ubuntu universe's obs-studio +dfsg build (CEF stripped),
      # so browser_source silently fails at scene load. First arm64 build
      # takes ~30 min for the CEF compile; cached thereafter.
      - |
        args="--project-directory . --env-file infra/docker/env.docker -f infra/docker/docker-compose.yml"
        case "$(uname -m)" in
          arm64|aarch64) args="$args -f infra/docker/docker-compose.arm64.yml" ;;
        esac
        docker compose $args build
      - k3d image import adanalife/tripbot:latest --cluster=adanalife-bees
      - k3d image import adanalife/vlc:latest --cluster=adanalife-bees
      - k3d image import adanalife/obs:latest --cluster=adanalife-bees

  # Restart an app deployment so its pods re-pull the image. Pairs
  # with `k8s:import-images` — after importing rebuilt images into
  # k3d, restart the deployment to roll new pods that fetch the
  # freshly-imported tag. imagePullPolicy: Always on these
  # deployments (#411) means "rollout restart" is sufficient; no
  # need to bump tags or delete the cached image first.
  k8s:rollout:tripbot:
    desc: restart the tripbot deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/tripbot
      - kubectl rollout status deploy/tripbot --timeout=120s

  k8s:rollout:vlc-server:
    desc: restart the vlc-server deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/vlc-server
      - kubectl rollout status deploy/vlc-server --timeout=120s

  k8s:rollout:obs:
    desc: restart the obs deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s

  k8s:rollout:all:
    desc: restart all three app deployments (tripbot + vlc-server + obs)
    aliases: [k8s:rollout]
    deps: [k8s:rollout:tripbot, k8s:rollout:vlc-server, k8s:rollout:obs]

  k8s:apply:
    desc: apply the local app manifests to the cluster
    cmds:
      - kubectl apply -k k8s/overlays/local

  k8s:stage:apply:
    desc: apply stage-1 overlay (apps only — bring up cloudflared separately via k8s:stage:tunnel:up)
    cmds:
      - kubectl apply -k k8s/overlays/stage-1

  k8s:stage:apply-nas:
    desc: "apply stage-1-nas overlay — vlc-server reads dashcam from NAS via /host/nas-dashcam (home network only; requires the NAS share to be mounted on the cluster host per k3d-config.bees.local.yaml and the cluster rebuilt with that override)"
    cmds:
      - kubectl apply -k k8s/overlays/stage-1-nas

  k8s:prod:apply:
    desc: apply prod-1 overlay (shared-secrets + postgres + vlc-server; tripbot/obs added when their prod-1 overlays land)
    cmds:
      - kubectl apply -k k8s/overlays/prod-1

  # Cloudflare Tunnel client. Opt-in: not part of `cluster:rebuild`
  # nor `k8s:stage:apply`. Brings up the `cloudflared` namespace, seeds
  # the tunnel-token Secret from terraform output, and applies the
  # Deployment in one gesture.
  #
  # **stage-1 only** — there is no tunnel in prod-1.
  #
  # The status check makes re-runs cheap (no aws-vault / keybase
  # reprompt). `task --force k8s:stage:tunnel:up` force-rotates the
  # token if the underlying tunnel is recreated.
  k8s:stage:tunnel:up:
    desc: bring up the cloudflared tunnel client (namespace + token Secret + Deployment)
    status:
      - kubectl get secret cloudflared-secret -n cloudflared >/dev/null 2>&1
      - kubectl get deploy cloudflared -n cloudflared >/dev/null 2>&1
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:stage:cluster:up` first"
    cmds:
      # Ensure namespace exists before the secret lands in it. The
      # kustomize apply below also declares the namespace; this is
      # the cheap insurance for the secret create that runs first.
      - kubectl create namespace cloudflared --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret cloudflared-secret -n cloudflared >/dev/null 2>&1; then
          echo "cloudflared-secret already present, skipping"
        else
          set -euo pipefail
          token=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw cloudflared_tunnel_token)
          kubectl create secret generic cloudflared-secret \
            --namespace=cloudflared \
            --from-literal=TUNNEL_TOKEN="$token" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "applied cloudflared-secret Secret to cloudflared namespace"
        fi
      - kubectl apply -k k8s/platform/cloudflared/overlays/stage-1
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/cloudflared -n cloudflared
      - echo "cloudflared up. Tunnel routes (terraform/stage-1/cloudflare-tunnel.tf) now have a client."

  k8s:stage:tunnel:down:
    desc: tear down the cloudflared tunnel client (Deployment + Secret + namespace)
    preconditions:
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster"
    cmds:
      # Deleting the namespace via the kustomize manifest sweeps the
      # Deployment and the out-of-band Secret with it. --ignore-not-found
      # keeps the task idempotent across repeat runs.
      - kubectl delete -k k8s/platform/cloudflared/overlays/stage-1 --ignore-not-found

  # Bootstrap the cluster Secrets that don't survive a recreate but
  # have to exist before the platform stack can come up:
  #
  #   - eso-aws-credentials   (external-secrets namespace) — ESOSecretsReader
  #     IAM access key for ESO to read SM. PGP-decrypted via keybase.
  #
  # The cloudflared tunnel token is bootstrapped separately by
  # `k8s:stage:tunnel:up` so the tunnel stays opt-in (it's stage-1
  # only and will eventually be retired in favor of the
  # external-dns/traefik HTTPS path).
  #
  # Comes from `task tf:<env>:apply` outputs and stays in a shell
  # variable only (never written to disk). Re-runs idempotently:
  # the bootstrap block skips when its target Secret already exists,
  # so `task --force k8s:<env>:bootstrap-secrets` is the way to
  # force-rotate after a TF output changes (e.g., access-key rotation).
  #
  # Used as a dep by `k8s:<env>:platform:up` so the platform stack always
  # has its credentials, but the inner status checks make repeat runs
  # cheap (no aws-vault / keybase reprompt when nothing's missing).
  k8s:stage:bootstrap-secrets:
    desc: apply stage-1 ESO bootstrap Secret + write external-dns values.local.yml (no plaintext on disk)
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - test -f k8s/external-dns/stage-1/values.local.yml
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault` (see infra/README.md)"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: command -v curl >/dev/null
        msg: "curl not found — required to fetch host public IP for external-dns default-targets"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:stage:cluster:up` first"
    cmds:
      # eso-aws-credentials: ESOSecretsReader access key for ESO.
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          kubectl create secret generic eso-aws-credentials \
            --namespace=external-secrets \
            --from-literal=AWS_ACCESS_KEY_ID="$ak" \
            --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "applied eso-aws-credentials Secret to external-secrets namespace"
        fi
      # external-dns values.local.yml: per-machine helm override holding
      # the host's current public IP, fed to external-dns as
      # --default-targets so any Ingress without an explicit
      # external-dns.alpha.kubernetes.io/target annotation resolves to
      # this machine. File-based (not a Secret) because helm values are
      # consumed at chart install, not at pod runtime — re-run this
      # task and `task k8s:stage:platform:up` after a home-IP rotation.
      - |
        values_file=k8s/external-dns/stage-1/values.local.yml
        if [ -f "$values_file" ]; then
          echo "$values_file already present, skipping"
        else
          set -euo pipefail
          # -4 forces IPv4: Route53 A records can only point at v4
          # addresses, and ifconfig.me prefers v6 when the host has it.
          ip=$(curl -4 -fsS ifconfig.me)
          cat > "$values_file" <<YAML
        # Generated by \`task k8s:stage:bootstrap-secrets\` — host public IP
        # snapshot for external-dns --default-targets. Re-run the task
        # after an IP rotation, then \`task k8s:stage:platform:up\` to roll
        # the chart with the new value.
        #
        # --force-default-targets is required because traefik writes
        # the cluster-internal klipper-lb IP into Ingress.status, and
        # external-dns prefers source-provided targets unless told to
        # override them with the default.
        extraArgs:
          - --default-targets=$ip
          - --force-default-targets
        YAML
          echo "wrote $values_file (default-targets=$ip)"
        fi

  # prod-1 sibling — same shape minus the cloudflared block (no tunnel
  # in prod-1 in this pass). Reads from terraform/prod-1 via the
  # adanalife-prod aws-vault profile, writes the external-dns values
  # file into k8s/external-dns/prod-1/.
  k8s:prod:bootstrap-secrets:
    desc: apply prod-1 ESO bootstrap Secret + write external-dns values.local.yml (no plaintext on disk)
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - test -f k8s/external-dns/prod-1/values.local.yml
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: command -v curl >/dev/null
        msg: "curl not found — required to fetch host public IP for external-dns default-targets"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:prod:cluster:up` first"
    cmds:
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-prod -- terraform -chdir=terraform/prod-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-prod -- terraform -chdir=terraform/prod-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          kubectl create secret generic eso-aws-credentials \
            --namespace=external-secrets \
            --from-literal=AWS_ACCESS_KEY_ID="$ak" \
            --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "applied eso-aws-credentials Secret to external-secrets namespace"
        fi
      - |
        values_file=k8s/external-dns/prod-1/values.local.yml
        if [ -f "$values_file" ]; then
          echo "$values_file already present, skipping"
        else
          set -euo pipefail
          # adanalife-minipc is LAN-only by design (no public ingress yet),
          # so external-dns publishes Route53 records pointing at the
          # node's LAN IP rather than the host's public IP. The LAN IP
          # is pinned by router DHCP reservation; see
          # vault/infra/adanalife-minipc-bootstrap.md.
          # Override with EXTERNAL_DNS_TARGET_IP=<ip> for non-default cases.
          ip="${EXTERNAL_DNS_TARGET_IP:-192.168.1.200}"
          cat > "$values_file" <<YAML
        # Generated by \`task k8s:prod:bootstrap-secrets\` — LAN IP target
        # for external-dns --default-targets (no public ingress for
        # adanalife-minipc). Override default via EXTERNAL_DNS_TARGET_IP
        # env var, or hand-edit this file.
        extraArgs:
          - --default-targets=$ip
          - --force-default-targets
        YAML
          echo "wrote $values_file (default-targets=$ip)"
        fi

  # Install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring
  # into the local cluster. Idempotent — re-run after a cluster recreate or
  # to upgrade any chart. Depends on `k8s:<env>:bootstrap-secrets`, which
  # auto-skips when its bootstrap targets already exist (so the common
  # path doesn't re-prompt for aws-vault + keybase).
  #
  # k8s-monitoring requires the k8s/grafana-cloud-metrics-write SM value
  # to have been seeded out-of-band first; if it hasn't, the ExternalSecret
  # materialization will fail and the helm install won't run. See
  # vault/infra/grafana-cloud-bootstrap.md.
  #
  # Traefik: the bundled k3s Traefik is disabled via --disable=traefik in
  # the k3d configs, so this task is the only thing that brings up an
  # ingress controller. App Ingresses (`ingressClassName: traefik`) don't
  # reach anything until this runs.
  #
  # external-dns: publishes Route53 records for any Ingress annotated with
  # `external-dns.alpha.kubernetes.io/hostname`. Default target IP comes
  # from values.local.yml (per-machine, written by
  # k8s:<env>:bootstrap-secrets from `curl -4 ifconfig.me`).
  #
  # cert-manager: issues LE certs via DNS-01 against Route53 for any
  # Ingress annotated with `cert-manager.io/cluster-issuer`. Issuance
  # works regardless of inbound network state — only serving TLS does.
  # A smoke-test Certificate (cert-test.<env>.whereisdana.today, LE
  # staging) ships in the cert-manager kustomize so the pipeline is
  # exercised even before any app Ingress requests a cert.
  k8s:stage:platform:up:
    desc: install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring into the bees cluster
    deps: [k8s:stage:bootstrap-secrets]
    preconditions:
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:stage:cluster:up` first"
      - sh: test -f k8s/external-dns/stage-1/values.local.yml
        msg: "k8s/external-dns/stage-1/values.local.yml missing — run `task k8s:stage:bootstrap-secrets` first"
    cmds:
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo add jetstack https://charts.jetstack.io
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/stage-1/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/stage-1
      - echo "ESO up. ClusterSecretStore aws-secretsmanager is ready for ExternalSecret consumers."
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up. App Ingresses (ingressClassName=traefik) will route through this."'
      - kubectl apply -k k8s/external-dns/stage-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n kube-system
      - helm upgrade --install external-dns external-dns/external-dns
          -n kube-system
          -f k8s/external-dns/stage-1/config.yml
          -f k8s/external-dns/stage-1/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns -n kube-system
      - 'echo "external-dns up. Annotate an Ingress with external-dns.alpha.kubernetes.io/hostname to publish a Route53 record."'
      - helm upgrade --install cert-manager jetstack/cert-manager
          -n kube-system
          -f k8s/cert-manager/stage-1/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment -n kube-system -l app.kubernetes.io/instance=cert-manager
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clusterissuers.cert-manager.io
          crd/certificates.cert-manager.io
      - kubectl apply -k k8s/cert-manager/stage-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/cert-manager-aws-credentials -n kube-system
      - 'echo "cert-manager up. Annotate an Ingress with cert-manager.io/cluster-issuer=letsencrypt-staging-route53 to request a cert."'
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -k k8s/monitoring/stage-1
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Has k8s/grafana-cloud-metrics-write been seeded? See vault/infra/grafana-cloud-bootstrap.md."; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/stage-1/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."

  # prod-1 sibling — same shape, references k8s/<component>/prod-1/ paths.
  # KEEP-IN-SYNC with k8s:stage:platform:up; structural changes should
  # mirror to both unless deliberately env-specific.
  k8s:prod:platform:up:
    desc: install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring into the empty cluster
    deps: [k8s:prod:bootstrap-secrets]
    preconditions:
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:prod:cluster:up` first"
      - sh: test -f k8s/external-dns/prod-1/values.local.yml
        msg: "k8s/external-dns/prod-1/values.local.yml missing — run `task k8s:prod:bootstrap-secrets` first"
    cmds:
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo add jetstack https://charts.jetstack.io
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/stage-1/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/prod-1
      - echo "ESO up. ClusterSecretStore aws-secretsmanager is ready for ExternalSecret consumers."
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
          -f k8s/traefik/values.prod-1.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up on hostNetwork (binds 192.168.1.200:80/443 directly). App Ingresses (ingressClassName=traefik) will route through this."'
      - kubectl apply -k k8s/external-dns/prod-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n kube-system
      - helm upgrade --install external-dns external-dns/external-dns
          -n kube-system
          -f k8s/external-dns/prod-1/config.yml
          -f k8s/external-dns/prod-1/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns -n kube-system
      - 'echo "external-dns up. Annotate an Ingress with external-dns.alpha.kubernetes.io/hostname to publish a Route53 record."'
      - helm upgrade --install cert-manager jetstack/cert-manager
          -n kube-system
          -f k8s/cert-manager/prod-1/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment -n kube-system -l app.kubernetes.io/instance=cert-manager
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clusterissuers.cert-manager.io
          crd/certificates.cert-manager.io
      - kubectl apply -k k8s/cert-manager/prod-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/cert-manager-aws-credentials -n kube-system
      - 'echo "cert-manager up. Annotate an Ingress with cert-manager.io/cluster-issuer=letsencrypt-staging-route53 to request a cert."'
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -k k8s/monitoring/prod-1
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Has k8s/grafana-cloud-metrics-write been seeded in prod-1? See vault/infra/grafana-cloud-bootstrap.md."; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/prod-1/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."
      # Intel GPU device plugin + XPU Manager. Plugin registers
      # gpu.intel.com/i915 (+ i915_monitoring) so OBS/vlc-server pods
      # can claim the iGPU as an extended resource without hostPath.
      # XPU Manager scrapes iGPU telemetry off the i915_monitoring
      # device and exposes it on :29999 with the xpum_ prefix; Grafana
      # Alloy's annotation auto-discovery picks it up via the
      # prometheus.io/scrape annotation on the pod.
      - kubectl apply -k k8s/intel-gpu-plugin/prod-1
      - kubectl rollout status -n kube-system daemonset/intel-gpu-plugin --timeout=120s
      - kubectl apply -k k8s/intel-xpu-manager/prod-1
      - kubectl rollout status -n kube-system daemonset/intel-xpumanager --timeout=180s
      - 'echo "Intel GPU plugin + XPU Manager up. gpu.intel.com/i915 schedulable; xpum_* metrics scraping at <pod-ip>:29999."'

  # Twitch streaming toggle for OBS. The OBS deployment's envFrom on
  # obs-secret is `optional: true`, so the existence + content of that
  # Secret IS the stream state. `obs:stream:on` pulls the STREAM_KEY
  # from AWS Secrets Manager (k8s/obs/twitch-stream-key) and creates
  # the Secret; `obs:stream:off` deletes the Secret. Either way we
  # rollout-restart obs so the entrypoint re-reads STREAM_KEY at boot
  # — Kubernetes doesn't propagate Secret changes to running pods'
  # env vars.
  obs:stream:on:
    desc: enable Twitch streaming on OBS (pulls STREAM_KEY from SM, creates obs-secret, restarts OBS)
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:stage:cluster:up` first"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found — run `task k8s:stage:apply` first"
    cmds:
      - |
        set -euo pipefail
        sk=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id k8s/obs/twitch-stream-key --query SecretString --output text)
        kubectl create secret generic obs-secret \
          --from-literal=STREAM_KEY="$sk" \
          --dry-run=client -o yaml | kubectl apply -f - >/dev/null
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s
      - echo "OBS streaming to Twitch (adanalife_staging via stage-1 SM)"

  obs:stream:off:
    desc: disable Twitch streaming on OBS (deletes obs-secret, restarts OBS to idle)
    preconditions:
      - sh: command -v kubectl >/dev/null
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found"
    cmds:
      - kubectl delete secret obs-secret --ignore-not-found
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s
      - echo "OBS idle (not streaming)"

  k8s:logs:
    desc: tail logs across all app pods
    cmds:
      - kubectl logs -l app.kubernetes.io/part-of=tripbot --all-containers --tail=50 -f

  # Local kubectl port-forward wrappers for OBS / vlc-server VNC. The
  # host-access LoadBalancer overlays (k8s/apps/{obs,vlc-server}/overlays/local)
  # already expose VNC at host ports 5902 / 5903 via klipper-lb when the
  # local overlay is applied — these tasks are the cluster-agnostic
  # alternative when that overlay isn't in play (e.g. on stage-1, or
  # when iterating without applying the local overlay). Backgrounded
  # kubectl PID is parked under /tmp/adanalife-tasks/ so :down can
  # find it. Re-running :up overwrites the PID file; if :down can't
  # find a lingering kubectl, fall back to `pkill -f "port-forward svc/obs"`.
  obs:vnc:up:
    desc: start a local kubectl port-forward to OBS VNC at localhost:5902
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward svc/obs 5902:5900 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/obs-vnc.pid
      - 'echo "OBS VNC port-forward started — connect a VNC client to localhost:5902 (PID $(cat /tmp/adanalife-tasks/obs-vnc.pid))"'

  obs:vnc:down:
    desc: stop the local kubectl port-forward to OBS VNC
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/obs-vnc.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/obs-vnc.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/obs-vnc.pid
          echo "OBS VNC port-forward stopped"
        else
          echo "No OBS VNC port-forward PID file found — nothing to stop"
        fi

  obs:browser:refresh:
    desc: Refresh all OBS browser sources via websocket (k8s; port-forwards 4455 transiently)
    preconditions:
      - sh: command -v uv >/dev/null
        msg: "uv not found — install with `brew install uv`"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found — is the cluster up?"
    cmds:
      - |
        set -eo pipefail
        kubectl port-forward svc/obs 4455:4455 >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "$PF" 2>/dev/null || true; wait 2>/dev/null || true; }
        trap cleanup EXIT
        sleep 1
        OBS_WEBSOCKET_HOST=localhost \
        OBS_WEBSOCKET_PASSWD=$(kubectl get configmap obs-config -o jsonpath='{.data.OBS_WEBSOCKET_PASSWD}') \
        uv run --with obsws-python \
          {{.HOME}}/adanalife/tripbot/bin/obs-browser-refresh

  obs:media:restart:
    desc: Restart all OBS media sources (ffmpeg/vlc) via websocket — forces OBS to reconnect to the RTSP stream after a vlc-server restart
    preconditions:
      - sh: command -v uv >/dev/null
        msg: "uv not found — install with `brew install uv`"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found — is the cluster up?"
    cmds:
      - |
        set -eo pipefail
        kubectl port-forward svc/obs 4455:4455 >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "$PF" 2>/dev/null || true; wait 2>/dev/null || true; }
        trap cleanup EXIT
        sleep 1
        OBS_WEBSOCKET_HOST=localhost \
        OBS_WEBSOCKET_PASSWD=$(kubectl get configmap obs-config -o jsonpath='{.data.OBS_WEBSOCKET_PASSWD}') \
        uv run --with obsws-python \
          {{.HOME}}/adanalife/tripbot/bin/obs-media-restart

  vlc:vnc:up:
    desc: start a local kubectl port-forward to vlc-server VNC at localhost:5903
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward svc/vlc-server 5903:5900 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/vlc-vnc.pid
      - 'echo "vlc-server VNC port-forward started — connect a VNC client to localhost:5903 (PID $(cat /tmp/adanalife-tasks/vlc-vnc.pid))"'

  vlc:vnc:down:
    desc: stop the local kubectl port-forward to vlc-server VNC
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/vlc-vnc.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/vlc-vnc.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/vlc-vnc.pid
          echo "vlc-server VNC port-forward stopped"
        else
          echo "No vlc-server VNC port-forward PID file found — nothing to stop"
        fi

  talos:minipc:dashboard:
    desc: open the talosctl TUI dashboard against the minipc node
    cmds:
      - TALOSCONFIG={{.ROOT_DIR}}/talos/adanalife-minipc/talosconfig mise exec -- talosctl dashboard --nodes 192.168.1.200

  # tripbot operational tasks. Naming follows <tool>:<env>:<verb>[:<subverb>]
  # so it's clear which cluster each one targets. Aliases preserve the
  # older unscoped names while the schema migration is in flight.
  #
  # The :db:* tasks open kubectl port-forwards to the cluster Postgres
  # (a headless ClusterIP, otherwise unreachable from outside the cluster) —
  # primarily for the auth-bootstrap CLI and psql poking.
  tripbot:stage:db:up:
    desc: start a local kubectl port-forward to the stage cluster Postgres at localhost:5432
    aliases: [tripbot:db:up]
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward svc/postgres 5432:5432 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/tripbot-db.pid
      - 'echo "tripbot Postgres port-forward started — psql at localhost:5432 (PID $(cat /tmp/adanalife-tasks/tripbot-db.pid))"'

  tripbot:stage:db:down:
    desc: stop the local kubectl port-forward to the stage cluster Postgres
    aliases: [tripbot:db:down]
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/tripbot-db.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/tripbot-db.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/tripbot-db.pid
          echo "tripbot Postgres port-forward stopped"
        else
          echo "No tripbot Postgres port-forward PID file found — nothing to stop"
        fi

  tripbot:stage:db:seed:
    desc: run the one-shot DB seed Job in the stage cluster; idempotent — skips if videos table already has real rows
    aliases: [tripbot:db:seed]
    cmds:
      - kubectl apply -k k8s/apps/tripbot/overlays/stage-1
      # kubectl wait doesn't short-circuit on Failed when asked for
      # Complete — wait the full window then disambiguate after the fact.
      - |
        if ! kubectl wait --for=condition=complete --timeout=180s job/tripbot-seed; then
          if kubectl get job tripbot-seed -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' | grep -q True; then
            echo "seed job failed"
          else
            echo "seed job timed out after 180s (still pending)"
          fi
          exit 1
        fi
      - kubectl logs job/tripbot-seed

  tripbot:stage:auth:bootstrap:
    desc: run the interactive Twitch OAuth bootstrap job against stage-1; port-forwards 8080 so the browser callback reaches the pod
    aliases: [tripbot:auth:bootstrap]
    cmds:
      - kubectl delete job tripbot-auth-bootstrap --ignore-not-found
      - kubectl apply -k k8s/apps/tripbot/overlays/stage-1
      - until kubectl get pod -l job-name=tripbot-auth-bootstrap --no-headers 2>/dev/null | grep -q Running; do sleep 1; done
      - until kubectl logs -l job-name=tripbot-auth-bootstrap 2>/dev/null | grep -q "id.twitch.tv"; do sleep 1; done
      - kubectl logs -l job-name=tripbot-auth-bootstrap
      - echo "Port-forwarding localhost:8080 → job pod. Open the URL above in your browser."
      - kubectl port-forward job/tripbot-auth-bootstrap 8080:8080 2>/dev/null || true
      - echo "Bootstrap complete — token written to cluster Postgres."

  tripbot:prod:auth:bootstrap:
    desc: run the interactive Twitch OAuth bootstrap job against prod-1; port-forwards 8080 so the browser callback reaches the pod
    cmds:
      # The auth-bootstrap Job is deliberately NOT part of the prod-1
      # umbrella overlay (would otherwise re-run every k8s:prod:apply and
      # burn its 5min timeout). Standalone manifest at
      # k8s/apps/tripbot/overlays/prod-1/auth-bootstrap.yaml carries
      # prod-shaped envFroms (tripbot-twitch-creds, tripbot-database-creds,
      # tripbot-google-maps-api-key) and direct env: literals for the
      # config-required values.
      - kubectl delete job tripbot-auth-bootstrap --ignore-not-found
      - kubectl apply -f k8s/apps/tripbot/overlays/prod-1/auth-bootstrap.yaml
      - until kubectl get pod -l job-name=tripbot-auth-bootstrap --no-headers 2>/dev/null | grep -q Running; do sleep 1; done
      - until kubectl logs -l job-name=tripbot-auth-bootstrap 2>/dev/null | grep -q "id.twitch.tv"; do sleep 1; done
      - kubectl logs -l job-name=tripbot-auth-bootstrap
      - echo "Port-forwarding localhost:8080 → job pod. Open the URL above in your browser."
      - kubectl port-forward job/tripbot-auth-bootstrap 8080:8080 2>/dev/null || true
      - 'echo "Bootstrap complete — token written to prod Postgres. Run \`kubectl rollout restart deploy/tripbot\` to bring the bot online."'
