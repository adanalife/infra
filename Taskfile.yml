version: '3'

tasks:
  # Terraform: tf:<env>:<verb>. Extra flags pass via the `--` separator,
  # e.g. `task tf:stage:init -- -upgrade` or `task tf:stage:plan -- -target=…`.
  tf:stage:apply:
    desc: terraform apply against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform apply {{.CLI_ARGS}}

  tf:stage:plan:
    desc: terraform plan against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform plan {{.CLI_ARGS}}

  tf:stage:init:
    desc: terraform init against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform init {{.CLI_ARGS}}

  tf:stage:init:reconfigure:
    desc: terraform init -reconfigure against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:stage:init:migrate:
    desc: terraform init -migrate-state against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:stage:destroy:
    desc: terraform destroy against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform destroy {{.CLI_ARGS}}

  tf:prod:apply:
    desc: terraform apply against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform apply {{.CLI_ARGS}}

  tf:prod:plan:
    desc: terraform plan against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform plan {{.CLI_ARGS}}

  tf:prod:init:
    desc: terraform init against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform init {{.CLI_ARGS}}

  tf:prod:init:reconfigure:
    desc: terraform init -reconfigure against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:prod:init:migrate:
    desc: terraform init -migrate-state against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:prod:destroy:
    desc: terraform destroy against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform destroy {{.CLI_ARGS}}

  # Core uses --no-session because session tokens can't make IAM changes.
  tf:core:apply:
    desc: terraform apply against core (no session token; IAM changes need full creds)
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform apply {{.CLI_ARGS}}

  tf:core:plan:
    desc: terraform plan against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform plan {{.CLI_ARGS}}

  tf:core:init:
    desc: terraform init against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform init {{.CLI_ARGS}}

  tf:core:init:reconfigure:
    desc: terraform init -reconfigure against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:core:init:migrate:
    desc: terraform init -migrate-state against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:core:destroy:
    desc: terraform destroy against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform destroy {{.CLI_ARGS}}

  # Append the host's current public IP (via ifconfig.me) to the
  # stage-1/allowlist-cidrs list in Secrets Manager, deduping with
  # jq. Use this when your home IP rotates and you're locked out of
  # tripbot.whalecore.com. terraform reads the updated value via
  # data source on the next `task tf:stage:apply`. To remove stale
  # entries or add a non-current CIDR, edit the secret directly:
  #   aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
  #     --secret-id stage-1/allowlist-cidrs --secret-string '["X.X.X.X/32", ...]'
  stage:allowlist:add-current-ip:
    desc: append your current public IP to stage-1/allowlist-cidrs
    cmds:
      - |
        ip=$(curl -fsS ifconfig.me) || { echo "could not detect public IP"; exit 1; }
        cidr="$ip/32"
        updated=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id stage-1/allowlist-cidrs --query SecretString --output text \
          | jq --arg c "$cidr" '. + [$c] | unique')
        aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
          --secret-id stage-1/allowlist-cidrs --secret-string "$updated" >/dev/null
        echo "allowlist-cidrs is now:"
        echo "$updated" | jq .
        echo "Run 'task tf:stage:apply' to apply."

  # `aws-vault login` opens the AWS web console in browser
  aws:login:stage:
    cmds:
      - aws-vault login adanalife-stage

  aws:login:prod:
    cmds:
      - aws-vault login adanalife-prod

  aws:login:core:
    cmds:
      - aws-vault login adanalife-core

  # GCP — single bootstrap helper today, used by the tripbot prod-1 Maps
  # credential mint (see vault/tripbot/credentials.md → Google Maps section).
  # If/when more GCP resources show up here, lift this to a hashicorp/google
  # provider in terraform/prod-1/; the migration TODO lives in vault/infra/TODO.md.
  # Pre-req: `gcloud auth login` once + billing attached to the target project.
  gcp:prod:mint-maps-key:
    desc: mint a fresh Maps API key on tripbot-prod (Geocoding + Maps JavaScript only) and print the keyString to stdout
    silent: true
    vars:
      PROJECT: tripbot-prod
      NAME: '{{.NAME | default "tripbot-prod-1"}}'
    cmds:
      - |
        set -euo pipefail
        echo "Enabling API Keys + Geocoding + Maps JavaScript APIs on {{.PROJECT}}..." >&2
        # apikeys.googleapis.com is the meta-API for managing API keys
        # (what the `api-keys create` subcommand below talks to). It's a
        # separate enablement from the Maps APIs the minted key actually uses.
        # Without it, the first run on a fresh project fails with
        # PERMISSION_DENIED / SERVICE_DISABLED.
        gcloud services enable \
          apikeys.googleapis.com \
          geocoding-backend.googleapis.com \
          maps-backend.googleapis.com \
          --project={{.PROJECT}} >&2
        echo "Minting API key '{{.NAME}}' on {{.PROJECT}}..." >&2
        KEY_RESOURCE=$(gcloud alpha services api-keys create \
          --display-name='{{.NAME}}' \
          --api-target=service=geocoding-backend.googleapis.com \
          --api-target=service=maps-backend.googleapis.com \
          --project={{.PROJECT}} \
          --format='value(response.name)' \
          --quiet)
        echo "Created key resource: $KEY_RESOURCE" >&2
        # The keyString is the ONLY line on stdout — capture with:
        #   export PROD_GOOGLE_MAPS_API_KEY=$(task gcp:prod:mint-maps-key)
        gcloud alpha services api-keys get-key-string "$KEY_RESOURCE" \
          --format='value(keyString)' \
          --quiet

  # k3d cluster lifecycle. Tasks are env-prefixed (k8s:dev:* / k8s:prod:*)
  # following the tf:stage:* / tf:prod:* pattern; the cluster name embedded
  # in each k3d-config is host-based (adanalife-bees, adanalife-empty) so
  # the cluster identity survives any future env-reassignment.
  #
  # Lifecycle verbs:
  #   up      → create the cluster (first time)
  #   down    → delete the cluster (full wipe)
  #   stop    → suspend the cluster (containers down, definition + state preserved)
  #   start   → resume a stopped cluster (counterpart to stop)
  #   rebuild → up + platform:up + apply, the canonical "cold-start to fully
  #             deployed" sequence; each step delegates to its canonical task
  k8s:dev:cluster:up:
    desc: "create the local k3d cluster on bees (development) — example video by default; pass DASHCAM_NAS=<host path> to also mount a real dashcam dir at /host/nas-dashcam for the development-nas overlay"
    cmds:
      # Development plays the committed example video (mounted at
      # /host/dashcam) by default — the 99% case. To stream a real dashcam
      # directory instead, pass its host path as DASHCAM_NAS=<path>; it's
      # bind-mounted :ro at /host/nas-dashcam for the development-nas
      # overlay (task k8s:dev:apply-nas). The path is a runtime arg so the
      # real footage location never gets committed. k3d bind-mounts are
      # fixed at create time, so this must be set on cluster:up, not apply.
      - |
        if [ -n "{{.DASHCAM_NAS}}" ]; then
          echo "mounting dashcam: {{.DASHCAM_NAS}} -> /host/nas-dashcam (:ro)"
          k3d cluster create -c k8s/k3d-config.bees.yaml --volume "{{.DASHCAM_NAS}}:/host/nas-dashcam:ro@server:*"
        else
          k3d cluster create -c k8s/k3d-config.bees.yaml
        fi

  k8s:dev:cluster:down:
    desc: tear down the local k3d cluster on bees (delete; use k8s:dev:cluster:stop to suspend without wipe)
    cmds:
      - k3d cluster delete adanalife-bees

  k8s:dev:cluster:stop:
    desc: suspend the local k3d cluster on bees (containers down, cluster definition + state preserved)
    cmds:
      - k3d cluster stop adanalife-bees

  k8s:dev:cluster:start:
    desc: resume a stopped local k3d cluster on bees (counterpart to k8s:dev:cluster:stop)
    cmds:
      - k3d cluster start adanalife-bees

  k8s:dev:cluster:rebuild:
    desc: Full bees-cluster rebuild — cluster + platform helm charts (which triggers ESO bootstrap secrets as a dep) + development app manifests. Each step is the canonical task; failures short-circuit the chain.
    cmds:
      - task: k8s:dev:cluster:up
      - task: k8s:dev:platform:up
      - task: k8s:dev:apply

  # prod-1 is the bare-metal Talos mini-PC (192.168.1.200), not a k3d
  # cluster — its lifecycle is talosctl wipe-and-rebuild (see
  # vault/infra/adanalife-minipc-bootstrap.md). The k8s:prod:* tasks below
  # (bootstrap-secrets / platform:up / apply) target the live Talos cluster;
  # there is no k8s:prod:cluster:* (the old k3d-on-empty tasks were vestigial
  # and were dropped post-convergence).

  k8s:import-images:
    desc: build the tripbot/vlc/obs images and import them into the local cluster
    dir: ../tripbot
    cmds:
      # --project-directory + --env-file mirror bin/devenv so build contexts
      # resolve relative to the tripbot repo root and ${VAR} substitutions in
      # the compose file pick up env.docker. Without these, compose resolves
      # `context: .` against the compose file's dir and the build fails with
      # `lstat .../infra/docker/infra: no such file or directory`.
      #
      # On arm64 hosts (Apple Silicon), layer docker-compose.arm64.yml so
      # the OBS service builds from Dockerfile.arm64 (compiles OBS + CEF
      # from source). Without it, the amd64 Dockerfile runs natively on
      # arm64, the OBS PPA has no arm64 packages, and apt silently falls
      # back to Ubuntu universe's obs-studio +dfsg build (CEF stripped),
      # so browser_source silently fails at scene load. First arm64 build
      # takes ~30 min for the CEF compile; cached thereafter.
      - |
        args="--project-directory . --env-file infra/docker/env.docker -f infra/docker/docker-compose.yml"
        case "$(uname -m)" in
          arm64|aarch64) args="$args -f infra/docker/docker-compose.arm64.yml" ;;
        esac
        docker compose $args build
      - k3d image import adanalife/tripbot:latest --cluster=adanalife-bees
      - k3d image import adanalife/vlc:latest --cluster=adanalife-bees
      - k3d image import adanalife/obs:latest --cluster=adanalife-bees

  # Restart an app deployment so its pods re-pull the image. Pairs
  # with `k8s:import-images` — after importing rebuilt images into
  # k3d, restart the deployment to roll new pods that fetch the
  # freshly-imported tag. imagePullPolicy: Always on these
  # deployments (#411) means "rollout restart" is sufficient; no
  # need to bump tags or delete the cached image first.
  k8s:rollout:tripbot:
    desc: restart the tripbot deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/tripbot
      - kubectl rollout status deploy/tripbot --timeout=120s

  k8s:rollout:vlc-server:
    desc: restart the vlc-server deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/vlc-server
      - kubectl rollout status deploy/vlc-server --timeout=120s

  k8s:rollout:obs:
    desc: restart the obs deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s

  k8s:rollout:all:
    desc: restart all three app deployments (tripbot + vlc-server + obs)
    aliases: [k8s:rollout]
    deps: [k8s:rollout:tripbot, k8s:rollout:vlc-server, k8s:rollout:obs]

  # The k8s:*:diff tasks below are server-side dry-run previews (read-only) of
  # what the matching :apply would change. Each :apply runs its diff first so
  # there's always a preview before the cluster is mutated. The diff is
  # best-effort — `kubectl diff` exits non-zero when a diff exists (and on a
  # missing cluster), so it's `|| true`'d to never abort the apply. Deliberately
  # NOT a blocking confirmation prompt: k8s:dev:apply is called by other tasks
  # (k8s:dev:cluster:up) and would deadlock a non-interactive run.

  k8s:diff:
    desc: preview (server-side dry-run) what k8s:apply would change on the local cluster
    cmds:
      - kubectl diff -k k8s/overlays/local || true

  k8s:apply:
    desc: apply the local app manifests to the cluster
    cmds:
      - task: k8s:diff
      - kubectl apply -k k8s/overlays/local

  k8s:dev:diff:
    desc: preview (server-side dry-run) what k8s:dev:apply would change
    cmds:
      - kubectl diff -k k8s/overlays/development || true

  k8s:dev:apply:
    desc: apply development overlay (apps only — bring up cloudflared separately via k8s:dev:tunnel:up)
    cmds:
      - task: k8s:dev:diff
      - kubectl apply -k k8s/overlays/development

  k8s:dev:apply-nas:
    desc: "apply development-nas overlay — vlc-server reads dashcam from /host/nas-dashcam (requires the cluster to have been created with DASHCAM_NAS=<host path> set; see k8s:dev:cluster:up)"
    cmds:
      - kubectl diff -k k8s/overlays/development-nas || true
      - kubectl apply -k k8s/overlays/development-nas

  k8s:prod:diff:
    desc: preview (server-side dry-run) what k8s:prod:apply would change
    cmds:
      - kubectl diff -k k8s/overlays/prod-1 || true

  k8s:prod:apply:
    desc: apply prod-1 overlay (shared-secrets + postgres + vlc-server; tripbot/obs added when their prod-1 overlays land)
    cmds:
      - task: k8s:prod:diff
      - kubectl apply -k k8s/overlays/prod-1

  k8s:stage:diff:
    desc: preview (server-side dry-run) what k8s:stage:apply would change
    cmds:
      - kubectl diff -k k8s/overlays/stage-1 || true

  k8s:stage:apply:
    desc: apply the stage-1 overlay (shared-secrets + postgres + tripbot + vlc-server + OBS) + stage external-dns into the mini-PC cluster
    deps: [k8s:stage:bootstrap-secrets]
    preconditions:
      - sh: test -f k8s/external-dns/stage-1/values.local.yml
        msg: "k8s/external-dns/stage-1/values.local.yml missing — run `task k8s:stage:bootstrap-secrets` first"
    cmds:
      - task: k8s:stage:diff
      # Pre-reqs: task tf:stage:apply (postgres creds), task
      # k8s:stage:bootstrap-secrets (stage ESO store + external-dns
      # values.local), and a populated
      # k8s/apps/vlc-server/overlays/stage-1/dashcam-nfs.local.yaml.
      #
      # Stage reuses prod's SHARED platform stack (traefik / ESO operator /
      # cert-manager controller / monitoring) — there is still no
      # k8s:stage:platform:up. The one env-specific platform piece is
      # external-dns: stage runs its OWN in stage-1-platform, reading the
      # adanalife-stage account so it can write the stage.whereisdana.today
      # zone (no cross-account). The namespaced cert-manager Issuers ship in
      # the umbrella below.
      - kubectl apply -k k8s/overlays/stage-1
      # Stage external-dns (own instance, stage account, stage zone). The
      # kustomize apply creates stage-1-platform + its SecretStore +
      # ExternalSecret; the helm release name differs from prod's
      # (external-dns-stage) because the chart's RBAC is cluster-scoped.
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo update external-dns
      - kubectl apply -k k8s/external-dns/stage-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n stage-1-platform
      - helm upgrade --install external-dns-stage external-dns/external-dns
          -n stage-1-platform
          -f k8s/external-dns/stage-1/config.yml
          -f k8s/external-dns/stage-1/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns-stage -n stage-1-platform
      - 'echo "stage external-dns up in stage-1-platform. *.stage.whereisdana.today records now publish to the adanalife-stage zone."'

  # Cloudflare Tunnel client. Opt-in: not part of `cluster:rebuild`
  # nor `k8s:dev:apply`. Brings up the `cloudflared` namespace, seeds
  # the tunnel-token Secret from terraform output, and applies the
  # Deployment in one gesture.
  #
  # **development only** — there is no tunnel in prod-1.
  #
  # The status check makes re-runs cheap (no aws-vault / keybase
  # reprompt). `task --force k8s:dev:tunnel:up` force-rotates the
  # token if the underlying tunnel is recreated.
  k8s:dev:tunnel:up:
    desc: bring up the cloudflared tunnel client (namespace + token Secret + Deployment)
    status:
      - kubectl get secret cloudflared-secret -n cloudflared >/dev/null 2>&1
      - kubectl get deploy cloudflared -n cloudflared >/dev/null 2>&1
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:dev:cluster:up` first"
    cmds:
      # Ensure namespace exists before the secret lands in it. The
      # kustomize apply below also declares the namespace; this is
      # the cheap insurance for the secret create that runs first.
      - kubectl create namespace cloudflared --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret cloudflared-secret -n cloudflared >/dev/null 2>&1; then
          echo "cloudflared-secret already present, skipping"
        else
          set -euo pipefail
          token=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw cloudflared_tunnel_token)
          kubectl create secret generic cloudflared-secret \
            --namespace=cloudflared \
            --from-literal=TUNNEL_TOKEN="$token" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "applied cloudflared-secret Secret to cloudflared namespace"
        fi
      - kubectl apply -k k8s/platform/cloudflared/overlays/development
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/cloudflared -n cloudflared
      - echo "cloudflared up. Tunnel routes (terraform/stage-1/cloudflare-tunnel.tf) now have a client."

  k8s:dev:tunnel:down:
    desc: tear down the cloudflared tunnel client (Deployment + Secret + namespace)
    preconditions:
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster"
    cmds:
      # Deleting the namespace via the kustomize manifest sweeps the
      # Deployment and the out-of-band Secret with it. --ignore-not-found
      # keeps the task idempotent across repeat runs.
      - kubectl delete -k k8s/platform/cloudflared/overlays/development --ignore-not-found

  # Bootstrap the cluster Secrets that don't survive a recreate but
  # have to exist before the platform stack can come up:
  #
  #   - eso-aws-credentials   (external-secrets namespace) — ESOSecretsReader
  #     IAM access key for ESO to read SM. PGP-decrypted via keybase.
  #
  # The cloudflared tunnel token is bootstrapped separately by
  # `k8s:dev:tunnel:up` so the tunnel stays opt-in (it's development-env-only
  # only and will eventually be retired in favor of the
  # external-dns/traefik HTTPS path).
  #
  # Comes from `task tf:<env>:apply` outputs and stays in a shell
  # variable only (never written to disk). Re-runs idempotently:
  # the bootstrap block skips when its target Secret already exists,
  # so `task --force k8s:<env>:bootstrap-secrets` is the way to
  # force-rotate after a TF output changes (e.g., access-key rotation).
  #
  # Used as a dep by `k8s:<env>:platform:up` so the platform stack always
  # has its credentials, but the inner status checks make repeat runs
  # cheap (no aws-vault / keybase reprompt when nothing's missing).
  k8s:dev:bootstrap-secrets:
    desc: apply development ESO bootstrap Secret + write external-dns values.local.yml (no plaintext on disk)
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n development >/dev/null 2>&1
      - test -f k8s/external-dns/development/values.local.yml
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault` (see infra/README.md)"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: command -v curl >/dev/null
        msg: "curl not found — required to fetch host public IP for external-dns default-targets"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:dev:cluster:up` first"
    cmds:
      # eso-aws-credentials (ESOSecretsReader, adanalife-stage account that
      # dev borrows) goes in BOTH external-secrets (for the
      # aws-secretsmanager-cluster ClusterSecretStore platform components
      # use) AND the development namespace (for the namespaced
      # aws-secretsmanager SecretStore the apps use).
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace development --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n development >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          for ns in external-secrets development; do
            kubectl create secret generic eso-aws-credentials \
              --namespace="$ns" \
              --from-literal=AWS_ACCESS_KEY_ID="$ak" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "applied eso-aws-credentials Secret to external-secrets + development namespaces"
        fi
      # external-dns values.local.yml: per-machine helm override holding
      # the bees host's current LAN IP, fed to external-dns as
      # --default-targets so any Ingress without an explicit
      # external-dns.alpha.kubernetes.io/target annotation resolves to
      # this machine on the LAN. We publish the LAN IP (not the public
      # one) so app Ingresses are reachable on-LAN over real HTTPS
      # (cert via DNS-01) without a router port-forward — same shape as
      # prod/stage on the mini-PC. File-based (not a Secret) because helm
      # values are consumed at chart install, not at pod runtime — re-run
      # this task and `task k8s:dev:platform:up` after a LAN-IP change.
      - |
        values_file=k8s/external-dns/development/values.local.yml
        if [ -f "$values_file" ]; then
          echo "$values_file already present, skipping"
        else
          set -euo pipefail
          # The bees cluster is local k3d on this macOS host; publish its
          # LAN IPv4 (en0 wifi, falling back to en1 ethernet). Route53 A
          # records can only point at v4 addresses.
          ip=$(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null)
          if [ -z "$ip" ]; then
            echo "could not determine LAN IP (en0/en1) — is the host online?" >&2
            exit 1
          fi
          cat > "$values_file" <<YAML
        # Generated by \`task k8s:dev:bootstrap-secrets\` — bees host LAN IP
        # snapshot for external-dns --default-targets. Re-run the task
        # after a LAN-IP change, then \`task k8s:dev:platform:up\` to roll
        # the chart with the new value.
        #
        # --force-default-targets is required because traefik writes
        # the cluster-internal klipper-lb IP into Ingress.status, and
        # external-dns prefers source-provided targets unless told to
        # override them with the default.
        extraArgs:
          - --default-targets=$ip
          - --force-default-targets
        YAML
          echo "wrote $values_file (default-targets=$ip)"
        fi

  # prod-1 sibling — same shape minus the cloudflared block (no tunnel
  # in prod-1 in this pass). Reads from terraform/prod-1 via the
  # adanalife-prod aws-vault profile, writes the external-dns values
  # file into k8s/external-dns/prod-1/.
  k8s:prod:bootstrap-secrets:
    desc: apply prod-1 ESO bootstrap Secret + write external-dns/traefik values.local.yml (no plaintext on disk)
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n prod-1 >/dev/null 2>&1
      - test -f k8s/external-dns/prod-1/values.local.yml
      - test -f k8s/traefik/values.local.yml
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first (also the source of the node InternalIP target)"
    cmds:
      # eso-aws-credentials goes in THREE namespaces (same prod-account
      # creds in all): external-secrets (for the aws-secretsmanager-cluster
      # ClusterSecretStore the kube-system platform components use), prod-1
      # (for the namespaced aws-secretsmanager SecretStore the apps use), and
      # prod-1-platform (for the namespaced store external-dns reads).
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace prod-1 --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace prod-1-platform --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n prod-1 >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n prod-1-platform >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-prod -- terraform -chdir=terraform/prod-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-prod -- terraform -chdir=terraform/prod-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          for ns in external-secrets prod-1 prod-1-platform; do
            kubectl create secret generic eso-aws-credentials \
              --namespace="$ns" \
              --from-literal=AWS_ACCESS_KEY_ID="$ak" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "applied eso-aws-credentials Secret to external-secrets + prod-1 + prod-1-platform namespaces"
        fi
      - |
        set -euo pipefail
        # adanalife-minipc is LAN-only by design (no public ingress yet), so
        # external-dns publishes Route53 records at the node's LAN IP, and
        # traefik stamps the same IP into managed Ingress statuses
        # (ingressEndpoint.ip). Discover it from the node's InternalIP rather
        # than hardcoding it in committed manifests — override with
        # EXTERNAL_DNS_TARGET_IP=<ip> for non-default cases.
        ip="${EXTERNAL_DNS_TARGET_IP:-$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')}"
        [ -n "$ip" ] || { echo "could not determine node InternalIP — set EXTERNAL_DNS_TARGET_IP=<ip>"; exit 1; }

        edns_file=k8s/external-dns/prod-1/values.local.yml
        if [ -f "$edns_file" ]; then
          echo "$edns_file already present, skipping"
        else
          cat > "$edns_file" <<YAML
        # Generated by \`task k8s:prod:bootstrap-secrets\` — LAN IP target for
        # external-dns --default-targets, discovered from the node's InternalIP.
        # Override via EXTERNAL_DNS_TARGET_IP; delete + re-run to regenerate.
        extraArgs:
          - --default-targets=$ip
          - --force-default-targets
        YAML
          echo "wrote $edns_file (default-targets=$ip)"
        fi

        traefik_file=k8s/traefik/values.local.yml
        if [ -f "$traefik_file" ]; then
          echo "$traefik_file already present, skipping"
        else
          cat > "$traefik_file" <<YAML
        # Generated by \`task k8s:prod:bootstrap-secrets\` — the node's LAN IP,
        # discovered from its InternalIP, for traefik's ingressEndpoint.ip.
        # Traefik stamps this into every managed Ingress's status so external-dns
        # publishes it without a per-Ingress target annotation. Override via
        # EXTERNAL_DNS_TARGET_IP; delete + re-run to regenerate.
        providers:
          kubernetesIngress:
            ingressEndpoint:
              ip: $ip
        YAML
          echo "wrote $traefik_file (ingressEndpoint.ip=$ip)"
        fi

  # Stage-1 ESO bootstrap on the mini-PC Talos cluster. Seeds the
  # adanalife-stage reader creds as eso-aws-credentials into BOTH stage-1
  # (the app namespace's aws-secretsmanager SecretStore, shipped in the
  # umbrella) and stage-1-platform (the namespaced store stage's own
  # external-dns reads). Stage does NOT touch external-secrets — prod owns
  # the cluster-scoped aws-secretsmanager-cluster store there. Isolation is
  # by AWS account (stage creds only read the stage account) AND by
  # namespace (the stores are unreachable from prod). Also writes the
  # stage external-dns values.local.yml (stage now has its OWN external-dns
  # in stage-1-platform, reading the stage account). Point kubectl at
  # adanalife-minipc.
  k8s:stage:bootstrap-secrets:
    desc: seed the stage-1 ESO bootstrap Secret (adanalife-stage account) into stage-1 + stage-1-platform + write stage external-dns values.local.yml (mini-PC cluster)
    status:
      - kubectl get secret eso-aws-credentials -n stage-1 >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n stage-1-platform >/dev/null 2>&1
      - test -f k8s/external-dns/stage-1/values.local.yml
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: command -v curl >/dev/null
        msg: "curl not found — required to fetch host public IP for external-dns default-targets"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first"
    cmds:
      - kubectl create namespace stage-1 --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace stage-1-platform --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n stage-1 >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n stage-1-platform >/dev/null 2>&1; then
          echo "eso-aws-credentials already present in stage-1 + stage-1-platform, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          for ns in stage-1 stage-1-platform; do
            kubectl create secret generic eso-aws-credentials \
              --namespace="$ns" \
              --from-literal=AWS_ACCESS_KEY_ID="$ak" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "applied eso-aws-credentials Secret to stage-1 + stage-1-platform namespaces"
        fi
      # The stage SecretStore (aws-secretsmanager, namespaced) ships in both
      # the stage-1 umbrella and k8s/external-dns/stage-1.
      - |
        values_file=k8s/external-dns/stage-1/values.local.yml
        if [ -f "$values_file" ]; then
          echo "$values_file already present, skipping"
        else
          set -euo pipefail
          # adanalife-minipc is LAN-only; external-dns publishes the node's
          # LAN IP. Override via EXTERNAL_DNS_TARGET_IP=<ip>.
          ip="${EXTERNAL_DNS_TARGET_IP:-192.168.1.200}"
          cat > "$values_file" <<YAML
        # Generated by \`task k8s:stage:bootstrap-secrets\` — LAN IP target
        # for the stage external-dns --default-targets. Override default via
        # EXTERNAL_DNS_TARGET_IP env var, or hand-edit this file.
        extraArgs:
          - --default-targets=$ip
          - --force-default-targets
        YAML
          echo "wrote $values_file (default-targets=$ip)"
        fi

  # Install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring
  # into the local cluster. Idempotent — re-run after a cluster recreate or
  # to upgrade any chart. Depends on `k8s:<env>:bootstrap-secrets`, which
  # auto-skips when its bootstrap targets already exist (so the common
  # path doesn't re-prompt for aws-vault + keybase).
  #
  # k8s-monitoring requires the k8s/grafana-cloud-metrics-write SM value
  # to have been seeded out-of-band first; if it hasn't, the ExternalSecret
  # materialization will fail and the helm install won't run. See
  # vault/infra/grafana-cloud-bootstrap.md.
  #
  # Traefik: the bundled k3s Traefik is disabled via --disable=traefik in
  # the k3d configs, so this task is the only thing that brings up an
  # ingress controller. App Ingresses (`ingressClassName: traefik`) don't
  # reach anything until this runs.
  #
  # external-dns: publishes Route53 records for any Ingress annotated with
  # `external-dns.alpha.kubernetes.io/hostname`. Default target IP comes
  # from values.local.yml (per-machine, written by
  # k8s:<env>:bootstrap-secrets from `curl -4 ifconfig.me`).
  #
  # cert-manager: issues LE certs via DNS-01 against Route53 for any
  # Ingress annotated with `cert-manager.io/cluster-issuer`. Issuance
  # works regardless of inbound network state — only serving TLS does.
  # A smoke-test Certificate (cert-test.<env>.whereisdana.today, LE
  # staging) ships in the cert-manager kustomize so the pipeline is
  # exercised even before any app Ingress requests a cert.
  k8s:dev:platform:up:
    desc: install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring into the bees cluster
    deps: [k8s:dev:bootstrap-secrets]
    preconditions:
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:dev:cluster:up` first"
      - sh: test -f k8s/external-dns/development/values.local.yml
        msg: "k8s/external-dns/development/values.local.yml missing — run `task k8s:dev:bootstrap-secrets` first"
    cmds:
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo add jetstack https://charts.jetstack.io
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/cluster-store
      - echo "ESO up. ClusterSecretStore aws-secretsmanager-cluster is ready for platform ExternalSecret consumers; per-namespace SecretStores come up with each env's apply."
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up. App Ingresses (ingressClassName=traefik) will route through this."'
      - kubectl apply -k k8s/external-dns/development
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n kube-system
      - helm upgrade --install external-dns external-dns/external-dns
          -n kube-system
          -f k8s/external-dns/development/config.yml
          -f k8s/external-dns/development/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns -n kube-system
      - 'echo "external-dns up. Annotate an Ingress with external-dns.alpha.kubernetes.io/hostname to publish a Route53 record."'
      - helm upgrade --install cert-manager jetstack/cert-manager
          -n kube-system
          -f k8s/cert-manager/development/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment -n kube-system -l app.kubernetes.io/instance=cert-manager
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clusterissuers.cert-manager.io
          crd/certificates.cert-manager.io
      - kubectl apply -k k8s/cert-manager/development
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/cert-manager-aws-credentials -n kube-system
      - 'echo "cert-manager up. Annotate an Ingress with cert-manager.io/cluster-issuer=letsencrypt-staging-route53 to request a cert."'
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      # PSA-privileged namespace for the isolated node-exporter install
      # below — see k8s/monitoring/host-namespace.yml for why this is
      # split out from the main k8s-monitoring chart. Applied via
      # kubectl (not kustomize) because env-specific kustomizations
      # can't reference a shared file outside their directory.
      - kubectl apply -f k8s/monitoring/host-namespace.yml
      - kubectl apply -k k8s/monitoring/development
      - helm upgrade --install node-exporter prometheus-community/prometheus-node-exporter
          -n monitoring-host
          -f k8s/monitoring/node-exporter/values.yml
      - kubectl rollout status daemonset/node-exporter-prometheus-node-exporter
          -n monitoring-host --timeout=120s
      - 'echo "node-exporter up in monitoring-host (privileged); alloy-metrics discovers it via prometheus.io/scrape annotations."'
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Has k8s/grafana-cloud-metrics-write been seeded? See vault/infra/grafana-cloud-bootstrap.md."; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/development/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."

  # prod-1 sibling — same shape, references k8s/<component>/prod-1/ paths.
  # KEEP-IN-SYNC with k8s:dev:platform:up; structural changes should
  # mirror to both unless deliberately env-specific.
  k8s:prod:platform:up:
    desc: install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring into the empty cluster
    deps: [k8s:prod:bootstrap-secrets]
    preconditions:
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first"
      - sh: test -f k8s/external-dns/prod-1/values.local.yml
        msg: "k8s/external-dns/prod-1/values.local.yml missing — run `task k8s:prod:bootstrap-secrets` first"
      - sh: test -f k8s/traefik/values.local.yml
        msg: "k8s/traefik/values.local.yml missing — run `task k8s:prod:bootstrap-secrets` first"
    cmds:
      # Cilium FIRST — it is the CNI + kube-proxy replacement (Talos installs
      # neither; see controlplane.patch.yaml). Until it's up the node is
      # NotReady and nothing else can schedule, so it precedes everything.
      # KubePrism (localhost:7445) gives the agent a stable kube-apiserver
      # endpoint with no kube-proxy / ClusterIP dependency.
      - helm repo add cilium https://helm.cilium.io/
      - helm repo update
      - helm upgrade --install cilium cilium/cilium
          -n kube-system
          -f k8s/cilium/values.yml
      - kubectl -n kube-system rollout status daemonset/cilium --timeout=180s
      - kubectl wait --for=condition=Ready node --all --timeout=180s
      - 'echo "Cilium up; node Ready. CNI + eBPF kube-proxy replacement online."'
      # local-path-provisioner — cluster storage backing. Must precede any
      # PVC-consuming workload (postgres). Codified from the former manual
      # bootstrap-runbook Phase 5.0 steps; see k8s/local-path-provisioner/prod-1.
      - kubectl apply -k k8s/local-path-provisioner/prod-1
      - kubectl rollout status deployment/local-path-provisioner -n local-path-storage --timeout=120s
      - 'echo "local-path-provisioner up. StorageClass local-path available; local-path-retain comes from the postgres overlay."'
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo add jetstack https://charts.jetstack.io
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/cluster-store
      - echo "ESO up. ClusterSecretStore aws-secretsmanager-cluster is ready for platform ExternalSecret consumers; per-namespace SecretStores come up with each env's apply."
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
          -f k8s/traefik/values.prod-1.yml
          -f k8s/traefik/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up on hostNetwork (binds 192.168.1.200:80/443 directly). App Ingresses (ingressClassName=traefik) will route through this."'
      # Dashboard Ingress (traefik.prod.whereisdana.today, LAN-only). Plain
      # Ingress rather than the chart's IngressRoute so external-dns publishes
      # the Route53 record; DNS + cert reconcile once external-dns/cert-manager
      # come up below.
      - kubectl apply -f k8s/traefik/prod-1/dashboard-ingress.yaml
      # external-dns runs in the prod-1-platform namespace (not kube-system)
      # so the prod-1 app namespace stays pod-clean. The kustomize apply
      # creates the namespace + its namespaced aws-secretsmanager SecretStore
      # + the external-dns ExternalSecret (reading the prod account, no
      # cross-account). It watches Ingresses cluster-wide (chart ClusterRole)
      # and publishes prod.whereisdana.today records — including the platform
      # ingresses in kube-system (hubble/traefik).
      - kubectl apply -k k8s/external-dns/prod-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n prod-1-platform
      - helm upgrade --install external-dns external-dns/external-dns
          -n prod-1-platform
          -f k8s/external-dns/prod-1/config.yml
          -f k8s/external-dns/prod-1/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns -n prod-1-platform
      - 'echo "external-dns up in prod-1-platform. Annotate an Ingress with external-dns.alpha.kubernetes.io/hostname to publish a Route53 record."'
      - helm upgrade --install cert-manager jetstack/cert-manager
          -n kube-system
          -f k8s/cert-manager/prod-1/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment -n kube-system -l app.kubernetes.io/instance=cert-manager
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clusterissuers.cert-manager.io
          crd/certificates.cert-manager.io
      - kubectl apply -k k8s/cert-manager/prod-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/cert-manager-aws-credentials -n kube-system
      - 'echo "cert-manager up. Annotate an Ingress with cert-manager.io/cluster-issuer=letsencrypt-staging-route53 to request a cert."'
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      # PSA-privileged namespace for the isolated node-exporter install
      # below — see k8s/monitoring/host-namespace.yml for why this is
      # split out from the main k8s-monitoring chart. Applied via
      # kubectl (not kustomize) because env-specific kustomizations
      # can't reference a shared file outside their directory.
      - kubectl apply -f k8s/monitoring/host-namespace.yml
      - kubectl apply -k k8s/monitoring/prod-1
      - helm upgrade --install node-exporter prometheus-community/prometheus-node-exporter
          -n monitoring-host
          -f k8s/monitoring/node-exporter/values.yml
      - kubectl rollout status daemonset/node-exporter-prometheus-node-exporter
          -n monitoring-host --timeout=120s
      - 'echo "node-exporter up in monitoring-host (privileged); alloy-metrics discovers it via prometheus.io/scrape annotations."'
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Has k8s/grafana-cloud-metrics-write been seeded in prod-1? See vault/infra/grafana-cloud-bootstrap.md."; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/prod-1/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."
      # Intel GPU device plugin + XPU Manager. Plugin registers
      # gpu.intel.com/i915 (+ i915_monitoring) so OBS/vlc-server pods
      # can claim the iGPU as an extended resource without hostPath.
      # XPU Manager scrapes iGPU telemetry off the i915_monitoring
      # device and exposes it on :29999 with the xpum_ prefix; Grafana
      # Alloy's annotation auto-discovery picks it up via the
      # prometheus.io/scrape annotation on the pod.
      - kubectl apply -k k8s/intel-gpu-plugin/prod-1
      - kubectl rollout status -n kube-system daemonset/intel-gpu-plugin --timeout=120s
      - kubectl apply -k k8s/intel-xpu-manager/prod-1
      - kubectl rollout status -n kube-system daemonset/intel-xpumanager --timeout=180s
      - 'echo "Intel GPU plugin + XPU Manager up. gpu.intel.com/i915 schedulable; xpum_* metrics scraping at <pod-ip>:29999."'

  # Twitch streaming toggle for OBS. The OBS deployment's envFrom on
  # obs-stream-key is `optional: true`, so the existence + content of that
  # Secret IS the stream state. Either way we rollout-restart obs so the
  # entrypoint re-reads STREAM_KEY at boot — Kubernetes doesn't propagate
  # Secret changes to running pods' env vars.
  #
  # PROD is on-by-default and goes through ESO: the obs-stream-key
  # ExternalSecret lives in the prod-1 overlay (stream-key-external-secret.yaml),
  # so `task k8s:prod:apply` materializes the Secret on every bring-up and OBS
  # streams without a manual step. `obs:prod:stream:on` just re-applies that
  # ExternalSecret (e.g. after an `:off`); `obs:prod:stream:off` deletes the
  # ExternalSecret AND the Secret so ESO can't re-materialize it — the pause
  # survives the refresh interval and lasts until the next apply/wipe.
  #
  # STAGE is off-by-default and stays imperative: there's no stage
  # ExternalSecret, so `obs:stage:stream:on` pulls STREAM_KEY from the
  # adanalife-stage SM account and creates the Secret directly. That `:on`
  # is env-prefixed because the key is sourced from a specific AWS account,
  # NOT from whatever cluster kubectl points at — the AWS profile is the
  # targeting, so it must be explicit, and the final echo surfaces both the
  # source profile and the live kubectl context so a cluster/key mismatch is
  # visible.
  #
  # `:off` is exposed under both env namespaces; the shared internal task
  # deletes both the ExternalSecret (no-op in stage, which has none) and the
  # Secret in the current cluster — no AWS account needed. Run with
  # NAMESPACE=stage-1 / NAMESPACE=prod-1 to override the per-task defaults.
  obs:stage:stream:on:
    desc: "stream OBS to adanalife_staging (STREAM_KEY from the stage-1 SM account)"
    vars:
      NAMESPACE: '{{.NAMESPACE | default "stage-1"}}'
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the target cluster first"
      - sh: kubectl get deploy obs -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs Deployment not found in namespace {{.NAMESPACE}} — apply the overlay first"
    cmds:
      - |
        set -euo pipefail
        sk=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id k8s/obs/twitch-stream-key --query SecretString --output text)
        kubectl create secret generic obs-stream-key \
          --from-literal=STREAM_KEY="$sk" \
          --dry-run=client -o yaml | kubectl apply -n {{.NAMESPACE}} -f - >/dev/null
      - kubectl rollout restart deploy/obs -n {{.NAMESPACE}}
      - kubectl rollout status deploy/obs -n {{.NAMESPACE}} --timeout=120s
      - 'echo "OBS streaming — key from adanalife-stage SM (→ adanalife_staging); namespace: {{.NAMESPACE}}; kubectl context: $(kubectl config current-context)"'

  # Prod streaming is on-by-default via the overlay's ExternalSecret, so
  # this task only matters as the inverse of `:off`: re-apply the
  # ExternalSecret, wait for ESO to materialize the Secret, then roll obs.
  # No aws-vault — ESO reads the adanalife-prod account itself.
  obs:prod:stream:on:
    desc: "resume prod OBS streaming (re-applies the obs-stream-key ExternalSecret; ESO pulls STREAM_KEY from the adanalife-prod SM account → adanalife_, or adanalife_staging while the key is a placeholder)"
    vars:
      NAMESPACE: '{{.NAMESPACE | default "prod-1"}}'
    preconditions:
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the target cluster first"
      - sh: kubectl get deploy obs -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs Deployment not found in namespace {{.NAMESPACE}} — apply the overlay first"
      - sh: kubectl get secretstore aws-secretsmanager -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "aws-secretsmanager SecretStore missing in {{.NAMESPACE}} — run the umbrella apply + bootstrap first"
    cmds:
      - kubectl apply -n {{.NAMESPACE}} -f k8s/apps/obs/overlays/prod-1/stream-key-external-secret.yaml
      - kubectl wait --for=condition=Ready externalsecret/obs-stream-key -n {{.NAMESPACE}} --timeout=120s
      - kubectl rollout restart deploy/obs -n {{.NAMESPACE}}
      - kubectl rollout status deploy/obs -n {{.NAMESPACE}} --timeout=120s
      - 'echo "OBS streaming — obs-stream-key materialized by ESO from adanalife-prod SM; namespace: {{.NAMESPACE}}; kubectl context: $(kubectl config current-context)"'

  # Stop streaming, keep OBS running. Deletes the obs-stream-key
  # ExternalSecret (if any — prod has one, stage doesn't) AND the
  # obs-stream-key Secret, then restarts the pod so it boots in idle
  # (VNC-only) mode — the container stays up, only the Twitch publish
  # stops. Deleting the ExternalSecret first is what makes the pause
  # durable in prod: otherwise ESO would re-materialize the Secret on its
  # next refresh. The pause lasts until the next `task k8s:prod:apply` or
  # cluster wipe re-applies the overlay. Exposed under both env namespaces
  # for symmetry with the `:on` tasks; the work is env-agnostic (no AWS
  # account — it only touches the local cluster), so both delegate to one
  # shared implementation.
  obs:stage:stream:off:
    desc: "stop OBS streaming (OBS stays up in idle/VNC mode)"
    cmds:
      - task: obs:stream:off:_run
        vars:
          NAMESPACE: '{{.NAMESPACE | default "stage-1"}}'

  obs:prod:stream:off:
    desc: "stop OBS streaming (OBS stays up in idle/VNC mode)"
    cmds:
      - task: obs:stream:off:_run
        vars:
          NAMESPACE: '{{.NAMESPACE | default "prod-1"}}'

  obs:stream:off:_run:
    internal: true
    requires:
      vars: [NAMESPACE]
    preconditions:
      - sh: command -v kubectl >/dev/null
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the target cluster first"
      - sh: kubectl get deploy obs -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs Deployment not found in namespace {{.NAMESPACE}}"
    cmds:
      # ExternalSecret first so ESO stops owning (and re-creating) the Secret.
      - kubectl delete externalsecret obs-stream-key -n {{.NAMESPACE}} --ignore-not-found
      - kubectl delete secret obs-stream-key -n {{.NAMESPACE}} --ignore-not-found
      - kubectl rollout restart deploy/obs -n {{.NAMESPACE}}
      - kubectl rollout status deploy/obs -n {{.NAMESPACE}} --timeout=120s
      - 'echo "OBS idle (not streaming) — container still up; namespace: {{.NAMESPACE}}; kubectl context: $(kubectl config current-context)"'

  k8s:logs:
    desc: tail logs across all app pods
    cmds:
      - kubectl logs -l app.kubernetes.io/part-of=tripbot --all-containers --tail=50 -f

  # Local kubectl port-forward wrappers for OBS / vlc-server VNC. The
  # host-access LoadBalancer overlays (k8s/apps/{obs,vlc-server}/overlays/local)
  # already expose VNC at host ports 5902 / 5903 via klipper-lb when the
  # local overlay is applied — these tasks are the cluster-agnostic
  # alternative when that overlay isn't in play (e.g. on development, or
  # when iterating without applying the local overlay). Backgrounded
  # kubectl PID is parked under /tmp/adanalife-tasks/ so :down can
  # find it. Re-running :up overwrites the PID file; if :down can't
  # find a lingering kubectl, fall back to `pkill -f "port-forward svc/obs"`.
  obs:vnc:up:
    desc: start a local kubectl port-forward to OBS VNC at localhost:5902
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward svc/obs 5902:5900 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/obs-vnc.pid
      - 'echo "OBS VNC port-forward started — connect a VNC client to localhost:5902 (PID $(cat /tmp/adanalife-tasks/obs-vnc.pid))"'

  obs:vnc:down:
    desc: stop the local kubectl port-forward to OBS VNC
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/obs-vnc.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/obs-vnc.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/obs-vnc.pid
          echo "OBS VNC port-forward stopped"
        else
          echo "No OBS VNC port-forward PID file found — nothing to stop"
        fi

  obs:browser:refresh:
    desc: Refresh all OBS browser sources via websocket (k8s; port-forwards 4455 transiently)
    preconditions:
      - sh: command -v uv >/dev/null
        msg: "uv not found — install with `brew install uv`"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found — is the cluster up?"
    cmds:
      - |
        set -eo pipefail
        kubectl port-forward svc/obs 4455:4455 >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "$PF" 2>/dev/null || true; wait 2>/dev/null || true; }
        trap cleanup EXIT
        sleep 1
        OBS_WEBSOCKET_HOST=localhost \
        OBS_WEBSOCKET_PASSWD=$(kubectl get configmap obs-config -o jsonpath='{.data.OBS_WEBSOCKET_PASSWD}') \
        uv run --with obsws-python \
          {{.HOME}}/adanalife/tripbot/bin/obs-browser-refresh

  obs:media:restart:
    desc: Restart all OBS media sources (ffmpeg/vlc) via websocket — forces OBS to reconnect to the RTSP stream after a vlc-server restart
    preconditions:
      - sh: command -v uv >/dev/null
        msg: "uv not found — install with `brew install uv`"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found — is the cluster up?"
    cmds:
      - |
        set -eo pipefail
        kubectl port-forward svc/obs 4455:4455 >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "$PF" 2>/dev/null || true; wait 2>/dev/null || true; }
        trap cleanup EXIT
        sleep 1
        OBS_WEBSOCKET_HOST=localhost \
        OBS_WEBSOCKET_PASSWD=$(kubectl get configmap obs-config -o jsonpath='{.data.OBS_WEBSOCKET_PASSWD}') \
        uv run --with obsws-python \
          {{.HOME}}/adanalife/tripbot/bin/obs-media-restart

  vlc:vnc:up:
    desc: start a local kubectl port-forward to vlc-server VNC at localhost:5903
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward svc/vlc-server 5903:5900 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/vlc-vnc.pid
      - 'echo "vlc-server VNC port-forward started — connect a VNC client to localhost:5903 (PID $(cat /tmp/adanalife-tasks/vlc-vnc.pid))"'

  vlc:vnc:down:
    desc: stop the local kubectl port-forward to vlc-server VNC
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/vlc-vnc.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/vlc-vnc.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/vlc-vnc.pid
          echo "vlc-server VNC port-forward stopped"
        else
          echo "No vlc-server VNC port-forward PID file found — nothing to stop"
        fi

  # Talos PKI (adanalife-minipc). The generated machine configs + talosconfig
  # hold the cluster CA key, bootstrap/trustd tokens, and etcd encryption
  # secrets. They're SOPS-encrypted with the prod-1 KMS key
  # (alias/sops-talos-pki, terraform/prod-1/sops.tf) and committed as
  # talos/adanalife-minipc/*.sops.yaml; the plaintext stays gitignored.
  # Bootstrap order + full workflow: vault/infra/adanalife-minipc-bootstrap.md
  # Phase 4. Encrypted as opaque binary blobs because the configs are
  # multi-document YAML (sops's native YAML store doesn't handle multi-doc).
  talos:minipc:secrets:decrypt:
    desc: decrypt the SOPS-sealed adanalife-minipc Talos PKI (+ tailscale patch) into gitignored plaintext
    dir: talos/adanalife-minipc
    preconditions:
      - sh: command -v sops >/dev/null
        msg: "sops not found — install with `brew install sops`"
    cmds:
      # Decrypt reads the KMS key ARN from each file's sops metadata — no
      # terraform output or --kms needed, so this works on a fresh checkout.
      # tailscale.patch.sops.yaml is optional (only exists once tailscale is
      # wired) — skip it if absent so the PKI decrypt never breaks.
      - |
        aws-vault exec adanalife-prod -- bash -c '
          set -euo pipefail
          for pair in "controlplane.sops.yaml:controlplane.yaml" "worker.sops.yaml:worker.yaml" "talosconfig.sops.yaml:talosconfig" "tailscale.patch.sops.yaml:tailscale.patch.yaml"; do
            src=${pair%%:*}; dst=${pair##*:}
            [ -f "$src" ] || { echo "skip $src (not present)"; continue; }
            sops -d --output-type binary "$src" > "$dst"
            chmod 600 "$dst"
          done
        '
      - 'echo "Talos secrets decrypted. Regenerate controlplane.patched.yaml via the machineconfig patch step (runbook Phase 4) before apply-config."'

  talos:minipc:secrets:encrypt:
    desc: re-seal the adanalife-minipc Talos PKI (+ tailscale patch) to SOPS after regenerating/rotating it
    dir: talos/adanalife-minipc
    preconditions:
      - sh: command -v sops >/dev/null
        msg: "sops not found — install with `brew install sops`"
      - sh: test -f controlplane.yaml && test -f worker.yaml && test -f talosconfig
        msg: "plaintext Talos PKI not present in talos/adanalife-minipc — nothing to encrypt"
    cmds:
      # Sources the KMS key ARN from terraform output (key must already be
      # applied via `task tf:prod:apply`). --input-type binary treats each
      # file as one opaque blob, sidestepping the multi-doc-YAML limitation.
      # tailscale.patch.yaml is optional (only exists once tailscale is wired) —
      # skip it if absent.
      - |
        aws-vault exec adanalife-prod -- bash -c '
          set -euo pipefail
          kms=$(terraform -chdir=../../terraform/prod-1 output -raw sops_talos_kms_key_arn)
          for pair in "controlplane.yaml:controlplane.sops.yaml" "worker.yaml:worker.sops.yaml" "talosconfig:talosconfig.sops.yaml" "tailscale.patch.yaml:tailscale.patch.sops.yaml"; do
            src=${pair%%:*}; dst=${pair##*:}
            [ -f "$src" ] || { echo "skip $src (not present)"; continue; }
            sops -e --input-type binary --output-type yaml --kms "$kms" "$src" > "$dst"
          done
        '
      - 'echo "Talos secrets re-sealed to *.sops.yaml. Commit the updated encrypted files."'

  talos:minipc:dashboard:
    desc: open the talosctl TUI dashboard against the minipc node
    cmds:
      - TALOSCONFIG={{.ROOT_DIR}}/talos/adanalife-minipc/talosconfig mise exec -- talosctl dashboard --nodes 192.168.1.200

  # tripbot operational tasks. Naming follows <tool>:<env>:<verb>[:<subverb>]
  # so it's clear which cluster each one targets. Aliases preserve the
  # older unscoped names while the schema migration is in flight.
  #
  # The :db:* tasks open kubectl port-forwards to the cluster Postgres
  # (a headless ClusterIP, otherwise unreachable from outside the cluster) —
  # primarily for the auth-bootstrap CLI and psql poking.
  tripbot:dev:db:up:
    desc: start a local kubectl port-forward to the development cluster Postgres at localhost:5432
    aliases: [tripbot:db:up]
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward -n development svc/postgres 5432:5432 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/tripbot-db.pid
      - 'echo "tripbot Postgres port-forward started — psql at localhost:5432 (PID $(cat /tmp/adanalife-tasks/tripbot-db.pid))"'

  tripbot:dev:db:down:
    desc: stop the local kubectl port-forward to the development cluster Postgres
    aliases: [tripbot:db:down]
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/tripbot-db.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/tripbot-db.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/tripbot-db.pid
          echo "tripbot Postgres port-forward stopped"
        else
          echo "No tripbot Postgres port-forward PID file found — nothing to stop"
        fi

  tripbot:stage:db:up:
    desc: start a kubectl port-forward to the stage-1 cluster Postgres at localhost:5433 (5433 to avoid colliding with a dev/prod forward on 5432)
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      - kubectl port-forward -n stage-1 svc/postgres 5433:5432 > /dev/null 2>&1 &
      - echo $! > /tmp/adanalife-tasks/tripbot-stage-db.pid
      - 'echo "stage-1 Postgres port-forward started — psql at localhost:5433 (PID $(cat /tmp/adanalife-tasks/tripbot-stage-db.pid))"'

  tripbot:stage:db:down:
    desc: stop the kubectl port-forward to the stage-1 cluster Postgres
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/tripbot-stage-db.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/tripbot-stage-db.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/tripbot-stage-db.pid
          echo "stage-1 Postgres port-forward stopped"
        else
          echo "No stage-1 Postgres port-forward PID file found — nothing to stop"
        fi

  # stage-1 Postgres backup/restore — on-demand, to a LOCAL file on the machine
  # running the task. Stage data is fresh-seeded and disposable, so (unlike
  # prod-1) there's no S3 bucket, no IAM/SM plumbing, and no CronJob — this is
  # just the "grab a snapshot before doing something risky" escape hatch. The
  # env is baked into the filename (stage-1-tripbot-<ts>.dump) so a stage dump
  # can never be confused with a prod one. Streams pg_dump -Fc out of postgres-0
  # reusing the pod's own POSTGRES_* creds (no credential handling here).
  tripbot:stage:db:backup:
    desc: "dump stage-1 Postgres to a local file (OUT_DIR/stage-1-tripbot-<ts>.dump, default ./backups); on-demand, no S3"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n stage-1 >/dev/null 2>&1
        msg: "postgres-0 not found in stage-1 — bring the cluster + postgres up first"
    cmds:
      - mkdir -p {{.OUT_DIR}}
      - |
        set -euo pipefail
        ts=$(date -u +%Y%m%d-%H%M%SZ)
        out="{{.OUT_DIR}}/stage-1-tripbot-${ts}.dump"
        echo "Dumping stage-1 Postgres to ${out}"
        # Write to a .partial then rename, so a failed dump never leaves a
        # truncated file that `:restore` (newest-first) would later pick up.
        kubectl exec -n stage-1 postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" pg_dump --format=custom -h localhost -U "$POSTGRES_USER" "$POSTGRES_DB"' \
          > "${out}.partial"
        mv "${out}.partial" "$out"
        echo "OK: ${out} ($(du -h "$out" | cut -f1))"

  # Mirrors tripbot:prod:db:restore: stream a local dump into postgres-0, then
  # clear a stale schema_migrations dirty flag if the dump carried one (a dirty
  # flag makes tripbot's migrate init container refuse to start; the dump is a
  # consistent snapshot so clearing it is safe). Does NOT roll tripbot.
  tripbot:stage:db:restore:
    desc: "restore stage-1 Postgres from a local dump (DUMP=path, default newest in OUT_DIR, ./backups) + clear stale migrate dirty flag"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n stage-1 >/dev/null 2>&1
        msg: "postgres-0 not found in stage-1 — bring the cluster + postgres up first"
    cmds:
      - |
        set -euo pipefail
        dump="{{.DUMP}}"
        if [ -z "$dump" ]; then
          dump=$(ls -1t {{.OUT_DIR}}/stage-1-tripbot-*.dump 2>/dev/null | head -1 || true)
          [ -n "$dump" ] || { echo "no dumps found in {{.OUT_DIR}}/ (stage-1-tripbot-*.dump) — pass DUMP=<path>"; exit 1; }
        fi
        [ -f "$dump" ] || { echo "dump not found: $dump"; exit 1; }
        echo "Restoring stage-1 Postgres from ${dump}"
        kubectl exec -i -n stage-1 postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" pg_restore --clean --if-exists --no-owner -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"' \
          < "$dump"
        echo "Restore complete."
      - |
        set -euo pipefail
        psql() { kubectl exec -i -n stage-1 postgres-0 -- sh -c "PGPASSWORD=\"\$POSTGRES_PASSWORD\" psql -tAq -h localhost -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -c \"$1\""; }
        ver=$(psql "SELECT version FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        dirty=$(psql "SELECT dirty FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        echo "schema_migrations: version=$ver dirty=$dirty"
        if [ "$dirty" = "t" ]; then
          echo "clearing stale dirty flag so tripbot's migrate init can re-apply pending migrations"
          psql "UPDATE schema_migrations SET dirty=false;" >/dev/null
          echo "cleared."
        fi
      - 'echo "Next: kubectl rollout restart deploy/tripbot -n stage-1 — its migrate init re-applies any pending migrations."'

  # prod-1 Postgres restore — part of the wipe-and-rebuild loop. A wipe takes
  # EPHEMERAL (the postgres PVC) with it, so each rebuild restores from the
  # most recent S3 dump written by the postgres-backup CronJob (pg_dump -Fc).
  # See vault/infra/adanalife-minipc-bootstrap.md "Wipe-and-rebuild loop".
  tripbot:prod:db:backups:
    desc: list available prod-1 Postgres dumps in S3 (newest last)
    vars:
      BUCKET: adanalife-prod-1-postgres-backups
    cmds:
      - aws-vault exec adanalife-prod -- aws s3 ls "s3://{{.BUCKET}}/tripbot/" | sort

  # Streams S3 → pg_restore inside postgres-0, reusing the pod's own POSTGRES_*
  # env creds (no credential handling here). Then clears a stale
  # schema_migrations dirty flag if the dump carried one — the historical
  # 20260518 dump was taken at version=10 dirty=true, which makes tripbot's
  # migrate init container refuse to start. Clearing it lets migrate re-apply
  # the pending migrations on tripbot's next roll. The dump is a consistent
  # snapshot, so clearing dirty is safe (it reflects the dumped state).
  #
  # DUMP_KEY=tripbot/<ts>.dump picks a specific dump; defaults to the newest.
  # NOTE: untested against a live cluster — eyeball the first run during the
  # wipe loop. Does NOT roll tripbot (echoes the command instead).
  tripbot:prod:db:restore:
    desc: "restore prod-1 Postgres from an S3 dump (DUMP_KEY=tripbot/<ts>.dump, default newest) + clear stale migrate dirty flag"
    vars:
      BUCKET: adanalife-prod-1-postgres-backups
    preconditions:
      - sh: kubectl get pod postgres-0 -n prod-1 >/dev/null 2>&1
        msg: "postgres-0 not found in prod-1 — bring the cluster + postgres up first"
    cmds:
      - |
        set -euo pipefail
        key="{{.DUMP_KEY}}"
        if [ -z "$key" ]; then
          newest=$(aws-vault exec adanalife-prod -- aws s3 ls "s3://{{.BUCKET}}/tripbot/" | sort | tail -1 | awk '{print $4}')
          [ -n "$newest" ] || { echo "no dumps found in s3://{{.BUCKET}}/tripbot/"; exit 1; }
          key="tripbot/$newest"
        fi
        echo "Restoring prod-1 Postgres from s3://{{.BUCKET}}/$key"
        aws-vault exec adanalife-prod -- aws s3 cp "s3://{{.BUCKET}}/$key" - \
          | kubectl exec -i -n prod-1 postgres-0 -- sh -c \
            'PGPASSWORD="$POSTGRES_PASSWORD" pg_restore --clean --if-exists --no-owner -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
        echo "Restore complete."
      - |
        set -euo pipefail
        psql() { kubectl exec -i -n prod-1 postgres-0 -- sh -c "PGPASSWORD=\"\$POSTGRES_PASSWORD\" psql -tAq -h localhost -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -c \"$1\""; }
        ver=$(psql "SELECT version FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        dirty=$(psql "SELECT dirty FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        echo "schema_migrations: version=$ver dirty=$dirty"
        if [ "$dirty" = "t" ]; then
          echo "clearing stale dirty flag so tripbot's migrate init can re-apply pending migrations"
          psql "UPDATE schema_migrations SET dirty=false;" >/dev/null
          echo "cleared."
        fi
      - 'echo "Next: kubectl rollout restart deploy/tripbot -n prod-1 — its migrate init re-applies any pending migrations."'

  tripbot:dev:db:seed:
    desc: run the one-shot ESO-wired seed Job in the development namespace; idempotent — skips if the videos table already has real rows
    aliases: [tripbot:db:seed]
    cmds:
      # Same shared, env-agnostic Job as stage/prod (k8s/apps/tripbot/jobs/) —
      # only the -n namespace differs.
      - kubectl delete job tripbot-seed -n development --ignore-not-found
      - kubectl apply -f k8s/apps/tripbot/jobs/seed.yaml -n development
      # kubectl wait doesn't short-circuit on Failed when asked for
      # Complete — wait the full window then disambiguate after the fact.
      - |
        if ! kubectl wait --for=condition=complete --timeout=180s job/tripbot-seed -n development; then
          if kubectl get job tripbot-seed -n development -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' | grep -q True; then
            echo "seed job failed"
          else
            echo "seed job timed out after 180s (still pending)"
          fi
          exit 1
        fi
      - kubectl logs job/tripbot-seed -n development

  tripbot:dev:auth:bootstrap:
    desc: bootstrap BOTH Twitch OAuth identities (bot + broadcaster) against development back-to-back; dev borrows the stage identity, so sign in as tripbot4000 then adanalife_staging
    aliases: [tripbot:auth:bootstrap]
    cmds:
      - task: tripbot:dev:auth:bootstrap:bot
      - task: tripbot:dev:auth:bootstrap:broadcaster

  tripbot:dev:auth:bootstrap:bot:
    desc: bootstrap the BOT Twitch OAuth token against development (development namespace); port-forwards 8080 so the browser callback reaches the pod
    cmds:
      # Same shared, env-agnostic Job as stage/prod — only -n differs.
      - kubectl delete job tripbot-auth-bootstrap-bot -n development --ignore-not-found
      - kubectl apply -f k8s/apps/tripbot/jobs/auth-bootstrap-bot.yaml -n development
      - until kubectl get pod -l job-name=tripbot-auth-bootstrap-bot -n development --no-headers 2>/dev/null | grep -q Running; do sleep 1; done
      - until kubectl logs -l job-name=tripbot-auth-bootstrap-bot -n development 2>/dev/null | grep -q "id.twitch.tv"; do sleep 1; done
      - kubectl logs -l job-name=tripbot-auth-bootstrap-bot -n development
      - echo "Port-forwarding localhost:8080 → bot job pod. Open the URL above and sign in as tripbot4000."
      - kubectl port-forward job/tripbot-auth-bootstrap-bot 8080:8080 -n development 2>/dev/null || true
      - echo "Bot bootstrap complete — token written to dev Postgres."

  tripbot:dev:auth:bootstrap:broadcaster:
    desc: bootstrap the BROADCASTER Twitch OAuth token against development; required for subscriber/follower polling + real-time EventSub
    cmds:
      - kubectl delete job tripbot-auth-bootstrap-broadcaster -n development --ignore-not-found
      - kubectl apply -f k8s/apps/tripbot/jobs/auth-bootstrap-broadcaster.yaml -n development
      - until kubectl get pod -l job-name=tripbot-auth-bootstrap-broadcaster -n development --no-headers 2>/dev/null | grep -q Running; do sleep 1; done
      - until kubectl logs -l job-name=tripbot-auth-bootstrap-broadcaster -n development 2>/dev/null | grep -q "id.twitch.tv"; do sleep 1; done
      - kubectl logs -l job-name=tripbot-auth-bootstrap-broadcaster -n development
      - echo "Port-forwarding localhost:8080 → broadcaster job pod. Open the URL above and sign in as adanalife_staging."
      - kubectl port-forward job/tripbot-auth-bootstrap-broadcaster 8080:8080 -n development 2>/dev/null || true
      - 'echo "Broadcaster bootstrap complete. Run \`kubectl rollout restart deploy/tripbot -n development\` to bring the bot online with both identities."'

  tripbot:prod:auth:bootstrap:
    desc: bootstrap BOTH Twitch OAuth identities (bot + broadcaster) against prod-1 back-to-back; sign in as tripbot4000 on the first browser tab, then adanalife_ on the second
    cmds:
      - task: tripbot:prod:auth:bootstrap:bot
      - task: tripbot:prod:auth:bootstrap:broadcaster

  tripbot:prod:auth:bootstrap:bot:
    desc: bootstrap the BOT Twitch OAuth token (chat:read/edit etc.) against prod-1; port-forwards 8080 so the browser callback reaches the pod
    cmds:
      # The auth-bootstrap Jobs are deliberately NOT part of any umbrella
      # overlay (would otherwise re-run every apply and burn each leg's
      # 5min timeout). The shared, env-agnostic manifests at
      # k8s/apps/tripbot/jobs/auth-bootstrap-{bot,broadcaster}.yaml envFrom
      # the namespace's tripbot-config + the ESO Secrets, so the same files
      # serve prod (prod-1 ns) and stage (stage-1 ns) — only -n differs.
      - kubectl delete job tripbot-auth-bootstrap-bot -n prod-1 --ignore-not-found
      - kubectl apply -f k8s/apps/tripbot/jobs/auth-bootstrap-bot.yaml -n prod-1
      - until kubectl get pod -l job-name=tripbot-auth-bootstrap-bot -n prod-1 --no-headers 2>/dev/null | grep -q Running; do sleep 1; done
      - until kubectl logs -l job-name=tripbot-auth-bootstrap-bot -n prod-1 2>/dev/null | grep -q "id.twitch.tv"; do sleep 1; done
      - kubectl logs -l job-name=tripbot-auth-bootstrap-bot -n prod-1
      - echo "Port-forwarding localhost:8080 → bot job pod. Open the URL above and sign in as tripbot4000."
      - kubectl port-forward job/tripbot-auth-bootstrap-bot 8080:8080 -n prod-1 2>/dev/null || true
      - echo "Bot bootstrap complete — tripbot4000 token written to prod Postgres."

  tripbot:prod:auth:bootstrap:broadcaster:
    desc: bootstrap the BROADCASTER Twitch OAuth token (channel:read:subscriptions, moderator:read:followers, user:edit:broadcast) against prod-1; required for subscriber/follower polling + real-time EventSub
    cmds:
      - kubectl delete job tripbot-auth-bootstrap-broadcaster -n prod-1 --ignore-not-found
      - kubectl apply -f k8s/apps/tripbot/jobs/auth-bootstrap-broadcaster.yaml -n prod-1
