version: '3'

vars:
  # use like this: task tf-stage --tf_action=init
  TF_ACTION: apply # Default action is 'apply'

tasks:
  tf-stage:
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform {{.TF_ACTION}}

  tf-prod:
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform {{.TF_ACTION}}

  tf-core:
    dir: terraform/core
    cmds:
      # We can't use session tokens when making IAM changes
      - aws-vault exec adanalife-core --no-session -- terraform {{.TF_ACTION}}

  # Append the host's current public IP (via ifconfig.me) to the
  # stage-1/allowlist-cidrs list in Secrets Manager, deduping with
  # jq. Use this when your home IP rotates and you're locked out of
  # tripbot.whalecore.com. terraform reads the updated value via
  # data source on the next `task tf-stage`. To remove stale
  # entries or add a non-current CIDR, edit the secret directly:
  #   aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
  #     --secret-id stage-1/allowlist-cidrs --secret-string '["X.X.X.X/32", ...]'
  update-allowlist:
    desc: append your current public IP to stage-1/allowlist-cidrs
    cmds:
      - |
        ip=$(curl -fsS ifconfig.me) || { echo "could not detect public IP"; exit 1; }
        cidr="$ip/32"
        updated=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id stage-1/allowlist-cidrs --query SecretString --output text \
          | jq --arg c "$cidr" '. + [$c] | unique')
        aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
          --secret-id stage-1/allowlist-cidrs --secret-string "$updated" >/dev/null
        echo "allowlist-cidrs is now:"
        echo "$updated" | jq .
        echo "Run 'task tf-stage' to apply."

  # `aws-vault login` opens the AWS web console in browser
  aws-login-stage:
    cmds:
      - aws-vault login adanalife-stage

  aws-login-prod:
    cmds:
      - aws-vault login adanalife-prod

  aws-login-core:
    cmds:
      - aws-vault login adanalife-core

  # Local k3d cluster for app development. See k8s/k3d-config.yaml.
  k8s-up:
    desc: create the local k3d cluster
    cmds:
      - k3d cluster create -c k8s/k3d-config.yaml

  k8s-down:
    desc: tear down the local k3d cluster
    cmds:
      - k3d cluster delete adanalife-bees

  k8s-import-images:
    desc: build the tripbot/vlc/obs images and import them into the local cluster
    dir: ../tripbot
    cmds:
      # --project-directory + --env-file mirror bin/devenv so build contexts
      # resolve relative to the tripbot repo root and ${VAR} substitutions in
      # the compose file pick up env.docker. Without these, compose resolves
      # `context: .` against the compose file's dir and the build fails with
      # `lstat .../infra/docker/infra: no such file or directory`.
      #
      # On arm64 hosts (Apple Silicon), layer docker-compose.arm64.yml so
      # the OBS service builds from Dockerfile.arm64 (compiles OBS + CEF
      # from source). Without it, the amd64 Dockerfile runs natively on
      # arm64, the OBS PPA has no arm64 packages, and apt silently falls
      # back to Ubuntu universe's obs-studio +dfsg build (CEF stripped),
      # so browser_source silently fails at scene load. First arm64 build
      # takes ~30 min for the CEF compile; cached thereafter.
      - |
        args="--project-directory . --env-file infra/docker/env.docker -f infra/docker/docker-compose.yml"
        case "$(uname -m)" in
          arm64|aarch64) args="$args -f infra/docker/docker-compose.arm64.yml" ;;
        esac
        docker compose $args build
      - k3d image import adanalife/tripbot:latest --cluster=adanalife-bees
      - k3d image import adanalife/vlc:latest --cluster=adanalife-bees
      - k3d image import adanalife/obs:latest --cluster=adanalife-bees

  k8s-apply:
    desc: apply the local app manifests to the cluster
    cmds:
      - kubectl apply -k k8s/overlays/local

  k8s-apply-stage-1:
    desc: apply stage-1 overlay (cloudflared tunnel + apps)
    cmds:
      - kubectl apply -k k8s/overlays/stage-1

  # Pulls the tunnel token out of stage-1 terraform state and writes
  # it to the cloudflared secret.env. Run once after the first
  # `task tf-stage`, and re-run if the tunnel is recreated.
  k8s-tunnel-token:
    desc: write cloudflared tunnel token from terraform output to secret.env
    dir: terraform/stage-1
    cmds:
      - echo "TUNNEL_TOKEN=$(aws-vault exec adanalife-stage -- terraform output -raw cloudflared_tunnel_token)" > ../../k8s/platform/cloudflared/overlays/stage-1/secret.env

  k8s-logs:
    desc: tail logs across all app pods
    cmds:
      - kubectl logs -l app.kubernetes.io/part-of=tripbot --all-containers --tail=50 -f
