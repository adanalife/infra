    cmds:
      - task: tripbot:dev:auth:bootstrap:bot
      - task: tripbot:dev:auth:bootstrap:broadcaster

  tripbot:dev:auth:bootstrap:bot:
    desc: bootstrap the BOT Twitch OAuth token against development (development namespace); port-forwards 8080 so the browser callback reaches the pod
    cmds:
      # Authored per-env in the tripbot repo's cdk8s; applied from its committed
      # dist in the sibling tripbot checkout (same source as `task contract:sync`).
