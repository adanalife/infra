      - kubectl logs -l job-name=tripbot-auth-bootstrap-bot -n stage-1
      - echo "Port-forwarding localhost:8080 → bot job pod. Open the URL above and sign in as tripbot4000."
      - kubectl port-forward job/tripbot-auth-bootstrap-bot 8080:8080 -n stage-1 2>/dev/null || true
      - echo "Bot bootstrap complete — tripbot4000 token written to stage Postgres."

  tripbot:stage:auth:bootstrap:broadcaster:
    desc: bootstrap the BROADCASTER Twitch OAuth token against stage-1; required for subscriber/follower polling + real-time EventSub
    cmds:
      - kubectl delete job tripbot-auth-bootstrap-broadcaster -n stage-1 --ignore-not-found
