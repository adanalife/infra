      - until kubectl logs -l job-name=tripbot-auth-bootstrap-broadcaster -n prod-1 2>/dev/null | grep -q "id.twitch.tv"; do sleep 1; done
      - kubectl logs -l job-name=tripbot-auth-bootstrap-broadcaster -n prod-1
      - echo "Port-forwarding localhost:8080 → broadcaster job pod. Open the URL above and sign in as adanalife_."
      - kubectl port-forward job/tripbot-auth-bootstrap-broadcaster 8080:8080 -n prod-1 2>/dev/null || true
      - 'echo "Broadcaster bootstrap complete — adanalife_ token written to prod Postgres. Run \`kubectl rollout restart deploy/tripbot -n prod-1\` to bring the bot online with both identities loaded."'

  tripbot:stage:auth:bootstrap:
    desc: bootstrap BOTH Twitch OAuth identities (bot + broadcaster) against stage-1 back-to-back; sign in as tripbot4000 then adanalife_staging
    cmds:
      - task: tripbot:stage:auth:bootstrap:bot
      - task: tripbot:stage:auth:bootstrap:broadcaster

  tripbot:stage:auth:bootstrap:bot:
