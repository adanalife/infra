version: '3'

tasks:
  # Terraform: tf:<env>:<verb>. Extra flags pass via the `--` separator,
  # e.g. `task tf:stage:init -- -upgrade` or `task tf:stage:plan -- -target=…`.
  tf:stage:apply:
    desc: terraform apply against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform apply {{.CLI_ARGS}}

  tf:stage:plan:
    desc: terraform plan against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform plan {{.CLI_ARGS}}

  tf:stage:init:
    desc: terraform init against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform init {{.CLI_ARGS}}

  tf:stage:destroy:
    desc: terraform destroy against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- terraform destroy {{.CLI_ARGS}}

  tf:prod:apply:
    desc: terraform apply against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform apply {{.CLI_ARGS}}

  tf:prod:plan:
    desc: terraform plan against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform plan {{.CLI_ARGS}}

  tf:prod:init:
    desc: terraform init against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform init {{.CLI_ARGS}}

  tf:prod:destroy:
    desc: terraform destroy against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- terraform destroy {{.CLI_ARGS}}

  # Core uses --no-session because session tokens can't make IAM changes.
  tf:core:apply:
    desc: terraform apply against core (no session token; IAM changes need full creds)
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform apply {{.CLI_ARGS}}

  tf:core:plan:
    desc: terraform plan against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform plan {{.CLI_ARGS}}

  tf:core:init:
    desc: terraform init against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform init {{.CLI_ARGS}}

  tf:core:destroy:
    desc: terraform destroy against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- terraform destroy {{.CLI_ARGS}}

  # Append the host's current public IP (via ifconfig.me) to the
  # stage-1/allowlist-cidrs list in Secrets Manager, deduping with
  # jq. Use this when your home IP rotates and you're locked out of
  # tripbot.whalecore.com. terraform reads the updated value via
  # data source on the next `task tf:stage:apply`. To remove stale
  # entries or add a non-current CIDR, edit the secret directly:
  #   aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
  #     --secret-id stage-1/allowlist-cidrs --secret-string '["X.X.X.X/32", ...]'
  stage:allowlist:add-current-ip:
    desc: append your current public IP to stage-1/allowlist-cidrs
    cmds:
      - |
        ip=$(curl -fsS ifconfig.me) || { echo "could not detect public IP"; exit 1; }
        cidr="$ip/32"
        updated=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id stage-1/allowlist-cidrs --query SecretString --output text \
          | jq --arg c "$cidr" '. + [$c] | unique')
        aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
          --secret-id stage-1/allowlist-cidrs --secret-string "$updated" >/dev/null
        echo "allowlist-cidrs is now:"
        echo "$updated" | jq .
        echo "Run 'task tf:stage:apply' to apply."

  # `aws-vault login` opens the AWS web console in browser
  aws:login:stage:
    cmds:
      - aws-vault login adanalife-stage

  aws:login:prod:
    cmds:
      - aws-vault login adanalife-prod

  aws:login:core:
    cmds:
      - aws-vault login adanalife-core

  # Local k3d cluster for app development. See k8s/k3d-config.yaml.
  k8s:cluster:up:
    desc: create the local k3d cluster
    cmds:
      - k3d cluster create -c k8s/k3d-config.yaml

  k8s:cluster:down:
    desc: tear down the local k3d cluster
    cmds:
      - k3d cluster delete adanalife-bees

  k8s:import-images:
    desc: build the tripbot/vlc/obs images and import them into the local cluster
    dir: ../tripbot
    cmds:
      # --project-directory + --env-file mirror bin/devenv so build contexts
      # resolve relative to the tripbot repo root and ${VAR} substitutions in
      # the compose file pick up env.docker. Without these, compose resolves
      # `context: .` against the compose file's dir and the build fails with
      # `lstat .../infra/docker/infra: no such file or directory`.
      #
      # On arm64 hosts (Apple Silicon), layer docker-compose.arm64.yml so
      # the OBS service builds from Dockerfile.arm64 (compiles OBS + CEF
      # from source). Without it, the amd64 Dockerfile runs natively on
      # arm64, the OBS PPA has no arm64 packages, and apt silently falls
      # back to Ubuntu universe's obs-studio +dfsg build (CEF stripped),
      # so browser_source silently fails at scene load. First arm64 build
      # takes ~30 min for the CEF compile; cached thereafter.
      - |
        args="--project-directory . --env-file infra/docker/env.docker -f infra/docker/docker-compose.yml"
        case "$(uname -m)" in
          arm64|aarch64) args="$args -f infra/docker/docker-compose.arm64.yml" ;;
        esac
        docker compose $args build
      - k3d image import adanalife/tripbot:latest --cluster=adanalife-bees
      - k3d image import adanalife/vlc:latest --cluster=adanalife-bees
      - k3d image import adanalife/obs:latest --cluster=adanalife-bees

  # Restart an app deployment so its pods re-pull the image. Pairs
  # with `k8s:import-images` — after importing rebuilt images into
  # k3d, restart the deployment to roll new pods that fetch the
  # freshly-imported tag. imagePullPolicy: Always on these
  # deployments (#411) means "rollout restart" is sufficient; no
  # need to bump tags or delete the cached image first.
  k8s:rollout:tripbot:
    desc: restart the tripbot deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/tripbot
      - kubectl rollout status deploy/tripbot --timeout=120s

  k8s:rollout:vlc-server:
    desc: restart the vlc-server deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/vlc-server
      - kubectl rollout status deploy/vlc-server --timeout=120s

  k8s:rollout:obs:
    desc: restart the obs deployment so it pulls the latest imported image
    cmds:
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s

  k8s:rollout:
    desc: restart all three app deployments (tripbot + vlc-server + obs)
    deps: [k8s:rollout:tripbot, k8s:rollout:vlc-server, k8s:rollout:obs]

  k8s:apply:
    desc: apply the local app manifests to the cluster
    cmds:
      - kubectl apply -k k8s/overlays/local

  k8s:apply:stage-1:
    desc: apply stage-1 overlay (cloudflared tunnel + apps)
    cmds:
      - kubectl apply -k k8s/overlays/stage-1

  # Bootstrap the cluster Secrets that don't survive a recreate but
  # have to exist before the platform stack can come up:
  #
  #   - eso-aws-credentials   (external-secrets namespace) — ESOSecretsReader
  #     IAM access key for ESO to read SM. PGP-decrypted via keybase.
  #   - cloudflared-secret    (default namespace) — TUNNEL_TOKEN for the
  #     cloudflared Deployment in stage-1 mode.
  #
  # Both come from `task tf:stage:apply` outputs; both stay in shell
  # variables only (never written to disk). Re-runs idempotently:
  # each Secret's bootstrap block skips when its target Secret already
  # exists, so `task --force k8s:bootstrap-secrets` is the way to
  # force-rotate after a TF output changes (e.g., access-key rotation
  # or tunnel recreation).
  #
  # Used as a dep by `k8s:platform:up` so the platform stack always
  # has its credentials, but the inner status checks make repeat runs
  # cheap (no aws-vault / keybase reprompt when nothing's missing).
  k8s:bootstrap-secrets:
    desc: apply ESO + cloudflared bootstrap Secrets to the cluster (no plaintext on disk)
    # Skip the whole task only when both Secrets are already present.
    # Otherwise the cmds run, and each block independently no-ops if
    # its own Secret exists.
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - kubectl get secret cloudflared-secret >/dev/null 2>&1
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault` (see infra/README.md)"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:cluster:up` first"
    cmds:
      # eso-aws-credentials: ESOSecretsReader access key for ESO.
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          kubectl create secret generic eso-aws-credentials \
            --namespace=external-secrets \
            --from-literal=AWS_ACCESS_KEY_ID="$ak" \
            --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "applied eso-aws-credentials Secret to external-secrets namespace"
        fi
      # cloudflared-secret: TUNNEL_TOKEN for the cloudflared Deployment.
      - |
        if kubectl get secret cloudflared-secret >/dev/null 2>&1; then
          echo "cloudflared-secret already present, skipping"
        else
          set -euo pipefail
          token=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw cloudflared_tunnel_token)
          kubectl create secret generic cloudflared-secret \
            --namespace=default \
            --from-literal=TUNNEL_TOKEN="$token" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "applied cloudflared-secret Secret to default namespace"
        fi

  # Install ESO + traefik + grafana-k8s-monitoring into the local
  # cluster. Idempotent — re-run after a cluster recreate or to
  # upgrade any chart. Depends on `k8s:bootstrap-secrets`, which
  # auto-skips when both bootstrap Secrets already exist (so the
  # common path doesn't re-prompt for aws-vault + keybase).
  #
  # k8s-monitoring requires the k8s/grafana-cloud-metrics-write SM
  # value to have been seeded out-of-band first; see the bootstrap
  # comment block at the top of terraform/stage-1/grafana-k8s-monitoring.tf.
  # If it hasn't been seeded, the ExternalSecret materialization will
  # fail and the helm install will follow.
  #
  # Traefik: the bundled k3s Traefik is disabled via --disable=traefik
  # in k8s/k3d-config.yaml, so this task is the only thing that brings
  # up an ingress controller. App Ingresses (`ingressClassName: traefik`)
  # don't reach anything until this runs.
  #
  # Future consumers (cert-manager, external-dns, app workloads)
  # layer on top via their own kustomize overlays + ExternalSecret
  # manifests.
  k8s:platform:up:
    desc: install ESO + traefik + grafana-k8s-monitoring into the local cluster
    deps: [k8s:bootstrap-secrets]
    preconditions:
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:cluster:up` first"
    cmds:
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/stage-1/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      # Wait for CRD discovery to settle — kubectl's local cache lags
      # the helm install by a few seconds, and `kubectl apply -k` errors
      # with "no matches for kind" if you don't wait for the API.
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/stage-1
      - echo "ESO up. ClusterSecretStore aws-secretsmanager is ready for ExternalSecret consumers."
      # Traefik replaces the disabled k3s-bundled chart. Lives in
      # kube-system to match the bundled chart's namespace, so existing
      # app Ingresses (ingressClassName: traefik) keep working without
      # changes.
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up. App Ingresses (ingressClassName=traefik) will route through this."'
      # grafana-k8s-monitoring: namespace + ExternalSecret first so ESO
      # materializes grafana-cloud-metrics-write before the helm chart
      # tries to read it.
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -k k8s/monitoring/stage-1
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Has k8s/grafana-cloud-metrics-write been seeded? See terraform/stage-1/grafana-k8s-monitoring.tf."; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/stage-1/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."

  # Twitch streaming toggle for OBS. The OBS deployment's envFrom on
  # obs-secret is `optional: true`, so the existence + content of that
  # Secret IS the stream state. `obs:stream:on` pulls the STREAM_KEY
  # from AWS Secrets Manager (k8s/obs/twitch-stream-key) and creates
  # the Secret; `obs:stream:off` deletes the Secret. Either way we
  # rollout-restart obs so the entrypoint re-reads STREAM_KEY at boot
  # — Kubernetes doesn't propagate Secret changes to running pods'
  # env vars.
  obs:stream:on:
    desc: enable Twitch streaming on OBS (pulls STREAM_KEY from SM, creates obs-secret, restarts OBS)
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:cluster:up` first"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found — run `task k8s:apply:stage-1` first"
    cmds:
      - |
        set -euo pipefail
        sk=$(aws-vault exec adanalife-stage -- aws secretsmanager get-secret-value \
          --secret-id k8s/obs/twitch-stream-key --query SecretString --output text)
        kubectl create secret generic obs-secret \
          --from-literal=STREAM_KEY="$sk" \
          --dry-run=client -o yaml | kubectl apply -f - >/dev/null
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s
      - echo "OBS streaming to Twitch (adanalife_staging via stage-1 SM)"

  obs:stream:off:
    desc: disable Twitch streaming on OBS (deletes obs-secret, restarts OBS to idle)
    preconditions:
      - sh: command -v kubectl >/dev/null
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster"
      - sh: kubectl get deploy obs >/dev/null 2>&1
        msg: "obs Deployment not found"
    cmds:
      - kubectl delete secret obs-secret --ignore-not-found
      - kubectl rollout restart deploy/obs
      - kubectl rollout status deploy/obs --timeout=120s
      - echo "OBS idle (not streaming)"

  k8s:logs:
    desc: tail logs across all app pods
    cmds:
      - kubectl logs -l app.kubernetes.io/part-of=tripbot --all-containers --tail=50 -f

  # contact-form: SMTP credential bootstrap for the staging deploy.
  #
  # Run once after `task tf:stage:apply` lands the SES + IAM resources
  # in ses.tf. Re-runnable: idempotent on already-verified recipients,
  # always overwrites the SM secret value (no harm).
  #
  # Steps:
  #   1. SES sandbox requires verified recipients. If the recipient
  #      isn't yet verified, send the AWS verification email and
  #      exit (user clicks link, re-runs).
  #   2. Pull the encrypted access-key secret from terraform output,
  #      base64-decode, keybase-decrypt.
  #   3. Derive the SES SMTP password from the secret access key
  #      using AWS's documented HMAC-SHA256 chain (SigV4 → 0x04
  #      version byte → base64).
  #   4. Write {username, password} JSON to k8s/contact-form/smtp
  #      via aws secretsmanager put-secret-value.
  #
  # Override the recipient by exporting RECIPIENT_EMAIL before the
  # task. The default matches whatever EMAIL_RECIPIENTS is wired into
  # the contact-form deployment manifest.
  contact-form:bootstrap-smtp:
    desc: verify recipient + populate k8s/contact-form/smtp in SM with derived SES SMTP creds
    vars:
      RECIPIENT: '{{.RECIPIENT_EMAIL | default "danadotlol@gmail.com"}}'
    preconditions:
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install + log in per vault/infra/keybase-setup.md"
      - sh: command -v python3 >/dev/null
        msg: "python3 not found — install with `mise use -g python@3.12` or system python"
      - sh: command -v jq >/dev/null
        msg: "jq not found — install with `brew install jq`"
    cmds:
      - |
        set -euo pipefail
        email='{{.RECIPIENT}}'

        # 1. Ensure recipient is verified (SES sandbox)
        verified=$(aws-vault exec adanalife-stage -- aws ses get-identity-verification-attributes \
          --identities "$email" \
          --query "VerificationAttributes.\"$email\".VerificationStatus" \
          --output text 2>/dev/null || echo "None")
        if [ "$verified" != "Success" ]; then
          echo "Recipient $email is not yet verified by SES (status: $verified)."
          echo "Sending AWS verification email..."
          aws-vault exec adanalife-stage -- aws ses verify-email-identity --email-address "$email"
          echo
          echo "Click the verification link in $email's inbox, then re-run:"
          echo "  task contact-form:bootstrap-smtp"
          exit 1
        fi
        echo "Recipient $email is SES-verified."

        # 2. Pull terraform outputs + decrypt the access key
        ak=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw contact_form_mailer_access_key)
        sk=$(aws-vault exec adanalife-stage -- terraform -chdir=terraform/stage-1 output -raw contact_form_mailer_secret_encrypted \
              | base64 -d | keybase pgp decrypt)

        # 3. Derive the SES SMTP password (SigV4 chain → 0x04 prefix → base64)
        smtp_password=$(SK="$sk" REGION="us-east-1" python3 -c '
        import base64, hmac, hashlib, os
        def _sign(key, msg):
            return hmac.new(key, msg.encode("utf-8"), hashlib.sha256).digest()
        secret = os.environ["SK"]
        region = os.environ["REGION"]
        k = _sign(("AWS4" + secret).encode("utf-8"), "11111111")
        k = _sign(k, region)
        k = _sign(k, "ses")
        k = _sign(k, "aws4_request")
        k = _sign(k, "SendRawEmail")
        print(base64.b64encode(bytes([0x04]) + k).decode("ascii"), end="")
        ')

        # 4. Write to SM
        payload=$(jq -nc --arg u "$ak" --arg p "$smtp_password" '{username: $u, password: $p}')
        aws-vault exec adanalife-stage -- aws secretsmanager put-secret-value \
          --secret-id k8s/contact-form/smtp \
          --secret-string "$payload" >/dev/null
        echo "Wrote SES SMTP credentials to k8s/contact-form/smtp"
