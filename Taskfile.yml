version: '3'

env:
  # Colorize `kubectl diff` output. kubectl shells out to an external differ
  # (default plain `diff -u -N`, no color); point it at a color-forcing one.
  # --color=always (not auto) is required: Task captures the command's stdout,
  # so the differ never sees a TTY and auto-detection would disable color.
  # Both Apple/FreeBSD diff (macOS) and GNU diff (Linux mini-PC) support these
  # flags, so this is portable across hosts.
  KUBECTL_EXTERNAL_DIFF: diff -u -N --color=always

tasks:
  # ---------------------------------------------------------------------------
  # cdk8s — the Python Kubernetes authoring layer (infra/cdk8s/), migrating off
  # the Kustomize overlays. These are ADDITIVE: the live `k8s:<env>:apply` tasks
  # still drive Kustomize until the per-component cutover. `cdk8s:<env>:diff` is
  # the safe read-only way to compare cdk8s output against the live cluster.
  # ---------------------------------------------------------------------------
  cdk8s:imports:
    desc: Generate the typed k8s + CRD constructs (cdk8s import) into imports/ — gitignored, needed before synth/test on a fresh checkout
    dir: cdk8s
    # Skip if already generated (import is slow). Both dirs must exist: k8s is the
    # core API, io/ holds the ESO + cert-manager CRD constructs (per cdk8s.yaml).
    status:
      - test -d imports/k8s
      - test -d imports/io
    cmds:
      - mise exec -- uv run cdk8s import

  cdk8s:synth:
    desc: Synthesize infra's deploy units (offline) -> cdk8s/dist/<env>-{supporting,data}.k8s.yaml + argocd (the tripbot app/job manifests + dashcam-cv live in their own repos now)
    dir: cdk8s
    deps: [cdk8s:imports]
    cmds:
      - mise exec -- uv run cdk8s synth

  cdk8s:synth:platform:
    desc: Synthesize apps + the platform Helm stack (needs helm + network)
    dir: cdk8s
    deps: [cdk8s:imports]
    env:
      CDK8S_PLATFORM: "1"
    cmds:
      - mise exec -- uv run cdk8s synth

  # The dashcam NFS PersistentVolume is host-specific bootstrap infra kept OUT of
  # Argo (its own DashcamPVChart -> dist/<env>-dashcam-pv.k8s.yaml, not globbed by
  # the apps/data ApplicationSets). These tasks synth it with the real NFS coords
  # from the gitignored cdk8s/dashcam-nfs.local.env and apply just the PV — a
  # once-per-cluster bootstrap, like seeding secrets. The matching PVC is Argo's
  # (in the data unit) and binds to this PV by name.
  k8s:stage:dashcam-pv:
    desc: provision the stage-1 dashcam NFS PV (cluster-scoped, outside Argo) from cdk8s with real coords
    cmds:
      - task: k8s:_dashcam-pv:apply
        vars: { ENV: stage-1 }

  k8s:prod:dashcam-pv:
    desc: provision the prod-1 dashcam NFS PV (cluster-scoped, outside Argo) from cdk8s with real coords
    cmds:
      - task: k8s:_dashcam-pv:apply
        vars: { ENV: prod-1 }

  # Populate the node-local dashcam corpus cache from NFS (the NFS<->local serving
  # toggle). Requires dashcam_local_enabled for the env (so the vlc-dashcam-local
  # PVC exists). Re-runnable: the copy skips clips already present, so a second run
  # only fills gaps. Watch: kubectl -n <env> logs -f job/dashcam-localize
  k8s:stage:dashcam-localize:
    desc: copy the stage-1 dashcam corpus NFS -> node-local PVC (the one-shot localize Job)
    cmds:
      - task: k8s:_dashcam-localize:apply
        vars: { ENV: stage-1 }

  k8s:prod:dashcam-localize:
    desc: copy the prod-1 dashcam corpus NFS -> node-local PVC (the one-shot localize Job)
    cmds:
      - task: k8s:_dashcam-localize:apply
        vars: { ENV: prod-1 }

  # Post-rollout verification: confirm APP's running pods actually carry the
  # image the Deployment asks for. imagePullPolicy Always can silently roll a
  # pod onto a different image than expected — check the SHA before
  # feature-testing a deploy. Read-only.
  k8s:stage:verify-sha:
    desc: verify APP's stage-1 pods run the Deployment's image (APP=tripbot)
    cmds:
      - task: k8s:_verify-sha
        vars: { ENV: stage-1, APP: '{{.APP}}' }

  k8s:prod:verify-sha:
    desc: verify APP's prod-1 pods run the Deployment's image (APP=tripbot)
    cmds:
      - task: k8s:_verify-sha
        vars: { ENV: prod-1, APP: '{{.APP}}' }

  k8s:_verify-sha:
    internal: true
    requires:
      vars: [APP]
    preconditions:
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first"
    cmds:
      - |
        set -euo pipefail
        ns={{.ENV}}
        want=$(kubectl -n "$ns" get deploy {{.APP}} -o jsonpath='{.spec.template.spec.containers[0].image}')
        echo "deployment image: $want"
        sel=$(kubectl -n "$ns" get deploy {{.APP}} -o json | jq -r '.spec.selector.matchLabels | to_entries | map("\(.key)=\(.value)") | join(",")')
        kubectl -n "$ns" get pods -l "$sel" -o custom-columns='POD:.metadata.name,READY:.status.containerStatuses[0].ready,IMAGE:.status.containerStatuses[0].image,IMAGE_ID:.status.containerStatuses[0].imageID,STARTED:.status.startTime'

  k8s:_dashcam-pv:apply:
    internal: true
    dir: cdk8s
    deps: [cdk8s:imports]
    preconditions:
      # Guard: minipc-cluster tasks act on the AMBIENT kube-context — a bare
      # kubectl runs against whatever context happens to be current. On
      # 2026-07-03 `task gitops:apply` stamped the full Argo config onto an
      # unrelated GKE cluster this way. Same pattern as the k3d-only guard on
      # the dev tasks. Accepts any minipc context (admin@adanalife-minipc,
      # argocd-minipc) or the tailscale-operator off-LAN fallback.
      - &minipc-context-guard
        sh: 'case "$(kubectl config current-context 2>/dev/null)" in *minipc*|tailscale-operator.*) true ;; *) false ;; esac'
        msg: "refusing: this task targets the minipc (stage/prod) cluster, but the current kube-context is not a minipc context. Run kubectl config use-context admin@adanalife-minipc first."
      - sh: test -f dashcam-nfs.local.env
        msg: "cdk8s/dashcam-nfs.local.env missing — cp dashcam-nfs.local.env.example and fill in NFS_SERVER/NFS_PATH"
    cmds:
      - |
        set -euo pipefail
        set -a; . ./dashcam-nfs.local.env; set +a
        : "${NFS_SERVER:?set NFS_SERVER in cdk8s/dashcam-nfs.local.env}"
        : "${NFS_PATH:?set NFS_PATH in cdk8s/dashcam-nfs.local.env}"
        out=$(mktemp -d); trap 'rm -rf "$out"' EXIT
        # Synth via main.py directly (NOT `cdk8s synth`, which forces output=dist
        # from cdk8s.yaml) so the real coords land in a throwaway dir, never the
        # committed golden. Apply only the cluster-scoped PV.
        CDK8S_OUTDIR="$out" CDK8S_ENV={{.ENV}} mise exec -- uv run python main.py >/dev/null
        echo "Applying {{.ENV}} dashcam NFS PersistentVolume (cluster-scoped, outside Argo)"
        kubectl apply -f "$out/{{.ENV}}-dashcam-pv.k8s.yaml"

  k8s:_dashcam-localize:apply:
    internal: true
    dir: cdk8s
    deps: [cdk8s:imports]
    preconditions:
      - *minipc-context-guard
      - sh: test -f dashcam-nfs.local.env
        msg: "cdk8s/dashcam-nfs.local.env missing — cp dashcam-nfs.local.env.example and fill in NFS_SERVER/NFS_PATH"
    cmds:
      - |
        set -euo pipefail
        set -a; . ./dashcam-nfs.local.env; set +a
        : "${NFS_SERVER:?set NFS_SERVER in cdk8s/dashcam-nfs.local.env}"
        : "${NFS_PATH:?set NFS_PATH in cdk8s/dashcam-nfs.local.env}"
        out=$(mktemp -d); trap 'rm -rf "$out"' EXIT
        # Synth via main.py directly (real coords land in a throwaway dir, never the
        # committed golden — same as dashcam-pv). The localize Job only renders when
        # the env has dashcam_local_enabled; if the file is absent, that's the hint.
        CDK8S_OUTDIR="$out" CDK8S_ENV={{.ENV}} mise exec -- uv run python main.py >/dev/null
        f="$out/{{.ENV}}-dashcam-localize.k8s.yaml"
        test -f "$f" || { echo "no localize Job for {{.ENV}} — set dashcam_local_enabled=True for it in config.py first"; exit 1; }
        # Jobs are largely immutable, so clear any prior run before re-applying.
        kubectl -n {{.ENV}} delete job dashcam-localize --ignore-not-found
        echo "Applying {{.ENV}} dashcam localize Job (NFS -> node-local PVC, outside Argo)"
        kubectl apply -f "$f"
        echo "Watch: kubectl -n {{.ENV}} logs -f job/dashcam-localize"

  # dashcam-cv (stage-only vector fill) moved to the video-pipeline repo, which
  # owns its own cdk8s/dist + apply/ramp tasks now; Argo delivers it cross-repo.

  cdk8s:test:
    desc: Run the cdk8s unit + contract tests
    dir: cdk8s
    deps: [cdk8s:imports]
    cmds:
      - mise exec -- uv run pytest -q

  cdk8s:check:
    desc: Assert the committed dist/ deploy units match a fresh synth (golden-file gate)
    dir: cdk8s
    deps: [cdk8s:imports]
    env:
      NFS_SERVER: '<NFS server address>'
      NFS_PATH: '<export path>'
    cmds:
      - mise exec -- uv run cdk8s synth
      - git diff --exit-code -- dist/ || { echo "dist/ is stale — run task cdk8s:synth and commit"; exit 1; }

  # cdk8s:<env>:diff — kubectl diff the synthesized app manifests against the
  # live cluster (read-only; safe pre-cutover check). Output is colorized via the
  # top-level KUBECTL_EXTERNAL_DIFF (--color=always). kubectl diff exits non-zero
  # when a diff exists, so `|| true` keeps Task from treating "there's a diff" as
  # a failure. Point kubectl at the right context first.
  # The tripbot APP manifests (per <env>-<component>-<platform>) moved to the
  # tripbot repo's cdk8s; diff them there (`task cdk8s:{stage,prod}:diff` in
  # ~/adanalife/tripbot). infra keeps only the data + supporting + dashcam units.

  # cdk8s:dev:apply — bootstrap the development (k3d) DATA unit directly.
  # dev's apps + supporting + identity are Argo-managed (the k3d Argo reads the
  # tripbot repo @ main); this just lays down the postgres + SecretStore unit
  # that Argo's app sync depends on, before/independently of an Argo bootstrap.
  # Pre-req: a running k3d cluster + `task k8s:dev:bootstrap-secrets` for the
  # eso-aws-credentials Secret.
  cdk8s:dev:apply:
    desc: apply the synthesized development DATA unit (postgres + SecretStore) to the k3d cluster — apps come via the k3d Argo from the tripbot repo
    dir: cdk8s
    deps: [cdk8s:synth]
    preconditions:
      # Guard: k3d dev cluster only — never the minipc (Talos). Applying
      # dev manifests against the minipc would collide with the live stage/prod
      # workloads. (dir: cdk8s, so reach back up to the repo-root kubeconfig.)
      - sh: '[ "$(kubectl config current-context 2>/dev/null | cut -c1-4)" = "k3d-" ]'
        msg: "refusing: cdk8s:dev:apply must target the k3d dev cluster, but the current kube-context is not a k3d cluster. Run `kubectl config use-context k3d-adanalife-dev` (or `task k8s:dev:cluster:up`) first."
    cmds:
      - kubectl apply -f dist/development-data.k8s.yaml

  gitops:apply:
    desc: Apply the Argo CD config (project + appset + ingress + repo secret) reconciling cdk8s/dist (manual sync; see gitops/README.md)
    preconditions:
      - *minipc-context-guard
    cmds:
      - kubectl apply -f cdk8s/dist/argocd.k8s.yaml

  contract:sync:
    desc: Sync contract.json from the tripbot repo (the anti-drift bridge's source of truth)
    dir: cdk8s
    cmds:
      - cp ../../tripbot/pkg/contract/contract.json contract.json
      - echo "synced contract.json from tripbot/pkg/contract — re-run cdk8s:test to verify"

  # Terraform: tf:<env>:<verb>. Extra flags pass via the `--` separator,
  # e.g. `task tf:stage:init -- -upgrade` or `task tf:stage:plan -- -target=…`.
  tf:stage:apply:
    desc: terraform apply against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- mise exec -- terraform apply {{.CLI_ARGS}}

  tf:stage:plan:
    desc: terraform plan against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- mise exec -- terraform plan {{.CLI_ARGS}}

  tf:stage:init:
    desc: terraform init against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- mise exec -- terraform init {{.CLI_ARGS}}

  tf:stage:init:reconfigure:
    desc: terraform init -reconfigure against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- mise exec -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:stage:init:migrate:
    desc: terraform init -migrate-state against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- mise exec -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:stage:destroy:
    desc: terraform destroy against stage-1
    dir: terraform/stage-1
    cmds:
      - aws-vault exec adanalife-stage -- mise exec -- terraform destroy {{.CLI_ARGS}}

  tf:prod:apply:
    desc: terraform apply against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- mise exec -- terraform apply {{.CLI_ARGS}}

  tf:prod:plan:
    desc: terraform plan against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- mise exec -- terraform plan {{.CLI_ARGS}}

  tf:prod:init:
    desc: terraform init against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- mise exec -- terraform init {{.CLI_ARGS}}

  tf:prod:init:reconfigure:
    desc: terraform init -reconfigure against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- mise exec -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:prod:init:migrate:
    desc: terraform init -migrate-state against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- mise exec -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:prod:destroy:
    desc: terraform destroy against prod-1
    dir: terraform/prod-1
    cmds:
      - aws-vault exec adanalife-prod -- mise exec -- terraform destroy {{.CLI_ARGS}}

  # Core uses --no-session because session tokens can't make IAM changes.
  tf:core:apply:
    desc: terraform apply against core (no session token; IAM changes need full creds)
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform apply {{.CLI_ARGS}}

  tf:core:plan:
    desc: terraform plan against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform plan {{.CLI_ARGS}}

  tf:core:init:
    desc: terraform init against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform init {{.CLI_ARGS}}

  tf:core:init:reconfigure:
    desc: terraform init -reconfigure against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:core:init:migrate:
    desc: terraform init -migrate-state against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:core:destroy:
    desc: terraform destroy against core
    dir: terraform/core
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform destroy {{.CLI_ARGS}}

  # platform = env-agnostic config, i.e. things not owned by any specific
  # "-1" account (GitHub org config; Grafana Cloud is a migration candidate).
  # It has no account of its own — state/SM plumbing rides in the org-global
  # core account, hence the adanalife-core profile; --no-session because it
  # attaches IAM policies.
  tf:platform:apply:
    desc: terraform apply against platform
    dir: terraform/platform
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform apply {{.CLI_ARGS}}

  tf:platform:plan:
    desc: terraform plan against platform
    dir: terraform/platform
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform plan {{.CLI_ARGS}}

  tf:platform:init:
    desc: terraform init against platform
    dir: terraform/platform
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform init {{.CLI_ARGS}}

  tf:platform:init:reconfigure:
    desc: terraform init -reconfigure against platform
    dir: terraform/platform
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform init -reconfigure {{.CLI_ARGS}}

  tf:platform:init:migrate:
    desc: terraform init -migrate-state against platform
    dir: terraform/platform
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform init -migrate-state {{.CLI_ARGS}}

  tf:platform:destroy:
    desc: terraform destroy against platform
    dir: terraform/platform
    cmds:
      - aws-vault exec adanalife-core --no-session -- mise exec -- terraform destroy {{.CLI_ARGS}}

  # `aws-vault login` opens the AWS web console in browser
  aws:login:stage:
    cmds:
      - aws-vault login adanalife-stage

  aws:login:prod:
    cmds:
      - aws-vault login adanalife-prod

  aws:login:core:
    cmds:
      - aws-vault login adanalife-core

  # GCP — single bootstrap helper today, used by the tripbot prod-1 Maps
  # credential mint. If/when more GCP resources show up here, lift this to a
  # hashicorp/google provider in terraform/prod-1/.
  # Pre-req: `gcloud auth login` once + billing attached to the target project.
  gcp:prod:mint-maps-key:
    desc: mint a fresh Maps API key on tripbot-prod (Geocoding + Maps JavaScript only) and print the keyString to stdout
    silent: true
    vars:
      PROJECT: tripbot-prod
      NAME: '{{.NAME | default "tripbot-prod-1"}}'
    cmds:
      - |
        set -euo pipefail
        echo "Enabling API Keys + Geocoding + Maps JavaScript APIs on {{.PROJECT}}..." >&2
        # apikeys.googleapis.com is the meta-API for managing API keys
        # (what the `api-keys create` subcommand below talks to). It's a
        # separate enablement from the Maps APIs the minted key actually uses.
        # Without it, the first run on a fresh project fails with
        # PERMISSION_DENIED / SERVICE_DISABLED.
        gcloud services enable \
          apikeys.googleapis.com \
          geocoding-backend.googleapis.com \
          maps-backend.googleapis.com \
          --project={{.PROJECT}} >&2
        echo "Minting API key '{{.NAME}}' on {{.PROJECT}}..." >&2
        KEY_RESOURCE=$(gcloud alpha services api-keys create \
          --display-name='{{.NAME}}' \
          --api-target=service=geocoding-backend.googleapis.com \
          --api-target=service=maps-backend.googleapis.com \
          --project={{.PROJECT}} \
          --format='value(response.name)' \
          --quiet)
        echo "Created key resource: $KEY_RESOURCE" >&2
        # The keyString is the ONLY line on stdout — capture with:
        #   export PROD_GOOGLE_MAPS_API_KEY=$(task gcp:prod:mint-maps-key)
        gcloud alpha services api-keys get-key-string "$KEY_RESOURCE" \
          --format='value(keyString)' \
          --quiet

  # k3d cluster lifecycle. Tasks are env-prefixed (k8s:dev:* / k8s:prod:*)
  # following the tf:stage:* / tf:prod:* pattern. The cluster name embedded
  # in k3d-config.yaml is env-based and machine-independent (adanalife-dev,
  # context k3d-adanalife-dev) so the tooling is identical on any laptop —
  # no host name (the old adanalife-bees) baked into the config.
  #
  # These k8s:dev:cluster:* tasks are the low-level cluster primitives:
  #   cluster:up    → create the k3d cluster (just the cluster, no platform/apps)
  #   cluster:down  → delete the cluster (full wipe)
  #   cluster:stop  → suspend (containers down, definition + state preserved)
  #   cluster:start → resume a stopped cluster (counterpart to stop)
  #
  # Day-to-day you want the higher-level verbs that wrap these:
  #   k8s:dev:up      → cluster:up + platform:up + sync (cold-start to running)
  #   k8s:dev:down    → cluster:down
  #   k8s:dev:deploy  → build + import a local image and run it (APP=<app> for one)
  #   k8s:dev:sync    → re-sync Argo apps / revert a local image to CI :main
  #   k8s:dev:status  → pods + running image tags + Argo health
  k8s:dev:cluster:up:
    desc: "create the local k3d dev cluster — example video by default; DASHCAM_NAS=<host path> still bind-mounts a real dashcam dir at /host/nas-dashcam, but cdk8s dev does not consume it yet (the legacy development-nas overlay is gone — re-wire via cdk8s dev config if needed)"
    cmds:
      # Development plays the committed example video (mounted at
      # /host/dashcam) by default — the 99% case. To stream a real dashcam
      # directory instead, pass its host path as DASHCAM_NAS=<path>; it's
      # bind-mounted :ro at /host/nas-dashcam. NOTE: the legacy development-nas
      # overlay that consumed this mount is gone; cdk8s dev does not read it yet
      # (known gap — wire it into cdk8s dev config). The path is a runtime arg so the
      # real footage location never gets committed. k3d bind-mounts are
      # fixed at create time, so this must be set on cluster:up, not apply.
      - |
        if [ -n "{{.DASHCAM_NAS}}" ]; then
          echo "mounting dashcam: {{.DASHCAM_NAS}} -> /host/nas-dashcam (:ro)"
          k3d cluster create -c k8s/k3d-config.yaml --volume "{{.DASHCAM_NAS}}:/host/nas-dashcam:ro@server:*"
        else
          k3d cluster create -c k8s/k3d-config.yaml
        fi

  k8s:dev:cluster:down:
    desc: tear down the local k3d dev cluster (delete; use k8s:dev:cluster:stop to suspend without wipe)
    cmds:
      - k3d cluster delete adanalife-dev

  k8s:dev:cluster:stop:
    desc: suspend the local k3d dev cluster (containers down, cluster definition + state preserved)
    cmds:
      - k3d cluster stop adanalife-dev

  k8s:dev:cluster:start:
    desc: resume a stopped local k3d dev cluster (counterpart to k8s:dev:cluster:stop)
    cmds:
      - k3d cluster start adanalife-dev

  # The one-liner cold-start: create the cluster, install the platform stack +
  # Argo CD (platform:up pulls in bootstrap-secrets as a dep), then Argo-sync
  # the apps in dependency order. Each step is the canonical task; failures
  # short-circuit the chain. Replaces the old cluster:rebuild (which ended in the
  # now-superseded `cdk8s:dev:apply` — Argo owns the apps, so an imperative apply
  # just fights it with an SSA field-ownership conflict).
  k8s:dev:up:
    desc: "cold-start the dev env from nothing: create cluster -> install platform + Argo -> sync apps"
    aliases: ["k8s:dev:cluster:rebuild"]
    cmds:
      - task: k8s:dev:cluster:up
        vars: { DASHCAM_NAS: '{{.DASHCAM_NAS}}' }
      - task: k8s:dev:platform:up
      - task: k8s:dev:sync

  k8s:dev:down:
    desc: "tear down the dev cluster (delegates to k8s:dev:cluster:down)"
    cmds:
      - task: k8s:dev:cluster:down

  # prod-1 is the bare-metal Talos mini-PC (192.168.1.200), not a k3d
  # cluster — its lifecycle is talosctl wipe-and-rebuild. The k8s:prod:*
  # tasks below (bootstrap-secrets / platform:up / apply) target the live
  # Talos cluster; there is no k8s:prod:cluster:*.

  # Build the dev app images locally, tag them :dev-local, and import them into
  # the k3d dev cluster's image store. APP=tripbot|vlc|obs|onscreens builds just
  # one; omit for all four. The committed manifests still pin CI's :main so a
  # fresh cluster cold-starts on registry images — this (+ k8s:dev:deploy) is
  # only for iterating on a LOCAL build.
  k8s:dev:images:build:
    desc: "build local app images, tag :dev-local, import into the dev cluster (APP=tripbot|vlc|obs|onscreens for one; default all four)"
    dir: ../tripbot
    cmds:
      # --project-directory + --env-file mirror bin/devenv so build contexts
      # resolve relative to the tripbot repo root and ${VAR} substitutions in
      # the compose file pick up env.docker. On arm64 (Apple Silicon) layer
      # docker-compose.arm64.yml so OBS builds from Dockerfile.arm64 (compiles
      # OBS + CEF from source — without it browser_source silently breaks at
      # scene load). First arm64 OBS build is ~30min for the CEF compile; cached
      # thereafter. Locally-built images are single-platform, so k3d image
      # import works cleanly (unlike multi-arch registry pulls).
      - |
        set -e
        target="{{.APP}}"
        # app : compose-service : image-repo
        all="tripbot:tripbot:adanalife/tripbot \
             vlc:vlc:adanalife/vlc \
             obs:obs:adanalife/obs \
             onscreens:onscreens-server:adanalife/onscreens-server"
        args="--project-directory . --env-file infra/docker/env.docker -f infra/docker/docker-compose.yml"
        case "$(uname -m)" in arm64|aarch64) args="$args -f infra/docker/docker-compose.arm64.yml" ;; esac
        for row in $all; do
          app=${row%%:*}; rest=${row#*:}; svc=${rest%%:*}; repo=${rest#*:}
          { [ -n "$target" ] && [ "$target" != "$app" ]; } && continue
          echo "==> build $repo  (compose service: $svc)"
          docker compose $args build "$svc"
          docker tag "$repo:latest" "$repo:dev-local"
          k3d image import "$repo:dev-local" --cluster=adanalife-dev
        done

  # Run a locally-built image in the dev cluster: builds + imports :dev-local
  # (via images:build), then points the live Deployment(s) at it. Pauses Argo
  # selfHeal on the targeted app — the tripbot-apps ApplicationSet ignores
  # syncPolicy diffs (ignoreApplicationDifferences), so the pause sticks — and
  # flips imagePullPolicy to IfNotPresent so the imported image isn't evicted by
  # a re-pull. Argo will show the app OutOfSync while you iterate; that's
  # expected. Revert to CI :main (and re-enable selfHeal) with k8s:dev:sync.
  k8s:dev:deploy:
    desc: "run a locally-built image in the dev cluster (build+import :dev-local, pin the Deployment to it). APP=<app> for one; default all four. Revert with k8s:dev:sync"
    deps:
      - task: k8s:dev:images:build
        vars: { APP: '{{.APP}}' }
    preconditions:
      - sh: '[ "$(kubectl config current-context 2>/dev/null | cut -c1-4)" = "k3d-" ]'
        msg: "k8s:dev:* must target the k3d dev cluster — `unset KUBECONFIG` (or use-context k3d-adanalife-dev) first."
    cmds:
      - |
        set -e
        target="{{.APP}}"
        # app : deployment : container : image-repo  (dev platform suffix = twitch;
        # obs's container is named `obs`, the others `<app>-twitch`)
        all="tripbot:tripbot-twitch:tripbot-twitch:adanalife/tripbot \
             vlc:vlc-twitch:vlc-twitch:adanalife/vlc \
             obs:obs-twitch:obs:adanalife/obs \
             onscreens:onscreens-twitch:onscreens-twitch:adanalife/onscreens-server"
        for row in $all; do
          app=${row%%:*}; r=${row#*:}; dep=${r%%:*}; r=${r#*:}; ctr=${r%%:*}; repo=${r#*:}
          { [ -n "$target" ] && [ "$target" != "$app" ]; } && continue
          echo "==> deploy $repo:dev-local -> deploy/$dep (container $ctr)"
          # Pause Argo selfHeal so the override isn't reconciled back to :main.
          kubectl patch application "development-$dep" -n argocd --type merge \
            -p '{"spec":{"syncPolicy":{"automated":{"selfHeal":false}}}}' >/dev/null
          # Any initContainer sharing the image (tripbot's `migrate`) needs the
          # same override, or the pod gets stuck pulling :main for the init
          # step. Build an initContainers patch fragment for matching ones.
          init_items=""
          for ic in $(kubectl get "deploy/$dep" -n development \
                        -o jsonpath='{range .spec.template.spec.initContainers[*]}{.name}={.image}{"\n"}{end}'); do
            iname=${ic%%=*}; iimg=${ic#*=}
            case "$iimg" in "$repo:"*)
              init_items="${init_items}{\"name\":\"$iname\",\"image\":\"$repo:dev-local\",\"imagePullPolicy\":\"IfNotPresent\"}," ;;
            esac
          done
          init_patch=""
          [ -n "$init_items" ] && init_patch="\"initContainers\":[${init_items%,}],"
          # Image + IfNotPresent for the main container (and matching init
          # containers) in one strategic patch = one rollout.
          kubectl patch "deploy/$dep" -n development --type strategic \
            -p "{\"spec\":{\"template\":{\"spec\":{${init_patch}\"containers\":[{\"name\":\"$ctr\",\"image\":\"$repo:dev-local\",\"imagePullPolicy\":\"IfNotPresent\"}]}}}}"
          kubectl rollout status "deploy/$dep" -n development --timeout=180s
        done
        echo "running your local :dev-local build. revert to CI :main with: task k8s:dev:sync"

  # Dev env at a glance: pods, the image tag each app is running (CI :main vs
  # local :dev-local), and Argo app sync/health.
  k8s:dev:status:
    desc: "dev env at a glance: pods + running image tags (:main vs :dev-local) + Argo app health"
    preconditions:
      - sh: '[ "$(kubectl config current-context 2>/dev/null | cut -c1-4)" = "k3d-" ]'
        msg: "k8s:dev:* must target the k3d dev cluster — `unset KUBECONFIG` (or use-context k3d-adanalife-dev) first."
    cmds:
      - 'echo "== pods (development) =="'
      - kubectl get pods -n development
      - 'echo "== running images =="'
      - kubectl get deploy -n development -o custom-columns='DEPLOY:.metadata.name,IMAGE:.spec.template.spec.containers[0].image,POLICY:.spec.template.spec.containers[0].imagePullPolicy'
      - 'echo "== Argo apps =="'
      - kubectl get applications -n argocd -o custom-columns='APP:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status' | grep -E 'APP|development-'

  # Restart an app deployment so its pods re-pull the image. Pairs with
  # `k8s:import-images` — after importing rebuilt images into k3d, restart
  # the deployment to roll new pods that fetch the freshly-imported tag.
  # imagePullPolicy: Always on these deployments (#411) means "rollout
  # restart" is sufficient; no need to bump tags or delete the cached image.
  #
  # Env-prefixed because the
  # mini-PC cluster co-tenants prod-1 + stage-1 in different namespaces — a
  # context-less `kubectl rollout` would target whichever namespace is
  # current, which is ambiguous. Each task bakes in `-n <namespace>` so the
  # right pods restart regardless of the operator's current kubeconfig ns.
  #
  # Workloads are per-platform (`<app>-<platform>`, e.g. tripbot-twitch),
  # so PLATFORM selects which one to roll — default `twitch` (present in
  # every env's steady state), override `PLATFORM=youtube` for the YouTube
  # stack. `:all` rolls the default platform's four apps; pass PLATFORM= on
  # the command line to roll a different platform's set.
  k8s:prod:rollout:tripbot:
    desc: restart prod-1 tripbot so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/tripbot-{{.PLATFORM}} -n prod-1
      - kubectl rollout status deploy/tripbot-{{.PLATFORM}} -n prod-1 --timeout=120s

  k8s:prod:rollout:vlc-server:
    desc: restart prod-1 vlc-server so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/vlc-{{.PLATFORM}} -n prod-1
      - kubectl rollout status deploy/vlc-{{.PLATFORM}} -n prod-1 --timeout=120s

  k8s:prod:rollout:obs:
    desc: restart prod-1 obs so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/obs-{{.PLATFORM}} -n prod-1
      - kubectl rollout status deploy/obs-{{.PLATFORM}} -n prod-1 --timeout=120s

  k8s:prod:rollout:onscreens:
    desc: restart prod-1 onscreens-server so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/onscreens-{{.PLATFORM}} -n prod-1
      - kubectl rollout status deploy/onscreens-{{.PLATFORM}} -n prod-1 --timeout=120s

  k8s:prod:rollout:all:
    desc: restart all four prod-1 app deployments (tripbot + vlc-server + obs + onscreens-server; override PLATFORM=, default twitch)
    deps:
      - k8s:prod:rollout:tripbot
      - k8s:prod:rollout:vlc-server
      - k8s:prod:rollout:obs
      - k8s:prod:rollout:onscreens

  k8s:stage:rollout:tripbot:
    desc: restart stage-1 tripbot so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/tripbot-{{.PLATFORM}} -n stage-1
      - kubectl rollout status deploy/tripbot-{{.PLATFORM}} -n stage-1 --timeout=120s

  k8s:stage:rollout:vlc-server:
    desc: restart stage-1 vlc-server so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/vlc-{{.PLATFORM}} -n stage-1
      - kubectl rollout status deploy/vlc-{{.PLATFORM}} -n stage-1 --timeout=120s

  k8s:stage:rollout:obs:
    desc: restart stage-1 obs so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/obs-{{.PLATFORM}} -n stage-1
      - kubectl rollout status deploy/obs-{{.PLATFORM}} -n stage-1 --timeout=120s

  k8s:stage:rollout:onscreens:
    desc: restart stage-1 onscreens-server so it re-pulls the image (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - kubectl rollout restart deploy/onscreens-{{.PLATFORM}} -n stage-1
      - kubectl rollout status deploy/onscreens-{{.PLATFORM}} -n stage-1 --timeout=120s

  k8s:stage:rollout:all:
    desc: restart all four stage-1 app deployments (tripbot + vlc-server + obs + onscreens-server; override PLATFORM=, default twitch)
    deps:
      - k8s:stage:rollout:tripbot
      - k8s:stage:rollout:vlc-server
      - k8s:stage:rollout:obs
      - k8s:stage:rollout:onscreens

  # NOTE: the dev rollout:* tasks were removed — they pointed at pre-per-platform
  # deployment names (deploy/tripbot, not deploy/tripbot-twitch) so they no
  # longer matched anything, and a bare restart under imagePullPolicy: Always
  # just re-pulls CI's :main. Use `task k8s:dev:deploy` to run a local build,
  # `task k8s:dev:sync` to revert to CI images, and a plain
  # `kubectl rollout restart deploy/<app>-twitch -n development` for a bare bounce.

  # The app workloads for prod-1/stage-1 are delivered by Argo CD from
  # cdk8s/dist/<env>-apps.k8s.yaml (see gitops/README.md) — there is no
  # `k8s:{prod,stage}:apply` for apps anymore. dev (k3d) is likewise Argo-managed
  # by its own in-cluster Argo (`task k8s:dev:argo:sync`). The legacy Kustomize app overlays (k8s/apps,
  # k8s/overlays) are gone. What remains below is the stage env-PLATFORM install
  # (external-dns + NATS), which has NOT cut over to cdk8s yet.

  k8s:stage:platform-env:up:
    desc: install the stage-1 env-platform (external-dns + NATS) into the mini-PC cluster — apps are Argo-managed
    preconditions:
      - *minipc-context-guard
    deps: [k8s:stage:bootstrap-secrets]
    cmds:
      # Pre-req: task k8s:stage:bootstrap-secrets (stage ESO store + creds).
      #
      # Stage reuses prod's SHARED cluster platform stack (traefik / ESO operator
      # / cert-manager controller / monitoring). The env-specific platform pieces
      # are external-dns + NATS, both in stage-1-platform. external-dns reads the
      # adanalife-stage account so it can write the stage.whereisdana.today zone
      # (no cross-account).
      # Stage external-dns (own instance, stage account, stage zone). The
      # kustomize apply creates stage-1-platform + its SecretStore +
      # ExternalSecret; the helm release name differs from prod's
      # (external-dns-stage) because the chart's RBAC is cluster-scoped.
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo update external-dns
      - kubectl apply -k k8s/external-dns/stage-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n stage-1-platform
      - helm upgrade --install external-dns-stage external-dns/external-dns
          -n stage-1-platform
          -f k8s/external-dns/stage-1/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns-stage -n stage-1-platform
      - 'echo "stage external-dns up in stage-1-platform. *.stage.whereisdana.today records now publish to the adanalife-stage zone."'
      # NATS — pubsub substrate for inter-component messaging.
      # Stage gets its OWN NATS install in stage-1-platform —
      # namespace isolation from prod-1-platform's instance (rather than
      # cross-env topic-name discipline). Same chart, same values shape;
      # k8s/nats/stage-1/values.yml carries the (currently identical)
      # per-env sizing. Helm release name `nats` is namespace-scoped, so
      # no collision with prod's release of the same name.
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts/
      - helm repo update nats
      - helm upgrade --install nats nats/nats
          --version 2.14.0
          -n stage-1-platform --create-namespace
          -f k8s/nats/values.yml
          -f k8s/nats/stage-1/values.yml
      - kubectl rollout status statefulset/nats -n stage-1-platform --timeout=120s
      - 'echo "NATS up in stage-1-platform. Connect via nats://nats.stage-1-platform.svc.cluster.local:4222. Smoke test: kubectl port-forward -n stage-1-platform svc/nats 4222:4222 then nats pub foo bar from a local nats CLI"'

  # Bootstrap the cluster Secrets that don't survive a recreate but
  # have to exist before the platform stack can come up:
  #
  #   - eso-aws-credentials   (external-secrets namespace) — ESOSecretsReader
  #     IAM access key for ESO to read SM. PGP-decrypted via keybase.
  #
  # Comes from `task tf:<env>:apply` outputs and stays in a shell
  # variable only (never written to disk). Re-runs idempotently:
  # the bootstrap block skips when its target Secret already exists,
  # so `task --force k8s:<env>:bootstrap-secrets` is the way to
  # force-rotate after a TF output changes (e.g., access-key rotation).
  #
  # Used as a dep by `k8s:<env>:platform:up` so the platform stack always
  # has its credentials, but the inner status checks make repeat runs
  # cheap (no aws-vault / keybase reprompt when nothing's missing).
  k8s:dev:bootstrap-secrets:
    desc: apply development ESO bootstrap Secret + write external-dns values.local.yml (no plaintext on disk)
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n development >/dev/null 2>&1
      # Stale-target guard: re-run when the file is missing OR its embedded
      # --default-targets no longer matches the host's current LAN IP, so a
      # DHCP-rotated address doesn't silently persist a stale target.
      - |
        ip=$(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null)
        cur=$(grep -oE -- '--default-targets=[0-9.]+' k8s/external-dns/development/values.local.yml 2>/dev/null | cut -d= -f2)
        [ -n "$ip" ] && [ "$cur" = "$ip" ]
    preconditions:
      # Guard: dev tasks target the k3d dev cluster ONLY. The minipc
      # (stage/prod, Talos) is never a k3d context — and this task writes
      # eso-aws-credentials into the SHARED external-secrets namespace with
      # stage-account creds (dev borrows stage). Run against the minipc, it
      # clobbers prod's external-secrets/eso-aws-credentials → the prod
      # ClusterSecretStore feeds cert-manager's ClusterIssuer the wrong account
      # → cross-account AssumeRole fails → no ClusterIssuer certs issue.
      - sh: '[ "$(kubectl config current-context 2>/dev/null | cut -c1-4)" = "k3d-" ]'
        msg: "refusing: k8s:dev:* must target the k3d dev cluster, but the current kube-context is not a k3d cluster. Run `kubectl config use-context k3d-adanalife-dev` (or `task k8s:dev:cluster:up`) first."
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install with `brew install --cask keybase`, then log in"
      - sh: keybase status >/dev/null 2>&1
        msg: "keybase daemon not running (can't pgp-decrypt the ESO creds) — `open -a Keybase`, wait ~10s for the daemon, then retry"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: command -v curl >/dev/null
        msg: "curl not found — required to fetch host public IP for external-dns default-targets"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:dev:cluster:up` first"
    cmds:
      # eso-aws-credentials (ESOSecretsReader, adanalife-stage account that
      # dev borrows) goes in BOTH external-secrets (for the
      # aws-parameterstore-cluster ClusterSecretStore platform components
      # use) AND the development namespace (for the namespaced
      # aws-parameterstore SecretStore the apps use).
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace development --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n development >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-stage -- mise exec -- terraform -chdir=terraform/stage-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-stage -- mise exec -- terraform -chdir=terraform/stage-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          for ns in external-secrets development; do
            kubectl create secret generic eso-aws-credentials \
              --namespace="$ns" \
              --from-literal=AWS_ACCESS_KEY_ID="$ak" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "applied eso-aws-credentials Secret to external-secrets + development namespaces"
        fi
      # external-dns values.local.yml: per-machine helm override holding
      # the dev host's current LAN IP, fed to external-dns as
      # --default-targets so any Ingress without an explicit
      # external-dns.alpha.kubernetes.io/target annotation resolves to
      # this machine on the LAN. We publish the LAN IP (not the public
      # one) so app Ingresses are reachable on-LAN over real HTTPS
      # (cert via DNS-01) without a router port-forward — same shape as
      # prod/stage on the mini-PC. File-based (not a Secret) because helm
      # values are consumed at chart install, not at pod runtime — re-run
      # this task and `task k8s:dev:platform:up` after a LAN-IP change.
      - |
        set -euo pipefail
        values_file=k8s/external-dns/development/values.local.yml
        # The dev cluster is local k3d on this macOS host; publish its
        # LAN IPv4 (en0 wifi, falling back to en1 ethernet). Route53 A
        # records can only point at v4 addresses. Always rewrite (rather
        # than skip-if-present) so a DHCP-rotated IP can't silently persist
        # a stale --default-targets across a re-run.
        ip=$(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null)
        if [ -z "$ip" ]; then
          echo "could not determine LAN IP (en0/en1) — is the host online?" >&2
          exit 1
        fi
        prev=$(grep -oE -- '--default-targets=[0-9.]+' "$values_file" 2>/dev/null | cut -d= -f2 || true)
        cat > "$values_file" <<YAML
        # Generated by \`task k8s:dev:bootstrap-secrets\` — dev host LAN IP
        # snapshot for external-dns --default-targets. Re-run the task
        # after a LAN-IP change, then \`task k8s:dev:platform:up\` to roll
        # the chart with the new value.
        #
        # --force-default-targets is required because traefik writes
        # the cluster-internal klipper-lb IP into Ingress.status, and
        # external-dns prefers source-provided targets unless told to
        # override them with the default.
        extraArgs:
          - --default-targets=$ip
          - --force-default-targets
        YAML
        if [ -z "$prev" ]; then
          echo "wrote $values_file (default-targets=$ip)"
        elif [ "$prev" != "$ip" ]; then
          echo "rewrote $values_file: default-targets $prev -> $ip (LAN IP changed; run \`task k8s:dev:platform:up\` to roll external-dns)"
        else
          echo "$values_file already targets current LAN IP ($ip)"
        fi

  # prod-1 sibling — same shape. Reads from terraform/prod-1 via the
  # adanalife-prod aws-vault profile, writes the external-dns values
  # file into k8s/external-dns/prod-1/.
  k8s:prod:bootstrap-secrets:
    desc: apply prod-1 ESO bootstrap Secret into prod-1 + prod-1-data + prod-1-platform + external-secrets (no plaintext on disk)
    status:
      - kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n prod-1 >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n prod-1-data >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n prod-1-platform >/dev/null 2>&1
    preconditions:
      - *minipc-context-guard
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install with `brew install --cask keybase`, then log in"
      - sh: keybase status >/dev/null 2>&1
        msg: "keybase daemon not running (can't pgp-decrypt the ESO creds) — `open -a Keybase`, wait ~10s for the daemon, then retry"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first"
    cmds:
      # eso-aws-credentials goes in FOUR namespaces (same prod-account
      # creds in all): external-secrets (for the aws-parameterstore-cluster
      # ClusterSecretStore the kube-system platform components use), prod-1
      # (for the namespaced aws-parameterstore SecretStore the apps use),
      # prod-1-data (for the isolated DB namespace's store — postgres'
      # ExternalSecret reads it), and prod-1-platform (the store external-dns
      # reads).
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace prod-1 --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace prod-1-data --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace prod-1-platform --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n external-secrets >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n prod-1 >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n prod-1-data >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n prod-1-platform >/dev/null 2>&1; then
          echo "eso-aws-credentials already present, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-prod -- mise exec -- terraform -chdir=terraform/prod-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-prod -- mise exec -- terraform -chdir=terraform/prod-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          for ns in external-secrets prod-1 prod-1-data prod-1-platform; do
            kubectl create secret generic eso-aws-credentials \
              --namespace="$ns" \
              --from-literal=AWS_ACCESS_KEY_ID="$ak" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "applied eso-aws-credentials Secret to external-secrets + prod-1 + prod-1-data + prod-1-platform namespaces"
        fi
      # external-dns + traefik carry no per-machine LAN-IP override: both
      # target the stable pointer minipc.whereisdana.today (committed in
      # k8s/external-dns/prod-1/config.yml + k8s/traefik/values.prod-1.yml), and
      # the pointer is repointed in terraform/core on a physical-network move. So
      # this task is purely the ESO credential bootstrap.

  # Stage-1 ESO bootstrap on the mini-PC Talos cluster. Seeds the
  # adanalife-stage reader creds as eso-aws-credentials into BOTH stage-1
  # (the app namespace's aws-parameterstore SecretStore, shipped in the
  # umbrella) and stage-1-platform (the namespaced store stage's own
  # external-dns reads). Stage does NOT touch external-secrets — prod owns
  # the cluster-scoped aws-parameterstore-cluster store there. Isolation is
  # by AWS account (stage creds only read the stage account) AND by
  # namespace (the stores are unreachable from prod). Stage has its OWN
  # external-dns in stage-1-platform (reading the stage account); it targets the
  # stable minipc.whereisdana.today pointer from its committed config.yml, so
  # no per-machine values.local.yml is involved. Point kubectl at
  # adanalife-minipc.
  k8s:stage:bootstrap-secrets:
    desc: seed the stage-1 ESO bootstrap Secret (adanalife-stage account) into stage-1 + stage-1-data + stage-1-platform (mini-PC cluster)
    status:
      - kubectl get secret eso-aws-credentials -n stage-1 >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n stage-1-data >/dev/null 2>&1
      - kubectl get secret eso-aws-credentials -n stage-1-platform >/dev/null 2>&1
    preconditions:
      - *minipc-context-guard
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v keybase >/dev/null
        msg: "keybase not found — install with `brew install --cask keybase`, then log in"
      - sh: keybase status >/dev/null 2>&1
        msg: "keybase daemon not running (can't pgp-decrypt the ESO creds) — `open -a Keybase`, wait ~10s for the daemon, then retry"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first"
    cmds:
      - kubectl create namespace stage-1 --dry-run=client -o yaml | kubectl apply -f -
      # stage-1-data: the isolated DB namespace (postgres + its SecretStore). Its
      # ExternalSecret needs eso-aws-credentials here, same as the app namespace.
      - kubectl create namespace stage-1-data --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create namespace stage-1-platform --dry-run=client -o yaml | kubectl apply -f -
      - |
        if kubectl get secret eso-aws-credentials -n stage-1 >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n stage-1-data >/dev/null 2>&1 \
           && kubectl get secret eso-aws-credentials -n stage-1-platform >/dev/null 2>&1; then
          echo "eso-aws-credentials already present in stage-1 + stage-1-data + stage-1-platform, skipping"
        else
          set -euo pipefail
          ak=$(aws-vault exec adanalife-stage -- mise exec -- terraform -chdir=terraform/stage-1 output -raw eso_reader_access_key)
          sk=$(aws-vault exec adanalife-stage -- mise exec -- terraform -chdir=terraform/stage-1 output -raw eso_reader_secret \
                | base64 -d | keybase pgp decrypt)
          for ns in stage-1 stage-1-data stage-1-platform; do
            kubectl create secret generic eso-aws-credentials \
              --namespace="$ns" \
              --from-literal=AWS_ACCESS_KEY_ID="$ak" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$sk" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "applied eso-aws-credentials Secret to stage-1 + stage-1-data + stage-1-platform namespaces"
        fi
      # stage external-dns carries no per-machine LAN-IP override — it
      # targets the stable pointer minipc.whereisdana.today (committed in
      # k8s/external-dns/stage-1/config.yml), repointed in terraform/core on a
      # physical-network move. So this task is purely the ESO credential
      # bootstrap.

  # Install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring
  # into the local cluster. Idempotent — re-run after a cluster recreate or
  # to upgrade any chart. Depends on `k8s:<env>:bootstrap-secrets`, which
  # auto-skips when its bootstrap targets already exist (so the common
  # path doesn't re-prompt for aws-vault + keybase).
  #
  # k8s-monitoring requires the k8s/grafana-cloud-metrics-write SM value
  # to have been seeded out-of-band first; if it hasn't, the ExternalSecret
  # materialization will fail and the helm install won't run.
  #
  # Traefik: the bundled k3s Traefik is disabled via --disable=traefik in
  # the k3d configs, so this task is the only thing that brings up an
  # ingress controller. App Ingresses (`ingressClassName: traefik`) don't
  # reach anything until this runs.
  #
  # external-dns: publishes Route53 records for any Ingress annotated with
  # `external-dns.alpha.kubernetes.io/hostname`. Default target IP comes
  # from values.local.yml (per-machine, written by
  # k8s:<env>:bootstrap-secrets from `curl -4 ifconfig.me`).
  #
  # cert-manager: issues LE certs via DNS-01 against Route53 for any
  # Ingress annotated with `cert-manager.io/cluster-issuer`. Issuance
  # works regardless of inbound network state — only serving TLS does.
  # A smoke-test Certificate (cert-test.<env>.whereisdana.today, LE
  # staging) ships in the cert-manager kustomize so the pipeline is
  # exercised even before any app Ingress requests a cert.
  k8s:dev:platform:up:
    desc: install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring into the dev cluster
    deps: [k8s:dev:bootstrap-secrets]
    preconditions:
      # Guard: k3d dev cluster only — never the minipc (Talos). See the
      # k8s:dev:bootstrap-secrets precondition for why running dev against the
      # minipc breaks prod's ClusterIssuer.
      - sh: '[ "$(kubectl config current-context 2>/dev/null | cut -c1-4)" = "k3d-" ]'
        msg: "refusing: k8s:dev:* must target the k3d dev cluster, but the current kube-context is not a k3d cluster. Run `kubectl config use-context k3d-adanalife-dev` (or `task k8s:dev:cluster:up`) first."
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — run `task k8s:dev:cluster:up` first"
      - sh: test -f k8s/external-dns/development/values.local.yml
        msg: "k8s/external-dns/development/values.local.yml missing — run `task k8s:dev:bootstrap-secrets` first"
    cmds:
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo add jetstack https://charts.jetstack.io
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts/
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/cluster-store
      - echo "ESO up. ClusterSecretStore aws-parameterstore-cluster is ready for platform ExternalSecret consumers; per-namespace SecretStores come up with each env's apply."
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up. App Ingresses (ingressClassName=traefik) will route through this."'
      - kubectl apply -k k8s/external-dns/development
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n kube-system
      - helm upgrade --install external-dns external-dns/external-dns
          -n kube-system
          -f k8s/external-dns/development/config.yml
          -f k8s/external-dns/development/values.local.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns -n kube-system
      - 'echo "external-dns up. Annotate an Ingress with external-dns.alpha.kubernetes.io/hostname to publish a Route53 record."'
      - helm upgrade --install cert-manager jetstack/cert-manager
          -n kube-system
          -f k8s/cert-manager/development/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment -n kube-system -l app.kubernetes.io/instance=cert-manager
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clusterissuers.cert-manager.io
          crd/certificates.cert-manager.io
      - kubectl apply -k k8s/cert-manager/development
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/cert-manager-aws-credentials -n kube-system
      - 'echo "cert-manager up. Annotate an Ingress with cert-manager.io/cluster-issuer=letsencrypt-staging-route53 to request a cert."'
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      # PSA-privileged namespace for the isolated node-exporter install
      # below — see k8s/monitoring/host-namespace.yml for why this is
      # split out from the main k8s-monitoring chart. Applied via
      # kubectl (not kustomize) because env-specific kustomizations
      # can't reference a shared file outside their directory.
      - kubectl apply -f k8s/monitoring/host-namespace.yml
      - kubectl apply -k k8s/monitoring/development
      - helm upgrade --install node-exporter prometheus-community/prometheus-node-exporter
          -n monitoring-host
          -f k8s/monitoring/node-exporter/values.yml
      - kubectl rollout status daemonset/node-exporter-prometheus-node-exporter
          -n monitoring-host --timeout=120s
      - 'echo "node-exporter up in monitoring-host (privileged); alloy-metrics discovers it via prometheus.io/scrape annotations."'
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Seed it with: aws ssm put-parameter --overwrite --type SecureString --name /k8s/grafana-cloud-metrics-write"; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/development/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."
      # NATS — pubsub substrate for inter-component messaging.
      # Single-node, no JetStream, prom-exporter sidecar scraped by
      # alloy-metrics via prometheus.io/* pod annotations. Lives in its
      # own development-platform namespace mirroring stage-1-platform /
      # prod-1-platform (see k8s/nats/values.yml for the phase-0 framing).
      - helm upgrade --install nats nats/nats
          --version 2.14.0
          -n development-platform --create-namespace
          -f k8s/nats/values.yml
          -f k8s/nats/development/values.yml
      - kubectl rollout status statefulset/nats -n development-platform --timeout=120s
      - 'echo "NATS up in development-platform. Connect via nats://nats.development-platform.svc.cluster.local:4222. Smoke test: kubectl port-forward -n development-platform svc/nats 4222:4222 then nats pub foo bar from a local nats CLI"'
      # Argo CD on the k3d dev cluster — a SEPARATE in-cluster Argo managing ONLY
      # the development env (no cross-cluster wiring: it reconciles development
      # against this cluster's own API, same as the minipc Argo does for
      # prod/stage). dev borrows the stage AWS account, so the repo deploy key must
      # live at k8s/argocd/repo-ssh-key in the stage SM (the cluster-store reads
      # it). Version pinned to match cdk8s/adanalife_k8s/helm_platform.py. UI via
      # port-forward (no tailscale on the dev cluster). See gitops/README.md.
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update argo
      - helm upgrade --install argocd argo/argo-cd
          --version 9.5.17
          -n argocd --create-namespace
          -f k8s/argo-cd/values.yml
          -f k8s/argo-cd/values.k3d.yml
      - kubectl wait --for=condition=Available --timeout=180s deployment --all -n argocd
      - kubectl apply -f cdk8s/dist/argocd-k3d.k8s.yaml
      - 'echo "Argo CD up on the dev cluster (monitor-only). development Applications created. UI: http://argocd.dev.whereisdana.today:9080 (external-dns + traefik; port-forward svc/argocd-server as fallback). Next: task k8s:dev:argo:sync to bring up data -> supporting -> apps. If the repo Secret stays empty, seed k8s/argocd/repo-ssh-key in the stage SM. See gitops/README.md."'

  # Sync the dev Argo Applications in dependency order, then kick the apps.
  # data + supporting + identity are manual-sync (data is Prune=false forever —
  # it can never auto-prune the DB); the apps autosync, but this kicks them so
  # you don't wait for the next reconcile. Doubles as the "revert to CI :main"
  # gesture — it re-enables selfHeal on the app Applications (k8s:dev:deploy
  # pauses it to pin a local :dev-local image) and re-syncs them to the
  # committed manifest. Replaces clicking Sync in the UI.
  k8s:dev:sync:
    desc: "sync the dev Argo apps in order (data -> supporting -> identity -> apps); also reverts a k8s:dev:deploy local-image override back to CI :main"
    aliases: ["k8s:dev:argo:sync"]
    preconditions:
      - sh: '[ "$(kubectl config current-context 2>/dev/null | cut -c1-4)" = "k3d-" ]'
        msg: "k8s:dev:* must target the k3d dev cluster — `unset KUBECONFIG` (or use-context k3d-adanalife-dev) first."
      - sh: command -v argocd >/dev/null
        msg: "argocd CLI not found — `brew install argocd`"
    cmds:
      # `argocd --core` talks to the cluster via the kubeconfig (no Argo server /
      # login), but resolves argocd-cm from the CURRENT context's namespace — so
      # point the context at argocd for the duration, then restore on exit.
      - |
        ns_prev=$(kubectl config view --minify -o jsonpath='{..namespace}' 2>/dev/null)
        trap 'kubectl config set-context --current --namespace="${ns_prev:-default}" >/dev/null 2>&1' EXIT
        kubectl config set-context --current --namespace=argocd >/dev/null
        set -e
        # Stateful + supporting + identity land before the apps: tripbot won't
        # start without its DB (data) or the identity ESO secrets
        # (tripbot-database-creds / -twitch-creds / discord / maps).
        argocd app sync development-data --core --timeout 300
        argocd app wait development-data --core --health --timeout 300
        argocd app sync development-supporting --core --timeout 300
        argocd app wait development-supporting --core --health --timeout 300
        argocd app sync development-tripbot-identity --core --timeout 300
        argocd app wait development-tripbot-identity --core --health --timeout 300
        # Apps: the tripbot-apps ApplicationSet template sets no labels, so a
        # label selector matches nothing — enumerate the generated Applications
        # by name instead. Re-enable selfHeal first so any k8s:dev:deploy
        # :dev-local override reverts to the committed :main on sync.
        apps=$(argocd app list --core -o name | sed 's#^argocd/##' \
                 | grep -E '^development-' \
                 | grep -vE '^development-(data|supporting|tripbot-identity)$')
        for a in $apps; do
          kubectl patch application "$a" -n argocd --type merge \
            -p '{"spec":{"syncPolicy":{"automated":{"selfHeal":true}}}}' >/dev/null
        done
        argocd app sync $apps --core --timeout 300

  # prod-1 sibling — same shape, references k8s/<component>/prod-1/ paths.
  # KEEP-IN-SYNC with k8s:dev:platform:up; structural changes should
  # mirror to both unless deliberately env-specific.
  k8s:prod:platform:up:
    desc: install ESO + traefik + external-dns + cert-manager + grafana-k8s-monitoring into the empty cluster
    deps: [k8s:prod:bootstrap-secrets]
    preconditions:
      - *minipc-context-guard
      - sh: command -v helm >/dev/null
        msg: "helm not found — install with `brew install helm`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the adanalife-minipc context first"
    cmds:
      # Cilium FIRST — it is the CNI + kube-proxy replacement (Talos installs
      # neither; see controlplane.patch.yaml). Until it's up the node is
      # NotReady and nothing else can schedule, so it precedes everything.
      # KubePrism (localhost:7445) gives the agent a stable kube-apiserver
      # endpoint with no kube-proxy / ClusterIP dependency.
      - helm repo add cilium https://helm.cilium.io/
      - helm repo update
      - helm upgrade --install cilium cilium/cilium
          -n kube-system
          -f k8s/cilium/values.yml
      - kubectl -n kube-system rollout status daemonset/cilium --timeout=180s
      - kubectl wait --for=condition=Ready node --all --timeout=180s
      - 'echo "Cilium up; node Ready. CNI + eBPF kube-proxy replacement online."'
      # metrics-server — backs `kubectl top` + the HPA metrics API. Talos
      # doesn't bundle it (k3s does, hence dev k3d has it and this step is
      # prod-only). --kubelet-insecure-tls in values.yml works around Talos's
      # self-signed kubelet serving certs. No deps beyond a Ready node.
      - helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
      - helm repo update metrics-server
      - helm upgrade --install metrics-server metrics-server/metrics-server
          --version 3.13.1
          -n kube-system
          -f k8s/metrics-server/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/metrics-server -n kube-system
      - 'echo "metrics-server up. kubectl top nodes/pods now works on the minipc."'
      # local-path-provisioner — cluster storage backing. Must precede any
      # PVC-consuming workload (postgres). See k8s/local-path-provisioner/prod-1.
      - kubectl apply -k k8s/local-path-provisioner/prod-1
      - kubectl rollout status deployment/local-path-provisioner -n local-path-storage --timeout=120s
      - 'echo "local-path-provisioner up. StorageClass local-path available; local-path-retain comes from the postgres overlay."'
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      - helm repo add jetstack https://charts.jetstack.io
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts/
      - helm repo update
      - helm upgrade --install external-secrets external-secrets/external-secrets
          -n external-secrets --create-namespace
          -f k8s/external-secrets/values.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment --all -n external-secrets
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clustersecretstores.external-secrets.io
          crd/externalsecrets.external-secrets.io
      - kubectl apply -k k8s/external-secrets/cluster-store
      - echo "ESO up. ClusterSecretStore aws-parameterstore-cluster is ready for platform ExternalSecret consumers; per-namespace SecretStores come up with each env's apply."
      # Tailscale operator — kubectl over the tailnet (API server proxy) + app-UI
      # exposure as tailnet services. Needs ESO up (the operator-oauth Secret is
      # materialized from SM via the cluster store). prod-1 only — the tailnet is
      # global, managed once (see terraform/prod-1/tailscale.tf).
      - kubectl apply -f k8s/tailscale-operator/operator-oauth.yml
      - for i in $(seq 1 30); do kubectl get secret operator-oauth -n tailscale >/dev/null 2>&1 && break; sleep 2; done
      - helm repo add tailscale https://pkgs.tailscale.com/helmcharts
      - helm repo update tailscale
      - helm upgrade --install tailscale-operator tailscale/tailscale-operator
          --version 1.98.3
          -n tailscale
          -f k8s/tailscale-operator/values.yml
      - kubectl wait --for=condition=Available --timeout=120s deployment --all -n tailscale
      - 'echo "Tailscale operator up. kubectl over tailnet: tailscale configure kubeconfig tailscale-operator"'
      - helm upgrade --install traefik traefik/traefik
          -n kube-system
          -f k8s/traefik/values.yml
          -f k8s/traefik/values.prod-1.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/traefik -n kube-system
      - 'echo "Traefik up on hostNetwork (binds the node LAN IP :80/443 directly). App Ingresses (ingressClassName=traefik) will route through this."'
      # Dashboard Ingress (traefik.prod.whereisdana.today, LAN-only). Plain
      # Ingress rather than the chart's IngressRoute so external-dns publishes
      # the Route53 record; DNS + cert reconcile once external-dns/cert-manager
      # come up below.
      - kubectl apply -f k8s/traefik/prod-1/dashboard-ingress.yaml
      # Tailnet-native exposure of the two platform UIs (hubble + traefik),
      # additive to the on-LAN traefik Ingresses above. Reachable at
      # https://{hubble,traefik}-prod.<tailnet>.ts.net via the tailscale
      # operator — collision-proof from any client network.
      - kubectl apply -f k8s/traefik/prod-1/dashboard-tailscale-ingress.yaml
      - kubectl apply -f k8s/cilium/prod-1/hubble-tailscale-ingress.yaml
      # external-dns runs in the prod-1-platform namespace (not kube-system)
      # so the prod-1 app namespace stays pod-clean. The kustomize apply
      # creates the namespace + its namespaced aws-parameterstore SecretStore
      # + the external-dns ExternalSecret (reading the prod account, no
      # cross-account). It watches Ingresses cluster-wide (chart ClusterRole)
      # and publishes prod.whereisdana.today records — including the platform
      # ingresses in kube-system (hubble/traefik).
      - kubectl apply -k k8s/external-dns/prod-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/external-dns-aws-credentials -n prod-1-platform
      - helm upgrade --install external-dns external-dns/external-dns
          -n prod-1-platform
          -f k8s/external-dns/prod-1/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment/external-dns -n prod-1-platform
      - 'echo "external-dns up in prod-1-platform. Annotate an Ingress with external-dns.alpha.kubernetes.io/hostname to publish a Route53 record."'
      - helm upgrade --install cert-manager jetstack/cert-manager
          -n kube-system
          -f k8s/cert-manager/prod-1/config.yml
      - kubectl wait --for=condition=Available --timeout=120s
          deployment -n kube-system -l app.kubernetes.io/instance=cert-manager
      - kubectl wait --for=condition=Established --timeout=60s
          crd/clusterissuers.cert-manager.io
          crd/certificates.cert-manager.io
      - kubectl apply -k k8s/cert-manager/prod-1
      - kubectl wait --for=condition=Ready --timeout=120s
          externalsecret/cert-manager-aws-credentials -n kube-system
      - 'echo "cert-manager up. Annotate an Ingress with cert-manager.io/cluster-issuer=letsencrypt-staging-route53 to request a cert."'
      - kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      # PSA-privileged namespace for the isolated node-exporter install
      # below — see k8s/monitoring/host-namespace.yml for why this is
      # split out from the main k8s-monitoring chart. Applied via
      # kubectl (not kustomize) because env-specific kustomizations
      # can't reference a shared file outside their directory.
      - kubectl apply -f k8s/monitoring/host-namespace.yml
      - kubectl apply -k k8s/monitoring/prod-1
      - helm upgrade --install node-exporter prometheus-community/prometheus-node-exporter
          -n monitoring-host
          -f k8s/monitoring/node-exporter/values.yml
      - kubectl rollout status daemonset/node-exporter-prometheus-node-exporter
          -n monitoring-host --timeout=120s
      - 'echo "node-exporter up in monitoring-host (privileged); alloy-metrics discovers it via prometheus.io/scrape annotations."'
      - |
        echo "Waiting for grafana-cloud-metrics-write Secret to materialize..."
        for i in $(seq 1 30); do
          if kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null 2>&1; then
            echo "ready"; break
          fi
          sleep 2
        done
        kubectl get secret grafana-cloud-metrics-write -n monitoring >/dev/null \
          || { echo "ExternalSecret didn't materialize. Seed it with: aws ssm put-parameter --overwrite --type SecureString --name /k8s/grafana-cloud-metrics-write (prod account)"; exit 1; }
      - helm upgrade --install k8s-monitoring grafana/k8s-monitoring
          -n monitoring
          -f k8s/monitoring/prod-1/values.yml
      - echo "grafana-k8s-monitoring up. Cluster metrics + pod logs shipping to Grafana Cloud."
      # NATS — pubsub substrate for inter-component messaging.
      # Single-node, no JetStream, prom-exporter sidecar scraped by
      # alloy-metrics via prometheus.io/* pod annotations. Lives in
      # prod-1-platform (the env-platform namespace external-dns created
      # above) so prod-1 stays app-only. Stage runs its own NATS in
      # stage-1-platform via k8s:stage:platform-env:up — namespaces isolate the two.
      - helm upgrade --install nats nats/nats
          --version 2.14.0
          -n prod-1-platform --create-namespace
          -f k8s/nats/values.yml
          -f k8s/nats/prod-1/values.yml
      - kubectl rollout status statefulset/nats -n prod-1-platform --timeout=120s
      - 'echo "NATS up in prod-1-platform. Connect via nats://nats.prod-1-platform.svc.cluster.local:4222. Smoke test: kubectl port-forward -n prod-1-platform svc/nats 4222:4222 then nats pub foo bar from a local nats CLI"'
      # Intel GPU device plugin + XPU Manager. Plugin registers
      # gpu.intel.com/i915 (+ i915_monitoring) so OBS/vlc-server pods
      # can claim the iGPU as an extended resource without hostPath.
      # XPU Manager scrapes iGPU telemetry off the i915_monitoring
      # device and exposes it on :29999 with the xpum_ prefix; Grafana
      # Alloy's annotation auto-discovery picks it up via the
      # prometheus.io/scrape annotation on the pod.
      - kubectl apply -k k8s/intel-gpu-plugin/prod-1
      - kubectl rollout status -n kube-system daemonset/intel-gpu-plugin --timeout=120s
      - kubectl apply -k k8s/intel-xpu-manager/prod-1
      - kubectl rollout status -n kube-system daemonset/intel-xpumanager --timeout=180s
      - 'echo "Intel GPU plugin + XPU Manager up. gpu.intel.com/i915 schedulable; xpum_* metrics scraping at <pod-ip>:29999."'
      # Argo CD — the GitOps controller for the cdk8s app manifests. Installed as
      # part of the platform bring-up so there's no manual `helm repo add`. Comes
      # up idle (monitor-only); the ApplicationSets + repo cred + UI Ingress are
      # applied separately via `task gitops:apply` (cdk8s/dist/argocd.k8s.yaml).
      # Version pinned to match cdk8s/adanalife_k8s/helm_platform.py. See
      # gitops/README.md. (When the platform itself cuts over to cdk8s, this
      # step is superseded by PlatformChart's argo-cd component.)
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update argo
      - helm upgrade --install argocd argo/argo-cd
          --version 9.5.17
          -n argocd --create-namespace
          -f k8s/argo-cd/values.yml
      - kubectl wait --for=condition=Available --timeout=180s deployment --all -n argocd
      - 'echo "Argo CD up in the argocd namespace (idle, monitor-only). Next: task gitops:apply to create the ApplicationSets + repo cred + UI Ingress, then browse argocd-prod.<tailnet>.ts.net. See gitops/README.md."'

  # Streaming toggle for OBS. The OBS deployment's envFrom on the
  # stream-key Secret is `optional: true`, so the existence + content of
  # that Secret IS the stream state. Either way we rollout-restart obs so
  # the entrypoint re-reads STREAM_KEY at boot — Kubernetes doesn't
  # propagate Secret changes to running pods' env vars.
  #
  # Workloads are per-platform (`obs-<platform>`), so PLATFORM selects which
  # OBS to toggle — default `twitch`, override `PLATFORM=youtube`. The
  # stream-key object name follows the obs.py convention: twitch keeps the
  # shared base name `obs-stream-key`, every other platform gets a distinct
  # `obs-<platform>-stream-key` (so a twitch stream:on can't clobber
  # youtube's key); the SM container is `k8s/obs/<platform>-stream-key`.
  #
  # PROD goes through ESO: the stream-key ExternalSecret ships inside the
  # per-platform obs app dist (tripbot repo cdk8s -> dist/<env>-obs-<platform>.k8s.yaml,
  # Argo-delivered), so a normal sync materializes the Secret and OBS streams
  # with no manual step. `obs:prod:stream:on` re-applies just that
  # ExternalSecret (yq-extracted from the obs dist — it has no standalone
  # overlay file); `obs:prod:stream:off` deletes the
  # ExternalSecret AND the Secret. The pause is durable because the
  # ApplicationSet deliberately excludes prod-1 obs-twitch from automated
  # selfHeal (see cdk8s argocd.k8s.yaml) — Argo won't re-create the deleted
  # ExternalSecret until a manual sync (or `obs:prod:stream:on`).
  #
  # STAGE is off-by-default and stays imperative: `obs:stage:stream:on`
  # pulls STREAM_KEY from the adanalife-stage SM account and creates the
  # Secret directly. That `:on` is env-prefixed because the key is sourced
  # from a specific AWS account, NOT from whatever cluster kubectl points at
  # — the AWS profile is the targeting, so it must be explicit, and the
  # final echo surfaces both the source profile and the live kubectl context
  # so a cluster/key mismatch is visible.
  #
  # `:off` is exposed under both env namespaces; the shared internal task
  # deletes both the ExternalSecret (no-op in stage, which has none) and the
  # Secret in the current cluster — no AWS account needed. Run with
  # NAMESPACE=stage-1 / NAMESPACE=prod-1 + PLATFORM= to override the per-task
  # defaults.
  obs:stage:stream:on:
    desc: "stream stage OBS (STREAM_KEY from the stage-1 SM account; override PLATFORM=, default twitch)"
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
      NAMESPACE: '{{.NAMESPACE | default "stage-1"}}'
      SECRET: '{{if eq .PLATFORM "twitch"}}obs-stream-key{{else}}obs-{{.PLATFORM}}-stream-key{{end}}'
    preconditions:
      - *minipc-context-guard
      - sh: command -v aws-vault >/dev/null
        msg: "aws-vault not found — install with `brew install aws-vault`"
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the target cluster first"
      - sh: kubectl get deploy obs-{{.PLATFORM}} -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs-{{.PLATFORM}} Deployment not found in namespace {{.NAMESPACE}} — apply the overlay first"
    cmds:
      - |
        set -euo pipefail
        sk=$(aws-vault exec adanalife-stage -- aws ssm get-parameter \
          --name /k8s/obs/{{.PLATFORM}}-stream-key --with-decryption \
          --query Parameter.Value --output text)
        kubectl create secret generic {{.SECRET}} \
          --from-literal=STREAM_KEY="$sk" \
          --dry-run=client -o yaml | kubectl apply -n {{.NAMESPACE}} -f - >/dev/null
      - kubectl rollout restart deploy/obs-{{.PLATFORM}} -n {{.NAMESPACE}}
      - kubectl rollout status deploy/obs-{{.PLATFORM}} -n {{.NAMESPACE}} --timeout=120s
      - 'echo "OBS streaming ({{.PLATFORM}}) — key from adanalife-stage SSM; namespace: {{.NAMESPACE}}; kubectl context: $(kubectl config current-context)"'

  # Prod streaming is on-by-default via the obs app dist's ExternalSecret,
  # so this task only matters as the inverse of `:off`: re-apply the
  # ExternalSecret (extracted from the Argo-delivered obs dist), wait for ESO
  # to materialize the Secret, then roll obs. No aws-vault — ESO reads the
  # adanalife-prod account itself.
  obs:prod:stream:on:
    desc: "resume prod OBS streaming (re-applies the stream-key ExternalSecret from the obs app dist; ESO pulls STREAM_KEY from the adanalife-prod SM account; override PLATFORM=, default twitch)"
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
      NAMESPACE: '{{.NAMESPACE | default "prod-1"}}'
      SECRET: '{{if eq .PLATFORM "twitch"}}obs-stream-key{{else}}obs-{{.PLATFORM}}-stream-key{{end}}'
      OBS_DIST: '../tripbot/cdk8s/dist/{{.NAMESPACE}}-obs-{{.PLATFORM}}.k8s.yaml'
    preconditions:
      - *minipc-context-guard
      - sh: command -v kubectl >/dev/null
        msg: "kubectl not found — install with `brew install kubectl`"
      - sh: command -v yq >/dev/null
        msg: "yq not found — install with `brew install yq`"
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the target cluster first"
      - sh: test -f {{.OBS_DIST}}
        msg: "{{.OBS_DIST}} not found — the obs app dist lives in the sibling tripbot checkout; is ~/adanalife/tripbot present + synthed?"
      - sh: kubectl get deploy obs-{{.PLATFORM}} -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs-{{.PLATFORM}} Deployment not found in namespace {{.NAMESPACE}} — apply the overlay first"
      - sh: kubectl get secretstore aws-parameterstore -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "aws-parameterstore SecretStore missing in {{.NAMESPACE}} — run the umbrella apply + bootstrap first"
    cmds:
      - yq 'select(.kind == "ExternalSecret")' {{.OBS_DIST}} | kubectl apply -n {{.NAMESPACE}} -f -
      - kubectl wait --for=condition=Ready externalsecret/{{.SECRET}} -n {{.NAMESPACE}} --timeout=120s
      - kubectl rollout restart deploy/obs-{{.PLATFORM}} -n {{.NAMESPACE}}
      - kubectl rollout status deploy/obs-{{.PLATFORM}} -n {{.NAMESPACE}} --timeout=120s
      - 'echo "OBS streaming ({{.PLATFORM}}) — {{.SECRET}} materialized by ESO from adanalife-prod SSM; namespace: {{.NAMESPACE}}; kubectl context: $(kubectl config current-context)"'

  # Stop streaming, keep OBS running. Deletes the stream-key ExternalSecret
  # (if any — prod has one, stage doesn't) AND the stream-key Secret, then
  # restarts the pod so it boots in idle (VNC-only) mode — the container
  # stays up, only the publish stops. Deleting the ExternalSecret first is
  # what makes the pause durable in prod: otherwise ESO would re-materialize
  # the Secret on its next refresh. The pause lasts until the next manual
  # Argo sync of the obs app (or `obs:prod:stream:on`). Exposed under both
  # env namespaces for symmetry with the `:on` tasks; the work is
  # env-agnostic (no AWS account — it only touches the local cluster), so
  # both delegate to one shared implementation.
  obs:stage:stream:off:
    desc: "stop OBS streaming (OBS stays up in idle/VNC mode; override PLATFORM=, default twitch)"
    preconditions:
      - *minipc-context-guard
    cmds:
      - task: obs:stream:off:_run
        vars:
          PLATFORM: '{{.PLATFORM | default "twitch"}}'
          NAMESPACE: '{{.NAMESPACE | default "stage-1"}}'

  obs:prod:stream:off:
    desc: "stop OBS streaming (OBS stays up in idle/VNC mode; override PLATFORM=, default twitch)"
    preconditions:
      - *minipc-context-guard
    cmds:
      - task: obs:stream:off:_run
        vars:
          PLATFORM: '{{.PLATFORM | default "twitch"}}'
          NAMESPACE: '{{.NAMESPACE | default "prod-1"}}'

  obs:stream:off:_run:
    internal: true
    requires:
      vars: [NAMESPACE, PLATFORM]
    vars:
      SECRET: '{{if eq .PLATFORM "twitch"}}obs-stream-key{{else}}obs-{{.PLATFORM}}-stream-key{{end}}'
    preconditions:
      - sh: command -v kubectl >/dev/null
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "no reachable cluster — point kubectl at the target cluster first"
      - sh: kubectl get deploy obs-{{.PLATFORM}} -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs-{{.PLATFORM}} Deployment not found in namespace {{.NAMESPACE}}"
    cmds:
      # ExternalSecret first so ESO stops owning (and re-creating) the Secret.
      - kubectl delete externalsecret {{.SECRET}} -n {{.NAMESPACE}} --ignore-not-found
      - kubectl delete secret {{.SECRET}} -n {{.NAMESPACE}} --ignore-not-found
      - kubectl rollout restart deploy/obs-{{.PLATFORM}} -n {{.NAMESPACE}}
      - kubectl rollout status deploy/obs-{{.PLATFORM}} -n {{.NAMESPACE}} --timeout=120s
      - 'echo "OBS idle (not streaming) — container still up; namespace: {{.NAMESPACE}}; kubectl context: $(kubectl config current-context)"'

  k8s:logs:
    desc: tail logs across all app pods
    cmds:
      - kubectl logs -l app.kubernetes.io/part-of=tripbot --all-containers --tail=50 -f

  # Local kubectl port-forward wrappers for OBS / vlc-server VNC. The
  # host-access LoadBalancer overlays (k8s/apps/{obs,vlc-server}/overlays/local)
  # already expose VNC at host ports 5902 / 5903 via klipper-lb when the
  # local overlay is applied — these tasks are the cluster-agnostic
  # alternative when that overlay isn't in play (e.g. on development, or
  # when iterating without applying the local overlay). Backgrounded
  # kubectl PID is parked under /tmp/adanalife-tasks/ so :down can
  # find it. Re-running :up overwrites the PID file; if :down can't
  # find a lingering kubectl, fall back to `pkill -f "port-forward svc/obs-"`.
  obs:vnc:up:
    desc: start a local kubectl port-forward to OBS VNC at localhost:5902 (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      # PID capture must happen in the same shell as the backgrounded process —
      # each task cmd runs in its own shell, so `$!` in a separate cmd is empty.
      - kubectl port-forward svc/obs-{{.PLATFORM}} 5902:5900 > /dev/null 2>&1 & echo $! > /tmp/adanalife-tasks/obs-vnc.pid
      - 'echo "OBS VNC port-forward started — connect a VNC client to localhost:5902 (PID $(cat /tmp/adanalife-tasks/obs-vnc.pid))"'

  obs:vnc:down:
    desc: stop the local kubectl port-forward to OBS VNC
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/obs-vnc.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/obs-vnc.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/obs-vnc.pid
          echo "OBS VNC port-forward stopped"
        else
          echo "No OBS VNC port-forward PID file found — nothing to stop"
        fi

  # Refresh all OBS browser sources via obs-websocket — reloads each
  # browser_source's page no-cache (the programmatic equivalent of "Refresh
  # cache of current page"), e.g. after an onscreens-server template change so
  # OBS picks up the new markup instead of rendering a stale cached page.
  # obs-websocket binds localhost inside the pod, so we port-forward 4455
  # transiently and pull the websocket password from the obs ConfigMap.
  #
  # Env-prefixed (like obs:{prod,stage}:stream:off) so the namespace is explicit
  # on the co-tenant mini-PC rather than inherited from the current kubeconfig
  # namespace. PLATFORM selects the workload (default twitch).
  obs:prod:browser:refresh:
    desc: refresh all prod-1 OBS browser sources via websocket (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    cmds:
      - task: obs:browser:refresh:_run
        vars:
          PLATFORM: '{{.PLATFORM | default "twitch"}}'
          NAMESPACE: '{{.NAMESPACE | default "prod-1"}}'

  obs:stage:browser:refresh:
    desc: refresh all stage-1 OBS browser sources via websocket (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    cmds:
      - task: obs:browser:refresh:_run
        vars:
          PLATFORM: '{{.PLATFORM | default "twitch"}}'
          NAMESPACE: '{{.NAMESPACE | default "stage-1"}}'

  obs:browser:refresh:_run:
    internal: true
    requires:
      vars: [NAMESPACE, PLATFORM]
    preconditions:
      - sh: command -v uv >/dev/null
        msg: "uv not found — install with `brew install uv`"
      - sh: kubectl get deploy obs-{{.PLATFORM}} -n {{.NAMESPACE}} >/dev/null 2>&1
        msg: "obs-{{.PLATFORM}} Deployment not found in namespace {{.NAMESPACE}}"
    cmds:
      - |
        set -eo pipefail
        kubectl port-forward svc/obs-{{.PLATFORM}} 4455:4455 -n {{.NAMESPACE}} >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "$PF" 2>/dev/null || true; wait 2>/dev/null || true; }
        trap cleanup EXIT
        sleep 1
        OBS_WEBSOCKET_HOST=localhost \
        OBS_WEBSOCKET_PASSWD=$(kubectl get configmap obs-{{.PLATFORM}}-config -n {{.NAMESPACE}} -o jsonpath='{.data.OBS_WEBSOCKET_PASSWD}') \
        uv run --with obsws-python \
          {{.HOME}}/adanalife/tripbot/bin/obs-browser-refresh

  obs:media:restart:
    desc: Restart all OBS media sources (ffmpeg/vlc) via websocket — forces OBS to reconnect to the RTSP stream after a vlc-server restart (override PLATFORM=, default twitch)
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    preconditions:
      - *minipc-context-guard
      - sh: command -v uv >/dev/null
        msg: "uv not found — install with `brew install uv`"
      - sh: kubectl get deploy obs-{{.PLATFORM}} >/dev/null 2>&1
        msg: "obs-{{.PLATFORM}} Deployment not found — is the cluster up?"
    cmds:
      - |
        set -eo pipefail
        kubectl port-forward svc/obs-{{.PLATFORM}} 4455:4455 >/dev/null 2>&1 &
        PF=$!
        cleanup() { kill "$PF" 2>/dev/null || true; wait 2>/dev/null || true; }
        trap cleanup EXIT
        sleep 1
        OBS_WEBSOCKET_HOST=localhost \
        OBS_WEBSOCKET_PASSWD=$(kubectl get configmap obs-{{.PLATFORM}}-config -o jsonpath='{.data.OBS_WEBSOCKET_PASSWD}') \
        uv run --with obsws-python \
          {{.HOME}}/adanalife/tripbot/bin/obs-media-restart

  vlc:vnc:up:
    desc: start a local kubectl port-forward to vlc-server VNC at localhost:5903 (override PLATFORM=, default twitch)
    preconditions:
      - *minipc-context-guard
    vars:
      PLATFORM: '{{.PLATFORM | default "twitch"}}'
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      # PID capture must happen in the same shell as the backgrounded process —
      # each task cmd runs in its own shell, so `$!` in a separate cmd is empty.
      - kubectl port-forward svc/vlc-{{.PLATFORM}} 5903:5900 > /dev/null 2>&1 & echo $! > /tmp/adanalife-tasks/vlc-vnc.pid
      - 'echo "vlc-server VNC port-forward started — connect a VNC client to localhost:5903 (PID $(cat /tmp/adanalife-tasks/vlc-vnc.pid))"'

  vlc:vnc:down:
    desc: stop the local kubectl port-forward to vlc-server VNC
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/vlc-vnc.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/vlc-vnc.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/vlc-vnc.pid
          echo "vlc-server VNC port-forward stopped"
        else
          echo "No vlc-server VNC port-forward PID file found — nothing to stop"
        fi

  # Talos PKI (adanalife-minipc). The generated machine configs + talosconfig
  # hold the cluster CA key, bootstrap/trustd tokens, and etcd encryption
  # secrets. They're SOPS-encrypted with the prod-1 KMS key
  # (alias/sops-talos-pki, terraform/prod-1/sops.tf) and committed as
  # talos/adanalife-minipc/*.sops.yaml; the plaintext stays gitignored.
  # Encrypted as opaque binary blobs because the configs are
  # multi-document YAML (sops's native YAML store doesn't handle multi-doc).
  talos:minipc:secrets:decrypt:
    desc: decrypt the SOPS-sealed adanalife-minipc Talos PKI (+ tailscale patch) into gitignored plaintext
    dir: talos/adanalife-minipc
    preconditions:
      - sh: command -v sops >/dev/null
        msg: "sops not found — install with `brew install sops`"
    cmds:
      # Decrypt reads the KMS key ARN from each file's sops metadata — no
      # terraform output or --kms needed, so this works on a fresh checkout.
      # tailscale.patch.sops.yaml is optional (only exists once tailscale is
      # wired) — skip it if absent so the PKI decrypt never breaks.
      - |
        aws-vault exec adanalife-prod -- bash -c '
          set -euo pipefail
          for pair in "controlplane.sops.yaml:controlplane.yaml" "worker.sops.yaml:worker.yaml" "talosconfig.sops.yaml:talosconfig" "tailscale.patch.sops.yaml:tailscale.patch.yaml"; do
            src=${pair%%:*}; dst=${pair##*:}
            [ -f "$src" ] || { echo "skip $src (not present)"; continue; }
            sops -d --output-type binary "$src" > "$dst"
            chmod 600 "$dst"
          done
        '
      - 'echo "Talos secrets decrypted. Regenerate controlplane.patched.yaml via the machineconfig patch step before apply-config."'

  talos:minipc:secrets:encrypt:
    desc: re-seal the adanalife-minipc Talos PKI (+ tailscale patch) to SOPS after regenerating/rotating it
    dir: talos/adanalife-minipc
    preconditions:
      - sh: command -v sops >/dev/null
        msg: "sops not found — install with `brew install sops`"
      - sh: test -f controlplane.yaml && test -f worker.yaml && test -f talosconfig
        msg: "plaintext Talos PKI not present in talos/adanalife-minipc — nothing to encrypt"
    cmds:
      # Sources the KMS key ARN from terraform output (key must already be
      # applied via `task tf:prod:apply`). --input-type binary treats each
      # file as one opaque blob, sidestepping the multi-doc-YAML limitation.
      # tailscale.patch.yaml is optional (only exists once tailscale is wired) —
      # skip it if absent.
      - |
        aws-vault exec adanalife-prod -- bash -c '
          set -euo pipefail
          kms=$(terraform -chdir=../../terraform/prod-1 output -raw sops_talos_kms_key_arn)
          for pair in "controlplane.yaml:controlplane.sops.yaml" "worker.yaml:worker.sops.yaml" "talosconfig:talosconfig.sops.yaml" "tailscale.patch.yaml:tailscale.patch.sops.yaml"; do
            src=${pair%%:*}; dst=${pair##*:}
            [ -f "$src" ] || { echo "skip $src (not present)"; continue; }
            sops -e --input-type binary --output-type yaml --kms "$kms" "$src" > "$dst"
          done
        '
      - 'echo "Talos secrets re-sealed to *.sops.yaml. Commit the updated encrypted files."'

  talos:minipc:dashboard:
    desc: open the talosctl TUI dashboard against the minipc node
    cmds:
      - TALOSCONFIG={{.ROOT_DIR}}/talos/adanalife-minipc/talosconfig mise exec -- talosctl dashboard --nodes 192.168.1.200

  # tripbot operational tasks. Naming follows <tool>:<env>:<verb>[:<subverb>]
  # so it's clear which cluster each one targets. Aliases preserve the
  # older unscoped names while the schema migration is in flight.
  #
  # The :db:* tasks open kubectl port-forwards to the cluster Postgres
  # (a headless ClusterIP, otherwise unreachable from outside the cluster) —
  # primarily for the auth-bootstrap CLI and psql poking.
  tripbot:dev:db:up:
    desc: start a local kubectl port-forward to the development cluster Postgres at localhost:5432
    aliases: [tripbot:db:up]
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      # PID capture must happen in the same shell as the backgrounded process —
      # each task cmd runs in its own shell, so `$!` in a separate cmd is empty.
      - kubectl port-forward -n development svc/postgres 5432:5432 > /dev/null 2>&1 & echo $! > /tmp/adanalife-tasks/tripbot-db.pid
      - 'echo "tripbot Postgres port-forward started — psql at localhost:5432 (PID $(cat /tmp/adanalife-tasks/tripbot-db.pid))"'

  tripbot:dev:db:down:
    desc: stop the local kubectl port-forward to the development cluster Postgres
    aliases: [tripbot:db:down]
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/tripbot-db.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/tripbot-db.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/tripbot-db.pid
          echo "tripbot Postgres port-forward stopped"
        else
          echo "No tripbot Postgres port-forward PID file found — nothing to stop"
        fi

  tripbot:stage:db:up:
    desc: start a kubectl port-forward to the stage-1 cluster Postgres at localhost:5433 (5433 to avoid colliding with a dev/prod forward on 5432)
    cmds:
      - mkdir -p /tmp/adanalife-tasks
      # PID capture must happen in the same shell as the backgrounded process —
      # each task cmd runs in its own shell, so `$!` in a separate cmd is empty.
      - kubectl port-forward -n stage-1 svc/postgres 5433:5432 > /dev/null 2>&1 & echo $! > /tmp/adanalife-tasks/tripbot-stage-db.pid
      - 'echo "stage-1 Postgres port-forward started — psql at localhost:5433 (PID $(cat /tmp/adanalife-tasks/tripbot-stage-db.pid))"'

  tripbot:stage:db:down:
    desc: stop the kubectl port-forward to the stage-1 cluster Postgres
    cmds:
      - |
        if [ -f /tmp/adanalife-tasks/tripbot-stage-db.pid ]; then
          kill "$(cat /tmp/adanalife-tasks/tripbot-stage-db.pid)" 2>/dev/null || true
          rm -f /tmp/adanalife-tasks/tripbot-stage-db.pid
          echo "stage-1 Postgres port-forward stopped"
        else
          echo "No stage-1 Postgres port-forward PID file found — nothing to stop"
        fi

  # stage-1 Postgres backup/restore — on-demand, to a LOCAL file on the machine
  # running the task. Stage data is fresh-seeded and disposable, so (unlike
  # prod-1) there's no S3 bucket, no IAM/SM plumbing, and no CronJob — this is
  # just the "grab a snapshot before doing something risky" escape hatch. The
  # env is baked into the filename (stage-1-tripbot-<ts>.dump) so a stage dump
  # can never be confused with a prod one. Streams pg_dump -Fc out of postgres-0
  # reusing the pod's own POSTGRES_* creds (no credential handling here).
  #
  # frame_embeddings DATA is excluded (schema still ships): the CV vectors are
  # derived + reproducible and GBs big — they'd dwarf the rest of the dump and
  # corrupt over the tailnet proxy. Use :backup:vectors / :seed:vectors for them.
  tripbot:stage:db:backup:
    desc: "dump stage-1 Postgres to a local file (OUT_DIR/stage-1-tripbot-<ts>.dump, default ./backups); excludes frame_embeddings data — see :backup:vectors"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
      # postgres lives in the data namespace (stage-1-data) after the isolation
      # move; override NS=stage-1 to dump from the pre-move (app-namespace) pod.
      NS: '{{.NS | default "stage-1-data"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n {{.NS}} >/dev/null 2>&1
        msg: "postgres-0 not found in {{.NS}} — bring the cluster + postgres up first (override NS= if postgres is elsewhere)"
    cmds:
      - mkdir -p {{.OUT_DIR}}
      - |
        set -euo pipefail
        ts=$(date -u +%Y%m%d-%H%M%SZ)
        out="{{.OUT_DIR}}/stage-1-tripbot-${ts}.dump"
        echo "Dumping stage-1 Postgres to ${out}"
        # Write to a .partial then rename, so a failed dump never leaves a
        # truncated file that `:restore` (newest-first) would later pick up.
        kubectl exec -n {{.NS}} postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" pg_dump --format=custom --exclude-table-data=frame_embeddings -h localhost -U "$POSTGRES_USER" "$POSTGRES_DB"' \
          > "${out}.partial"
        mv "${out}.partial" "$out"
        echo "OK: ${out} ($(du -h "$out" | cut -f1))"

  # Mirrors tripbot:prod:db:restore: stream a local dump into postgres-0, then
  # clear a stale schema_migrations dirty flag if the dump carried one (a dirty
  # flag makes tripbot's migrate init container refuse to start; the dump is a
  # consistent snapshot so clearing it is safe). Does NOT roll tripbot.
  tripbot:stage:db:restore:
    desc: "restore stage-1 Postgres from a local dump (DUMP=path, default newest in OUT_DIR, ./backups) + clear stale migrate dirty flag"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
      # postgres lives in the data namespace (stage-1-data) after the isolation
      # move; override NS=stage-1 for a pre-move (app-namespace) restore.
      NS: '{{.NS | default "stage-1-data"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n {{.NS}} >/dev/null 2>&1
        msg: "postgres-0 not found in {{.NS}} — bring the cluster + postgres up first (override NS= if postgres is elsewhere)"
    cmds:
      - |
        set -euo pipefail
        dump="{{.DUMP}}"
        if [ -z "$dump" ]; then
          dump=$(ls -1t {{.OUT_DIR}}/stage-1-tripbot-*.dump 2>/dev/null | head -1 || true)
          [ -n "$dump" ] || { echo "no dumps found in {{.OUT_DIR}}/ (stage-1-tripbot-*.dump) — pass DUMP=<path>"; exit 1; }
        fi
        [ -f "$dump" ] || { echo "dump not found: $dump"; exit 1; }
        echo "Restoring stage-1 Postgres from ${dump}"
        kubectl exec -i -n {{.NS}} postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" pg_restore --clean --if-exists --no-owner -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"' \
          < "$dump"
        echo "Restore complete."
      - |
        set -euo pipefail
        psql() { kubectl exec -i -n {{.NS}} postgres-0 -- sh -c "PGPASSWORD=\"\$POSTGRES_PASSWORD\" psql -tAq -h localhost -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -c \"$1\""; }
        ver=$(psql "SELECT version FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        dirty=$(psql "SELECT dirty FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        echo "schema_migrations: version=$ver dirty=$dirty"
        if [ "$dirty" = "t" ]; then
          echo "clearing stale dirty flag so tripbot's migrate init can re-apply pending migrations"
          psql "UPDATE schema_migrations SET dirty=false;" >/dev/null
          echo "cleared."
        fi
      - 'echo "Next: kubectl rollout restart deploy/tripbot-twitch -n stage-1 — its migrate init re-applies any pending migrations."'

  # Dedicated dump of JUST the dashcam-cv vector table (frame_embeddings),
  # which the full-DB backup tasks deliberately exclude. The table is GBs big.
  # It dumps in-pod, then streams the file out with `exec cat` (a single stdout
  # stream) and verifies sha256 in-pod vs local.
  #
  # NOT `kubectl cp`: cp multiplexes a side stderr stream that closes abnormally
  # (`websocket: close 1006`) partway through a large file over the apiserver
  # proxy and SILENTLY TRUNCATES the copy — observed truncating this ~743 MB
  # dump by 1–4 MB on every attempt, even on-LAN. `pg_restore --list` does NOT
  # catch it (the custom-format TOC sits near the front of the file, so it reads
  # fine while the data tail is missing). The sha256 check makes a corrupt
  # transfer fail loudly instead of producing a bad backup. Same proxy hazard
  # the prod-1 cutover runbook flagged as `tls: bad record MAC`.
  tripbot:stage:db:backup:vectors:
    desc: "dump ONLY the frame_embeddings table to a local file (OUT_DIR/stage-1-frame-embeddings-<ts>.dump, default ./backups); in-pod dump + exec-cat stream + sha256 verify"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
      NS: '{{.NS | default "stage-1-data"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n {{.NS}} >/dev/null 2>&1
        msg: "postgres-0 not found in {{.NS}} — bring the cluster + postgres up first (override NS= if postgres is elsewhere)"
    cmds:
      - mkdir -p {{.OUT_DIR}}
      - |
        set -euo pipefail
        ts=$(date -u +%Y%m%d-%H%M%SZ)
        out="{{.OUT_DIR}}/stage-1-frame-embeddings-${ts}.dump"
        echo "Dumping frame_embeddings in-pod..."
        kubectl exec -n {{.NS}} postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" pg_dump --format=custom --table=frame_embeddings -h localhost -U "$POSTGRES_USER" "$POSTGRES_DB" > /tmp/frame-embeddings.dump'
        # Stream out (single stdout stream) to a .partial, then verify sha256
        # before promoting — a truncated transfer must never land as "$out".
        echo "Streaming out to ${out} (exec cat)..."
        kubectl exec -n {{.NS}} postgres-0 -- cat /tmp/frame-embeddings.dump > "${out}.partial"
        want=$(kubectl exec -n {{.NS}} postgres-0 -- sha256sum /tmp/frame-embeddings.dump | awk '{print $1}')
        got=$(shasum -a 256 "${out}.partial" | awk '{print $1}')
        kubectl exec -n {{.NS}} postgres-0 -- rm -f /tmp/frame-embeddings.dump
        if [ "$want" != "$got" ]; then
          rm -f "${out}.partial"
          echo "sha256 mismatch (in-pod $want != local $got) — transfer corrupt, retry"; exit 1
        fi
        mv "${out}.partial" "$out"
        echo "OK: ${out} ($(du -h "$out" | cut -f1)) — sha256 $got verified"

  # Seed frame_embeddings from a dedicated vector dump (the counterpart of
  # :backup:vectors). Run AFTER the regular seed/restore — the table has an
  # FK to videos(id). pg_restore --clean drops + recreates the table, so the
  # HNSW index is bulk-rebuilt after the load.
  #
  # That bulk HNSW build is memory-hungry: at the default maintenance_work_mem it
  # builds in-memory and OOM-killed the 1Gi-capped prod postgres, whose unclean
  # crash then lost the local-path PVC (2026-06-15 outage). So we pin a small
  # maintenance_work_mem (MAINT_WORK_MEM, default 128MB) + disable parallel maint
  # workers, forcing pgvector's slower ON-DISK build, whose non-reclaimable memory
  # stays well under 1Gi. Validated on stage's 1Gi postgres: peak pinned at the
  # limit (reclaimable page cache), zero OOM. Raise MAINT_WORK_MEM for a faster
  # build once postgres has the RAM headroom.
  #
  # The dump streams straight into pg_restore's stdin via `kubectl exec -i`
  # (the same single-stream pattern as :prod:db:restore) — NOT `kubectl cp`
  # into an in-pod temp file, which silently truncates a large transfer over
  # the apiserver proxy (see :backup:vectors). No temp file, one stream.
  # NS=prod-1-data seeds prod (the dump is env-agnostic — same videos table).
  tripbot:stage:db:seed:vectors:
    desc: "seed frame_embeddings from a local vector dump (DUMP=path, default newest stage-1-frame-embeddings-*.dump in OUT_DIR, ./backups); OOM-safe bounded HNSW build (MAINT_WORK_MEM=128MB); run after the videos seed; NS=prod-1-data for prod"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
      NS: '{{.NS | default "stage-1-data"}}'
      # Bounded HNSW-build memory — forces pgvector's on-disk build so the bulk
      # CREATE INDEX can't OOM a memory-capped postgres. Raise once it has RAM.
      MAINT_WORK_MEM: '{{.MAINT_WORK_MEM | default "128MB"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n {{.NS}} >/dev/null 2>&1
        msg: "postgres-0 not found in {{.NS}} — bring the cluster + postgres up first (override NS= if postgres is elsewhere)"
    cmds:
      - |
        set -euo pipefail
        dump="{{.DUMP}}"
        if [ -z "$dump" ]; then
          dump=$(ls -1t {{.OUT_DIR}}/stage-1-frame-embeddings-*.dump 2>/dev/null | head -1 || true)
          [ -n "$dump" ] || { echo "no vector dumps found in {{.OUT_DIR}}/ (stage-1-frame-embeddings-*.dump) — pass DUMP=<path>"; exit 1; }
        fi
        [ -f "$dump" ] || { echo "dump not found: $dump"; exit 1; }
        echo "Restoring frame_embeddings into {{.NS}}/postgres-0 (drop + recreate + HNSW rebuild)..."
        echo "  from ${dump} ($(du -h "$dump" | cut -f1))"
        echo "  bounded build: maintenance_work_mem={{.MAINT_WORK_MEM}}, no parallel maint workers (slow but memory-safe)"
        kubectl exec -i -n {{.NS}} postgres-0 -- sh -c \
          'PGOPTIONS="-c maintenance_work_mem={{.MAINT_WORK_MEM}} -c max_parallel_maintenance_workers=0" PGPASSWORD="$POSTGRES_PASSWORD" pg_restore --clean --if-exists --no-owner -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"' \
          < "$dump"
        rows=$(kubectl exec -n {{.NS}} postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" psql -tAq -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT count(*) FROM frame_embeddings;"')
        orphans=$(kubectl exec -n {{.NS}} postgres-0 -- sh -c \
          'PGPASSWORD="$POSTGRES_PASSWORD" psql -tAq -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT count(*) FROM frame_embeddings fe LEFT JOIN videos v ON v.id = fe.video_id WHERE v.id IS NULL;"')
        echo "Restore complete: ${rows} rows, ${orphans} FK orphans (want 0 — nonzero means the videos seed doesn't match this dump)."

  # Pin a local vector dump to the PERMANENT archive/ tier of the prod-1
  # Postgres backup bucket — the off-site "somewhere safe" home for the
  # frame_embeddings vectors, which the regular tiered DB backups exclude. The
  # archive/ prefix has no lifecycle rule (lives forever, stays S3 Standard —
  # no Glacier retrieval fee/latency). Stored there because stage has no bucket
  # of its own and the vectors are env-agnostic canonical data (seed any env).
  # ~743 MB → ~1.5¢/month to keep; :seed:vectors:fetch pulls it back (~5¢ egress).
  tripbot:stage:db:backup:vectors:archive:
    desc: "upload a local vector dump to s3://<bucket>/archive/ (permanent); DUMP=path, default newest stage-1-frame-embeddings-*.dump in OUT_DIR (./backups)"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
      BUCKET: adanalife-prod-1-postgres-backups
    cmds:
      - |
        set -euo pipefail
        dump="{{.DUMP}}"
        if [ -z "$dump" ]; then
          dump=$(ls -1t {{.OUT_DIR}}/stage-1-frame-embeddings-*.dump 2>/dev/null | head -1 || true)
          [ -n "$dump" ] || { echo "no vector dumps found in {{.OUT_DIR}}/ (stage-1-frame-embeddings-*.dump) — pass DUMP=<path>"; exit 1; }
        fi
        [ -f "$dump" ] || { echo "dump not found: $dump"; exit 1; }
        key="archive/$(basename "$dump")"
        echo "Uploading ${dump} ($(du -h "$dump" | cut -f1)) → s3://{{.BUCKET}}/${key}"
        aws-vault exec adanalife-prod -- aws s3 cp "$dump" "s3://{{.BUCKET}}/${key}"
        echo "Pinned to archive/ (permanent)."

  # Fetch the canonical frame_embeddings vector dump from S3 archive/ into
  # OUT_DIR so :seed:vectors (newest-first) picks it up — the reseed path for a
  # fresh stage/dev (or prod) DB. DUMP_KEY=archive/<file> picks a specific dump;
  # default = newest archive/stage-1-frame-embeddings-*.dump. Then run
  # :seed:vectors (NS=prod-1-data for prod).
  tripbot:stage:db:seed:vectors:fetch:
    desc: "download the canonical frame_embeddings dump from S3 archive/ into OUT_DIR (./backups) for :seed:vectors; DUMP_KEY=archive/<file> picks a specific one"
    vars:
      OUT_DIR: '{{.OUT_DIR | default "./backups"}}'
      BUCKET: adanalife-prod-1-postgres-backups
    cmds:
      - mkdir -p {{.OUT_DIR}}
      - |
        set -euo pipefail
        key="{{.DUMP_KEY}}"
        if [ -z "$key" ]; then
          newest=$(aws-vault exec adanalife-prod -- aws s3 ls "s3://{{.BUCKET}}/archive/" \
            | awk '{print $4}' | grep '^stage-1-frame-embeddings-.*\.dump$' | sort | tail -1 || true)
          [ -n "$newest" ] || { echo "no frame-embeddings dumps in s3://{{.BUCKET}}/archive/ — upload one with :backup:vectors:archive first"; exit 1; }
          key="archive/$newest"
        fi
        out="{{.OUT_DIR}}/$(basename "$key")"
        echo "Fetching s3://{{.BUCKET}}/${key} → ${out}"
        aws-vault exec adanalife-prod -- aws s3 cp "s3://{{.BUCKET}}/${key}" "$out"
        echo "OK: ${out} ($(du -h "$out" | cut -f1))"
        echo "Next: task tripbot:stage:db:seed:vectors  (NS=prod-1-data for prod)"

  # prod-1 Postgres restore — part of the wipe-and-rebuild loop. A wipe takes
  # EPHEMERAL (the postgres PVC) with it, so each rebuild restores from the
  # most recent S3 dump written by the postgres-backup CronJob (pg_dump -Fc).
  #
  # The CronJob (k8s/apps/postgres/overlays/prod-1/backup-cronjob.yaml) writes
  # to tiered prefixes under the bucket — see #584. Lifecycle rules vary by tier:
  #   hourly/   every hour,            expires at 2 days
  #   daily/    04:00 UTC,             expires at 30 days
  #   weekly/   04:00 UTC Sunday,      Glacier IR @ 30d, kept forever
  #   archive/  manual pin point,      no rule — lives forever
  tripbot:prod:db:backups:
    desc: list available prod-1 Postgres dumps in S3 across all tiers (newest last per tier)
    vars:
      BUCKET: adanalife-prod-1-postgres-backups
    cmds:
      - |
        set -euo pipefail
        for tier in hourly daily weekly archive; do
          echo "=== ${tier}/ ==="
          aws-vault exec adanalife-prod -- aws s3 ls "s3://{{.BUCKET}}/${tier}/" 2>/dev/null | sort || true
          echo
        done

  # On-demand prod-1 Postgres dump — runs the postgres-backup CronJob's script
  # now (instead of waiting for the hourly schedule), for a "just in case before
  # a risky op" snapshot. The one-shot Job lands in the hourly/ tier (expires at
  # 2 days). Set ARCHIVE=true to also copy the resulting dump into the permanent
  # archive/ tier (no lifecycle rule — lives forever), for snapshots worth
  # keeping past the 2-day window.
  tripbot:prod:db:backup:
    desc: "run an on-demand prod-1 Postgres dump (lands in hourly/); ARCHIVE=true also pins it to the permanent archive/ tier"
    vars:
      BUCKET: adanalife-prod-1-postgres-backups
      # postgres + its backup CronJob live in the data namespace (prod-1-data)
      # after the isolation move; override NS=prod-1 for the pre-move location.
      NS: '{{.NS | default "prod-1-data"}}'
    preconditions:
      - sh: kubectl get cronjob postgres-backup -n {{.NS}} >/dev/null 2>&1
        msg: "postgres-backup CronJob not found in {{.NS}} — apply the data unit first (override NS= if postgres is elsewhere)"
    cmds:
      - |
        set -euo pipefail
        job="postgres-backup-manual-$(date +%Y%m%d-%H%M%S)"
        echo "Creating one-shot backup Job ${job} from cronjob/postgres-backup..."
        kubectl create job --from=cronjob/postgres-backup "${job}" -n {{.NS}}
        echo "Waiting for ${job} to complete..."
        kubectl wait --for=condition=complete "job/${job}" -n {{.NS}} --timeout=300s
        kubectl logs "job/${job}" -n {{.NS}} --tail=20 || true
        echo "Backup complete (written to s3://{{.BUCKET}}/hourly/)."
        if [ "{{.ARCHIVE}}" = "true" ]; then
          newest=$(aws-vault exec adanalife-prod -- aws s3 ls "s3://{{.BUCKET}}/hourly/" | sort | tail -1 | awk '{print $4}')
          [ -n "$newest" ] || { echo "no dump found in hourly/ to pin"; exit 1; }
          echo "Pinning hourly/${newest} → archive/${newest}"
          aws-vault exec adanalife-prod -- aws s3 cp "s3://{{.BUCKET}}/hourly/${newest}" "s3://{{.BUCKET}}/archive/${newest}"
          echo "Pinned to archive/ (permanent)."
        fi

  # Streams S3 → pg_restore inside postgres-0, reusing the pod's own POSTGRES_*
  # env creds (no credential handling here). Then clears a stale
  # schema_migrations dirty flag if the dump carried one — the historical
  # 20260518 dump was taken at version=10 dirty=true, which makes tripbot's
  # migrate init container refuse to start. Clearing it lets migrate re-apply
  # the pending migrations on tripbot's next roll. The dump is a consistent
  # snapshot, so clearing dirty is safe (it reflects the dumped state).
  #
  # DUMP_KEY=tripbot/<ts>.dump picks a specific dump; defaults to the newest.
  # NOTE: untested against a live cluster — eyeball the first run during the
  # wipe loop. Does NOT roll tripbot (echoes the command instead).
  tripbot:prod:db:restore:
    desc: "restore prod-1 Postgres from an S3 dump (DUMP_KEY=tripbot/<ts>.dump, default newest) + clear stale migrate dirty flag"
    vars:
      BUCKET: adanalife-prod-1-postgres-backups
      # postgres lives in the data namespace (prod-1-data) after the isolation
      # move; override NS=prod-1 for a pre-move (app-namespace) restore.
      NS: '{{.NS | default "prod-1-data"}}'
    preconditions:
      - sh: kubectl get pod postgres-0 -n {{.NS}} >/dev/null 2>&1
        msg: "postgres-0 not found in {{.NS}} — bring the cluster + postgres up first (override NS= if postgres is elsewhere)"
    cmds:
      - |
        set -euo pipefail
        key="{{.DUMP_KEY}}"
        if [ -z "$key" ]; then
          newest=$(aws-vault exec adanalife-prod -- aws s3 ls "s3://{{.BUCKET}}/tripbot/" | sort | tail -1 | awk '{print $4}')
          [ -n "$newest" ] || { echo "no dumps found in s3://{{.BUCKET}}/tripbot/"; exit 1; }
          key="tripbot/$newest"
        fi
        echo "Restoring prod-1 Postgres from s3://{{.BUCKET}}/$key"
        aws-vault exec adanalife-prod -- aws s3 cp "s3://{{.BUCKET}}/$key" - \
          | kubectl exec -i -n {{.NS}} postgres-0 -- sh -c \
            'PGPASSWORD="$POSTGRES_PASSWORD" pg_restore --clean --if-exists --no-owner -h localhost -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
        echo "Restore complete."
      - |
        set -euo pipefail
        psql() { kubectl exec -i -n {{.NS}} postgres-0 -- sh -c "PGPASSWORD=\"\$POSTGRES_PASSWORD\" psql -tAq -h localhost -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -c \"$1\""; }
        ver=$(psql "SELECT version FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        dirty=$(psql "SELECT dirty FROM schema_migrations LIMIT 1;" | tr -d '[:space:]')
        echo "schema_migrations: version=$ver dirty=$dirty"
        if [ "$dirty" = "t" ]; then
          echo "clearing stale dirty flag so tripbot's migrate init can re-apply pending migrations"
          psql "UPDATE schema_migrations SET dirty=false;" >/dev/null
          echo "cleared."
        fi
      - 'echo "Next: kubectl rollout restart deploy/tripbot-twitch -n prod-1 — its migrate init re-applies any pending migrations."'

  tripbot:dev:db:seed:
    desc: run the one-shot ESO-wired seed Job in the development namespace; idempotent — skips if the videos table already has real rows
    aliases: [tripbot:db:seed]
    cmds:
      # The seed Job is authored in the tripbot repo's cdk8s now (per-env, with
      # the namespace baked in); applied from its committed dist in the sibling
      # tripbot checkout (same source assumption as `task contract:sync`).
      - kubectl delete job tripbot-seed -n development --ignore-not-found
      - kubectl apply -f ../tripbot/cdk8s/dist/development-job-seed.k8s.yaml -n development
      # kubectl wait doesn't short-circuit on Failed when asked for
      # Complete — wait the full window then disambiguate after the fact.
      - |
        if ! kubectl wait --for=condition=complete --timeout=180s job/tripbot-seed -n development; then
          if kubectl get job tripbot-seed -n development -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' | grep -q True; then
            echo "seed job failed"
          else
            echo "seed job timed out after 180s (still pending)"
          fi
          exit 1
        fi
      - kubectl logs job/tripbot-seed -n development

