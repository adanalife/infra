# Cross-cutting ExternalSecrets — not owned by any single workload.
#
# Per vault/decisions/shared-secrets-not-owned-by-workload.md, observability
# credentials that multiple workloads consume (or that conceptually belong
# to the cluster's platform tier rather than to any one application) live
# here. ESO materializes them into the `default` namespace; consumer
# Deployments `envFrom` the resulting Secrets with `optional: false`.
#
# Today: OTLP (multi-consumer) + Sentry DSNs (per-component but
# cross-env-shared). Future cross-cutting observability secrets land
# here too.
#
# Applied via each env's umbrella overlay (`k8s/overlays/{development,prod-1}`),
# so a cluster bring-up via `task k8s:{stage,prod}:apply` always brings
# these along. No per-env overlay is needed — SM container names are
# identical across envs, and the ClusterSecretStore env-routes via the
# cluster's AWS-side credentials.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - grafana-cloud-otlp-external-secret.yaml
  - sentry-tripbot-external-secret.yaml
  - sentry-vlc-server-external-secret.yaml
