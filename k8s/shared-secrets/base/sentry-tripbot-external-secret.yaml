# Sentry DSN for the tripbot Go service. Sourced from AWS Secrets
# Manager (k8s/sentry-tripbot) via the cluster-wide aws-secretsmanager
# ClusterSecretStore. Materialized Secret carries SENTRY_DSN; the
# tripbot Deployment envFroms it with optional: false.
#
# Per vault/decisions/observability-projects-by-component.md, the same
# DSN value lives in stage and prod SM containers (one Sentry project
# per component; env partitioning via SENTRY_ENVIRONMENT on each event).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sentry-tripbot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: sentry-tripbot
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/sentry-tripbot
