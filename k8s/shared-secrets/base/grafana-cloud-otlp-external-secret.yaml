# Grafana Cloud OTLP credentials. Sourced from AWS Secrets Manager
# (k8s/grafana-cloud-otlp) via the cluster-wide aws-secretsmanager
# ClusterSecretStore. The remote SM value is JSON; dataFrom.extract
# pulls each top-level key (OTEL_EXPORTER_OTLP_ENDPOINT,
# OTEL_EXPORTER_OTLP_HEADERS, OTEL_EXPORTER_OTLP_PROTOCOL) into a
# matching Secret key.
#
# Multi-consumer: tripbot and vlc-server both envFrom this Secret with
# optional: false. Per vault/decisions/observability-projects-by-component.md,
# the same value lives in stage and prod SM containers — env partitioning
# happens via deployment.environment in OTEL_RESOURCE_ATTRIBUTES.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-otlp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-otlp
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/grafana-cloud-otlp
