apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - external-secret.yaml

# Apply order: kustomize creates the ExternalSecret, ESO reconciles
# the Secret materialization within ~30s, then `helm upgrade --install`
# picks up the existing Secret via secret.create=false in values.yml.
# `task k8s:stage:platform:up` sequences these correctly. The dedicated
# `monitoring-host` Namespace (for node-exporter) is applied separately
# via `kubectl apply -f k8s/monitoring/host-namespace.yml` in the same
# task — same shape as how the `monitoring` namespace itself is created
# (kubectl, not kustomize).
