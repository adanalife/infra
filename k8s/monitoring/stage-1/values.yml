# Helm values for grafana/k8s-monitoring (chart v4.x). Ships the
# in-cluster collectors that fill the dashboards landed in
# terraform/stage-1/grafana-dashboards/:
#
#   - Alloy collectors → scrape pods + ship logs (via kube API) + cluster events
#   - kube-state-metrics → cluster/pod state metrics to Mimir
#   - kubelet + cAdvisor scrape (built into clusterMetrics)
#
# Host-level metrics (node-exporter) are installed separately into the
# `monitoring-host` namespace — Talos enforces PodSecurity baseline
# cluster-wide and node-exporter needs hostPath + hostNetwork, so it
# gets its own ns labeled `privileged`. This chart's workloads all stay
# under baseline.
#
# Credentials come from the grafana-cloud-metrics-write Secret in this
# namespace, materialized by the ExternalSecret in external-secret.yaml.
# All four keys are read at runtime via Alloy's `remote.kubernetes.secret`
# expression, so rotating the SM value + force-syncing the ExternalSecret
# is enough to pick up new tokens without redeploying the chart.

cluster:
  name: stage-1

destinations:
  metrics:
    type: prometheus
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.metrics.data["PROMETHEUS_HOST"]) + "/api/prom/push"
    auth:
      type: basic
      usernameKey: PROMETHEUS_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

  logs:
    type: loki
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.logs.data["LOKI_HOST"]) + "/loki/api/v1/push"
    auth:
      type: basic
      usernameKey: LOKI_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  # The chart's default cAdvisor + KSM allow lists are conservative —
  # enough for the basic Grafana Cloud Kubernetes views but missing
  # several metrics queried by the modern community dashboards we
  # vendored (k8s-cluster-overview, k8s-pods). Extra series listed
  # below; checked against the dashboard JSON queries.
  cadvisor:
    metricsTuning:
      includeMetrics:
        # CPU throttle time (seconds) — for "CPU Throttled seconds by
        # container/namespace" panels. Default allow list has
        # _periods_total but not _seconds_total.
        - container_cpu_cfs_throttled_seconds_total
        # OOM events — for "OOM Events by container/namespace" panels.
        - container_oom_events_total
        # Network errors — for "Network errors" panel.
        - container_network_receive_errors_total
        - container_network_transmit_errors_total
  kube-state-metrics:
    metricsTuning:
      includeMetrics:
        # Last terminated exit code — for the "Last Terminated Exit Code"
        # panel. Default allow list has _reason and _timestamp but not
        # _exitcode.
        - kube_pod_container_status_last_terminated_exitcode
        # Pod scheduled status — for "Unscheduled Pods" panel.
        - kube_pod_status_scheduled
        # Namespace creation timestamp — used as a 0-fallback in some
        # "by namespace" panel queries to ensure namespaces with no
        # pods still appear.
        - kube_namespace_created

# hostMetrics scrapes node-exporter — which is installed separately
# in the `monitoring-host` namespace (see Taskfile k8s:stage:platform:up
# and k8s/monitoring/host-namespace.yml). hostMetrics's annotation-based
# discovery picks up the prometheus.io/scrape-annotated node-exporter
# pods across namespaces.
#
# Without this, node-exporter runs but its /metrics never reaches Mimir,
# so node-level panels (Node Exporter Full + CPU/memory/disk on cluster
# overview) stay empty. clusterMetrics only covers kubelet/cAdvisor/KSM.
#
# `linuxHosts.enabled: true` is the per-source switch in the feature-
# host-metrics subchart (parent chart aliases it under `hostMetrics:`).
hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
    # Point hostMetrics at the externally-deployed node-exporter
    # (prometheus-community chart in the `monitoring-host` namespace
    # — see k8s/monitoring/node-exporter/). Without these, the chart
    # refuses to render: "The Linux host configuration requires a
    # connection to Node Exporter". The default would scrape the
    # chart's bundled node-exporter (which we disabled to keep this
    # namespace under baseline PSA).
    namespace: monitoring-host
    labelMatchers:
      app.kubernetes.io/name: prometheus-node-exporter
    # The chart's default-allow-list keeps only a minimal subset of
    # node-exporter metrics — enough for the basic Kubernetes views
    # but missing node_uname_info, node_load*, node_disk_*,
    # node_network_*errs_total, and most of what Node Exporter Full
    # queries. The integration allowlist is the richer set that
    # covers these.
    metricsTuning:
      useIntegrationAllowList: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

# Pod logs via the Kubernetes API instead of tailing /var/log on the
# host. Trade-off: a tiny bit slower than reading log files directly,
# but doesn't require hostPath (and therefore namespace-privileged PSA).
# Keeps every collector under PodSecurity baseline.
podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-logs

# annotationAutodiscovery scrapes any pod tagged with prometheus.io/scrape
# annotations. Used by helm-installed traefik / external-dns / cert-manager /
# external-secrets (each chart's values.yml sets podAnnotations), plus the
# externally-deployed node-exporter in the monitoring-host namespace.
# Avoids needing kube-prometheus-stack CRDs + ServiceMonitor.
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

# kube-state-metrics is off by default in v4.x; deploying it here, then
# clusterMetrics scrapes it. cAdvisor scrape is built into clusterMetrics's
# kubelet target — no extra deploy needed.
#
# node-exporter is the only workload in monitoring that genuinely needs
# hostPath + hostNetwork (which violates Talos's cluster-default
# baseline PSA). It's installed separately via
# prometheus-community/prometheus-node-exporter into the
# monitoring-host namespace (labeled `privileged`), so the rest of
# `monitoring` stays under baseline.
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: false

# Alloy collector deployments. Defaults are fine for a single-node k3d;
# revisit on a real multi-node cluster.
collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    # `clustered` is required by podLogsViaKubernetesApi — collectors
    # coordinate which pod's logs each replica reads via Alloy's
    # clustering, so a multi-replica DaemonSet doesn't duplicate-fetch
    # every pod's log stream through the kube API. The k8s-monitoring
    # chart's helm validation enforces this.
    #
    # `filesystem-log-reader` preset (the /var/log + docker-containers
    # hostPath mount set) was dropped when we switched off podLogsViaLoki.
    presets: [clustered, daemonset]
  alloy-singleton:
    presets: [singleton]

# Override the chart's default container securityContext for all alloy
# collectors. The upstream chart adds back ~14 of Docker's default
# capabilities after dropping ALL (CHOWN, FOWNER, NET_RAW, etc.); none
# of them are needed for HTTP scraping + push-to-Grafana-Cloud, and
# NET_RAW in particular is what made the collectors fail PodSecurity
# baseline. We drop ALL and add nothing back.
collectorCommon:
  alloy:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 4242
      seccompProfile:
        type: RuntimeDefault
