# ExternalSecret materializes the Grafana Cloud metrics/logs-write
# credentials into a k8s Secret in the monitoring namespace, sourced
# from AWS Secrets Manager via the cluster-wide aws-secretsmanager
# ClusterSecretStore.
#
# The remote SM value is JSON; dataFrom.extract pulls each top-level
# key (PROMETHEUS_HOST, PROMETHEUS_USERNAME, LOKI_HOST, LOKI_USERNAME,
# TOKEN) into a matching Secret key, so the helm chart can reference
# them from values.yml without enumerating each one here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-metrics-write
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-cluster
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-metrics-write
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/grafana-cloud-metrics-write
