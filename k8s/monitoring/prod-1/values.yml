# KEEP-IN-SYNC: k8s/monitoring/{development,prod-1}/values.yml
#
# Helm values for grafana/k8s-monitoring (chart v4.x). Ships the
# in-cluster collectors that fill the dashboards landed in
# terraform/development/grafana-dashboards/:
#
#   - Alloy collectors → scrape pods + ship logs (via kube API) + cluster events
#   - kube-state-metrics → cluster/pod state metrics to Mimir
#   - kubelet + cAdvisor scrape (built into clusterMetrics)
#
# Host-level metrics (node-exporter) are installed separately into the
# `monitoring-host` namespace — Talos enforces PodSecurity baseline
# cluster-wide and node-exporter needs hostPath + hostNetwork, so it
# gets its own ns labeled `privileged`. This chart's workloads all stay
# under baseline.
#
# Credentials come from the grafana-cloud-metrics-write Secret in this
# namespace, materialized by the ExternalSecret in external-secret.yaml.
#
# Deltas from development/values.yml:
#   - cluster.name — labels the physical cluster (adanalife-minipc) in
#     Grafana Cloud dashboard filters. stage-1 and prod-1 co-tenant this
#     one mini-PC cluster and are separated by the `namespace` label
#     (which the chart attaches to every series) plus each workload's
#     deployment.environment OTEL attribute — NOT by cluster.
#   - clusterMetrics / hostMetrics / annotationAutodiscovery are off in
#     development (logs + cluster events only). Here they're on for
#     prod-1, fanned out to two metrics destinations: Grafana Cloud
#     (capped free tier — cap-driven drops applied per-destination) and
#     the in-cluster VictoriaMetrics (full fidelity, no drops).

cluster:
  name: adanalife-minipc

destinations:
  metrics:
    type: prometheus
    # PROMETHEUS_HOST in SM already includes the /api/prom path
    # (Grafana Cloud's "Prometheus" connection URL form). Only the
    # /push suffix needs adding.
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.metrics.data["PROMETHEUS_HOST"]) + "/push"
    auth:
      type: basic
      usernameKey: PROMETHEUS_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring
    # Cloud-only trims. These are write_relabel_config blocks on this
    # destination's remote_write endpoint, so they gate what ships to
    # Grafana Cloud without touching what localMetrics receives. Every
    # drop here exists purely for the free tier's active-series cap —
    # series with real signal that we'd keep if the cloud were free.
    # Zero-signal noise (dup-timestamp xpum series, rollout-churn
    # labels, Cilium internals) is dropped at the source rules instead,
    # before the fan-out.
    metricProcessingRules: |-
      write_relabel_config {
        // stage-1 namespaces don't ship to the cloud — prod-1 metrics
        // only from this shared cluster. stage-1 logs + events still
        // ship (Loki, not Mimir), and stage-1 series land in
        // localMetrics.
        source_labels = ["namespace"]
        regex = "stage-1(-platform)?"
        action = "drop"
      }
      write_relabel_config {
        // Launch-day trim: "cool but not essential" series kept out of
        // the cloud for cap headroom (15K hard cap).
        //
        // Cilium: keep policy / network / drop counters; drop the
        // feature-flag info gauges, BPF-map internals, FQDN-cache
        // stats, controller heartbeats, drift checker, and
        // cilium_endpoint (per-endpoint cardinality grows with pods).
        //
        // external-dns: nothing here is alert-relevant — Route53 record
        // presence is checked via cert-manager + the smoke tests.
        //
        // cert-manager: keep only the expiration / ready / renewal
        // timestamps that ops actually queries.
        //
        // CoreDNS: drop histogram buckets (no p95 DNS latency charts in
        // the cloud). Counts and sums still ship for rate panels.
        source_labels = ["__name__"]
        regex = "cilium_feature_.+|cilium_bpf_.+|cilium_fqdn_.+|cilium_drift_.+|cilium_hive_status|cilium_controllers_(group_runs_total|runs_duration_seconds_.+|runs_total)|cilium_endpoint(_state|_regenerations_total)?|external_dns_.+|externaldns_.+|certmanager_(http_acme_client_.+|acme_client_.+|clock_time_seconds.*|clusterissuer_.+|controller_.+|certificate_challenge_status)|coredns_.+_bucket"
        action = "drop"
      }

  localMetrics:
    type: prometheus
    # In-cluster VictoriaMetrics — the full-fidelity, no-cap store
    # (see k8s/monitoring/victoria-metrics/). Receives everything the
    # collectors scrape, including the stage-1 and launch-day-trim
    # series the cloud destination drops.
    url: http://victoria-metrics.monitoring.svc.cluster.local:8428/api/v1/write

  logs:
    type: loki
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.logs.data["LOKI_HOST"]) + "/loki/api/v1/push"
    auth:
      type: basic
      usernameKey: LOKI_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  cadvisor:
    metricsTuning:
      includeMetrics:
        - container_cpu_cfs_throttled_seconds_total
        - container_oom_events_total
        - container_network_receive_errors_total
        - container_network_transmit_errors_total
    # Drop high-cardinality identifier labels that change on every container
    # restart (container_id) or are duplicates of pod/container (id, image_id).
    # Mimir merges series that differ only by dropped labels — saves the
    # restart-churn cardinality. Source-level: no destination wants these.
    extraMetricProcessingRules: |-
      rule {
        action = "labeldrop"
        regex = "id|container_id|image_id"
      }
  kube-state-metrics:
    metricsTuning:
      includeMetrics:
        - kube_pod_container_status_last_terminated_exitcode
        - kube_pod_status_scheduled
        - kube_namespace_created
      # Both overlap with cheaper metrics already in the default allowlist:
      # kube_pod_status_reason (~210 series) overlaps with kube_pod_status_phase;
      # kube_deployment_status_condition (~144 series) is rarely queried directly
      # vs. the cluster-overview dashboards that use kube_deployment_status_replicas_*.
      excludeMetrics:
        - kube_pod_status_reason
        - kube_deployment_status_condition
    # Drop pod UID — changes on every pod rebuild and creates a fresh series
    # set each rollout. Dashboards query by pod name, not uid.
    extraMetricProcessingRules: |-
      rule {
        action = "labeldrop"
        regex = "uid"
      }

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
    # Point hostMetrics at the externally-deployed node-exporter
    # (prometheus-community chart in the `monitoring-host` namespace
    # — see k8s/monitoring/node-exporter/). Without these, the chart
    # refuses to render: "The Linux host configuration requires a
    # connection to Node Exporter". The default would scrape the
    # chart's bundled node-exporter (which we disabled to keep this
    # namespace under baseline PSA).
    namespace: monitoring-host
    labelMatchers:
      app.kubernetes.io/name: prometheus-node-exporter
    metricsTuning:
      useIntegrationAllowList: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

# Pod logs via the Kubernetes API instead of tailing /var/log on the
# host. Trade-off: a tiny bit slower than reading log files directly,
# but doesn't require hostPath (and therefore namespace-privileged PSA).
# Keeps every collector under PodSecurity baseline.
podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-logs

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
  # Override the chart's default annotation keys (k8s.grafana.com/*)
  # to the standard prometheus.io/* convention used by upstream charts
  # (traefik, external-dns, cert-manager, external-secrets,
  # prometheus-community/prometheus-node-exporter, and almost any
  # future scrape target we'd add).
  annotations:
    scrape: "prometheus.io/scrape"
    metricsPath: "prometheus.io/path"
    metricsPortNumber: "prometheus.io/port"
    metricsScheme: "prometheus.io/scheme"
  # Cardinality controls (Alloy River syntax). Applied to every series
  # scraped via annotation-autodiscovery — covers Cilium, traefik, ESO,
  # cert-manager, external-dns, node-exporter, and any future prometheus.io-
  # annotated pod. Rules execute top-to-bottom; first matching action wins.
  # Source-level rules run before the destination fan-out, so everything
  # dropped here is gone from Grafana Cloud AND the local VictoriaMetrics —
  # only zero-signal noise belongs in this list. Cap-driven trims live on
  # the cloud destination's metricProcessingRules instead.
  extraMetricProcessingRules: |-
    rule {
      // Drop Cilium's internal scheduler / k8s-client histograms — high
      // cardinality (~700 series combined), zero operational signal for
      // adanalife. Network/policy/endpoint counters are preserved.
      source_labels = ["__name__"]
      regex = "cilium_hive_jobs_.+|cilium_identity_updater_timer_.+|cilium_k8s_workqueue_.+_bucket|cilium_k8s_client_api_latency_.+_bucket|cilium_act_processing_time_seconds_bucket"
      action = "drop"
    }
    rule {
      // Drop _bucket suffix on controller_runtime + workqueue histograms
      // (cert-manager / ESO / external-dns reconcile loops). We don't
      // chart p99 latency on these — _count and _sum are kept so rate
      // and average panels still work. ~500 series.
      source_labels = ["__name__"]
      regex = "controller_runtime_reconcile_time_seconds_bucket|workqueue_(queue|work|unfinished_work|longest_running_processor)_duration_seconds_bucket"
      action = "drop"
    }
    rule {
      // Drop rollout-churn labels from annotation-scraped series. Both
      // change on every Deployment/DaemonSet rev, so without this each
      // rollout doubles the active series for ~20min (Mimir lookback).
      action = "labeldrop"
      regex = "pod_template_hash|controller_revision_hash"
    }
    rule {
      // intel/xpumanager v1.3.6 emits xpum_per_engine_ratio (12x per
      // scrape — one per GPU engine: compute/render/copy/video-encode/...)
      // and xpum_frequency_mhz (2x) with identical label sets — the
      // exporter is missing an `engine` label to differentiate. Alloy
      // logs each duplicate as "Error on ingesting samples with different
      // value but same timestamp" and drops the dupes anyway, so this
      // rule both saves the cardinality and silences the warning spam.
      // Other xpum_* metrics (memory, power, temperature, utilization)
      // are unaffected and continue to feed the iGPU dashboard.
      source_labels = ["__name__"]
      regex = "xpum_per_engine_ratio|xpum_frequency_mhz"
      action = "drop"
    }

telemetryServices:
  kube-state-metrics:
    deploy: true
  # node-exporter deploys separately into the `monitoring-host`
  # namespace via the prometheus-community/prometheus-node-exporter
  # chart — see Taskfile k8s:prod:platform:up. It's the only workload
  # we run that genuinely needs hostPath + hostNetwork; isolating it
  # in its own privileged-labeled namespace keeps the rest of
  # `monitoring` under baseline.
  node-exporter:
    deploy: false

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    # `clustered` lets replicas partition pods between themselves so
    # podLogsViaKubernetesApi doesn't N-multiply kube-API log fetches.
    # `daemonset` keeps one collector per node for locality.
    presets: [clustered, daemonset]
  alloy-singleton:
    presets: [singleton]

# `collectorCommon.alloy` passes through to the underlying grafana/alloy
# subchart, which uses two distinct securityContext keys (the doubled
# `alloy.alloy` path is the container-level block — load-bearing for
# PSA, which reads capabilities from there).
#
# The chart's container default re-adds the full Docker capability set
# after dropping ALL, including NET_RAW — which is what fails Talos's
# baseline PSA enforcement. Alloy needs none of those caps for HTTP
# scrape + push, so we wipe the add list entirely. `add: []` is
# required explicitly because helm deep-merges the capabilities map
# (omitting `add` would inherit the chart default).
collectorCommon:
  alloy:
    securityContext:
      runAsNonRoot: true
      runAsUser: 4242
      seccompProfile:
        type: RuntimeDefault
    alloy:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add: []
          drop: [ALL]
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 4242
        seccompProfile:
          type: RuntimeDefault
      # Writable working dir for alloy's storagePath (default
      # /tmp/alloy) — needed because readOnlyRootFilesystem locks /.
      mounts:
        extra:
          - name: tmp-alloy
            mountPath: /tmp/alloy
    controller:
      volumes:
        extra:
          - name: tmp-alloy
            emptyDir: {}
