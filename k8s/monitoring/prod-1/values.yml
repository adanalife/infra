# KEEP-IN-SYNC: k8s/monitoring/{stage-1,prod-1}/values.yml
#
# Helm values for grafana/k8s-monitoring (chart v4.x). Ships the
# in-cluster collectors that fill the dashboards landed in
# terraform/stage-1/grafana-dashboards/:
#
#   - Alloy collectors → scrape pods + ship logs (via kube API) + cluster events
#   - kube-state-metrics → cluster/pod state metrics to Mimir
#   - kubelet + cAdvisor scrape (built into clusterMetrics)
#
# Host-level metrics (node-exporter) are installed separately into the
# `monitoring-host` namespace — Talos enforces PodSecurity baseline
# cluster-wide and node-exporter needs hostPath + hostNetwork, so it
# gets its own ns labeled `privileged`. This chart's workloads all stay
# under baseline.
#
# Credentials come from the grafana-cloud-metrics-write Secret in this
# namespace, materialized by the ExternalSecret in external-secret.yaml.
#
# Only delta from stage-1's values.yml is `cluster.name` — the shared
# Grafana Cloud stack uses this label to separate prod-1 data from
# stage-1's in dashboard filters.

cluster:
  name: prod-1

destinations:
  metrics:
    type: prometheus
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.metrics.data["PROMETHEUS_HOST"]) + "/api/prom/push"
    auth:
      type: basic
      usernameKey: PROMETHEUS_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

  logs:
    type: loki
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.logs.data["LOKI_HOST"]) + "/loki/api/v1/push"
    auth:
      type: basic
      usernameKey: LOKI_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  cadvisor:
    metricsTuning:
      includeMetrics:
        - container_cpu_cfs_throttled_seconds_total
        - container_oom_events_total
        - container_network_receive_errors_total
        - container_network_transmit_errors_total
  kube-state-metrics:
    metricsTuning:
      includeMetrics:
        - kube_pod_container_status_last_terminated_exitcode
        - kube_pod_status_scheduled
        - kube_namespace_created

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
    # Point hostMetrics at the externally-deployed node-exporter
    # (prometheus-community chart in the `monitoring-host` namespace
    # — see k8s/monitoring/node-exporter/). Without these, the chart
    # refuses to render: "The Linux host configuration requires a
    # connection to Node Exporter". The default would scrape the
    # chart's bundled node-exporter (which we disabled to keep this
    # namespace under baseline PSA).
    namespace: monitoring-host
    labelMatchers:
      app.kubernetes.io/name: prometheus-node-exporter
    metricsTuning:
      useIntegrationAllowList: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

# Pod logs via the Kubernetes API instead of tailing /var/log on the
# host. Trade-off: a tiny bit slower than reading log files directly,
# but doesn't require hostPath (and therefore namespace-privileged PSA).
# Keeps every collector under PodSecurity baseline.
podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-logs

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

telemetryServices:
  kube-state-metrics:
    deploy: true
  # node-exporter deploys separately into the `monitoring-host`
  # namespace via the prometheus-community/prometheus-node-exporter
  # chart — see Taskfile k8s:prod:platform:up. It's the only workload
  # we run that genuinely needs hostPath + hostNetwork; isolating it
  # in its own privileged-labeled namespace keeps the rest of
  # `monitoring` under baseline.
  node-exporter:
    deploy: false

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    # `clustered` is required by podLogsViaKubernetesApi — collectors
    # coordinate which pod's logs each replica reads via Alloy's
    # clustering, so a multi-replica DaemonSet doesn't duplicate-fetch
    # every pod's log stream through the kube API. The k8s-monitoring
    # chart's helm validation enforces this.
    #
    # `filesystem-log-reader` preset (the /var/log + docker-containers
    # hostPath mount set) was dropped when we switched off podLogsViaLoki.
    presets: [clustered, daemonset]
  alloy-singleton:
    presets: [singleton]

# Override the chart's default securityContext for all alloy collectors.
# The k8s-monitoring chart's `collectorCommon.alloy` block passes through
# to the underlying grafana/alloy subchart, which uses two distinct keys:
#
#   - `securityContext` at top level → POD-level PodSecurityContext
#   - `alloy.securityContext`         → CONTAINER-level SecurityContext
#
# PSA evaluates the container's capabilities. The chart's container
# default re-adds 14 of Docker's default caps (CHOWN, FOWNER, NET_RAW,
# etc.) after dropping ALL — NET_RAW is what made the collectors fail
# baseline. Alloy needs none of these for HTTP scrape + push to Grafana
# Cloud, so we override the container-level block too (doubled-`alloy`
# path) to drop ALL and add nothing back.
collectorCommon:
  alloy:
    # Pod-level PodSecurityContext. runAsNonRoot + runAsUser are the
    # baseline-respecting defaults the chart already wires; restating
    # so the override is explicit in one place.
    securityContext:
      runAsNonRoot: true
      runAsUser: 4242
      seccompProfile:
        type: RuntimeDefault
    # Container-level SecurityContext for the `alloy` container. This
    # is the load-bearing override — PSA reads capabilities from here.
    #
    # `add: []` is non-obvious but required: helm/yaml deep-merges the
    # `capabilities` map with the chart default rather than replacing
    # it, so omitting `add` keeps the chart's full Docker-default list
    # (including NET_RAW). Explicit empty list wipes the merge.
    alloy:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add: []
          drop: [ALL]
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 4242
        seccompProfile:
          type: RuntimeDefault
      # readOnlyRootFilesystem makes / read-only, but alloy needs a
      # writable working dir at `storagePath` (default /tmp/alloy) for
      # its remotecfg service + WAL. Mount an emptyDir specifically
      # there so the readonly root stays in place.
      mounts:
        extra:
          - name: tmp-alloy
            mountPath: /tmp/alloy
    controller:
      volumes:
        extra:
          - name: tmp-alloy
            emptyDir: {}
