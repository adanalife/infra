# KEEP-IN-SYNC: k8s/monitoring/{stage-1,prod-1}/values.yml
#
# Helm values for grafana/k8s-monitoring (chart v4.x). Ships the
# in-cluster collectors that fill the dashboards landed in
# terraform/stage-1/grafana-dashboards/:
#
#   - Alloy collectors → scrape pods + ship logs (via kube API) + cluster events
#   - kube-state-metrics → cluster/pod state metrics to Mimir
#   - kubelet + cAdvisor scrape (built into clusterMetrics)
#
# Host-level metrics (node-exporter) are installed separately into the
# `monitoring-host` namespace — Talos enforces PodSecurity baseline
# cluster-wide and node-exporter needs hostPath + hostNetwork, so it
# gets its own ns labeled `privileged`. This chart's workloads all stay
# under baseline.
#
# Credentials come from the grafana-cloud-metrics-write Secret in this
# namespace, materialized by the ExternalSecret in external-secret.yaml.
#
# Only delta from stage-1's values.yml is `cluster.name` — the shared
# Grafana Cloud stack uses this label to separate prod-1 data from
# stage-1's in dashboard filters.

cluster:
  name: prod-1

destinations:
  metrics:
    type: prometheus
    # PROMETHEUS_HOST in SM already includes the /api/prom path
    # (Grafana Cloud's "Prometheus" connection URL form). Only the
    # /push suffix needs adding.
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.metrics.data["PROMETHEUS_HOST"]) + "/push"
    auth:
      type: basic
      usernameKey: PROMETHEUS_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

  logs:
    type: loki
    urlFrom: convert.nonsensitive(remote.kubernetes.secret.logs.data["LOKI_HOST"]) + "/loki/api/v1/push"
    auth:
      type: basic
      usernameKey: LOKI_USERNAME
      passwordKey: TOKEN
    secret:
      create: false
      name: grafana-cloud-metrics-write
      namespace: monitoring

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  cadvisor:
    metricsTuning:
      includeMetrics:
        - container_cpu_cfs_throttled_seconds_total
        - container_oom_events_total
        - container_network_receive_errors_total
        - container_network_transmit_errors_total
  kube-state-metrics:
    metricsTuning:
      includeMetrics:
        - kube_pod_container_status_last_terminated_exitcode
        - kube_pod_status_scheduled
        - kube_namespace_created

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
    # Point hostMetrics at the externally-deployed node-exporter
    # (prometheus-community chart in the `monitoring-host` namespace
    # — see k8s/monitoring/node-exporter/). Without these, the chart
    # refuses to render: "The Linux host configuration requires a
    # connection to Node Exporter". The default would scrape the
    # chart's bundled node-exporter (which we disabled to keep this
    # namespace under baseline PSA).
    namespace: monitoring-host
    labelMatchers:
      app.kubernetes.io/name: prometheus-node-exporter
    metricsTuning:
      useIntegrationAllowList: true

clusterEvents:
  enabled: true
  collector: alloy-singleton

# Pod logs via the Kubernetes API instead of tailing /var/log on the
# host. Trade-off: a tiny bit slower than reading log files directly,
# but doesn't require hostPath (and therefore namespace-privileged PSA).
# Keeps every collector under PodSecurity baseline.
podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-logs

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

telemetryServices:
  kube-state-metrics:
    deploy: true
  # node-exporter deploys separately into the `monitoring-host`
  # namespace via the prometheus-community/prometheus-node-exporter
  # chart — see Taskfile k8s:prod:platform:up. It's the only workload
  # we run that genuinely needs hostPath + hostNetwork; isolating it
  # in its own privileged-labeled namespace keeps the rest of
  # `monitoring` under baseline.
  node-exporter:
    deploy: false

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
  alloy-logs:
    # `clustered` lets replicas partition pods between themselves so
    # podLogsViaKubernetesApi doesn't N-multiply kube-API log fetches.
    # `daemonset` keeps one collector per node for locality.
    presets: [clustered, daemonset]
  alloy-singleton:
    presets: [singleton]

# `collectorCommon.alloy` passes through to the underlying grafana/alloy
# subchart, which uses two distinct securityContext keys (the doubled
# `alloy.alloy` path is the container-level block — load-bearing for
# PSA, which reads capabilities from there).
#
# The chart's container default re-adds the full Docker capability set
# after dropping ALL, including NET_RAW — which is what fails Talos's
# baseline PSA enforcement. Alloy needs none of those caps for HTTP
# scrape + push, so we wipe the add list entirely. `add: []` is
# required explicitly because helm deep-merges the capabilities map
# (omitting `add` would inherit the chart default).
collectorCommon:
  alloy:
    securityContext:
      runAsNonRoot: true
      runAsUser: 4242
      seccompProfile:
        type: RuntimeDefault
    alloy:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add: []
          drop: [ALL]
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 4242
        seccompProfile:
          type: RuntimeDefault
      # Writable working dir for alloy's storagePath (default
      # /tmp/alloy) — needed because readOnlyRootFilesystem locks /.
      mounts:
        extra:
          - name: tmp-alloy
            mountPath: /tmp/alloy
    controller:
      volumes:
        extra:
          - name: tmp-alloy
            emptyDir: {}
