# Umbrella overlay for development when the cluster host is on the home LAN.
# Identical to k8s/overlays/development except vlc-server uses the NAS-backed
# dashcam overlay (development-nas) instead of the local hostPath overlay.
#
# Apply with: task k8s:dev:apply-nas
# Use development (task k8s:dev:apply) when away from the home network.
#
# Prerequisites:
#   - The directory holding the dashcam footage must be reachable on the
#     cluster host (the path is host-specific).
#   - The cluster must have been created with that path mounted at
#     `/host/nas-dashcam`, i.e. `task k8s:dev:cluster:up DASHCAM_NAS=<path>`
#     (k3d bind-mounts are fixed at create time, so rebuild to change it).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/postgres/overlays/local
  - ../../apps/tripbot/overlays/development
  - ../../apps/vlc-server/overlays/development-nas
  - ../../apps/onscreens-server/overlays/development-nas
  - ../../apps/obs/overlays/local
# The cloudflared Deployment (tunnel client for *.whalecore.com) is
# opt-in — bring it up with `task k8s:dev:tunnel:up`. It lives in
# its own `cloudflared` namespace and is no longer part of this
# umbrella.
