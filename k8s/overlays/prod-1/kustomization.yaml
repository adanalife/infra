# Umbrella overlay for the "prod-1 mode" — the adanalife-minipc
# Talos cluster running production workloads. `kubectl apply -k
# k8s/overlays/prod-1` brings up the full app stack against AWS SM
# values from the adanalife-prod account.
#
# Covers postgres (with backup CronJob), vlc-server, tripbot, and OBS.
#
# Cloudflare Tunnel is dropped per the bringup session — prod-1 has
# no public Ingress (tripbot is outbound-only, vlc-server is reachable
# via traefik+external-dns at vlc.prod.whereisdana.today).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod runs in its own `prod-1` namespace (was the cluster `default`),
# symmetric with stage-1. Co-tenancy on the mini-PC is now namespace +
# per-account ESO store, with no environment squatting in `default`.
namespace: prod-1

resources:
  # Per-env namespaced SecretStore (aws-secretsmanager) reading the
  # adanalife-prod account via prod's in-namespace eso-aws-credentials.
  - ../../external-secrets/namespace-store
  # Cross-cutting observability ExternalSecrets (OTLP + Sentry DSNs)
  # owned at the cluster level, not by any workload.
  # See vault/decisions/shared-secrets-not-owned-by-workload.md.
  - ../../shared-secrets/base
  # Namespaced cert-manager Issuers (+ DNS-01 Route53 creds) for the app
  # ingresses, so each env solves DNS-01 with its own account — no
  # cross-account. App ingresses use cert-manager.io/issuer; the
  # kube-system ClusterIssuers stay for the platform (hubble/traefik)
  # ingresses. Issuer/Secret only (no pods).
  - ../../cert-manager/app-issuer/prod-1
  - ../../apps/postgres/overlays/prod-1
  - ../../apps/vlc-server/overlays/prod-1
  - ../../apps/tripbot/overlays/prod-1
  - ../../apps/obs/overlays/prod-1
