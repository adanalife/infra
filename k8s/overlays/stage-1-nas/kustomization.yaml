# Umbrella overlay for stage-1 when the cluster host is on the home LAN.
# Identical to k8s/overlays/stage-1 except vlc-server uses the NAS-backed
# dashcam overlay (stage-1-nas) instead of the local hostPath overlay.
#
# Apply with: task k8s:stage:apply-nas
# Use stage-1 (task k8s:stage:apply) when away from the home network.
#
# Prerequisites:
#   - The NAS share that holds the dashcam footage must be mounted on the
#     cluster host. The mount path itself is host-specific (see
#     k3d-config.bees.local.yaml.example).
#   - k3d cluster must be running with `k3d-config.bees.local.yaml`
#     applied so the `/host/nas-dashcam` bind-mount exists on the k3d node
#     (rebuild after editing the local config).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/postgres/overlays/local
  - ../../apps/tripbot/overlays/stage-1
  - ../../apps/vlc-server/overlays/stage-1-nas
  - ../../apps/obs/overlays/local
# The cloudflared Deployment (tunnel client for *.whalecore.com) is
# opt-in — bring it up with `task k8s:stage:tunnel:up`. It lives in
# its own `cloudflared` namespace and is no longer part of this
# umbrella.
