# Umbrella overlay for the "development mode" — the local k3d cluster
# wired to a public Cloudflare Tunnel for *.whalecore.com plus
# external-dns + traefik for *.dev.whereisdana.today. `kubectl apply
# -k k8s/overlays/development` brings up the four-app stack.
#
# vlc-server and tripbot have graduated into their own
# apps/<app>/overlays/development so they can carry public Ingresses.
# postgres + obs continue to reuse their local overlays — postgres
# stays internal, obs only needs VNC port-forward access for now.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development runs in its own `development` namespace, symmetric with
# stage-1 and prod-1 — no environment squats in the cluster default.
namespace: development

resources:
  # Per-env namespaced SecretStore (aws-secretsmanager) reading the
  # adanalife-stage account via dev's in-namespace eso-aws-credentials.
  - ../../external-secrets/namespace-store
  # Cross-cutting observability ExternalSecrets (OTLP + Sentry DSNs)
  # owned at the cluster level, not by any workload.
  # See vault/decisions/shared-secrets-not-owned-by-workload.md.
  - ../../shared-secrets/base
  # Namespaced cert-manager Issuers (letsencrypt-route53 +
  # -staging-route53) + their Route53 creds, for app Ingress TLS via
  # DNS-01. Byte-identical to stage-1 (dev borrows the stage account).
  - ../../cert-manager/app-issuer/development
  - ../../apps/postgres/overlays/development
  - ../../apps/tripbot/overlays/development
  - ../../apps/vlc-server/overlays/development
  - ../../apps/obs-twitch/overlays/development
# Traefik is installed via helm by `task k8s:dev:platform:up` — see
# k8s/traefik/values.yml. Dashboard is reachable via port-forward
# only; not exposed through the Cloudflare Tunnel.
#
# The cloudflared Deployment (tunnel client for *.whalecore.com) is
# opt-in — bring it up with `task k8s:dev:tunnel:up`. It lives in
# its own `cloudflared` namespace and is no longer part of this
# umbrella.
