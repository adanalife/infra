# Local-only: enable traefik's dashboard / web UI on port 9000.
#
# The bundled k3d traefik comes up without --api.dashboard. This
# HelmChartConfig layers extra args onto the chart values so traefik
# starts with the dashboard enabled and exposes it on port 9000.
#
# Access:
#   - After cluster recreate: http://localhost:9000/dashboard/
#     (the trailing slash matters — traefik's dashboard handler is
#     strict about it)
#   - Without recreate: kubectl -n kube-system port-forward svc/traefik 9000:9000
#
# Don't apply this on prod — `--api.insecure=true` is fine for a
# local cluster but exposes the API without auth.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - "--api.insecure=true"
      - "--api.dashboard=true"
    ports:
      traefik:
        port: 9000
        exposedPort: 9000
        protocol: TCP
        expose:
          default: true
