# Umbrella overlay — `kubectl apply -k k8s/overlays/local` brings up
# the entire app stack (postgres, tripbot, vlc-server, obs) on a local
# k3d cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/postgres/overlays/local
  - ../../apps/tripbot/overlays/local
  - ../../apps/vlc-server/overlays/local
  - ../../apps/onscreens-server/overlays/local
  - ../../apps/obs/overlays/local
# Traefik dashboard is enabled via --api.insecure=true in the helm
# release values (k8s/traefik/values.yml). Reach it with:
#   kubectl -n kube-system port-forward svc/traefik 9000:9000
#   open http://localhost:9000/dashboard/
