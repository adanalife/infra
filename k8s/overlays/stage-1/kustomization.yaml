# Umbrella overlay for the "stage-1 mode" — the local k3d cluster
# wired to a public Cloudflare Tunnel for *.whalecore.com plus
# external-dns + traefik for *.stage.whereisdana.today. `kubectl apply
# -k k8s/overlays/stage-1` brings up the four-app stack PLUS the
# cloudflared Deployment that dials Cloudflare's edge.
#
# vlc-server and tripbot have graduated into their own
# apps/<app>/overlays/stage-1 so they can carry public Ingresses.
# postgres + obs continue to reuse their local overlays — postgres
# stays internal, obs only needs VNC port-forward access for now.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/postgres/overlays/local
  - ../../apps/tripbot/overlays/stage-1
  - ../../apps/vlc-server/overlays/stage-1
  - ../../apps/obs/overlays/local
  - ../../platform/cloudflared/overlays/stage-1
# Traefik is installed via helm by `task k8s:stage:platform:up` — see
# k8s/traefik/values.yml. Dashboard is reachable via port-forward
# only; not exposed through the Cloudflare Tunnel.
