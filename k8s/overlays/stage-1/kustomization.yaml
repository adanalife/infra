# Umbrella overlay for "stage-1 mode" — a staging environment co-tenanting
# the adanalife-minipc Talos cluster beside prod-1, in its own `stage-1`
# namespace. `kubectl apply -k k8s/overlays/stage-1` (via task
# k8s:stage:apply) brings up the stage app stack against AWS SM values
# from the adanalife-stage account.
#
# Co-tenancy model (see vault/decisions/k8s-platform-stack.md):
#   - Reuses prod's platform stack (traefik / ESO / external-dns /
#     cert-manager / monitoring) — no second install.
#   - Namespace isolation: everything lands in `stage-1` (the `namespace`
#     field below); prod runs in its own `prod-1` namespace.
#   - Secret isolation: stage's in-namespace `aws-secretsmanager`
#     SecretStore (../../external-secrets/namespace-store) reads the
#     adanalife-stage account via stage's eso-aws-credentials. A namespaced
#     store is unreachable from other namespaces, so isolation is
#     structural — and EVERY ExternalSecret references it identically, so
#     there's no per-env store name and no repoint patch.
#
# Full app set: shared observability secrets + postgres + tripbot
# (outbound-only) + vlc-server + OBS (both on the shared iGPU at low
# quality, streaming off by default).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stage-1

resources:
  # Per-env namespaced SecretStore (aws-secretsmanager) reading the
  # adanalife-stage account via stage's in-namespace eso-aws-credentials.
  - ../../external-secrets/namespace-store
  # Cross-cutting observability ExternalSecrets (OTLP + Sentry DSNs).
  - ../../shared-secrets/base
  # Namespaced cert-manager Issuers (+ DNS-01 Route53 creds) for the app
  # ingresses, so stage solves DNS-01 with the adanalife-stage account —
  # no cross-account. Mirror of prod-1. App ingresses use
  # cert-manager.io/issuer. Issuer/Secret only (no pods).
  - ../../cert-manager/app-issuer/stage-1
  - ../../apps/postgres/overlays/stage-1
  - ../../apps/tripbot/overlays/stage-1
  - ../../apps/vlc-server/overlays/stage-1
  - ../../apps/onscreens-server/overlays/stage-1
  - ../../apps/obs/overlays/stage-1
