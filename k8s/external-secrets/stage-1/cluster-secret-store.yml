# Stage-1 ESO store — reads the adanalife-stage AWS account, locked to the
# `stage-1` namespace. Co-tenants the mini-PC Talos cluster beside prod's
# `aws-secretsmanager` store (adanalife-prod account, applied from
# k8s/external-secrets/prod-1/). The two stores are isolated at two layers:
#
#   1. Separate AWS accounts — these creds (eso-aws-credentials-stage, from
#      the adanalife-stage account) can only read that account's k8s/* SM
#      secrets; prod's creds can only read prod's. Cross-account read is
#      impossible at the IAM layer.
#   2. namespaceSelector below — only ExternalSecrets in the `stage-1`
#      namespace may consume this store, so prod workloads can't reach the
#      stage account through it.
#
# (Hardening the *prod* store symmetrically — rename → aws-secretsmanager-prod
# + lock to its namespace — is deferred; see infra TODO. Until then a stage
# ExternalSecret must reference this store by name, never `aws-secretsmanager`.)
#
# The eso-aws-credentials-stage Secret this references is applied directly by
# `task k8s:stage:bootstrap-secrets`; see Taskfile.yml.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager-stage
spec:
  conditions:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: stage-1
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: eso-aws-credentials-stage
            key: AWS_ACCESS_KEY_ID
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: eso-aws-credentials-stage
            key: AWS_SECRET_ACCESS_KEY
            namespace: external-secrets
