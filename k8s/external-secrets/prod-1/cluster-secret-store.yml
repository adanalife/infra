# KEEP-IN-SYNC: k8s/external-secrets/{development,prod-1}/cluster-secret-store.yml
#
# Cluster-scoped store so ExternalSecret resources in any namespace
# (kube-system, default, future apps/*) can reference the same backing
# AWS Secrets Manager identity without duplicating per-namespace store
# config. The bootstrap Secret lives alongside ESO in
# external-secrets, NOT in the consumer namespaces — it's only the ESO
# controller pods that read it.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: eso-aws-credentials
            key: AWS_ACCESS_KEY_ID
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: eso-aws-credentials
            key: AWS_SECRET_ACCESS_KEY
            namespace: external-secrets
