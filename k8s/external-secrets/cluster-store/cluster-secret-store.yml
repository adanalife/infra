# Cluster-scoped store for PLATFORM components only (external-dns,
# cert-manager, grafana-k8s-monitoring) whose ExternalSecrets live in
# kube-system — a namespace no app overlay owns. Named
# `aws-secretsmanager-cluster` to stay visibly distinct from the
# namespaced `aws-secretsmanager` SecretStore the apps use (the two are
# different kinds, but the distinct name keeps the split obvious).
#
# Reads creds from external-secrets/eso-aws-credentials — the cluster
# owner's account (adanalife-prod on the mini-PC, adanalife-stage on the
# dev cluster). Applied by `task k8s:<env>:platform:up`.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager-cluster
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: eso-aws-credentials
            key: AWS_ACCESS_KEY_ID
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: eso-aws-credentials
            key: AWS_SECRET_ACCESS_KEY
            namespace: external-secrets
