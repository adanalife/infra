# LAN IP pool for LoadBalancer services on adanalife-minipc.
#
# 192.168.1.210-219 — 10 IPs, outside the router's DHCP pool. The first
# IP (.210) lands on the only LB service today (traefik). Future LB
# services (e.g. a Postgres replica, a separate ingress class, etc.)
# claim the next IPs in order.
#
# When the box moves to Maine, update this range to match the Maine
# router's DHCP-pool-exclusion zone — same idea, different network.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.210-192.168.1.219
