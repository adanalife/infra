# Advertise the default-pool via L2 (ARP). MetalLB's speaker DaemonSet
# replies to ARP queries for the pool's IPs, so any LAN host can route
# packets to them. No router config needed.
#
# For multi-node clusters, MetalLB elects one speaker as the announcer
# for each IP — failover happens within seconds if the elected node
# goes down. On single-node we just have the one option.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - default-pool
