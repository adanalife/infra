apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# external-dns lives in the env's dedicated platform namespace (not
# kube-system, not the app namespace) so `kubectl get pods -n prod-1`
# shows only application pods. Mirrored by k8s/external-dns/stage-1.
namespace: prod-1-platform

resources:
  - namespace.yml
  # Namespaced aws-parameterstore SecretStore (byte-identical across
  # envs; reads the prod account via prod-1-platform's eso-aws-credentials,
  # seeded by `task k8s:prod:bootstrap-secrets`).
  - ../../external-secrets/namespace-store
  - external-secret.yml
