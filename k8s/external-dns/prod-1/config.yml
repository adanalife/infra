# KEEP-IN-SYNC: k8s/external-dns/{prod-1,stage-1}/config.yml
#
# Helm values for the upstream external-dns chart at
# https://kubernetes-sigs.github.io/external-dns/. Applied by
# `task k8s:prod:platform:up`, sequenced after the ExternalSecret materialises
# the `external-dns-aws-credentials` Secret in kube-system.
#
# Same shape as stage-1's; the deltas are `domainFilters` (prod subdomain) and
# `txtOwnerId` (so the prod + stage controllers don't fight over the zone
# registry). development is NOT in sync — it targets the host's public IP via a
# per-machine values.local.yml (home network, no minipc pointer).

# Limit reconcile to the prod-1 zone delegated from core. external-dns
# discovers the zone ID by name via ListHostedZones — no need to hardcode.
domainFilters:
  - prod.whereisdana.today

# Logical owner ID for the TXT registry records external-dns writes
# alongside each managed record. Lets multiple controllers share a zone
# safely; nothing else cares about the value.
txtOwnerId: external-dns-prod-1
txtPrefix: edns-

provider:
  name: aws

# ESO populates `external-dns-aws-credentials` with a `credentials` key
# in AWS shared-credentials INI format. Mount it at the conventional
# path and point AWS_SHARED_CREDENTIALS_FILE at it. AWS_DEFAULT_REGION
# is needed because the credentials INI doesn't include a region
# (and Route53 is global but the SDK still requires one to be set).
env:
  - name: AWS_SHARED_CREDENTIALS_FILE
    value: /etc/aws/credentials
  - name: AWS_DEFAULT_REGION
    value: us-east-1
extraVolumes:
  - name: aws-credentials
    secret:
      secretName: external-dns-aws-credentials
extraVolumeMounts:
  - name: aws-credentials
    mountPath: /etc/aws
    readOnly: true

# Default target for every managed record: the stable LAN pointer
# minipc.whereisdana.today (a CNAME in the whereisdana.today apex zone, managed
# by terraform/core/minipc-dns.tf, pointing at whichever per-location A record
# is active). So every *.prod.whereisdana.today Ingress without its own
# `external-dns.alpha.kubernetes.io/target` annotation gets a CNAME to the
# pointer — and a physical-network move is a one-line change in terraform/core
# (repoint the pointer), with zero cluster churn here.
#
# --force-default-targets makes external-dns ignore the target traefik stamps
# into Ingress.status and always use --default-targets above.
#
# This list is committed here (not in a per-machine values.local.yml) because
# the target is now a stable name, not the node's IP. Helm REPLACES lists rather
# than merging, so external-dns must be installed with this file as the sole
# source of extraArgs — `task k8s:{prod,stage}:platform{,-env}:up` no longer
# layers a values.local.yml.
extraArgs:
  - --default-targets=minipc.whereisdana.today
  - --force-default-targets

# Reap records when their owning Ingress is deleted.
policy: sync

interval: 1m
logLevel: info

# Pod-level prometheus.io/* annotations let grafana-k8s-monitoring's
# annotationAutodiscovery feature scrape external-dns's metrics endpoint
# (same port as the service; chart defaults to 7979). Mirrors the
# pattern used in k8s/traefik/values.yml.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"
