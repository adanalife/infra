# ESO-managed Secret for external-dns. Pulls the AWS access key + secret
# stored in `k8s/external-dns/aws-credentials` (SSM Parameter Store) and
# synthesises the AWS shared-credentials INI format that external-dns
# reads via its mounted `credentials` file (see config.yml extraVolumes).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-aws-credentials
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore-cluster
    kind: ClusterSecretStore
  target:
    name: external-dns-aws-credentials
    template:
      type: Opaque
      data:
        credentials: |
          [default]
          aws_access_key_id = {{ .accessKey }}
          aws_secret_access_key = {{ .secretKey }}
  data:
    - secretKey: accessKey
      remoteRef:
        key: /k8s/external-dns/aws-credentials
        property: access-key
    - secretKey: secretKey
      remoteRef:
        key: /k8s/external-dns/aws-credentials
        property: secret-key
