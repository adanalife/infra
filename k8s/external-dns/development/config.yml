# Helm values for the upstream external-dns chart at
# https://kubernetes-sigs.github.io/external-dns/. Applied by
# `task k8s:dev:platform:up`, sequenced after the ExternalSecret materialises
# the `external-dns-aws-credentials` Secret in kube-system.
#
# We were on bitnami/external-dns originally but Bitnami restructured
# their free-tier image registry and stopped publishing the tags the
# chart referenced. Upstream chart + image is the more stable path.

# Limit reconcile to the development zone delegated from core. external-dns
# discovers the zone ID by name via ListHostedZones — no need to hardcode.
domainFilters:
  - dev.whereisdana.today

# Logical owner ID for the TXT registry records external-dns writes
# alongside each managed record. Lets multiple controllers share a zone
# safely; nothing else cares about the value.
txtOwnerId: external-dns-development
txtPrefix: edns-

provider:
  name: aws

# ESO populates `external-dns-aws-credentials` with a `credentials` key
# in AWS shared-credentials INI format. Mount it at the conventional
# path and point AWS_SHARED_CREDENTIALS_FILE at it. AWS_DEFAULT_REGION
# is needed because the credentials INI doesn't include a region
# (and Route53 is global but the SDK still requires one to be set).
env:
  - name: AWS_SHARED_CREDENTIALS_FILE
    value: /etc/aws/credentials
  - name: AWS_DEFAULT_REGION
    value: us-east-1
extraVolumes:
  - name: aws-credentials
    secret:
      secretName: external-dns-aws-credentials
extraVolumeMounts:
  - name: aws-credentials
    mountPath: /etc/aws
    readOnly: true

# NOTE: extraArgs lives in values.local.yml (generated by
# `task k8s:dev:bootstrap-secrets`), not here. Helm doesn't merge YAML lists —
# it replaces them — so any extraArgs here would be wiped by the
# per-machine override. values.local.yml is the single source of truth
# for external-dns's flag list (including --default-targets).

# Reap records when their owning Ingress is deleted. Important on a
# learning cluster where Ingresses come and go a lot.
policy: sync

interval: 1m
logLevel: info

# Pod-level prometheus.io/* annotations let grafana-k8s-monitoring's
# annotationAutodiscovery feature scrape external-dns's metrics endpoint
# (same port as the service; chart defaults to 7979). Mirrors the
# pattern used in k8s/traefik/values.yml.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"
