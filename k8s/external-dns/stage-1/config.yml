# KEEP-IN-SYNC: k8s/external-dns/{prod-1,stage-1}/config.yml
#
# Helm values for the upstream external-dns chart. Installed by
# `task k8s:stage:apply` into the stage-1-platform namespace, after the
# ExternalSecret materialises external-dns-aws-credentials there.
#
# Same shape as prod-1's; the deltas are `domainFilters` (stage subdomain)
# and `txtOwnerId` (so the prod + stage controllers don't fight over the
# zone registry).

# Limit reconcile to the stage zone delegated to the adanalife-stage
# account. external-dns discovers the zone ID by name via ListHostedZones.
domainFilters:
  - stage.whereisdana.today

# Logical owner ID for the TXT registry records external-dns writes
# alongside each managed record. Distinct from prod's so the two
# controllers never claim each other's records.
txtOwnerId: external-dns-stage-1
txtPrefix: edns-

provider:
  name: aws

# ESO populates external-dns-aws-credentials (in stage-1-platform) with a
# `credentials` key in AWS shared-credentials INI format — sourced from
# the adanalife-stage account. Mount it and point
# AWS_SHARED_CREDENTIALS_FILE at it.
env:
  - name: AWS_SHARED_CREDENTIALS_FILE
    value: /etc/aws/credentials
  - name: AWS_DEFAULT_REGION
    value: us-east-1
extraVolumes:
  - name: aws-credentials
    secret:
      secretName: external-dns-aws-credentials
extraVolumeMounts:
  - name: aws-credentials
    mountPath: /etc/aws
    readOnly: true

# Default target for every managed record: the stable LAN pointer
# minipc.whereisdana.today (a CNAME in the whereisdana.today apex zone, managed
# by terraform/core/minipc-dns.tf, pointing at whichever per-location A record
# is active). So every *.stage.whereisdana.today Ingress without its own
# `external-dns.alpha.kubernetes.io/target` annotation gets a CNAME to the
# pointer — and a physical-network move is a one-line change in terraform/core
# (repoint the pointer), with zero cluster churn here.
#
# --force-default-targets makes external-dns ignore the target traefik stamps
# into Ingress.status and always use --default-targets above.
#
# This list is committed here (not in a per-machine values.local.yml) because
# the target is a stable name, not the node's IP. Helm REPLACES lists rather
# than merging, so external-dns must be installed with this file as the sole
# source of extraArgs — nothing layers a values.local.yml on top.
extraArgs:
  - --default-targets=minipc.whereisdana.today
  - --force-default-targets

# Reap records when their owning Ingress is deleted.
policy: sync

interval: 1m
logLevel: info

# Pod-level prometheus.io/* annotations so grafana-k8s-monitoring's
# annotationAutodiscovery scrapes external-dns's metrics endpoint.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"
