---
apiVersion: rbac.authorization.k8s.io/v1beta1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - verbs:
      - get
      - watch
      - list
    apiGroups:
      - ''
    resources:
      - services
      - pods
      - nodes
  - verbs:
      - get
      - watch
      - list
    apiGroups:
      - extensions
    resources:
      - ingresses
