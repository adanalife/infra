# KEEP-IN-SYNC: k8s/external-dns/{prod-1,stage-1}/external-secret.yml
# (byte-identical — each is stamped into its own *-1-platform namespace
# by its kustomization and reads its own account via that namespace's
# eso-aws-credentials). development/ stays on the kube-system cluster
# store: it's a single-env cluster with no co-tenancy to isolate.
#
# ESO-managed Secret for external-dns. Pulls the AWS access key + secret
# stored in `k8s/external-dns/aws-credentials` (AWS Secrets Manager) and
# synthesises the AWS shared-credentials INI format that external-dns
# reads via its mounted `credentials` file (see config.yml extraVolumes).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-aws-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Namespaced store in this same *-1-platform namespace — reads the
    # env's own AWS account, so no cross-account access is needed.
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: external-dns-aws-credentials
    template:
      type: Opaque
      data:
        credentials: |
          [default]
          aws_access_key_id = {{ .accessKey }}
          aws_secret_access_key = {{ .secretKey }}
  data:
    - secretKey: accessKey
      remoteRef:
        key: k8s/external-dns/aws-credentials
        property: access-key
    - secretKey: secretKey
      remoteRef:
        key: k8s/external-dns/aws-credentials
        property: secret-key
