apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# external-dns lives in the env's dedicated platform namespace (not
# kube-system, not the app namespace) so `kubectl get pods -n stage-1`
# shows only application pods. Mirror of k8s/external-dns/prod-1.
namespace: stage-1-platform

resources:
  - namespace.yml
  # Namespaced aws-parameterstore SecretStore (byte-identical across
  # envs; reads the stage account via stage-1-platform's
  # eso-aws-credentials, seeded by `task k8s:stage:bootstrap-secrets`).
  - ../../external-secrets/namespace-store
  - external-secret.yml
