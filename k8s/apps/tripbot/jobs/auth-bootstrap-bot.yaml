# ESO-wired auth-bootstrap Job for the BOT account — shared by every
# credentialed environment (prod-1, stage-1). Applied per-env via
# `task tripbot:<env>:auth:bootstrap:bot` with `-n <namespace>`; NOT part
# of any umbrella overlay (it's a one-shot interactive workflow that would
# burn its 5-minute Twitch-callback timeout on every apply).
#
# Env-agnostic: it `envFrom`s the namespace's `tripbot-config` (a stable,
# non-hashed name) for all config values + the ESO-materialized Secrets by
# their fixed names. The same file therefore bootstraps prod (in default)
# and stage (in stage-1) — only the `-n` differs. The broadcaster account
# has a sibling Job (auth-bootstrap-broadcaster.yaml); both must be
# bootstrapped for subscriber/follower polling + real-time EventSub.
apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap-bot
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: auth-bootstrap
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/auth-bootstrap"]
          args: ["--account=bot"]
          # Port 8080 is the OAuth callback listener; the task port-forwards
          # it to localhost so the browser redirect lands here. EXTERNAL_URL
          # (http://localhost:8080) comes from tripbot-config.
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-twitch-creds
                optional: false
            - secretRef:
                name: tripbot-database-creds
                optional: false
            - secretRef:
                name: tripbot-google-maps-api-key
                optional: false
