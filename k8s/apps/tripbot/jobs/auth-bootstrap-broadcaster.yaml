# ESO-wired auth-bootstrap Job for the BROADCASTER account — shared by
# every credentialed environment. Applied per-env via
# `task tripbot:<env>:auth:bootstrap:broadcaster` with `-n <namespace>`.
# Sibling of auth-bootstrap-bot.yaml — see it for the env-agnostic /
# not-in-umbrella rationale.
#
# The broadcaster leg requests broadcaster scopes (channel:read:subscriptions,
# moderator:read:followers, user:edit:broadcast) and writes a row keyed by
# CHANNEL_NAME to oauth_tokens. cmd/auth-bootstrap's identity check refuses
# to write the row if the wrong account signs in.
apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap-broadcaster
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: auth-bootstrap
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/auth-bootstrap"]
          args: ["--account=broadcaster"]
          ports:
            - containerPort: 8080
          # See auth-bootstrap-bot.yaml: the OAuth callback must return to this
          # port-forwarded pod, so EXTERNAL_URL is pinned to localhost:8080 and
          # overrides tripbot-config's #557 ingress host.
          env:
            - name: EXTERNAL_URL
              value: http://localhost:8080
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-twitch-creds
                optional: false
            - secretRef:
                name: tripbot-database-creds
                optional: false
            - secretRef:
                name: tripbot-google-maps-api-key
                optional: false
