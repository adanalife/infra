# tripbot development overlay — the k3d cluster (adanalife-bees). Same
# pure-ESO shape as stage-1/prod-1 (extends base), reading the
# adanalife-stage account; dev borrows stage's Twitch identity
# (tripbot4000 / adanalife_staging), so dev and stage must not be live at
# once (see vault/infra/TODO.md). It differs from stage only by the env
# tags + its Ingress host.
#
# Non-secret config that used to hide in secret.env (CHANNEL_NAME,
# BOT_USERNAME, EXTERNAL_URL, GOOGLE_APPS_PROJECT_ID) now lives here in the
# configMap; the actual secrets come from ESO via base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=staging
      - CHANNEL_NAME=adanalife_staging
      - BOT_USERNAME=tripbot4000
      # Internal Traefik Ingress host, matching prod/stage so the OAuth
      # round-trip + logged reauth_url (tripbot#625) work on-LAN with no
      # port-forward. external-dns publishes the record at the bees host's
      # LAN IP; cert-manager issues a real cert via DNS-01 (no inbound
      # needed). The :9443 suffix is the one divergence from prod/stage —
      # k3d's traefik LB is mapped to host :9443 (Colima can't bind :443
      # without sudo), so both the reauth_url and the Twitch /auth/callback
      # redirect_uri must carry the port. The matching Redirect URL
      # (…:9443/auth/callback) must be registered in the shared stage
      # Twitch app's dev console.
      - EXTERNAL_URL=https://tripbot.dev.whereisdana.today:9443
      - GOOGLE_APPS_PROJECT_ID=tripbot-stage
      - OTEL_SDK_DISABLED=true
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=development,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=development

patches:
  # Internal-IP Ingress for tripbot's web UI at tripbot.dev.whereisdana.today
  # — external-dns publishes the record at the bees host's LAN IP, so it's
  # LAN-only. cert-manager issues via DNS-01 against the namespaced
  # letsencrypt-route53 Issuer (app-issuer/development). Same shape as
  # prod/stage; served on traefik's :9443 entrypoint (k3d port mapping).
  - target:
      kind: Ingress
      name: tripbot
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: tripbot.dev.whereisdana.today
      - op: add
        path: /metadata/annotations
        value:
          external-dns.alpha.kubernetes.io/hostname: tripbot.dev.whereisdana.today
          cert-manager.io/issuer: letsencrypt-route53
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - tripbot.dev.whereisdana.today
            secretName: tripbot-tls

# Development rolls forward continuously off the develop branch — every push
# to tripbot's develop branch republishes adanalife/tripbot:develop (multi-arch
# manifest at tripbot's .github/workflows/release-development.yml). Prod
# stays on the base's :latest, which only moves on release-tag pushes.
images:
  - name: adanalife/tripbot
    newTag: develop
