# Shared ESO base for the credentialed environments (prod-1, stage-1).
# Both extend this instead of base directly, so the ESO wiring lives in
# ONE place and prod/stage differ only by their config VALUES (the
# configMapGenerator merge in each child overlay) and their
# database-external-secret's store name. Anything that should be the same
# across prod and stage lives here.
#
# Extends base and:
#   - drops the Ingress (outbound-only — EventSub uses the WebSocket
#     transport, no public callback URL needed)
#   - drops the base seed + auth-bootstrap Jobs (they envFrom the
#     secret.env-style tripbot-secret, which credentialed envs don't have;
#     the ESO-wired equivalents run via tasks, not on apply)
#   - swaps the Deployment's tripbot-secret envFrom for the ESO Secret set
#     (tripbot-database-creds + the runtime credentials). References Secret
#     NAMES only, so it's identical for prod and stage; the per-env
#     database-external-secret materializes tripbot-database-creds from the
#     right account.
#
# The leading underscore marks this as a non-deployable intermediate (not
# an environment) — never applied directly; only extended.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Outbound-only — drop the Ingress.
  - target:
      kind: Ingress
      name: tripbot
    patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: tripbot

  # Drop the base seed Job — credentialed envs seed (if at all) via a task,
  # not on every apply.
  - target:
      kind: Job
      name: tripbot-seed
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: tripbot-seed

  # Drop the base auth-bootstrap Job — interactive one-shot; runs via a
  # dedicated task instead of on every apply.
  - target:
      kind: Job
      name: tripbot-auth-bootstrap
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: tripbot-auth-bootstrap

  # Swap the base's tripbot-secret envFrom (sourced from gitignored
  # secret.env, which credentialed envs don't use) for the ESO Secret set.
  # All required — the pod fails to start if any are missing, surfacing
  # misconfiguration loudly. Both the migrate init container and the main
  # container get the DB creds; the main container also gets the runtime
  # credentials.
  - target:
      kind: Deployment
      name: tripbot
    patch: |-
      - op: remove
        path: /spec/template/spec/initContainers/0/envFrom/1
      - op: remove
        path: /spec/template/spec/containers/0/envFrom/1
      - op: add
        path: /spec/template/spec/initContainers/0/envFrom/-
        value:
          secretRef:
            name: tripbot-database-creds
            optional: false
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: grafana-cloud-otlp
            optional: false
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: sentry-tripbot
            optional: false
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: tripbot-twitch-creds
            optional: false
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: tripbot-google-maps-api-key
            optional: false
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: tripbot-database-creds
            optional: false
