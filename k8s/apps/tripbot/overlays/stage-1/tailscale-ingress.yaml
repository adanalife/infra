# Tailnet-native exposure of the stage tripbot dashboard via the Tailscale
# operator (same operator that serves prod-1). Additive — the traefik Ingress
# (tripbot.stage.whereisdana.today, on-LAN) stays. Gives
# https://tripbot-stage.<tailnet>.ts.net, reachable from ANY network.
# Backend is the tripbot web port (8080: dashboard + /auth/*).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripbot-ts
  namespace: stage-1
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: tripbot
      port:
        number: 8080
  tls:
    - hosts:
        - tripbot-stage
