# tripbot stage-1 overlay. Same shape as prod-1: extends base (the
# canonical ESO/production shape), so this file is just stage's config
# VALUES. The only differences from prod are the literals below.
#
# Identity: bot tripbot4000 in channel adanalife_staging (the same Twitch
# identity the development env borrows — so dev and stage must not be live
# at once; see vault/infra/TODO.md).
#
# Pre-reqs:
# - shared-secrets applied via the stage-1 umbrella (Sentry + OTLP)
# - the stage account's tripbot twitch-creds + google-maps-api-key +
#   postgres/credentials SM containers populated (see terraform/stage-1)
# - the namespaced aws-secretsmanager SecretStore + eso-aws-credentials
#   present in the stage-1 namespace (umbrella + bootstrap)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=staging
      - CHANNEL_NAME=adanalife_staging
      - BOT_USERNAME=tripbot4000
      - EXTERNAL_URL=http://localhost:8080
      - GOOGLE_APPS_PROJECT_ID=tripbot-stage
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=stage-1,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=stage-1

patches:
  # Internal-IP Ingress for tripbot's web UI at tripbot.stage.whereisdana.today
  # — LAN-only via external-dns at the mini-PC IP, cert-manager DNS-01. Same
  # shape as prod, only the hostname differs.
  - target:
      kind: Ingress
      name: tripbot
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: tripbot.stage.whereisdana.today
      - op: add
        path: /metadata/annotations
        value:
          external-dns.alpha.kubernetes.io/hostname: tripbot.stage.whereisdana.today
          external-dns.alpha.kubernetes.io/target: 192.168.1.200
          cert-manager.io/cluster-issuer: letsencrypt-route53
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - tripbot.stage.whereisdana.today
            secretName: tripbot-tls
