# tripbot stage-1 overlay. Same shape as prod-1: extends the shared ESO
# base (../_eso), so this file is just stage's config VALUES plus its
# database-external-secret (which names the stage store directly). The
# only differences from prod are the values below.
#
# Identity: bot tripbot4000 in channel adanalife_staging (the same Twitch
# identity the development/k3d env borrows — so dev and stage must not be
# live at once; see vault/infra/TODO.md).
#
# Outbound-only like prod (Ingress dropped in ../_eso); EventSub uses the
# WebSocket transport, so no public callback URL is needed. The seed +
# auth-bootstrap Jobs run via tasks, not on apply.
#
# Pre-reqs:
# - shared-secrets applied via the stage-1 umbrella (Sentry + OTLP)
# - the stage account's tripbot_twitch_creds + tripbot_google_maps_api_key
#   SM containers populated (already exist; see terraform/stage-1)
# - postgres stage-1 overlay applied + k8s/postgres/credentials populated
#   (terraform-owned; database-external-secret reads it)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../_eso
  # stage DATABASE_* materialization from k8s/postgres/credentials, via
  # the stage store (named directly — not routed through the umbrella patch).
  - database-external-secret.yaml

configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=staging
      - CHANNEL_NAME=adanalife_staging
      - BOT_USERNAME=tripbot4000
      - EXTERNAL_URL=http://localhost:8080
      - GOOGLE_APPS_PROJECT_ID=tripbot-stage
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=stage-1,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=stage-1
