# Tripbot's database credentials for stage-1. Reads from the same SM
# container as the postgres workload's ExternalSecret
# (k8s/postgres/credentials, terraform-owned in the adanalife-stage
# account) but materializes the values under DATABASE_USER / DATABASE_PASS
# / DATABASE_DB keys — tripbot's config package expects DATABASE_* env
# vars while the postgres image expects POSTGRES_*. One SM container, two
# materializations, no key collision.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tripbot-database-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-stage
    kind: ClusterSecretStore
  target:
    name: tripbot-database-creds
    template:
      type: Opaque
      data:
        DATABASE_USER: "{{ .user }}"
        DATABASE_PASS: "{{ .password }}"
        DATABASE_DB: "{{ .db }}"
  data:
    - secretKey: user
      remoteRef:
        key: k8s/postgres/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: k8s/postgres/credentials
        property: password
    - secretKey: db
      remoteRef:
        key: k8s/postgres/credentials
        property: db
