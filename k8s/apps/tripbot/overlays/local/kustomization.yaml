apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The laptop overlay — the ONE place secret.env survives, and only for the
# local disposable Postgres DB creds (DATABASE_*). Everything else (Twitch,
# Maps, Sentry, OTLP) comes from ESO via base, exactly like the cloud envs.
# So this overlay: (1) builds tripbot-secret from the DB-only secret.env,
# (2) swaps the DB envFrom from the ESO tripbot-database-creds to that
# secret, (3) drops the ESO database-external-secret (no cloud DB locally),
# (4) reroutes the Ingress to tripbot.localhost, and (5) re-adds the
# secret.env-wired seed + auth-bootstrap Jobs that run on apply for laptop
# convenience.
resources:
  - ../../base
  - seed-job.yaml
  - auth-job.yaml

# secret.env is gitignored — copy from secret.env.example. DB creds only.
secretGenerator:
  - name: tripbot-secret
    envs:
      - secret.env

# Non-secret config (was partly hiding in secret.env). ENV=staging matches
# the borrowed stage identity; the env tags split this machine out in
# Sentry/Tempo/Loki.
configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=staging
      - CHANNEL_NAME=adanalife_staging
      - BOT_USERNAME=tripbot4000
      - EXTERNAL_URL=http://tripbot.localhost
      - GOOGLE_APPS_PROJECT_ID=tripbot-stage
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=development,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=development

patches:
  # Local Ingress hostname — tripbot.localhost resolves to 127.0.0.1 via
  # the .localhost TLD, hitting traefik on port 80.
  - target:
      kind: Ingress
      name: tripbot
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: tripbot.localhost
  # DB creds come from the on-disk secret.env (tripbot-secret), not the ESO
  # tripbot-database-creds — the laptop Postgres uses its local password.
  # base's envFrom has tripbot-database-creds at index 1 of both containers.
  - target:
      kind: Deployment
      name: tripbot
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/envFrom/1/secretRef/name
        value: tripbot-secret
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: tripbot-secret
  # Drop the ESO DB ExternalSecret — the laptop has no cloud Postgres.
  - target:
      kind: ExternalSecret
      name: tripbot-database-creds
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: tripbot-database-creds
