apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # ExternalSecret pulling Grafana Cloud OTLP creds from AWS SM. The
  # materialized Secret is consumed by an envFrom patch below and by
  # vlc-server's overlay.
  - external-secret.yaml
  # ExternalSecret pulling tripbot's Sentry DSN from AWS SM
  # (k8s/sentry-tripbot). Materialized Secret is named `sentry` and
  # envFrom'd by the Deployment patch below.
  - sentry-external-secret.yaml
  # ExternalSecret pulling tripbot's Twitch credentials (chat IRC +
  # Helix API) from AWS SM (k8s/tripbot/twitch-creds). Materialized
  # Secret is named `tripbot-twitch-creds` and envFrom'd by the
  # Deployment patch below — overrides the placeholder Twitch values
  # from secret.env once ESO has reconciled.
  - twitch-external-secret.yaml
  # ExternalSecret pulling tripbot's Google Maps API key from AWS SM
  # (k8s/tripbot/google-maps-api-key). Materialized Secret is named
  # `tripbot-google-maps-api-key` and envFrom'd by the Deployment patch
  # below — overrides the `stub` placeholder in secret.env once ESO
  # has reconciled.
  - google-maps-external-secret.yaml

# secret.env is gitignored — copy from secret.env.example.
secretGenerator:
  - name: tripbot-secret
    envs:
      - secret.env

# Merge environment-specific values into the base ConfigMap. ENV is
# what tripbot's main package checks at startup; without it the bot
# refuses to boot. The OTEL_* defaults turn the SDK on for stage-1; the
# OTLP endpoint + auth header arrive via the grafana-cloud-otlp Secret
# (envFrom patch below).
configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=staging
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=stage-1,service.namespace=tripbot

patches:
  # Local Ingress hostname — `tripbot.localhost` resolves to 127.0.0.1
  # on most systems via the .localhost TLD, hitting traefik on port 80.
  - target:
      kind: Ingress
      name: tripbot
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: tripbot.localhost
  # Inject the Grafana Cloud OTLP env vars (endpoint + headers) from the
  # ExternalSecret-managed Secret. optional:true keeps the pod running
  # while ESO is still reconciling — pkg/telemetry treats a missing
  # endpoint as "OTel disabled," so the worst case is no traces, not a
  # crash loop.
  - target:
      kind: Deployment
      name: tripbot
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: grafana-cloud-otlp
            optional: true
  # Inject SENTRY_DSN from the ExternalSecret-managed `sentry-tripbot`
  # Secret. optional:true so the pod stays up while ESO reconciles;
  # pkg/errors treats an unset DSN as "Sentry disabled," which is also
  # the dev default per vault/tripbot/credentials.md.
  - target:
      kind: Deployment
      name: tripbot
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: sentry-tripbot
            optional: true
  # Inject Twitch credentials (TWITCH_CLIENT_ID, TWITCH_CLIENT_SECRET,
  # TWITCH_AUTH_TOKEN) from the ExternalSecret-managed
  # `tripbot-twitch-creds` Secret. optional:true so the pod stays up
  # while ESO reconciles. Appended last so the real values from SM
  # override any stub Twitch values still in the secretGenerator-built
  # `tripbot-secret` (later envFrom entries win).
  - target:
      kind: Deployment
      name: tripbot
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: tripbot-twitch-creds
            optional: true
  # Inject GOOGLE_MAPS_API_KEY from the ExternalSecret-managed
  # `tripbot-google-maps-api-key` Secret. optional:true so the pod
  # stays up while ESO reconciles — the bot boots with the `stub`
  # value from secret.env (required:"true" in config) and switches
  # to the real key on the next pod restart after ESO syncs. Stub
  # works for `!location` to no-op gracefully; real Geocoding calls
  # need the real key.
  - target:
      kind: Deployment
      name: tripbot
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: tripbot-google-maps-api-key
            optional: true
