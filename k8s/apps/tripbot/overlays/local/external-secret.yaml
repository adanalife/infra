# ExternalSecret materializes the Grafana Cloud OTLP credentials into a
# k8s Secret in the default namespace, sourced from AWS Secrets Manager
# via the cluster-wide aws-secretsmanager ClusterSecretStore. Owned by
# tripbot's overlay because tripbot is the primary OTel consumer;
# vlc-server's deployment patch in its own overlay envFroms the same
# materialized Secret.
#
# The remote SM value is JSON; dataFrom.extract pulls each top-level key
# (OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_HEADERS, …) into a
# matching Secret key, so consumers can `envFrom: secretRef:` without
# enumerating each variable here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-otlp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-otlp
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/grafana-cloud-otlp
