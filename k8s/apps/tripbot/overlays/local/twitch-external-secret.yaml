# ExternalSecret for tripbot's Twitch credentials (chat IRC + Helix
# API). Sourced from AWS Secrets Manager (k8s/tripbot/twitch-creds) via
# the cluster-wide aws-secretsmanager ClusterSecretStore. The remote SM
# value is a JSON blob; dataFrom.extract pulls each top-level key
# (TWITCH_CLIENT_ID, TWITCH_CLIENT_SECRET, TWITCH_AUTH_TOKEN) into a
# matching key on the materialized Secret so the Deployment can
# `envFrom: secretRef:` without spelling each var here.
#
# The materialized Secret is named `tripbot-twitch-creds` and is wired
# into the Deployment via an envFrom patch in kustomization.yaml with
# optional:true — the bot already pulls Twitch values from the
# secretGenerator-produced `tripbot-secret` (see secret.env.example), so
# while ESO reconciles the ExternalSecret-managed Secret takes
# precedence (later envFrom entries override earlier ones).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tripbot-twitch-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: tripbot-twitch-creds
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/tripbot/twitch-creds
