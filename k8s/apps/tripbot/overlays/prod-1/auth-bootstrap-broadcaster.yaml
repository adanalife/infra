# Standalone prod-1 auth-bootstrap Job for the BROADCASTER account
# (adanalife_). Applied via `task tripbot:prod:auth:bootstrap:broadcaster`.
# Sibling of auth-bootstrap.yaml (the bot leg) — see that file for the
# umbrella-overlay rationale and the env-literal mirror-the-ConfigMap
# convention.
#
# The broadcaster leg requests BroadcasterScopes
# (channel:read:subscriptions, moderator:read:followers,
# user:edit:broadcast) and writes a row keyed by CHANNEL_NAME
# (adanalife_) to oauth_tokens. cmd/auth-bootstrap's identity check
# refuses to write the row if the wrong account signs in.
apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap-broadcaster
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: auth-bootstrap
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/auth-bootstrap"]
          args: ["--account=broadcaster"]
          ports:
            - containerPort: 8080
          env:
            # Config-package-required env (mirror of tripbot-config in
            # the prod-1 ConfigMap merge).
            - name: ENV
              value: production
            - name: CHANNEL_NAME
              value: adanalife_
            - name: BOT_USERNAME
              value: tripbot4000
            - name: EXTERNAL_URL
              value: http://localhost:8080
            - name: GOOGLE_APPS_PROJECT_ID
              value: tripbot-prod
            - name: VLC_SERVER_HOST
              value: vlc-server:8080
            - name: ONSCREENS_SERVER_HOST
              value: vlc-server:8081
            - name: DATABASE_HOST
              value: postgres
          envFrom:
            - secretRef:
                name: tripbot-twitch-creds
                optional: false
            - secretRef:
                name: tripbot-database-creds
                optional: false
            - secretRef:
                name: tripbot-google-maps-api-key
                optional: false
