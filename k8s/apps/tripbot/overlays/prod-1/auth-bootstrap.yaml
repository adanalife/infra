# Standalone prod-1 auth-bootstrap Job. Applied directly via
# `task tripbot:prod:auth:bootstrap` — NOT part of the prod-1 umbrella
# overlay because this is a one-shot interactive workflow that
# shouldn't run on every `task k8s:prod:apply` (it'd burn its 5-minute
# Twitch-callback timeout each time).
#
# Config flows via direct env: entries rather than envFrom configMapRef
# so the manifest can be applied with raw `kubectl apply -f` — the
# kustomize-generated ConfigMap (tripbot-config-<hash>) wouldn't resolve
# in that path. ESO-materialized Secrets keep their declared names, so
# envFrom secretRef works without hash gymnastics.
#
# The env: literals here are kept in sync with the prod-1 ConfigMap
# merge in kustomization.yaml by convention — both need to change
# together for values like CHANNEL_NAME or BOT_USERNAME.
apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: auth-bootstrap
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/auth-bootstrap"]
          ports:
            - containerPort: 8080
          env:
            # Config-package-required env (mirror of tripbot-config in
            # the prod-1 ConfigMap merge).
            - name: ENV
              value: production
            - name: CHANNEL_NAME
              value: adanalife_
            - name: BOT_USERNAME
              value: tripbot4000
            - name: EXTERNAL_URL
              value: http://localhost:8080
            - name: GOOGLE_APPS_PROJECT_ID
              value: tripbot-prod
            - name: VLC_SERVER_HOST
              value: vlc-server:8080
            - name: ONSCREENS_SERVER_HOST
              value: vlc-server:8081
            - name: DATABASE_HOST
              value: postgres
          envFrom:
            - secretRef:
                name: tripbot-twitch-creds
                optional: false
            - secretRef:
                name: tripbot-database-creds
                optional: false
            - secretRef:
                name: tripbot-google-maps-api-key
                optional: false
