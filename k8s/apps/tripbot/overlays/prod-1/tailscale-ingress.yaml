# Tailnet-native exposure of the tripbot dashboard via the Tailscale operator.
# Additive — the traefik Ingress (tripbot.prod.whereisdana.today, on-LAN) stays.
# Gives https://tripbot-prod.<tailnet>.ts.net, reachable from ANY network
# (collision-proof, unlike the 192.168.1.x subnet-route path). Backend is the
# tripbot web port (8080: dashboard at /, plus /auth/*).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripbot-ts
  namespace: prod-1
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: tripbot
      port:
        number: 8080
  tls:
    - hosts:
        - tripbot-prod
