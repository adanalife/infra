# tripbot prod-1 overlay. Extends the shared ESO base (../_eso) — which
# carries all the wiring common to credentialed envs — so this file is
# just prod's config VALUES plus its database-external-secret (which names
# the prod store). stage-1 is the same shape; the two differ only here.
#
# Pre-reqs (all satisfied by `task k8s:prod:apply`):
# - k8s/shared-secrets/base applied (owns the Sentry + OTLP ExternalSecrets)
# - k8s/tripbot/twitch-creds + k8s/tripbot/google-maps-api-key SM containers
#   populated in the adanalife-prod account
# - postgres prod-1 overlay applied (database-external-secret reads the same
#   k8s/postgres/credentials SM container)
#
# Tripbot is outbound-only in prod (Ingress dropped in ../_eso); the seed +
# auth-bootstrap Jobs run via tasks, not on apply.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../_eso
  # prod DATABASE_* materialization from k8s/postgres/credentials.
  - database-external-secret.yaml

configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=production
      - CHANNEL_NAME=adanalife_
      - BOT_USERNAME=tripbot4000
      - EXTERNAL_URL=http://localhost:8080
      - GOOGLE_APPS_PROJECT_ID=tripbot-prod
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod-1,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=prod-1
