# tripbot prod-1 overlay. Extends base (the canonical ESO/production shape)
# and adds only prod's config VALUES — stage-1 is the same shape, the two
# differ only by the literals below.
#
# Pre-reqs (all satisfied by `task k8s:prod:apply` + bootstrap):
# - k8s/shared-secrets/base applied (Sentry + OTLP ExternalSecrets)
# - the adanalife-prod account's tripbot twitch-creds + google-maps-api-key
#   + postgres/credentials SM containers populated
# - the namespaced aws-secretsmanager SecretStore + eso-aws-credentials
#   present in the prod-1 namespace (umbrella + bootstrap)
#
# EXTERNAL_URL is the internal Traefik Ingress host (same as the per-env host
# patch below) so the OAuth round-trip — and the reauth_url tripbot logs when a
# token is missing (tripbot#625) — work from any on-LAN browser without a
# port-forward. It's LAN-only (external-dns publishes the mini-PC IP); the
# /auth/callback URL must be registered as a Redirect URL in the Twitch dev
# console. The seed + auth-bootstrap Jobs run via tasks, not on apply.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - tailscale-ingress.yaml

configMapGenerator:
  - name: tripbot-config
    behavior: merge
    literals:
      - ENV=production
      - CHANNEL_NAME=adanalife_
      - BOT_USERNAME=tripbot4000
      - EXTERNAL_URL=https://tripbot.prod.whereisdana.today
      - GOOGLE_APPS_PROJECT_ID=tripbot-prod
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod-1,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=prod-1
      # NATS pubsub endpoint (phase 1 — fire-and-forget alongside HTTP).
      - NATS_URL=nats://nats.prod-1-platform.svc.cluster.local:4222
      # DISCORD_GUILD_ID intentionally unset until launch — pkg/discord.ShouldStart
      # skips Discord init when this is empty, keeping the prod bot gated off
      # while the staging bot iterates. Flip on at launch by adding:
      #   - DISCORD_GUILD_ID=607964164220125258
      # then `kubectl -n prod-1 rollout restart deploy/tripbot` (tripbot-config
      # is non-hashed per stage-prod-cotenancy ADR). See vault runbook.

patches:
  # Internal-IP Ingress for tripbot's web UI at tripbot.prod.whereisdana.today
  # — external-dns publishes the record at the mini-PC LAN IP, so it's
  # LAN-only. cert-manager issues via DNS-01. Same shape as vlc/obs prod.
  - target:
      kind: Ingress
      name: tripbot
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: tripbot.prod.whereisdana.today
      - op: add
        path: /metadata/annotations
        value:
          external-dns.alpha.kubernetes.io/hostname: tripbot.prod.whereisdana.today
          cert-manager.io/issuer: letsencrypt-route53
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - tripbot.prod.whereisdana.today
            secretName: tripbot-tls
