# ExternalSecret for tripbot's Google Maps API key. Sourced from AWS
# Secrets Manager (k8s/tripbot/google-maps-api-key) via the cluster-wide
# aws-secretsmanager ClusterSecretStore. The remote SM value is a JSON
# blob; dataFrom.extract pulls the GOOGLE_MAPS_API_KEY top-level key
# into a matching key on the materialized Secret so the Deployment can
# `envFrom: secretRef:` without spelling the var here.
#
# The materialized Secret is named `tripbot-google-maps-api-key` and is
# wired into the Deployment via an envFrom patch in kustomization.yaml
# with optional:true — secret.env carries a `stub` placeholder so the
# bot can boot (required:"true" in pkg/config/tripbot/type.go) before
# ESO has reconciled; once it does, the later envFrom overrides with
# the real key.
#
# Retire path: when GOOGLE_MAPS_API_KEY drops out of tripbot's runtime
# config (the `!location` chat handler is the last live caller), delete
# this file, the SM container in terraform, and the envFrom patch in
# kustomization.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tripbot-google-maps-api-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: tripbot-google-maps-api-key
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/tripbot/google-maps-api-key
