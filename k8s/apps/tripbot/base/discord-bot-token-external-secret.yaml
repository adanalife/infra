# ExternalSecret for the live Discord bot token consumed by pkg/discord
# at runtime. Sourced from AWS Secrets Manager (k8s/tripbot/discord-bot-token)
# via the namespaced aws-secretsmanager SecretStore. The materialized
# Secret is named `tripbot-discord-bot-token` and is wired into the
# Deployment via envFrom in deployment.yaml as DISCORD_BOT_TOKEN.
#
# pkg/discord.ShouldStart skips Discord init when this is the placeholder
# string OR when DISCORD_GUILD_ID is unset in the env's ConfigMap, so
# leaving either unconfigured per env is the supported way to keep the
# bot gated off.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tripbot-discord-bot-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: tripbot-discord-bot-token
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: k8s/tripbot/discord-bot-token
