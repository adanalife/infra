apiVersion: v1
kind: ConfigMap
metadata:
  name: tripbot-config
data:
  # Non-secret defaults — mirrors tripbot/infra/docker/env.docker, with
  # service hosts swapped from compose names (db, vlc) to k8s service
  # names (postgres, vlc-server).
  READ_ONLY: "false"
  VERBOSE: "false"
  DASHCAM_DIR: /opt/data/Dashcam
  MAPS_OUTPUT_DIR: /opt/data/maps
  RUN_DIR: /opt/data/run
  DATABASE_HOST: postgres
  DISABLE_TWITCH_WEBHOOKS: "true"
  TRIPBOT_SERVER_PORT: "8080"
  VLC_SERVER_HOST: vlc-server:8080
