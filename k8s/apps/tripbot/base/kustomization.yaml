apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - seed-job.yaml

# tripbot-config holds non-secret env defaults that mirror
# tripbot/infra/docker/env.docker, with service hosts swapped from
# compose names (db, vlc) to k8s service names (postgres, vlc-server).
# Overlays merge environment-specific values (ENV, GOOGLE_*, etc.).
configMapGenerator:
  - name: tripbot-config
    literals:
      - READ_ONLY=false
      - VERBOSE=false
      - MAPS_OUTPUT_DIR=/opt/data/maps
      - DATABASE_HOST=postgres
      - DISABLE_TWITCH_WEBHOOKS=true
      - TRIPBOT_SERVER_PORT=8080
      - VLC_SERVER_HOST=vlc-server:8080

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: tripbot
      app.kubernetes.io/part-of: tripbot
