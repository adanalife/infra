apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - seed-job.yaml
  - auth-job.yaml
  # ExternalSecrets for workload-specific tripbot creds. The
  # aws-secretsmanager ClusterSecretStore is env-routed by the
  # cluster's own AWS creds, so the same manifest reads from
  # adanalife-stage SM in stage clusters and adanalife-prod SM in
  # prod clusters.
  - twitch-external-secret.yaml
  - google-maps-external-secret.yaml

# tripbot-config holds non-secret env defaults that mirror
# tripbot/infra/docker/env.docker, with service hosts swapped from
# compose names (db, vlc) to k8s service names (postgres, vlc-server).
# Overlays merge environment-specific values (ENV, GOOGLE_*, etc.).
configMapGenerator:
  - name: tripbot-config
    # Stable name (no hash suffix) so the standalone, raw-`kubectl apply`d
    # auth-bootstrap / seed Jobs can `envFrom` it by a fixed name instead of
    # duplicating its values as inline env: literals. Trade-off: a config
    # value change no longer auto-rolls the Deployment via a new hash — edit
    # then `kubectl rollout restart deploy/tripbot`. (vlc-server-config /
    # obs-config keep their hashes; only tripbot-config needs the fixed name.)
    options:
      disableNameSuffixHash: true
    literals:
      - READ_ONLY=false
      - VERBOSE=false
      - MAPS_OUTPUT_DIR=/opt/data/maps
      - DATABASE_HOST=postgres
      - TRIPBOT_SERVER_PORT=8080
      - VLC_SERVER_HOST=vlc-server:8080
      - ONSCREENS_SERVER_HOST=vlc-server:8081

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: tripbot
      app.kubernetes.io/part-of: tripbot
