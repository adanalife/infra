apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripbot
  template:
    metadata:
      labels:
        app: tripbot
    spec:
      # Pod runs fully PodSecurity-restricted compliant: the tripbot and
      # migrate images are static CGO_ENABLED=0 Go binaries (+ the migrate
      # CLI) that need no root, no volumes, and no Linux capabilities.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Run db migrations to head before tripbot starts. Same image as
      # the main container — tripbot v2.3.1+ bakes the migrate CLI and
      # db/migrate/*.sql into the image. `migrate up` is idempotent, so
      # at-head runs are a no-op (~1-2s). On a fresh cluster, this is
      # what populates the schema before LoadFromDB runs in the main
      # container.
      initContainers:
        - name: migrate
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["migrate"]
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable"
            - "up"
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-database-creds
      containers:
        - name: tripbot
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # USER must be set so OTel SDK's default resource detector
          # (user.Current() in detect-process) doesn't crash telemetry
          # initialization. tripbot is a static CGO_ENABLED=0 binary running
          # as uid 65532 with no /etc/passwd entry — without $USER the
          # detector returns "error detecting resource: user: Current
          # requires cgo or $USER set in environment" and OTel disables
          # itself entirely (no metrics, no traces).
          env:
            - name: USER
              value: "tripbot"
          # All secrets come from ESO (the namespaced aws-secretsmanager
          # SecretStore). The laptop `local` overlay swaps the DB creds for
          # its on-disk secret.env password; everything else stays ESO even
          # there. Most are required — a missing Secret fails the pod loudly.
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: grafana-cloud-otlp
            - secretRef:
                name: sentry-tripbot
            - secretRef:
                name: tripbot-twitch-creds
            - secretRef:
                name: tripbot-google-maps-api-key
            # Optional: tripbot handles a missing DISCORD_ALERTS_WEBHOOK by
            # silently skipping the Discord post (see pkg/chatbot/commands.go).
            # Envs that don't provision the SM container — e.g. stage-1 — just
            # don't get alerts, which is the intent.
            - secretRef:
                name: tripbot-discord-alerts-webhook
                optional: true
            # Optional: pkg/discord.ShouldStart skips Discord init when the
            # token is the SM placeholder OR DISCORD_GUILD_ID is unset, so
            # missing/placeholder values just keep the bot gated off rather
            # than blocking pod startup.
            - secretRef:
                name: tripbot-discord-bot-token
                optional: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
