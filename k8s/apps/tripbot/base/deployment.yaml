apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripbot
  template:
    metadata:
      labels:
        app: tripbot
    spec:
      containers:
        - name: tripbot
          image: adanalife/tripbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
