apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripbot
  template:
    metadata:
      labels:
        app: tripbot
    spec:
      # Pod runs fully PodSecurity-restricted compliant: the tripbot and
      # migrate images are static CGO_ENABLED=0 Go binaries (+ the migrate
      # CLI) that need no root, no volumes, and no Linux capabilities.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Run db migrations to head before tripbot starts. Same image as
      # the main container — tripbot v2.3.1+ bakes the migrate CLI and
      # db/migrate/*.sql into the image. `migrate up` is idempotent, so
      # at-head runs are a no-op (~1-2s). On a fresh cluster, this is
      # what populates the schema before LoadFromDB runs in the main
      # container.
      initContainers:
        - name: migrate
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["migrate"]
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable"
            - "up"
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-database-creds
      containers:
        - name: tripbot
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # All secrets come from ESO (the namespaced aws-secretsmanager
          # SecretStore). The laptop `local` overlay swaps the DB creds for
          # its on-disk secret.env password; everything else stays ESO even
          # there. All required — a missing Secret fails the pod loudly.
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: grafana-cloud-otlp
            - secretRef:
                name: sentry-tripbot
            - secretRef:
                name: tripbot-twitch-creds
            - secretRef:
                name: tripbot-google-maps-api-key
            - secretRef:
                name: tripbot-discord-alerts-webhook
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
