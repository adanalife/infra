# ExternalSecret for the Discord webhook URL that tripbot's reportCmd
# POSTs viewer reports to. Sourced from AWS Secrets Manager
# (k8s/tripbot/discord-alerts-webhook) via the namespaced
# aws-secretsmanager SecretStore. The materialized Secret is named
# `tripbot-discord-alerts-webhook` and is wired into the Deployment via
# envFrom in deployment.yaml as DISCORD_ALERTS_WEBHOOK.
#
# Same URL is used terraform-side for the Grafana Cloud Discord contact
# point (see infra/terraform/stage-1/grafana-alerts.tf) — populate both
# the stage-1 and prod-1 SM containers with the same webhook URL.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tripbot-discord-alerts-webhook
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: tripbot-discord-alerts-webhook
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_ALERTS_WEBHOOK
      remoteRef:
        key: k8s/tripbot/discord-alerts-webhook
