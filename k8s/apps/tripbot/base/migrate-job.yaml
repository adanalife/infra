# Triggered by `task k8s:migrate` in infra/Taskfile.yml (which is wired
# into `task k8s:apply:stage-1`). Intentionally NOT in the sibling
# kustomization.yaml's resources list: `kubectl apply` refuses
# generateName (no stable identity to reconcile against), so this Job
# is created out-of-band via `kubectl create -f` each time, leaving the
# overlay reconcile path clean. ttlSecondsAfterFinished cleans the old
# Job rows up after an hour.
apiVersion: batch/v1
kind: Job
metadata:
  generateName: tripbot-migrate-
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: tripbot-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          command: ["migrate"]
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable"
            - "up"
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-secret
