# Local k3d overlay. No NATS (the laptop has no platform NATS — the
# subscriber is a graceful no-op when NATS_URL is unset). ENV=staging mirrors
# the vlc-server + tripbot local overlays: the binary's config validator only
# accepts {staging,production,development}, and ENV is the env segment of the
# tripbot.<env>.onscreens.middle.show NATS subject — it MUST match the
# chatbot publisher's ENV (also "staging" in dev) or middle-text events miss.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

configMapGenerator:
  - name: onscreens-server-config
    behavior: merge
    literals:
      - ENV=staging
      - OTEL_SDK_DISABLED=true
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=development,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=development
