# development-nas umbrella variant. onscreens-server has no dashcam volume,
# so the NAS-vs-hostPath distinction (which only affects vlc-server) is
# irrelevant here — this overlay is identical to development. It exists so the
# development-nas umbrella can reference an env-matched overlay path,
# symmetric with the other apps.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../development
