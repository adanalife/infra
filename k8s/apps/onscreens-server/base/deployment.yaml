apiVersion: apps/v1
kind: Deployment
metadata:
  name: onscreens-server
spec:
  replicas: 1
  strategy:
    # RollingUpdate maxSurge=1 / maxUnavailable=0: the new pod must pass its
    # readiness probe before the old one terminates. onscreens-server is a
    # stateless HTTP service (overlay state is in-memory and rebuilt on boot;
    # OBS browser sources re-poll /onscreens/state.json), so a brief overlap is
    # harmless and a failed rollout leaves the old pod serving.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: onscreens-server
  template:
    metadata:
      labels:
        app: onscreens-server
    spec:
      # PodSecurity-restricted hardening (mirrors vlc-server): seccomp +
      # no-privesc + drop all caps. Nothing here needs capabilities. Unlike
      # vlc-server this image has no libvlc/iGPU/syslog, so runAsNonRoot is a
      # reasonable follow-up once the pidfile path is confirmed writable by a
      # non-root user.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: onscreens-server
          image: adanalife/onscreens-server:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          # ENV + telemetry tags via the configmap; SENTRY_DSN + OTLP
          # endpoint/headers via the shared observability ExternalSecrets
          # (applied by the env umbrella). onscreens-server reuses the
          # sentry-vlc-server DSN for now — a dedicated sentry-onscreens-server
          # project is a follow-up.
          envFrom:
            - configMapRef:
                name: onscreens-server-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          # Writable scratch for the pidfile (RUN_DIR defaults to
          # /opt/data/run); tmpfs is sufficient — nothing here is durable.
          volumeMounts:
            - name: run
              mountPath: /opt/data/run
      volumes:
        - name: run
          emptyDir: {}
