apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs
spec:
  replicas: 1
  strategy:
    # Recreate avoids two OBS pods racing for the same Xvfb display
    # and VNC port during rollout — the OBS process owns stateful
    # local resources that don't survive an overlapping handoff.
    type: Recreate
  selector:
    matchLabels:
      app: obs
  template:
    metadata:
      labels:
        app: obs
    spec:
      containers:
        - name: obs
          image: adanalife/obs:latest
          imagePullPolicy: Always
          ports:
            - name: vnc
              containerPort: 5900
          envFrom:
            - configMapRef:
                name: obs-config
            # obs-secret existence + content IS the streaming toggle:
            # `task obs-stream-on` creates it with STREAM_KEY pulled from
            # AWS Secrets Manager; `task obs-stream-off` deletes it. The
            # OBS entrypoint checks `-n "${STREAM_KEY:-}"` to decide
            # whether to add --startstreaming to obs args. optional=true
            # means the pod boots in idle mode (VNC-only) when the
            # Secret is absent.
            - secretRef:
                name: obs-secret
                optional: true
          # OBS has no HTTP surface — exec the existing healthcheck.sh
          # which validates: (1) obs process alive, (2) X server up,
          # (3) no safe-mode crash-dialog modal blocking the canvas.
          # Crash-dialog detection is the load-bearing one: OBS process
          # is up but pinned behind a modal until a human dismisses it
          # — only a pod restart unsticks it.
          # initialDelay 60s covers Xvfb + OBS + scene-load startup.
          livenessProbe:
            exec:
              command: ["/opt/obs/healthcheck.sh"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            # 3Gi instead of 2Gi: OBS's preview canvas tips it over
            # 2Gi when enabled. Preview is normally disabled for the
            # actual stream, so keeping the headroom modest.
            limits:
              memory: 3Gi
