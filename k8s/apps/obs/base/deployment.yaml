apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs
spec:
  replicas: 1
  strategy:
    # Recreate avoids two OBS pods racing for the same Xvfb display
    # and VNC port during rollout — the OBS process owns stateful
    # local resources that don't survive an overlapping handoff.
    type: Recreate
  selector:
    matchLabels:
      app: obs
  template:
    metadata:
      labels:
        app: obs
    spec:
      # Partial PodSecurity-restricted hardening: seccomp + no-privesc +
      # drop all caps. OBS listens only on high ports (5900/4455/6080) and
      # reaches the iGPU as root via device-node owner bits, so it needs no
      # Linux capabilities. runAsNonRoot is deferred — it needs a Dockerfile
      # rework in the tripbot repo (non-root user, Xvfb/VNC + render-group
      # GID) + live GPU verification, tracked as a follow-up.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: obs
          image: adanalife/obs:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: vnc
              containerPort: 5900
            - name: websocket
              containerPort: 4455
            # noVNC (websockify) — browser VNC client, fronted by the
            # Ingress in the prod-1 overlay.
            - name: novnc
              containerPort: 6080
            # obs-server — small Flask app exposing /health/ready,
            # /version, POST /admin/shutdown so the admin panel can
            # treat OBS like vlc-server / onscreens-server.
            - name: obs-server
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: obs-config
            # obs-stream-key existence + content IS the streaming toggle:
            # `task obs:{stage,prod}:stream:on` creates it with STREAM_KEY
            # pulled from AWS Secrets Manager; `task obs:{stage,prod}:stream:off`
            # deletes it. The OBS entrypoint checks `-n "${STREAM_KEY:-}"` to decide
            # whether to add --startstreaming to obs args. optional=true
            # means the pod boots in idle mode (VNC-only) when the
            # Secret is absent.
            - secretRef:
                name: obs-stream-key
                optional: true
          # Exec the in-image healthcheck.sh — OBS has no HTTP surface.
          # Catches the safe-mode crash-dialog (modal blocks the canvas;
          # only a pod restart unsticks it), the failure mode this probe
          # exists for.
          livenessProbe:
            exec:
              command: ["/opt/obs/healthcheck.sh"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            # 3Gi instead of 2Gi: OBS's preview canvas tips it over
            # 2Gi when enabled. Preview is normally disabled for the
            # actual stream, so keeping the headroom modest.
            limits:
              memory: 3Gi
