apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs
spec:
  replicas: 1
  strategy:
    # Recreate avoids two OBS pods racing for the same Xvfb display
    # and VNC port during rollout — the OBS process owns stateful
    # local resources that don't survive an overlapping handoff.
    type: Recreate
  selector:
    matchLabels:
      app: obs
  template:
    metadata:
      labels:
        app: obs
    spec:
      containers:
        - name: obs
          image: adanalife/obs:latest
          imagePullPolicy: Always
          ports:
            - name: vnc
              containerPort: 5900
          envFrom:
            - configMapRef:
                name: obs-config
            # obs-secret existence + content IS the streaming toggle:
            # `task obs-stream-on` creates it with STREAM_KEY pulled from
            # AWS Secrets Manager; `task obs-stream-off` deletes it. The
            # OBS entrypoint checks `-n "${STREAM_KEY:-}"` to decide
            # whether to add --startstreaming to obs args. optional=true
            # means the pod boots in idle mode (VNC-only) when the
            # Secret is absent.
            - secretRef:
                name: obs-secret
                optional: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            # 3Gi instead of 2Gi: OBS's preview canvas tips it over
            # 2Gi when enabled. Preview is normally disabled for the
            # actual stream, so keeping the headroom modest.
            limits:
              memory: 3Gi
