apiVersion: v1
kind: ConfigMap
metadata:
  name: obs-config
data:
  DASHCAM_RTSP_URL: rtsp://vlc-server:8554/dashcam
  # Base URL for the browser_source onscreens that onscreens-server serves.
  # entrypoint.sh envsubst's this into Tripbot.json.tmpl so each
  # browser_source's `url` field becomes fully qualified. Without
  # it, URLs render as relative ("/onscreens/...") and CEF can't
  # resolve them, so onscreens never appear on the OBS canvas.
  ONSCREENS_URL_BASE: http://vlc-server:8081
  # Base URL for the next-frame cover layer that vlc-server serves at
  # /next-frame.html. Same envsubst pathway as ONSCREENS_URL_BASE — the
  # entrypoint expands the placeholder in Tripbot.json.tmpl so the
  # browser_source has a fully qualified URL.
  VLC_URL_BASE: http://vlc-server:8080
  OBS_WEBSOCKET_PASSWD: adanalife
