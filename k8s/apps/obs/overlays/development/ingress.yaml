# Browser noVNC Ingress for dev OBS at obs.dev.whereisdana.today. Same
# dev pattern as vlc-server's dev ingress: external-dns reconciles the
# hostname into a Route53 record pointing at the dev cluster's target (from
# external-dns --default-targets / values.local.yml — the dev box's LAN IP,
# NOT the mini-PC's). HTTP-only until the dev port-forward lands; flip the
# cert-manager annotation + tls block on then. No auth — keep LAN-only.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obs
  annotations:
    external-dns.alpha.kubernetes.io/hostname: obs.dev.whereisdana.today
    # cert-manager.io/cluster-issuer: letsencrypt-staging-route53
spec:
  ingressClassName: traefik
  # tls:
  #   - hosts:
  #       - obs.dev.whereisdana.today
  #     secretName: obs-tls
  rules:
    - host: obs.dev.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs
                port:
                  name: novnc
