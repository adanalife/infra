apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - host-access.yaml

# obs-stream-key is created/deleted imperatively by
# `task obs:{stage,prod}:stream:{on,off}` from the Taskfile, NOT via
# kustomize. The
# Secret's existence + content is the Twitch streaming toggle (see the
# OBS deployment's envFrom for the rationale). Pulling STREAM_KEY out
# of kustomize means an apply of this overlay never accidentally
# clobbers the running stream state.

configMapGenerator:
  - name: obs-config
    behavior: merge
    literals:
      - OBS_QUALITY_PRESET=low
