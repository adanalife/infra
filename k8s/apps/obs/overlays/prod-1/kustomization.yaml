# OBS prod-1 overlay. Extends base + adds an Ingress for browser VNC.
#
# OBS's VNC is now reachable in a browser: the image runs websockify +
# noVNC on :6080, and ingress.yaml fronts the obs Service's novnc port
# through traefik at obs.prod.whereisdana.today (LAN-only — see ingress.yaml).
# Raw VNC (5900) and the websocket (4455) stay cluster-internal; the
# websocket is what vlc-server/onscreens-server poll for stream stats.
#
# Streaming is ON by default in prod: stream-key-external-secret.yaml
# pulls STREAM_KEY from the adanalife-prod SM account via ESO, so
# `task k8s:prod:apply` (and every post-wipe bring-up) materializes the
# `obs-stream-key` Secret and OBS starts streaming on its own. Toggle it
# off with `task obs:prod:stream:off` (deletes the ExternalSecret +
# Secret); back on with `task obs:prod:stream:on` (re-applies the
# ExternalSecret) — see Taskfile.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml
  - tailscale-ingress.yaml
  - stream-key-external-secret.yaml

# OBS_QUALITY_PRESET=high is explicit even though `high` is the
# entrypoint default — the manifest tells the full story.
#
# OBS_STREAM_ENCODER=ffmpeg_vaapi opts this overlay into VAAPI
# hardware encode via the iGPU. Entrypoint default is x264 so development
# (k3d on a Mac laptop, no /dev/dri) stays on software encode without
# surprise.
configMapGenerator:
  - name: obs-config
    behavior: merge
    literals:
      # TEMPORARY (prod-only): keep OBS browser sources pointed at the in-pod
      # onscreens process on vlc-server:8081 rather than the new standalone
      # onscreens-server (base default, already live on dev/stage). Cutting
      # over to onscreens-server:8080 requires an OBS restart to reload
      # Tripbot.json, which interrupts the live stream — so prod stays on the
      # old path until a maintenance window. The onscreens-server Deployment
      # still runs in prod, just unrouted. Remove this (and the vlc-server +
      # tripbot prod overrides) when prod cuts over. See #621.
      - ONSCREENS_URL_BASE=http://vlc-server:8081
      - OBS_QUALITY_PRESET=high
      # OBS exposes the VAAPI H.264 encoder as `ffmpeg_vaapi_tex`, not
      # `ffmpeg_vaapi` — verified empirically by reading the Available
      # Encoders list from a running pod. The bare name silently falls
      # back to x264 (OBS doesn't error on unknown encoder strings).
      - OBS_STREAM_ENCODER=ffmpeg_vaapi_tex

# Request the iGPU via the Intel device plugin
# (k8s/intel-gpu-plugin/prod-1/). The plugin advertises 4 virtual
# instances of the single physical Iris Xe so OBS + vlc-server can
# share it; one each is plenty.
#
# This is the standard k8s extended-resource pattern — no hostPath,
# so the default namespace stays at PSS baseline. The plugin handles
# the device passthrough at the runtime layer.
patches:
  - target:
      kind: Deployment
      name: obs
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: obs
      spec:
        template:
          spec:
            containers:
              - name: obs
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"
