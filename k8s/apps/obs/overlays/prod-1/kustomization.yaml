# OBS prod-1 overlay. Extends base directly — local-overlay's
# host-access LoadBalancer is k3d-only; prod-1 reaches VNC via
# `task obs:vnc:up` port-forward instead.
#
# No Ingress: OBS exposes only VNC (TCP 5900) and websocket (4455),
# neither of which is useful through traefik HTTPS without a
# websockify shim. The container is reachable only from inside the
# cluster (websocket via the in-cluster `obs:4455` Service is what
# vlc-server/onscreens-server poll for stream stats).
#
# Streaming toggle: `obs-secret` is created imperatively by
# `task obs:prod:stream:on` (pulls STREAM_KEY from the adanalife-prod
# SM account). While the prod k8s/obs/twitch-stream-key holds a
# placeholder copy of the stage key, this still streams to
# adanalife_staging — the cutover to the live adanalife_ channel is a
# `put-secret-value` of the real key, no manifest change. Run
# `task obs:stage:stream:on` to force the stage key explicitly.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# OBS_QUALITY_PRESET=high is explicit even though `high` is the
# entrypoint default — the manifest tells the full story.
#
# OBS_STREAM_ENCODER=ffmpeg_vaapi opts this overlay into VAAPI
# hardware encode via the iGPU. Entrypoint default is x264 so stage-1
# (k3d on a Mac laptop, no /dev/dri) stays on software encode without
# surprise.
configMapGenerator:
  - name: obs-config
    behavior: merge
    literals:
      - OBS_QUALITY_PRESET=high
      # OBS exposes the VAAPI H.264 encoder as `ffmpeg_vaapi_tex`, not
      # `ffmpeg_vaapi` — verified empirically by reading the Available
      # Encoders list from a running pod. The bare name silently falls
      # back to x264 (OBS doesn't error on unknown encoder strings).
      - OBS_STREAM_ENCODER=ffmpeg_vaapi_tex

# Request the iGPU via the Intel device plugin
# (k8s/intel-gpu-plugin/prod-1/). The plugin advertises 4 virtual
# instances of the single physical Iris Xe so OBS + vlc-server can
# share it; one each is plenty.
#
# This is the standard k8s extended-resource pattern — no hostPath,
# so the default namespace stays at PSS baseline. The plugin handles
# the device passthrough at the runtime layer.
patches:
  - target:
      kind: Deployment
      name: obs
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: obs
      spec:
        template:
          spec:
            containers:
              - name: obs
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"
