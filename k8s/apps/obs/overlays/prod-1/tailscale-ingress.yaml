# Tailnet-native exposure of the OBS noVNC UI via the Tailscale operator.
# Additive — the traefik noVNC Ingress (obs.prod.whereisdana.today, on-LAN)
# stays. Gives https://obs-prod.<tailnet>.ts.net, reachable from ANY network
# (collision-proof, unlike the 192.168.1.x subnet-route path). Backend is the
# noVNC web port (6080).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obs-ts
  namespace: prod-1
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: obs
      port:
        number: 6080
  tls:
    - hosts:
        - obs-prod
