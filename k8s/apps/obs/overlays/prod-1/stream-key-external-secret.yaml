# ExternalSecret that makes prod OBS stream BY DEFAULT.
#
# The OBS Deployment treats the `obs-stream-key` Secret as the streaming
# toggle (envFrom secretRef, optional:true — see base/deployment.yaml).
# Before this, that Secret was only ever created imperatively by
# `task obs:prod:stream:on`, so a cluster wipe left OBS idle until the
# task was re-run. Pulling the key in via ESO — applied as part of the
# prod-1 overlay, hence `task k8s:prod:apply` — means streaming comes
# back up on its own after a wipe.
#
# Sourced from the adanalife-prod account's k8s/obs/twitch-stream-key via
# the namespaced aws-secretsmanager SecretStore (umbrella + bootstrap).
# That SM value is a bare string (the Twitch stream key), not a JSON
# blob, so we map it to the `STREAM_KEY` env key with data.remoteRef
# rather than dataFrom.extract.
#
# Stage stays OFF by default: this lives only in the prod-1 overlay, not
# base, so stage-1 has no ExternalSecret and OBS there boots idle until
# `task obs:stage:stream:on` (per vault/decisions/stage-prod-cotenancy.md).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: obs-stream-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: obs-stream-key
    creationPolicy: Owner
  data:
    - secretKey: STREAM_KEY
      remoteRef:
        key: k8s/obs/twitch-stream-key
