# vlc-server stage-1 overlay. Mirrors prod-1 (extends base directly, NFS
# dashcam, iGPU via the Intel device plugin, internal-IP Ingress) with two
# deltas: ENV=staging / stage-1 telemetry tags, and its own NFS PV
# (vlc-dashcam-nfs-stage — PVs bind 1:1, so stage can't reuse prod's even
# though it's the same export). The Ingress is LAN-only (external-dns
# target = mini-PC LAN IP), same as prod.
#
# Pre-reqs (satisfied by task k8s:stage:apply):
# - dashcam-nfs.local.yaml populated from .example (gitignored) — shares
#   prod's NFS export read-only
# - shared-secrets applied via the stage-1 umbrella (Sentry + OTLP)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - dashcam-nfs.local.yaml
  - ingress.yaml
  - tailscale-ingress.yaml

configMapGenerator:
  - name: vlc-server-config
    behavior: merge
    literals:
      # Binary's config validator accepts ENV ∈ {staging, production,
      # development}; "staging" is the stage-1 value.
      - ENV=staging
      - OTEL_SDK_DISABLED=true
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=stage-1,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=stage-1
      # NATS pubsub endpoint — read by the onscreens-server binary (same
      # pod as vlc-server, supervisord-managed) to subscribe to
      # tripbot.staging.onscreens.* events (phase 1).
      - NATS_URL=nats://nats.stage-1-platform.svc.cluster.local:4222

patches:
  # Mount the dashcam NFS PVC at the corpus path (read-only).
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: dashcam
            persistentVolumeClaim:
              claimName: vlc-dashcam
              readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: dashcam
            mountPath: /opt/data/Dashcam/_all
            readOnly: true
  # Sentry + OTLP envFrom now live in base (all envs get them).
  # Request the iGPU via the Intel device plugin (k8s/intel-gpu-plugin/prod-1/,
  # a single cluster-wide install). -shared-dev-num=4 covers prod's vlc+obs
  # plus stage's vlc+obs = 4 concurrent claims.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vlc-server
      spec:
        template:
          spec:
            containers:
              - name: vlc-server
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"

# Stage rolls forward continuously off the develop branch — every push to
# tripbot's develop branch republishes adanalife/vlc:develop (multi-arch
# manifest at tripbot's .github/workflows/release-development.yml). Prod
# stays on the base's :latest, which only moves on release-tag pushes.
images:
  - name: adanalife/vlc
    newTag: develop
