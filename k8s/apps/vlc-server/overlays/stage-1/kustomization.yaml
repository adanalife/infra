# vlc-server stage-1 overlay. Mirrors prod-1 (extends base directly, NFS
# dashcam, iGPU via the Intel device plugin) with three deltas: ENV=staging
# / stage-1 telemetry tags, its own NFS PV (vlc-dashcam-nfs-stage — PVs
# bind 1:1, so stage can't reuse prod's even though it's the same export),
# and NO Ingress — stage vlc-server is cluster-internal, reached via
# `kubectl port-forward` rather than a public vlc.stage.* URL. (vlc-server
# has no in-process auth, so not publishing it keeps the surface smaller.)
#
# Pre-reqs (satisfied by task k8s:stage:apply):
# - dashcam-nfs.local.yaml populated from .example (gitignored) — shares
#   prod's NFS export read-only
# - shared-secrets applied via the stage-1 umbrella (Sentry + OTLP)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - dashcam-nfs.local.yaml

configMapGenerator:
  - name: vlc-server-config
    behavior: merge
    literals:
      # Binary's config validator accepts ENV ∈ {staging, production,
      # development}; "staging" is the stage-1 value.
      - ENV=staging
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=stage-1,service.namespace=tripbot
      - SENTRY_ENVIRONMENT=stage-1

patches:
  # Mount the dashcam NFS PVC at the corpus path (read-only).
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: dashcam
            persistentVolumeClaim:
              claimName: vlc-dashcam
              readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: dashcam
            mountPath: /opt/data/Dashcam/_all
            readOnly: true
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: sentry-vlc-server
            optional: false
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: grafana-cloud-otlp
            optional: false
  # Request the iGPU via the Intel device plugin (k8s/intel-gpu-plugin/prod-1/,
  # a single cluster-wide install). -shared-dev-num=4 covers prod's vlc+obs
  # plus stage's vlc+obs = 4 concurrent claims.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vlc-server
      spec:
        template:
          spec:
            containers:
              - name: vlc-server
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"
