# Internal-IP ingress for stage vlc-server — same shape as prod-1's, with
# the stage hostname. external-dns publishes a public Route53 record
# pointing at the mini-PC LAN IP, so vlc.stage.whereisdana.today resolves
# anywhere but is only reachable on the home network. cert-manager issues
# via DNS-01 (independent of inbound reachability). No in-process auth, so
# LAN-only reachability is the gate.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlc-server
  annotations:
    external-dns.alpha.kubernetes.io/hostname: vlc.stage.whereisdana.today
    # Namespaced Issuer in this app namespace (k8s/cert-manager/app-issuer/
    # stage-1) — solves DNS-01 with the stage account, no cross-account.
    cert-manager.io/issuer: letsencrypt-route53
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - vlc.stage.whereisdana.today
      secretName: vlc-tls
  rules:
    - host: vlc.stage.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vlc-server
                port:
                  name: http
