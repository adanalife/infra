# Public Ingress for vlc-server's HTTP API at vlc.stage.whereisdana.today.
#
# external-dns reconciles the hostname annotation into a Route53 A
# record pointing at the host's public IPv4 (set globally via
# external-dns's --default-targets, fed from values.local.yml).
#
# HTTP-only today. cert-manager is installed and proven (the smoke-test
# Certificate in k8s/cert-manager/stage-1/ issues against LE staging on
# every cluster bring-up). The remaining blocker is the home-network
# port-forward — once inbound 443 reaches traefik, uncomment the
# cert-manager.io/cluster-issuer annotation AND the tls: block below to
# flip this URL to HTTPS. Start with letsencrypt-staging-route53 to
# avoid LE prod's per-week duplicate-cert limit; flip to
# letsencrypt-route53 once the first cert issues clean.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlc-server
  annotations:
    external-dns.alpha.kubernetes.io/hostname: vlc.stage.whereisdana.today
    # cert-manager.io/cluster-issuer: letsencrypt-staging-route53
spec:
  ingressClassName: traefik
  # tls:
  #   - hosts:
  #       - vlc.stage.whereisdana.today
  #     secretName: vlc-tls
  rules:
    - host: vlc.stage.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vlc-server
                port:
                  name: http
