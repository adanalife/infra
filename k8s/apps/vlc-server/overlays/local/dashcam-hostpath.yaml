# Local-only: bind-mount the dashcam video directory so vlc-server has
# files to play. Compose did this via
# `./assets/video:/opt/data/Dashcam/_all:ro`. On EKS this needs a
# different strategy (S3 + sidecar fetcher, separate ADR).
#
# The path /host/dashcam refers to a mount declared in k3d-config.yaml
# under `volumes:`, which proxies the real host directory through the
# k3d node container. If you change the host path, change it there too.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vlc-server
spec:
  template:
    spec:
      containers:
        - name: vlc-server
          volumeMounts:
            - name: dashcam
              mountPath: /opt/data/Dashcam/_all
              readOnly: true
      volumes:
        - name: dashcam
          hostPath:
            path: /host/dashcam
            type: Directory
