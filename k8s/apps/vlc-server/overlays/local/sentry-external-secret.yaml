# ExternalSecret for vlc-server's Sentry DSN. Sourced from AWS Secrets
# Manager (k8s/sentry-vlc-server) via the cluster-wide aws-secretsmanager
# ClusterSecretStore. The remote SM value is JSON; dataFrom.extract pulls
# the SENTRY_DSN key into the materialized Secret so the Deployment can
# `envFrom: secretRef:` without spelling each var here.
#
# Resource name is `sentry-vlc-server` (not just `sentry`) so it doesn't
# collide with tripbot's ExternalSecret when the stage-1 overlay
# aggregates both apps into the same namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sentry-vlc-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: sentry-vlc-server
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/sentry-vlc-server
