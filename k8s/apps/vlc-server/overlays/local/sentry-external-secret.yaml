# ExternalSecret for vlc-server's Sentry DSN. Sourced from AWS Secrets
# Manager (k8s/sentry-vlc-server) via the cluster-wide aws-secretsmanager
# ClusterSecretStore. The remote SM value is JSON; dataFrom.extract pulls
# the SENTRY_DSN key into the materialized Secret so the Deployment can
# `envFrom: secretRef:` without spelling each var here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sentry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: sentry
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/sentry-vlc-server
