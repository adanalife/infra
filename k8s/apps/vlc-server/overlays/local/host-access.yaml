# Host-port access for VNC and RTSP, k3d-only convenience.
#
# On k3d this lights up the host port mappings declared in k3d-config
# (5903 for VNC, 8554 for RTSP) via klipper-lb. On EKS this Service
# wouldn't exist — port-forward or a properly-configured Ingress/ELB
# would handle host access instead.
apiVersion: v1
kind: Service
metadata:
  name: vlc-server-host
spec:
  type: LoadBalancer
  selector:
    app: vlc-server
  ports:
    - name: vnc
      port: 5903
      targetPort: vnc
    - name: rtsp
      port: 8554
      targetPort: rtsp
