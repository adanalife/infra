apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - host-access.yaml
  # Cross-cutting observability ExternalSecrets (Sentry + OTLP) live in
  # k8s/shared-secrets/base/ per
  # vault/decisions/shared-secrets-not-owned-by-workload.md — applied
  # by the env's umbrella overlay alongside this app overlay.

# Merge environment-specific config into the base ConfigMap. vlc-server
# shares tripbot's config package, so it needs the same env-var surface
# even though most of these values are stubs in local. For stage/prod
# the secret values would move into a real Secret — TODO.
#
# OTEL_* defaults match tripbot's overlay; the OTLP endpoint + headers
# arrive via the grafana-cloud-otlp Secret (envFrom patch below) which
# tripbot's overlay materializes via ExternalSecret.
configMapGenerator:
  - name: vlc-server-config
    behavior: merge
    literals:
      - ENV=staging
      - DATABASE_HOST=postgres
      - DATABASE_USER=tripbot_docker
      - DATABASE_PASS=hunter2
      - DATABASE_DB=tripbot_docker
      - CHANNEL_NAME=adanalife
      - BOT_USERNAME=adanalife_bot
      - TWITCH_CLIENT_ID=stub
      - TWITCH_CLIENT_SECRET=stub
      - TWITCH_AUTH_TOKEN=oauth:stub
      - TWILIO_ACCT_SID=stub
      - TWILIO_AUTH_TOKEN=stub
      - TWILIO_FROM_NUM=+15555550100
      - TWILIO_TO_NUM=+15555550101
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=stage-1,service.namespace=tripbot

# Mount the dashcam video dir from the host (k3d-only).
patches:
  - path: dashcam-hostpath.yaml
  # Inject the Grafana Cloud OTLP env vars from the shared-secrets
  # ExternalSecret. optional: false — pod fails to start if the
  # shared-secrets overlay isn't applied.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: grafana-cloud-otlp
            optional: false
  # Inject SENTRY_DSN from the shared-secrets ExternalSecret.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: sentry-vlc-server
            optional: false
