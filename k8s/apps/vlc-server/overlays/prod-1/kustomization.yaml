# vlc-server prod-1 overlay. Extends base directly (not the local
# overlay) to skip k3d-specific bits like host-access and the dashcam
# hostPath; dashcam mounts from NFS instead.
#
# Pre-reqs (all satisfied by `task k8s:prod:apply`):
# - dashcam-nfs.local.yaml populated from .example (gitignored)
# - k8s/shared-secrets/base applied (owns the Sentry + OTLP
#   ExternalSecrets envFrom'd below, both required)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - dashcam-nfs.local.yaml
  - ingress.yaml
  - tailscale-ingress.yaml

# Prod-1 env vars merged onto base's vlc-server-config ConfigMap.
# The binary's config-package validator only accepts ENV ∈
# {staging, production, development} — "prod-1" is the infra/k8s naming
# for the env, "production" is what the binary expects.
# OTEL_RESOURCE_ATTRIBUTES preserves "prod-1" as the telemetry identifier.
configMapGenerator:
  - name: vlc-server-config
    behavior: merge
    literals:
      - ENV=production
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod-1,service.namespace=tripbot
      # Override the local overlay's development tag — see that overlay for
      # why this exists.
      - SENTRY_ENVIRONMENT=prod-1

patches:
  # Mount the dashcam NFS PVC at the corpus path.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: dashcam
            persistentVolumeClaim:
              claimName: vlc-dashcam
              readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: dashcam
            mountPath: /opt/data/Dashcam/_all
            readOnly: true
  # Sentry + OTLP envFrom now live in base (all envs get them).
  # Request the iGPU via the Intel device plugin
  # (k8s/intel-gpu-plugin/prod-1/) so libvlc can hardware-decode the
  # dashcam corpus via VAAPI. Sibling OBS overlay does the same; the
  # plugin's -shared-dev-num=4 lets both pods claim concurrently.
  # Pairs with the tripbot PR's VLC_AVCODEC_HW default change
  # (vdpau_avcodec -> any), which makes libvlc pick VAAPI when the
  # device is reachable.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vlc-server
      spec:
        template:
          spec:
            containers:
              - name: vlc-server
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"
