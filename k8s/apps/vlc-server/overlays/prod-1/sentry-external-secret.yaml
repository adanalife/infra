# ExternalSecret for vlc-server's Sentry DSN on prod-1. Same SM source
# as stage-1 (k8s/sentry-vlc-server) — the secret value is itself a
# Sentry environment differentiator, not the SDN-routing tag.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sentry-vlc-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: sentry-vlc-server
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/sentry-vlc-server
