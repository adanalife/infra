# Tailnet-native exposure of the vlc-server UI via the Tailscale operator.
# Additive — the traefik Ingress (vlc.prod.whereisdana.today, on-LAN) stays.
# Gives https://vlc-prod.<tailnet>.ts.net, reachable from ANY network (a
# 100.x/CGNAT name that never collides with a 192.168.1.x LAN, unlike the
# subnet-route path). Auto HTTPS via the tailnet cert; access gated by the ACL.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlc-server-ts
  namespace: prod-1
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: vlc-server
      port:
        number: 8080
  tls:
    - hosts:
        - vlc-prod
