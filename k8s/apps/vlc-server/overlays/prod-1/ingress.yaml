# LE cert from day one via DNS-01 against Route53 — issuance is
# independent of port-forward state. vlc-server has NO in-process
# auth, so reachability is gated entirely by what external-dns
# publishes as the record's target.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlc-server
  annotations:
    external-dns.alpha.kubernetes.io/hostname: vlc.prod.whereisdana.today
    # Namespaced Issuer in this app namespace (k8s/cert-manager/app-issuer/
    # prod-1) — solves DNS-01 with the prod account, no cross-account.
    cert-manager.io/issuer: letsencrypt-route53
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - vlc.prod.whereisdana.today
      secretName: vlc-tls
  rules:
    - host: vlc.prod.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vlc-server
                port:
                  name: http
