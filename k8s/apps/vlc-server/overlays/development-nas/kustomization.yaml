apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Extends development (which extends local), replacing the local hostPath
# dashcam volume with one sourced from a host-mounted dashcam directory.
# That path is bind-mounted :ro into the k3d node at /host/nas-dashcam via
# `task k8s:dev:cluster:up DASHCAM_NAS=<host path>`, giving read-only
# enforcement at two levels: Docker bind mount + volumeMount.
# Use plain development (task k8s:dev:apply) for the example video.
resources:
  - ../development

patches:
  # Replace the hostPath dashcam volume (local overlay, /host/dashcam) with the
  # NAS-backed hostPath (/host/nas-dashcam). JSON 6902 replace is used because
  # strategic merge patches merge object fields rather than replacing them,
  # which would leave both paths present simultaneously.
  # Index 0 is stable: base has no volumes; local overlay adds exactly one.
  - target:
      kind: Deployment
      name: vlc-server
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: dashcam
          hostPath:
            path: /host/nas-dashcam
            type: Directory
