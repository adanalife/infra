# Stage-1 overlay: extends the local overlay (configmap merge,
# host-access Service, dashcam hostPath) and adds a public Ingress
# for vlc.dev.whereisdana.today via the platform stack
# (external-dns + helm-installed traefik).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../local
  - ingress.yaml

# NATS pubsub endpoint — read by the onscreens-server binary (same pod
# as vlc-server, supervisord-managed) to subscribe to
# tripbot.staging.onscreens.* events (phase 1). development-platform is
# the k3d-side mirror of stage/prod's env-platform namespace pattern.
# Merged on top of local's vlc-server-config so the laptop / non-cluster
# variants stay clean (no NATS_URL → graceful no-op).
configMapGenerator:
  - name: vlc-server-config
    behavior: merge
    literals:
      - NATS_URL=nats://nats.development-platform.svc.cluster.local:4222

# Development rolls forward continuously off the develop branch — every push
# to tripbot's develop branch republishes adanalife/vlc:develop (multi-arch
# manifest at tripbot's .github/workflows/release-development.yml). Prod
# stays on the base's :latest, which only moves on release-tag pushes.
images:
  - name: adanalife/vlc
    newTag: develop
