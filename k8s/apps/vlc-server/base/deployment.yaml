apiVersion: apps/v1
kind: Deployment
metadata:
  name: vlc-server
spec:
  replicas: 1
  strategy:
    # Recreate so an in-flight RTSP stream / VNC session isn't briefly
    # served by two replicas at once during rollout. vlc-server is a
    # single-replica workload by design (RTSP + libvlc state are local
    # to the process).
    type: Recreate
  selector:
    matchLabels:
      app: vlc-server
  template:
    metadata:
      labels:
        app: vlc-server
    spec:
      containers:
        - name: vlc-server
          image: adanalife/vlc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: vnc
              containerPort: 5900
            - name: rtsp
              containerPort: 8554
          envFrom:
            - configMapRef:
                name: vlc-server-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
