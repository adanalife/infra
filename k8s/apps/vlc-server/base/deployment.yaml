apiVersion: apps/v1
kind: Deployment
metadata:
  name: vlc-server
spec:
  replicas: 1
  strategy:
    # RollingUpdate with maxSurge=1 / maxUnavailable=0: the new pod must
    # pass its readiness probe before the old pod terminates. Trade-off
    # vs. the previous Recreate strategy: during the rollout window,
    # both pods are briefly Running. The dashcam PVC is mounted
    # readOnly (NFS supports many-readers); the Intel GPU plugin runs
    # with -shared-dev-num=4 so both pods can claim concurrently; ports
    # are container-local (not hostPort). OBS holds its RTSP connection
    # to the old pod until that pod terminates, then reconnects via the
    # Service to the new pod — same drop-and-reconnect path as before,
    # but only fires once the new pod is proven healthy. A failed
    # rollout (like the v2.17.0 CHANNEL_NAME-validator regression on
    # 2026-05-28) now leaves the old pod serving instead of yielding a
    # full outage.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vlc-server
  template:
    metadata:
      labels:
        app: vlc-server
    spec:
      # Partial PodSecurity-restricted hardening: seccomp + no-privesc +
      # drop all caps. The container still runs as root (supervisord +
      # syslog-ng writing /var/log, libvlc reaching /dev/dri as root via
      # owner bits) — root needs no capabilities for any of that, so
      # dropping ALL is safe. runAsNonRoot is deferred: it needs a
      # Dockerfile rework in the tripbot repo (non-root user, syslog to a
      # writable path, render-group GID for the iGPU) + live GPU
      # verification, tracked as a follow-up.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vlc-server
          image: adanalife/vlc:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
            - name: onscreens
              containerPort: 8081
            - name: vnc
              containerPort: 5900
            - name: rtsp
              containerPort: 8554
          # Observability secrets via ESO (shared-secrets). Every env has
          # them (the umbrella applies shared-secrets/base), so they live in
          # base instead of being re-patched per overlay.
          envFrom:
            - configMapRef:
                name: vlc-server-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          # Bare-HTTP liveness — only fails when the HTTP server is hung
          # or the process is gone. Doesn't try to detect libvlc-internal
          # deadlock (false-positive risk during legitimate state
          # transitions); that's tracked separately as a follow-up.
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
