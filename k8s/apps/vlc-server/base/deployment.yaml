apiVersion: apps/v1
kind: Deployment
metadata:
  name: vlc-server
spec:
  replicas: 1
  strategy:
    # Recreate so an in-flight RTSP stream / VNC session isn't briefly
    # served by two replicas at once during rollout. vlc-server is a
    # single-replica workload by design (RTSP + libvlc state are local
    # to the process).
    type: Recreate
  selector:
    matchLabels:
      app: vlc-server
  template:
    metadata:
      labels:
        app: vlc-server
    spec:
      containers:
        - name: vlc-server
          image: adanalife/vlc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: onscreens
              containerPort: 8081
            - name: vnc
              containerPort: 5900
            - name: rtsp
              containerPort: 8554
          # Observability secrets via ESO (shared-secrets). Every env has
          # them (the umbrella applies shared-secrets/base), so they live in
          # base instead of being re-patched per overlay.
          envFrom:
            - configMapRef:
                name: vlc-server-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          # Bare-HTTP liveness — only fails when the HTTP server is hung
          # or the process is gone. Doesn't try to detect libvlc-internal
          # deadlock (false-positive risk during legitimate state
          # transitions); that's tracked separately as a follow-up.
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
