# Cluster-scoped low priority for the dashcam-cv batch. Value < 0 means every
# default-priority pod (all of prod-1 + stage-1's app/platform workloads sit at
# the default 0) outranks it: under CPU/memory pressure the scheduler preempts
# THIS job, never the live stream. The embed job is best-effort background work.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: dashcam-cv-low
value: -10
globalDefault: false
description: "Background dashcam-cv embedding — preemptible; never outranks live workloads."
