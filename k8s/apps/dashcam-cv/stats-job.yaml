# On-demand corpus stats — coverage, DB size, and the concept scan. Read-only.
#   kubectl -n stage-1 delete job dashcam-cv-stats --ignore-not-found
#   kubectl -n stage-1 apply --validate=false -f k8s/apps/dashcam-cv/stats-job.yaml
#   kubectl -n stage-1 logs -f job/dashcam-cv-stats
# Drop --concepts from args for a fast (no-model) coverage+size view.
apiVersion: batch/v1
kind: Job
metadata:
  name: dashcam-cv-stats
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      priorityClassName: dashcam-cv-low
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stats
          image: adanalife/dashcam-cv:develop
          imagePullPolicy: Always
          args: ["stats", "--concepts"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: tripbot-config
            - secretRef:
                name: tripbot-database-creds
          env:
            - name: HOME
              value: /tmp
            - name: USER
              value: dashcam
          resources:
            requests: { cpu: "1", memory: 5Gi }
            limits:   { cpu: "4", memory: 6Gi }
          volumeMounts:
            - name: models
              mountPath: /opt/models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: dashcam-cv-models
