apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Partial PodSecurity-restricted hardening: seccomp + no-privesc.
      # capabilities.drop:[ALL] and runAsNonRoot are deferred together:
      # the postgres:16-alpine entrypoint starts as root and chowns a fresh
      # PGDATA to the postgres user (needs CAP_CHOWN), so dropping caps
      # without also setting runAsUser:70 + fsGroup would break first-boot
      # on an empty PVC. Do those as one verified follow-up change.
      # (allowPrivilegeEscalation:false is safe — the
      # entrypoint's gosu root->postgres drop works under no_new_privs.)
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          # Liveness uses pg_isready (exec) — answers protocol-level
          # rather than just confirming the port is open like the
          # tcpSocket readinessProbe does. Catches the "process up
          # but not accepting queries" failure mode where a restart
          # is the right answer.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
