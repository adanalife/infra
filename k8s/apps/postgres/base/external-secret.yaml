# Materializes the `postgres-secret` Secret (envFrom'd by the StatefulSet)
# from the `k8s/postgres/credentials` SM container via the namespaced
# aws-secretsmanager SecretStore — so it reads each env's own account.
# Container shape: {"user": "...", "password": "...", "db": "..."}.
# Terraform owns the value (terraform/<env>/secrets.tf). The laptop
# `local` overlay drops this and uses its on-disk secret.env instead.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: postgres-secret
    template:
      type: Opaque
      data:
        POSTGRES_USER: "{{ .user }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_DB: "{{ .db }}"
  data:
    - secretKey: user
      remoteRef:
        key: k8s/postgres/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: k8s/postgres/credentials
        property: password
    - secretKey: db
      remoteRef:
        key: k8s/postgres/credentials
        property: db
