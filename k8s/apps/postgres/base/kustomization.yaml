apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - statefulset.yaml
  - service.yaml
  # ESO-materialized postgres-secret (the production default). The laptop
  # `local` overlay deletes this and builds postgres-secret from secret.env.
  - external-secret.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: tripbot
