# stage-1 Postgres: a small PVC on the default `local-path` (Delete)
# StorageClass. Unlike prod-1 (50Gi on local-path-retain), stage data is
# fresh-seeded and disposable — Delete reclaim is fine and auto-cleans on
# PVC removal. local-path-provisioner doesn't support volume expansion,
# so size up-front; 10Gi is generous for a seeded-only staging DB.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
