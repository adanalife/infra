# Materializes the `postgres-secret` Secret (envFrom'd by the
# StatefulSet) from the `k8s/postgres/credentials` SM container in the
# adanalife-stage account. Container shape:
# {"user": "...", "password": "...", "db": "..."}. Terraform owns the
# value in stage-1 — see terraform/stage-1/secrets.tf.
#
# secretStoreRef.name is `aws-secretsmanager` here to match the prod-1
# file verbatim; the stage-1 umbrella overlay (k8s/overlays/stage-1)
# repoints every ExternalSecret to the namespace-locked
# `aws-secretsmanager-stage` store via a single patch.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    template:
      type: Opaque
      data:
        POSTGRES_USER: "{{ .user }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_DB: "{{ .db }}"
  data:
    - secretKey: user
      remoteRef:
        key: k8s/postgres/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: k8s/postgres/credentials
        property: password
    - secretKey: db
      remoteRef:
        key: k8s/postgres/credentials
        property: db
