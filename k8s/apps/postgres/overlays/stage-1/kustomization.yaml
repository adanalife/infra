# stage-1 postgres overlay: a small disposable PVC on the default
# local-path StorageClass + credentials sourced from AWS Secrets Manager
# (adanalife-stage account) via ESO.
#
# Unlike prod-1 there is NO backup CronJob / backup ExternalSecret — stage
# data is fresh-seeded and disposable, so it isn't backed up, and the
# stage account has no postgres-backup-s3 SM container.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - external-secret.yaml

patches:
  - path: statefulset-patch.yaml
    target:
      kind: StatefulSet
      name: postgres
