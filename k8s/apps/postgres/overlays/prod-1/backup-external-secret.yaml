# ESO ExternalSecret for the postgres backup CronJob.
#
# Materializes `postgres-backup-s3` Secret (consumed via envFrom by
# backup-cronjob.yaml) from AWS Secrets Manager. The SM container at
# k8s/postgres/backup-s3-credentials is OWNED by terraform — see
# terraform/prod-1/postgres-backup.tf for the resource shape.
#
# Container holds a JSON object with four string properties:
#
#   {
#     "AWS_ACCESS_KEY_ID":     "AKIA...",
#     "AWS_SECRET_ACCESS_KEY": "<40-char secret>",
#     "AWS_DEFAULT_REGION":    "us-east-1",
#     "S3_BUCKET":             "adanalife-prod-1-postgres-backups"
#   }
#
# Rotate by tainting `aws_iam_access_key.postgres_backup` in
# terraform and re-applying; the new key+secret get written into
# this container and ESO syncs within refreshInterval (≤1h).
# Force a faster sync with:
#   kubectl annotate externalsecret postgres-backup-s3-credentials \
#     force-sync=$(date +%s) --overwrite
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-backup-s3-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: postgres-backup-s3
    template:
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        AWS_DEFAULT_REGION: "{{ .AWS_DEFAULT_REGION }}"
        S3_BUCKET: "{{ .S3_BUCKET }}"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: AWS_DEFAULT_REGION
    - secretKey: S3_BUCKET
      remoteRef:
        key: k8s/postgres/backup-s3-credentials
        property: S3_BUCKET
