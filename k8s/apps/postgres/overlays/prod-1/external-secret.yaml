# ESO ExternalSecret for postgres prod-1.
#
# Materializes the `postgres-secret` Secret (consumed via envFrom by
# the base StatefulSet's container) from AWS Secrets Manager. The SM
# container at `k8s/postgres/credentials` must hold a JSON object
# with three string properties:
#
#   {
#     "user": "tripbot",
#     "password": "<strong-password>",
#     "db": "tripbot"
#   }
#
# Seed once with:
#   aws-vault exec adanalife-prod -- aws secretsmanager create-secret \
#     --name k8s/postgres/credentials \
#     --secret-string '{"user":"tripbot","password":"...","db":"tripbot"}'
#
# Rotate later with `put-secret-value`. ESO picks up the new value
# within refreshInterval (1h); force-sync with:
#   kubectl annotate externalsecret postgres-credentials \
#     force-sync=$(date +%s) --overwrite
#
# Password choice depends on the dump:
# - Dump has CREATE USER / ALTER USER WITH PASSWORD → password must
#   match the dump (otherwise tripbot connects with the new password
#   but pg_authid has the dump's, and auth fails).
# - Dump is data-only (pg_dump --no-owner --no-acl, etc.) → pick a
#   fresh strong password; pg_authid keeps the env-var value from
#   initial empty-DB setup, no disconnect.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    template:
      type: Opaque
      data:
        POSTGRES_USER: "{{ .user }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_DB: "{{ .db }}"
  data:
    - secretKey: user
      remoteRef:
        key: k8s/postgres/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: k8s/postgres/credentials
        property: password
    - secretKey: db
      remoteRef:
        key: k8s/postgres/credentials
        property: db
