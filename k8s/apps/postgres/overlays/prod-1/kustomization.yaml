# Prod-1 postgres overlay: 50Gi PVC on a Retain-policy StorageClass
# (the safety lever for irreplaceable data) + credentials sourced
# from AWS Secrets Manager via ESO.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - storageclass.yaml
  - backup-external-secret.yaml
  - backup-cronjob.yaml

patches:
  - path: statefulset-patch.yaml
    target:
      kind: StatefulSet
      name: postgres
