# Postgres backup CronJob — runs daily at 04:00 UTC.
#
# Manual trigger (e.g. for an ad-hoc dump):
#   kubectl create job postgres-backup-manual-$(date +%Y%m%d-%H%M%S) \
#     --from=cronjob/postgres-backup
# Logs: kubectl logs -f job/<job-name>
#
# Later: flip `suspend: false` to enable the hourly schedule.
#
# Tiered prefixes (lifecycle rules in terraform/prod-1/postgres-backup.tf):
#   hourly/<TS>.dump   every hour, expires at 2 days
#   daily/<TS>.dump    at 04:00 UTC, expires at 30 days
#   weekly/<TS>.dump   at 04:00 UTC Sunday, Glacier IR @ 30d, kept forever
#   archive/<TS>.dump  no schedule writes here — manual pin point, lives forever
#
# Mechanics:
#   - `postgres:16-alpine` matches the server image (PG16 pg_dump).
#     `apk add aws-cli` at start adds ~10–20s — fine for a backup job.
#   - pg_dump --format=custom (-Fc) writes a single compressed dump
#     (zlib internal). Restore with pg_restore --clean --if-exists.
#   - The dump is written to /tmp once per run so the same bytes can
#     be uploaded to multiple tier prefixes without re-dumping the DB.
#   - Two envFroms: postgres-secret (USER/PASSWORD/DB from the
#     server's ESO) and postgres-backup-s3 (S3 creds + bucket).
#   - concurrencyPolicy: Forbid so an overrunning backup doesn't
#     stack on the next schedule.
#   - backoffLimit: 1 keeps failed-job retry cheap.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "0 * * * *"
  suspend: false
  timeZone: Etc/UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  apk add --no-cache aws-cli
                  TS=$(date -u +%Y%m%d-%H%M%SZ)
                  HOUR=$(date -u +%H)
                  DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
                  DUMP=/tmp/dump.pgcustom

                  echo "Dumping ${POSTGRES_DB}"
                  PGPASSWORD="$POSTGRES_PASSWORD" pg_dump \
                    --format=custom \
                    --host=postgres \
                    --username="$POSTGRES_USER" \
                    "$POSTGRES_DB" \
                    > "$DUMP"

                  echo "Uploading hourly/${TS}.dump"
                  aws s3 cp --no-progress "$DUMP" "s3://${S3_BUCKET}/hourly/${TS}.dump"

                  if [ "$HOUR" = "04" ]; then
                    echo "Uploading daily/${TS}.dump"
                    aws s3 cp --no-progress "$DUMP" "s3://${S3_BUCKET}/daily/${TS}.dump"
                  fi

                  if [ "$HOUR" = "04" ] && [ "$DOW" = "7" ]; then
                    echo "Uploading weekly/${TS}.dump"
                    aws s3 cp --no-progress "$DUMP" "s3://${S3_BUCKET}/weekly/${TS}.dump"
                  fi

                  rm -f "$DUMP"
                  echo "OK"
              envFrom:
                - secretRef:
                    name: postgres-secret
                - secretRef:
                    name: postgres-backup-s3
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 512Mi
