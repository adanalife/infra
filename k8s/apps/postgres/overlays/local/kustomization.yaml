apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# secret.env is gitignored — copy from secret.env.example. Must match
# tripbot's local overlay DATABASE_* vars. This is the one place the
# Postgres password lives on disk.
secretGenerator:
  - name: postgres-secret
    envs:
      - secret.env

patches:
  # Drop base's ESO ExternalSecret — the laptop has no cloud Postgres; its
  # postgres-secret comes from the secretGenerator above.
  - target:
      kind: ExternalSecret
      name: postgres-credentials
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: postgres-credentials
