# OBS stage-1 overlay. Mirrors prod-1's iGPU + VAAPI encode setup and its
# internal-IP noVNC Ingress (obs-twitch.stage.whereisdana.today, LAN-only), but at
# LOW quality.
#
# Streaming is OFF by default: like prod, the `obs-stream-key` Secret is
# created imperatively (task obs:stage:stream:on, which pulls the
# adanalife_staging key from the stage SM account). Without it OBS sits
# idle in VNC mode — no manifest carries a stream key.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml
  - tailscale-ingress.yaml

# LOW quality for stage (prod runs `high`). OBS_STREAM_ENCODER opts into
# VAAPI hardware encode via the iGPU — OBS exposes the VAAPI H.264 encoder
# as `ffmpeg_vaapi_tex` (the bare `ffmpeg_vaapi` silently falls back to
# x264). Only matters when streaming is toggled on.
configMapGenerator:
  - name: obs-config
    behavior: merge
    literals:
      - OBS_QUALITY_PRESET=low
      - OBS_STREAM_ENCODER=ffmpeg_vaapi_tex

# Request the iGPU via the Intel device plugin (single cluster-wide
# install at k8s/intel-gpu-plugin/prod-1/; -shared-dev-num=4 covers
# prod vlc+obs + stage vlc+obs = 4 concurrent claims).
patches:
  - target:
      kind: Deployment
      name: obs-twitch
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: obs-twitch
      spec:
        template:
          spec:
            containers:
              - name: obs
                resources:
                  requests:
                    gpu.intel.com/i915: "1"
                  limits:
                    gpu.intel.com/i915: "1"

# Stage rolls forward continuously off the develop branch — every push to
# tripbot's develop branch republishes adanalife/obs:develop (multi-arch
# manifest at tripbot's .github/workflows/release-development.yml). Prod
# stays on the base's :latest, which only moves on release-tag pushes.
images:
  - name: adanalife/obs
    newTag: develop
