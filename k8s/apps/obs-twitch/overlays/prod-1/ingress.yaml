# Browser access to OBS via noVNC (websockify on the obs Service's :6080).
# Mirrors vlc-server's prod-1 ingress: external-dns publishes a public
# Route53 record that points at the LAN IP, so the host resolves anywhere
# but is only reachable on the home network. cert-manager issues via DNS-01,
# independent of inbound reachability.
#
# NO auth: reachability is gated entirely by the LAN-only target, same as
# vlc-server. If/when this is exposed beyond the LAN (e.g. once the home
# port-forward lands), add a traefik basic-auth middleware here — wayvnc
# itself runs auth-off inside the pod.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obs-twitch
  annotations:
    external-dns.alpha.kubernetes.io/hostname: obs-twitch.prod.whereisdana.today
    # Namespaced Issuer in this app namespace (k8s/cert-manager/app-issuer/
    # prod-1) — solves DNS-01 with the prod account, no cross-account.
    cert-manager.io/issuer: letsencrypt-route53
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - obs-twitch.prod.whereisdana.today
      secretName: obs-twitch-tls
  rules:
    - host: obs-twitch.prod.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-twitch
                port:
                  name: novnc
