# OBS development overlay (k3d). Extends the local overlay (host-access
# Service for VNC, low quality, software encode — no iGPU on the laptop)
# and adds the browser noVNC Ingress at obs.dev.whereisdana.today, matching
# vlc-server's dev overlay. Streaming stays off by default (obs-stream-key
# is the imperative toggle).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../local
  - ingress.yaml

# Development rolls forward continuously off the develop branch — every push
# to tripbot's develop branch republishes adanalife/obs:develop (multi-arch
# manifest at tripbot's .github/workflows/release-development.yml). Prod
# stays on the base's :latest, which only moves on release-tag pushes.
images:
  - name: adanalife/obs
    newTag: develop
