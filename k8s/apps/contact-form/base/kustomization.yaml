apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Non-secret env defaults consumed by the contact-form Sinatra app.
# SMTP credentials come from the contact-form-smtp Secret materialized
# by ESO (see overlays/local/external-secret.yaml). EMAIL_RECIPIENTS
# is technically PII; lives in the ConfigMap because it isn't a
# credential — moved to a Secret if its visibility ever matters.
configMapGenerator:
  - name: contact-form-config
    literals:
      - FROM_DOMAIN=stage.dana.lol
      - SUCCESS_URL=https://www.dana.lol/success
      # ALLOWLIST is space-separated origins. Exact match — no wildcards.
      # Branch-preview URLs (*.dana-lol-staging.pages.dev) are not enumerated;
      # if a preview ever needs to test the form, add its specific origin.
      - "ALLOWLIST=https://www.dana.lol https://dana.lol https://staging.dana.lol https://www.whalecore.com"
      - EMAIL_RECIPIENTS=danadotlol@gmail.com

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: contact-form
      app.kubernetes.io/part-of: contact-form
