# Materialize the SES SMTP credentials from AWS Secrets Manager
# into a k8s Secret consumed by the contact-form Deployment via
# `envFrom: secretRef:`. ESO uses the cluster-wide aws-secretsmanager
# ClusterSecretStore (set up in k8s/external-secrets/stage-1/).
#
# Remote SM value at k8s/contact-form/smtp is JSON with two keys:
#   {"SMTP_USERNAME":"<access-key-id>","SMTP_PASSWORD":"<derived-smtp-password>"}
# dataFrom.extract pulls each top-level key into a matching k8s Secret
# key, so the consumer can `envFrom: secretRef:` without enumerating
# each variable here. Populate the SM value via
# `task contact-form:bootstrap-smtp` (see Taskfile.yml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: contact-form-smtp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: contact-form-smtp
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/contact-form/smtp
