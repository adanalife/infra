apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# The cloudflared-secret Secret that the deployment references is
# applied directly by `task k8s:stage:bootstrap-secrets` via `kubectl create
# secret generic ... | kubectl apply -f -`. The token stays in a shell
# variable only — no plaintext secret.env on disk. See the task
# definition in Taskfile.yml.
