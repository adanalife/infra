apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Namespace `cloudflared` is created by the base kustomization. The
# cloudflared-secret Secret that the Deployment references is applied
# directly into that namespace by `task k8s:stage:tunnel:up` via
# `kubectl create secret generic ... | kubectl apply -f -`. The token
# stays in a shell variable only — no plaintext secret.env on disk.
# See the task definition in Taskfile.yml.
