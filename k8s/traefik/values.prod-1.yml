# Prod-1 traefik override — layered on top of values.yml via
# `helm upgrade --install ... -f values.yml -f values.prod-1.yml`.
# Stage-1 (bees / k3d) uses just values.yml.
#
# Talos has no LoadBalancer controller of its own; hostNetwork binds
# traefik directly to the node's IP on 80/443. MetalLB is the
# eventual alternative once a second node lands. Trade-offs of this shape:
#   - single replica only (host ports can't coexist)
#   - second node needs revisiting (MetalLB or DaemonSet)
#   - traefik Service EXTERNAL-IP stays <pending> (no controller fills it)
#
# TODO: drop runAsUser: 0 +
# NET_BIND_SERVICE — instead route inbound :80/:443 through the
# router's port-forward to high ports on the node, run traefik
# unprivileged.

hostNetwork: true

deployment:
  replicas: 1
  # Recreate (vs default RollingUpdate) so the old pod terminates
  # before the new one starts — with hostPorts on 80/443, two pods
  # can't coexist on the same node.
  kind: Deployment

updateStrategy:
  type: Recreate
  rollingUpdate: null

# Root + NET_BIND_SERVICE is the workaround for binding privileged
# ports under hostNetwork (the cleaner sysctl approach is blocked
# because hostNetwork pods can't set sysctls). See the TODO at the
# top of the file for the long-term fix.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0

securityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# LoadBalancer for chart consistency; EXTERNAL-IP stays <pending>
# because real traffic flows through hostNetwork.
service:
  type: LoadBalancer

# Stamp a stable ingress endpoint into every traefik-managed Ingress's
# status.loadBalancer: the LAN pointer minipc.whereisdana.today (a CNAME in the
# whereisdana.today apex zone — see terraform/core/minipc-dns.tf).
#
# This is now COSMETIC: external-dns runs with --force-default-targets (see
# k8s/external-dns/prod-1/config.yml), so it ignores whatever traefik stamps and
# always publishes the same pointer. We set the matching stable hostname here so
# the Ingress ADDRESS column agrees and nothing carries the node's raw IP. (It
# used to be the node's LAN IP, discovered from the InternalIP and written to a
# gitignored values.local.yml — which silently grabbed the Tailscale interface
# once; the stable pointer removes that whole per-machine discovery.)
#
# `hostname` and `publishedService` are mutually exclusive ingress-endpoint
# sources, so disable the (no-op here) publishedService copy inherited from
# values.yml — on the minipc the traefik Service is LoadBalancer with EXTERNAL-IP
# <pending> forever (no LB controller; traffic flows through hostNetwork above),
# so it would copy nothing anyway. Dev/k3d keeps publishedService (klipper-lb
# fills the Service IP there) by not layering this file.
providers:
  kubernetesIngress:
    publishedService:
      enabled: false
    ingressEndpoint:
      hostname: minipc.whereisdana.today

# Override the chart default of 8000/8443 to bind real 80/443 under
# hostNetwork.
ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443
  # Expose the api/dashboard entrypoint on the traefik Service (chart
  # default is expose.default=false) so the dashboard Ingress in
  # k8s/traefik/prod-1/dashboard-ingress.yaml can route to it. Still
  # only reachable through that LAN-only Ingress (or a port-forward) —
  # the entrypoint isn't bound on hostNetwork.
  traefik:
    expose:
      default: true
