# Prod-1 traefik override — layered on top of values.yml via
# `helm upgrade --install ... -f values.yml -f values.prod-1.yml`.
# Stage-1 (bees / k3d) uses just values.yml.
#
# Talos has no LoadBalancer controller of its own; hostNetwork binds
# traefik directly to the node's IP on 80/443. MetalLB is the
# eventual alternative once a second node lands — see
# vault/infra/TODO.md. Trade-offs of this shape:
#   - single replica only (host ports can't coexist)
#   - second node needs revisiting (MetalLB or DaemonSet)
#   - traefik Service EXTERNAL-IP stays <pending> (no controller fills it)
#
# TODO[vault/infra/TODO.md#traefik-non-root]: drop runAsUser: 0 +
# NET_BIND_SERVICE — instead route inbound :80/:443 through the
# router's port-forward to high ports on the node, run traefik
# unprivileged.

hostNetwork: true

deployment:
  replicas: 1
  # Recreate (vs default RollingUpdate) so the old pod terminates
  # before the new one starts — with hostPorts on 80/443, two pods
  # can't coexist on the same node.
  kind: Deployment

updateStrategy:
  type: Recreate
  rollingUpdate: null

# Root + NET_BIND_SERVICE is the workaround for binding privileged
# ports under hostNetwork (the cleaner sysctl approach is blocked
# because hostNetwork pods can't set sysctls). See the TODO at the
# top of the file for the long-term fix.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0

securityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# LoadBalancer for chart consistency; EXTERNAL-IP stays <pending>
# because real traffic flows through hostNetwork.
service:
  type: LoadBalancer

# Make external-dns able to publish a target for every traefik-managed Ingress
# WITHOUT a per-Ingress `external-dns.alpha.kubernetes.io/target` annotation.
# external-dns reads its target from Ingress.status.loadBalancer.ingress[].ip;
# something has to write that. values.yml enables `publishedService`, which
# copies it from the traefik Service's status — but on the minipc the Service
# is LoadBalancer with EXTERNAL-IP <pending> forever (no LB controller; traffic
# flows through hostNetwork above), so there's nothing to copy and the status
# stays empty. Point traefik at the node's LAN IP directly instead: it then
# stamps 192.168.1.200 into every managed Ingress's status, and external-dns
# picks it up natively.
#
# `ip` and `publishedService` are mutually exclusive ingress-endpoint sources,
# so disable the (no-op here) publishedService copy inherited from values.yml.
# Dev/k3d keeps publishedService (klipper-lb fills the Service IP there) by not
# layering this file.
providers:
  kubernetesIngress:
    publishedService:
      enabled: false
    ingressEndpoint:
      ip: 192.168.1.200

# Override the chart default of 8000/8443 to bind real 80/443 under
# hostNetwork.
ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443
  # Expose the api/dashboard entrypoint on the traefik Service (chart
  # default is expose.default=false) so the dashboard Ingress in
  # k8s/traefik/prod-1/dashboard-ingress.yaml can route to it. Still
  # only reachable through that LAN-only Ingress (or a port-forward) —
  # the entrypoint isn't bound on hostNetwork.
  traefik:
    expose:
      default: true
