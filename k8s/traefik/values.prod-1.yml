# Prod-1 traefik override — layered on top of values.yml via
# `helm upgrade --install ... -f values.yml -f values.prod-1.yml`.
# Stage-1 (bees / k3d) uses just values.yml.
#
# Talos has no LoadBalancer controller of its own; hostNetwork binds
# traefik directly to the node's IP on 80/443. MetalLB is the
# eventual alternative once a second node lands — see
# vault/infra/TODO.md. Trade-offs of this shape:
#   - single replica only (host ports can't coexist)
#   - second node needs revisiting (MetalLB or DaemonSet)
#   - traefik Service EXTERNAL-IP stays <pending> (no controller fills it)
#
# TODO[vault/infra/TODO.md#traefik-non-root]: drop runAsUser: 0 +
# NET_BIND_SERVICE — instead route inbound :80/:443 through the
# router's port-forward to high ports on the node, run traefik
# unprivileged.

hostNetwork: true

deployment:
  replicas: 1
  # Recreate (vs default RollingUpdate) so the old pod terminates
  # before the new one starts — with hostPorts on 80/443, two pods
  # can't coexist on the same node.
  kind: Deployment

updateStrategy:
  type: Recreate
  rollingUpdate: null

# Root + NET_BIND_SERVICE is the workaround for binding privileged
# ports under hostNetwork (the cleaner sysctl approach is blocked
# because hostNetwork pods can't set sysctls). See the TODO at the
# top of the file for the long-term fix.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0

securityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# LoadBalancer for chart consistency; EXTERNAL-IP stays <pending>
# because real traffic flows through hostNetwork.
service:
  type: LoadBalancer

# Override the chart default of 8000/8443 to bind real 80/443 under
# hostNetwork.
ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443
