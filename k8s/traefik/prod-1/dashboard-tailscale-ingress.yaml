# Tailnet-native exposure of the Traefik dashboard via the Tailscale operator.
# Additive — the dashboard-ingress.yaml sibling (traefik.prod.whereisdana.today,
# on-LAN) stays. Gives https://traefik-prod.<tailnet>.ts.net, reachable from
# ANY network (CGNAT name, no LAN-subnet collision). Auto HTTPS via the tailnet
# cert. Same `traefik` port (api/dashboard) the LAN dashboard ingress uses.
#
# Still NO auth on the dashboard itself (--api.insecure=true) — reachability is
# now gated by the tailnet ACL rather than LAN-only. Add a traefik basic-auth
# middleware before sharing the URL beyond your own tailnet devices.
#
# Unlike the LAN sibling, this Ingress is handled by the tailscale operator
# (ingressClassName: tailscale) — traefik's Middleware CRDs don't apply here
# because requests reach the api/dashboard endpoint bypassing traefik's own
# kubernetesIngress router. The bare `/` → `/dashboard/` 301 is still visible
# here; a tailnet-side rewrite would be the follow-up if it matters.
#
# Applied by `task k8s:prod:platform:up` (kubectl apply -f) right after the
# sibling dashboard-ingress.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-dashboard-tailscale
  namespace: kube-system
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: traefik
      port:
        name: traefik
  tls:
    - hosts:
        - traefik-prod
