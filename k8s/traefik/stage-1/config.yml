#
# Configure the deployment
#
deployment:
  enabled: true
  # Additional pod annotations (e.g. for mesh injection or prometheus scraping)
  podAnnotations:
    prometheus.io/scrape: 'true'
  # Additional Pod labels (e.g. for filtering Pod by custom labels)
  podLabels:
    app: traefik
# deactivate Pilot integration
pilot:
  enabled: false
#
# Configure providers
#
providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true
    namespaces:
      - "default"
      - "kube-system"
    # IP used for Kubernetes Ingress endpoints
    publishedService:
      enabled: true
globalArguments:
  - "--global.checknewversion"
  - "--metrics.prometheus=true"
  - "--entryPoints.metrics.address=:9100/tcp"
  - "--metrics.prometheus.entryPoint=metrics"
# Configure ports
ports:
  web:
    # Added in 2.2, you can make permanent redirects via entrypoints.
    # https://docs.traefik.io/routing/entrypoints/#redirection
    redirectTo: websecure
# IngressRoute for the dashboard
ingressRoute:
  dashboard:
    enabled: true
# Options for the main traefik service, where the entrypoints traffic comes
# from.
service:
  enabled: true
  # Additional annotations (e.g. for cloud provider specific config)
  # annotations:
  #   external-dns.alpha.kubernetes.io/hostname: traefik.staging.whereisdana.today
  #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  #   service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:...
