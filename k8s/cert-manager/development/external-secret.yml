# ESO-managed Secret for cert-manager's DNS-01 Route53 solver. Pulls
# the same SM source as external-dns (k8s/external-dns/aws-credentials)
# but exposes the access-key-id + secret-access-key as raw keys —
# cert-manager wants discrete keys, not the INI format external-dns uses.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-aws-credentials
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore-cluster
    kind: ClusterSecretStore
  target:
    name: cert-manager-aws-credentials
  data:
    - secretKey: access-key-id
      remoteRef:
        key: /k8s/external-dns/aws-credentials
        property: access-key
    - secretKey: secret-access-key
      remoteRef:
        key: /k8s/external-dns/aws-credentials
        property: secret-key
