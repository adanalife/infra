apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No namespace here — the development umbrella stamps these into the
# development namespace. The Issuer + cred Secret are CRD/Secret objects
# (no pods), so they don't clutter `kubectl get pods -n development`.
#
# dev borrows the adanalife-stage account, so this is byte-identical to
# app-issuer/stage-1 (same ExternalDNSRole ARN, same SecretStore).
resources:
  - issuer.yml
  - external-secret.yml
