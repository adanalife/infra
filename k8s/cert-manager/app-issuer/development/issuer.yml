# KEEP-IN-SYNC: k8s/cert-manager/app-issuer/{prod-1,stage-1,development}/issuer.yml
# (identical except the route53 `role:` ARN — prod's vs stage's
# ExternalDNSRole, in their respective accounts). development borrows the
# adanalife-stage account, so it's byte-identical to stage-1.
#
# Namespaced Issuers for APP ingresses (tripbot/vlc/obs), stamped into the
# env's app namespace by the umbrella. App ingresses reference these via
# `cert-manager.io/issuer` (not cluster-issuer) so each env's DNS-01
# challenge is solved with that env's own account creds + ExternalDNSRole —
# no cross-account. The kube-system ClusterIssuers stay for the PLATFORM
# ingresses (hubble/traefik), which live in kube-system and are prod-zone.
#
# The role ARN is the adanalife-stage account's ExternalDNSRole (already
# defined in terraform/stage-1, KEEP-IN-SYNC with prod).
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-staging-route53
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: danadotlol@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-route53-account
    solvers:
      - dns01:
          route53:
            region: us-east-1
            accessKeyIDSecretRef:
              name: cert-manager-aws-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: cert-manager-aws-credentials
              key: secret-access-key
            role: arn:aws:iam::413585268653:role/ExternalDNSRole
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-route53
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: danadotlol@gmail.com
    privateKeySecretRef:
      name: letsencrypt-route53-account
    solvers:
      - dns01:
          route53:
            region: us-east-1
            accessKeyIDSecretRef:
              name: cert-manager-aws-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: cert-manager-aws-credentials
              key: secret-access-key
            role: arn:aws:iam::413585268653:role/ExternalDNSRole
