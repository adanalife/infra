apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No namespace here — the prod-1 umbrella stamps these into prod-1. The
# Issuer + cred Secret are CRD/Secret objects (no pods), so they don't
# clutter `kubectl get pods -n prod-1`; only external-dns moves to the
# dedicated prod-1-platform namespace.
resources:
  - issuer.yml
  - external-secret.yml
