# KEEP-IN-SYNC: k8s/cert-manager/app-issuer/{prod-1,stage-1}/external-secret.yml
# (byte-identical — stamped into the env's app namespace by the umbrella,
# reads the env's own account via that namespace's aws-secretsmanager
# SecretStore).
#
# cert-manager's DNS-01 Route53 solver creds for the namespaced Issuers in
# this namespace. Pulls k8s/external-dns/aws-credentials from the env's
# account and exposes discrete keys (cert-manager wants discrete keys, not
# external-dns's INI format).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-aws-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: cert-manager-aws-credentials
  data:
    - secretKey: access-key-id
      remoteRef:
        key: k8s/external-dns/aws-credentials
        property: access-key
    - secretKey: secret-access-key
      remoteRef:
        key: k8s/external-dns/aws-credentials
        property: secret-key
