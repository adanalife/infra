apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No namespace here — the stage-1 umbrella stamps these into stage-1. The
# Issuer + cred Secret are CRD/Secret objects (no pods), so they don't
# clutter `kubectl get pods -n stage-1`; only external-dns moves to the
# dedicated stage-1-platform namespace.
resources:
  - issuer.yml
  - external-secret.yml
