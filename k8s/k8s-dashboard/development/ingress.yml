# Ingress for the kubernetes-dashboard chart at
# k8s-dashboard.dev.whereisdana.today. external-dns publishes a
# Route53 record (target = host public IPv4 via external-dns
# --default-targets, set per-machine in values.local.yml).
#
# HTTP-only today. cert-manager is installed and proven (the smoke-test
# Certificate in k8s/cert-manager/development/ issues against LE staging on
# every cluster bring-up). The remaining blocker is the home-network
# port-forward — once inbound 443 reaches traefik, uncomment the
# cert-manager.io/cluster-issuer annotation AND the tls: block below to
# flip this URL to HTTPS. Start with letsencrypt-staging-route53 to
# avoid LE prod's per-week duplicate-cert limit; flip to
# letsencrypt-route53 once the first cert issues clean.
#
# BEFORE FLIPPING TO HTTPS: the kubernetes-dashboard chart's own auth
# (token login) gates write actions, but anyone who can reach this URL
# gets the read-side dashboard. That was always the case behind the
# Cloudflare Access IP allowlist; revisit before publishing it on the
# open internet.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-dashboard
  namespace: kube-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: k8s-dashboard.dev.whereisdana.today
    # cert-manager.io/cluster-issuer: letsencrypt-staging-route53
spec:
  ingressClassName: traefik
  # tls:
  #   - hosts:
  #       - k8s-dashboard.dev.whereisdana.today
  #     secretName: k8s-dashboard-tls
  rules:
    - host: k8s-dashboard.dev.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-dashboard-kubernetes-dashboard
                port:
                  name: http
