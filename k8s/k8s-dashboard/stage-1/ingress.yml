# Ingress for the kubernetes-dashboard chart at
# k8s-dashboard.stage.whereisdana.today. external-dns publishes a
# Route53 record (target = host public IP via external-dns
# --default-targets, set per-machine in values.local.yml).
#
# HTTP-only for now — TLS depends on cert-manager, which isn't wired
# into k8s:platform:up yet (blocked on the home-network port-forward
# work). Add `cert-manager.io/cluster-issuer` annotation + tls block
# once cert-manager is live.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-dashboard
  namespace: kube-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: k8s-dashboard.stage.whereisdana.today
spec:
  ingressClassName: traefik
  rules:
    - host: k8s-dashboard.stage.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-dashboard-kubernetes-dashboard
                port:
                  name: http
