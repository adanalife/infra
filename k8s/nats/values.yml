# NATS chart values shared across all envs. Per-env overlays at
# k8s/nats/<env>/values.yml layer resource sizing + namespace context on top.
#
# Phase 0 (captured 2026-05-28): single-node, no JetStream, no PVC — the
# substrate to start migrating fire-and-forget HTTP calls onto a pubsub fabric.
#
# Phase 3 (2026-05-29): JetStream on, file-backed, so the admin live console's
# chat log + live-map breadcrumb trail survive a tripbot reboot (core NATS has
# no replay; the hub's in-memory ring/trail reset to empty on every restart).
# tripbot declares the streams (TRIPBOT_CHAT, TRIPBOT_VIDEO) at startup and
# backfills its buffers from them. Single-node still — durability here means
# "survives a NATS pod restart / node reboot," not HA replication.
#
# Topic convention (producer-side, not enforced here):
#   tripbot.<env>.<domain>.<event>
# e.g. tripbot.prod.onscreens.middle.show

config:
  # Single binary — chart default, made explicit as a tripwire if
  # someone ever flips it without thinking through the cluster mode
  # implications (cluster needs replicas >= 2 + JetStream for HA).
  cluster:
    enabled: false
  jetstream:
    enabled: true
    # File-backed so streams survive a NATS pod restart / node reboot. The
    # chart promotes the workload to a StatefulSet with a per-pod PVC; each env
    # runs its own NATS release in its own namespace, so each gets an isolated
    # JetStream store for free.
    #
    # CAVEAT: on the mini-PC (Talos) this PVC is local-path, which `talosctl
    # upgrade` WIPES even with --preserve (see vault talosctl-upgrade-ephemeral
    # -wipe memory). Acceptable here — the data is best-effort recent history
    # (last ~500 chat lines / ~200 video changes), rebuilt live after any wipe.
    fileStore:
      enabled: true
      pvc:
        enabled: true
        size: 1Gi  # streams are tiny (a few hundred small msgs); 1Gi is headroom
        # Pin the storage class — this cluster has NO default StorageClass (PVCs
        # without one stay Pending: "no persistent volumes available … and no
        # storage class is set"), so every PVC names local-path explicitly, same
        # as dashcam-cv / postgres. local-path is the provisioner on both the
        # Talos mini-PC (stage/prod) and k3d (dev).
        storageClassName: local-path
    memoryStore:
      enabled: false
  # Monitor endpoint on :8222 backs the prom exporter sidecar below.
  monitor:
    enabled: true

# Sidecar prom exporter on :7777 scraping the :8222 monitor endpoint.
# Annotation auto-discovery below routes alloy-metrics to it.
promExporter:
  enabled: true
  port: 7777

# Surface the scrape endpoint to alloy-metrics annotation auto-discovery.
# Matches the prometheus.io/* keys configured in
# annotationAutodiscovery.annotations in k8s/monitoring/<env>/values.yml.
podTemplate:
  merge:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7777"
        prometheus.io/path: "/metrics"

# nats-box (a small pod carrying the `nats` CLI) is disabled. It's a smoke-test
# convenience only — nothing in the data path uses it. Under the restricted Pod
# Security Standard it needs a non-root securityContext, but the natsio/nats-box
# image's HOME (/nsc) is owned by root, so a pinned non-root UID can't write its
# config dir (`mkdir /nsc/.config: permission denied`) and the pod CrashLoopBacks
# off. Rather than carry a writable-home workaround for a pod we rarely touch,
# leave it off — less surface on a single-node cluster. To smoke-test, port-
# forward the server and use a local `nats` CLI (see k8s/nats/README.md).
natsBox:
  enabled: false
