# k3d cluster config for app development.
#
# Bring up with:  task k8s-up
# Tear down with: task k8s-down
#
# Cluster name encodes the host (`bees` is dmerrick-bees) so future
# laptops get their own — `adanalife-<host>`.
#
# No host port bindings: HTTP/HTTPS for stage-1 mode goes through
# the Cloudflare Tunnel (no inbound listener on this machine).
# Anything else (VNC, RTSP, traefik dashboard, etc.) is reachable
# ad-hoc via `kubectl port-forward svc/<name> <local>:<remote>`.
#
# Notes for future EKS port:
#   - Bundled traefik (ingress) IS portable — same Ingress manifests
#     will work on prod traefik unchanged.
#   - Bundled servicelb / klipper-lb is k3d/k3s-only. On EKS,
#     LoadBalancer services are fulfilled by AWS ELB instead. The
#     Service manifests don't change; only the implementation underneath
#     does.
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: adanalife-bees

servers: 1
agents: 0

# Mount host paths into the k3d node so pod hostPath volumes can reach
# them. k3d nodes are themselves containers, so without this the host
# filesystem isn't visible to pods.
volumes:
  - volume: /Users/dmerrick/adanalife/tripbot/assets/video:/host/dashcam
    nodeFilters:
      - server:*
