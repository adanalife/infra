# Intel GPU device plugin for adanalife-minipc (prod-1).
#
# Registers `gpu.intel.com/i915` as a schedulable resource so OBS and
# vlc-server can request the iGPU via standard pod resource limits
# instead of bind-mounting /dev/dri via hostPath (which would require
# PSS-labeling the default namespace privileged). Pre-req: the
# i915-ucode Talos extension creates /dev/dri/renderD128 on the node.
#
# Lives in kube-system because:
#   1. The plugin's own pod needs hostPath access to /dev/dri,
#      /sys/class/drm, /var/lib/kubelet/device-plugins, /var/run/cdi.
#      kube-system is PSS-exempt by the Talos machine config.
#   2. Convention — kube-proxy, coredns, and other system DaemonSets
#      already live there.
#
# Patches:
#   `-enable-monitoring` advertises a sibling `gpu.intel.com/i915_monitoring`
#   resource that XPU Manager (see intel-xpu-manager/prod-1/) claims to
#   read GPU telemetry off all devices on the node.
#
#   `-shared-dev-num=8` advertises 8 virtual instances of the single
#   physical iGPU so multiple pods can share the device. The claim
#   ledger (worst-case steady state): prod obs-twitch + prod
#   obs-youtube + prod playout-youtube (vah264enc) + stage obs-youtube
#   + stage playout-youtube + the stage video-optimization job = 6,
#   leaving 2 slots of surge headroom for OBS RollingUpdates (playout
#   uses Recreate; vlc-server stream-copies and claims nothing). A
#   playout-twitch claim joins at cutover — still within 8. The Iris
#   Xe handles concurrent VAAPI clients fine — desktop Linux runs
#   Firefox + VLC + OBS sharing the same iGPU every day. Was 4 (no
#   surge headroom; the 2026-05-28 vlc-server rollout stuck Pending
#   on the missing 5th slot), then 6, then 8. Scheduling is only half
#   the guardrail: stage-1's ResourceQuota caps stage's aggregate
#   claims at 3 so stage scale-ups park Pending instead of contending
#   with the prod stream.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources:
  - github.com/intel/intel-device-plugins-for-kubernetes/deployments/gpu_plugin?ref=v0.35.0

patches:
  - target:
      kind: DaemonSet
      name: intel-gpu-plugin
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args
        value:
          - -enable-monitoring
          - -shared-dev-num=8
