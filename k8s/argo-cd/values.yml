# Argo CD — the GitOps controller that reconciles the committed cdk8s/dist app
# manifests. Installed by the cdk8s platform layer (PlatformChart, minipc only).
#
# MONITOR-ONLY by design right now: this install does nothing to your workloads
# on its own. Argo only watches the live cluster vs git and reports drift
# (Synced / OutOfSync + a diff). Whether it ever *applies* anything is decided
# per-Application — and gitops/applicationset.yaml uses MANUAL sync (no
# automated prune/selfHeal), so no changes happen until you click Sync. Flipping
# to continuous reconcile is a one-line change in the ApplicationSet, post-cutover.
#
# Near-default chart values — keep it minimal. The applicationset controller
# (which we depend on) is enabled by default; do NOT disable it.

# The tailnet hostname the UI is reachable at (tailscale Ingress below). Used for
# correct link/redirect generation.
global:
  domain: argocd-prod.tail020deb.ts.net

configs:
  # No login on the UI/API. Access is already gated by the Tailscale Ingress
  # (only this tailnet can reach argocd-prod.<tailnet>.ts.net), so a second auth
  # layer is friction without benefit for a single-operator tailnet. Anonymous
  # requests get the default RBAC role below.
  cm:
    users.anonymous.enabled: "true"
  rbac:
    # Anonymous (and everyone) gets full admin — needed to click Sync. Dial to
    # role:readonly if you want the monitor-only phase to be click-proof; you'd
    # then re-enable login to sync.
    policy.default: role:admin
  params:
    # Belt-and-suspenders: refuse to auto-create namespaces. The env namespaces
    # (prod-1 / stage-1) are owned by the cluster bootstrap, not Argo.
    application.namespaces: prod-1,stage-1
    # Run argocd-server without its own TLS/redirect — TLS is terminated at the
    # tailnet edge by the Tailscale operator Ingress (k8s/argo-cd/tailscale-ingress.yaml),
    # which forwards plain HTTP to argocd-server:80. Required to sit behind a proxy.
    server.insecure: true

# UI/API access is via the Tailscale Ingress (argocd-prod.<tailnet>.ts.net) — see
# tailscale-ingress.yaml. `kubectl -n argocd port-forward svc/argocd-server` also
# works as a fallback.

# Notifications — autosync's safety net. With apps on automated sync, a bad
# deploy lands while nobody is watching the UI; the notifications controller
# (runs by default in this chart) posts sync failures + health degradation to
# the same Discord channel tripbot's reportCmd and the Grafana alerts use.
# Event-driven, so it costs zero Grafana Cloud active series (the metrics
# budget sits near the free-tier cap) and fires faster than an eval loop.
#
# The webhook URL lives in the argocd-notifications-secret Secret, materialized
# by ESO from SM `k8s/tripbot/discord-alerts-webhook` (the ExternalSecret ships
# in cdk8s/dist/argocd.k8s.yaml via `task gitops:apply`) — hence
# secret.create=false here.
notifications:
  argocdUrl: https://argocd-prod.tail020deb.ts.net
  secret:
    create: false
  notifiers:
    # Discord webhooks accept a plain {"content": ...} JSON POST.
    service.webhook.discord: |
      url: $discord-webhook-url
      headers:
        - name: Content-Type
          value: application/json
  templates:
    # Bodies stay free of app.status free-text (operationState.message can
    # contain quotes/newlines that would break the JSON) — the UI link carries
    # the detail.
    template.app-sync-failed: |
      webhook:
        discord:
          method: POST
          body: |
            {"content": "🔴 Argo: **{{.app.metadata.name}}** sync {{.app.status.operationState.phase}} — {{.context.argocdUrl}}/applications/{{.app.metadata.name}}"}
    template.app-health-degraded: |
      webhook:
        discord:
          method: POST
          body: |
            {"content": "🟠 Argo: **{{.app.metadata.name}}** health Degraded — {{.context.argocdUrl}}/applications/{{.app.metadata.name}}"}
  triggers:
    trigger.on-sync-failed: |
      - when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-health-degraded]
  # Global default subscription — every Application in this Argo (tripbot apps +
  # platform releases), no per-app annotations to maintain.
  subscriptions:
    - recipients:
        - discord
      triggers:
        - on-sync-failed
        - on-health-degraded
