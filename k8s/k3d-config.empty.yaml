# k3d cluster config for prod-1 on the `empty` host (dmerrick-empty).
#
# Bring up with:  task k8s:prod:cluster:up
# Tear down with: task k8s:prod:cluster:down
#
# Sibling of k3d-config.bees.yaml. Cluster name is host-based, not env-based
# (see bees config header for the why). Most fields are identical; the
# deltas are:
#   - metadata.name: adanalife-empty (vs adanalife-bees)
#   - no dashcam volume mount: prod-1 apps stay dormant in this pass, so
#     the /host/dashcam mount has no consumer. Re-introduce when apps land
#     here (and verify the path resolves on the host's user home —
#     hardcoded /Users/dmerrick/ paths may not be portable across machines).
#
# Public 80/443 path on this host goes through an external reverse-proxy
# appliance on the host's local network. Routing from the proxy to the
# cluster's 9080/9443 is the missing link for TLS-serving; tracked in
# the infra TODO under the public-80/443 follow-up.
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: adanalife-empty

servers: 1
agents: 0

# Disable k3s's bundled Traefik. We install traefik/traefik via helm in
# `task k8s:prod:platform:up` instead, so the full chart's CRDs (default
# IngressClass, dashboard wiring, prometheus metrics) are available
# without the HelmChartConfig customization dance the bundled chart
# requires.
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*

# Map host ports onto the bundled klipper-lb so external traffic can
# reach traefik. High ports (9080/9443) instead of standard 80/443
# because Colima can't forward privileged ports (<1024) to the host
# without sudo; same constraint as bees. The external reverse-proxy
# port translation lands externally.
ports:
  - port: 9080:80
    nodeFilters:
      - loadbalancer
  - port: 9443:443
    nodeFilters:
      - loadbalancer
