# Helm values for the cilium/cilium chart on adanalife-minipc (Talos).
# Cilium is the CNI + kube-proxy replacement — Talos installs neither (see
# cluster.network.cni.name=none + cluster.proxy.disabled in
# talos/adanalife-minipc/controlplane.patch.yaml). Installed as the FIRST
# platform step by `task k8s:<env>:platform:up`; the node stays NotReady
# until this lands.
#
# Talos specifics (per the Talos "Deploying Cilium" guide):
#   - cgroup.autoMount.enabled=false + hostRoot=/sys/fs/cgroup — Talos
#     mounts the cgroup2 fs itself; Cilium must not try to remount it.
#   - securityContext.capabilities — Talos runs a locked-down host, so the
#     agent + cleanup pods need their capability sets named explicitly.
#   - k8sServiceHost=localhost / k8sServicePort=7445 — KubePrism, Talos's
#     in-host API-server load balancer (default-on 1.5+). With kube-proxy
#     gone, Cilium needs a kube-apiserver address that doesn't depend on a
#     ClusterIP; KubePrism gives a stable localhost endpoint.

ipam:
  mode: kubernetes

# eBPF kube-proxy replacement (Talos ships no kube-proxy).
kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Hubble — flow visibility + the web service map Dana wanted (DNS-aware,
# shows pod → twitch.tv egress, not just IP↔IP).
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    # Internal-IP Ingress at hubble.prod.whereisdana.today — external-dns
    # publishes the Route53 record at the mini-PC LAN IP (192.168.1.200),
    # so the host resolves anywhere but is only reachable on the home
    # network. cert-manager issues via DNS-01, independent of inbound
    # reachability. Same shape as the vlc/obs/tripbot app Ingresses.
    #
    # Cilium is only installed on the minipc (Talos has no CNI; dev/k3d
    # brings its own), so this file is effectively prod-only and the
    # hostname can live here directly — there's a single Hubble per cluster.
    #
    # NO auth: Hubble UI ships no login, so reachability is gated entirely
    # by the LAN-only target — same posture as vlc/obs. Add a traefik
    # basic-auth middleware here before exposing beyond the LAN.
    ingress:
      enabled: true
      className: traefik
      annotations:
        external-dns.alpha.kubernetes.io/hostname: hubble.prod.whereisdana.today
        cert-manager.io/cluster-issuer: letsencrypt-route53
      hosts:
        - hubble.prod.whereisdana.today
      tls:
        - hosts:
            - hubble.prod.whereisdana.today
          secretName: hubble-ui-tls

# Pod annotations so grafana-k8s-monitoring's annotationAutodiscovery
# scrapes Cilium's metrics (same pattern as external-secrets/traefik values).
operator:
  # Single-node cluster — the chart's default 2 operator replicas have pod
  # anti-affinity, so the 2nd sits Pending forever. One operator is plenty;
  # bump back to 2 if/when a second node joins.
  replicas: 1
  prometheus:
    enabled: true
# LAUNCH-DAY TRIM: cilium-agent scrape disabled to free ~600 active
# series under Mimir's 15K hard cap. Lose network-policy / drop /
# forward counters and per-node hubble flow stats — if launch traffic
# causes weird connectivity issues we'd be debugging blind on the
# datapath. Operator metrics (above) stay on; they're tiny and cover
# control-plane health. Re-enable by flipping this back to true.
prometheus:
  enabled: false
