name: Terraform

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
      - '.github/workflows/terraform-apply.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/core, terraform/stage-1, terraform/prod-1]
    env:
      # required in order to comment on MRs
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: ./.github/scripts/set-deploy-env.sh ${{ matrix.terraform-dirs }}
        env:
          CI_CORE_AWS_ACCESS_KEY_ID: ${{ secrets.CI_CORE_AWS_ACCESS_KEY_ID }}
          CI_CORE_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_CORE_AWS_SECRET_ACCESS_KEY }}
          CI_PROD_AWS_ACCESS_KEY_ID: ${{ secrets.CI_PROD_AWS_ACCESS_KEY_ID }}
          CI_PROD_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_PROD_AWS_SECRET_ACCESS_KEY }}
          CI_STAGE_AWS_ACCESS_KEY_ID: ${{ secrets.CI_STAGE_AWS_ACCESS_KEY_ID }}
          CI_STAGE_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_STAGE_AWS_SECRET_ACCESS_KEY }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: CITerraformRole
      - run: aws sts get-caller-identity
      - name: terraform plan
        uses: dflook/terraform-plan@v1
        with:
          path: ${{ matrix.terraform-dirs }}

  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/core, terraform/prod-1, terraform/stage-1]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: terraform validate
        uses: dflook/terraform-validate@v1
        with:
          path: ${{ matrix.terraform-dirs }}

  fmt:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/core, terraform/prod-1, terraform/stage-1]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: terraform fmt
        uses: dflook/terraform-fmt-check@v1
        with:
          path: ${{ matrix.terraform-dirs }}
