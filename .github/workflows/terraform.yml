name: Terraform Stuff
on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
jobs:
  terraform-stuff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # note that the bootstrap dir is not included here, that's
        # because it isn't used much and as such it's on a really
        # old version of terraform
        terraform-dirs: [terraform/stage-1]
        # terraform-dirs: [terraform/core, terraform/prod-1, terraform/stage-1]
    defaults:
      run:
        working-directory: ${{ matrix.terraform-dirs }}
    steps:
      - uses: actions/checkout@v2
      - uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.5"
          # this was suggested by the terraform-report action
          terraform_wrapper: false
      - run: terraform fmt -check -diff
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          role-to-assume: arn:aws:iam::413585268653:role/CITerraformRole
      - run: terraform init
      - run: terraform plan -lock=false -out terraform.plan
      # generate plain output
      - run: terraform show -no-color terraform.plan | tee terraform.text
      # generate json output
      - run: terraform show -json terraform.plan | tee terraform.json
        #TODO: remove this
      - run: ls -al
      - uses: ahmadnassri/action-terraform-report@v4
        with:
          # tell the action the plan outputs
          # terraform-text: ${{ github.workspace }}/terraform.text
          # terraform-json: ${{ github.workspace }}/terraform.json
          terraform-text: terraform.text
          terraform-json: terraform.json
          remove-stale-reports: true
