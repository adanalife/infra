name: pre-commit

on:
  pull_request:
  push:
    branches: [master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - uses: hashicorp/setup-terraform@v4
    - uses: pre-commit/action@v3.0.1
      env:
        SKIP: no-commit-to-branch
