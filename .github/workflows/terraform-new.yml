name: Create terraform plan

on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/stage-1]
    name: Create a plan for an example terraform configuration
    env:
      # required in order to comment on MRs
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          role-to-assume: CITerraformRole
      - name: terraform plan
        uses: dflook/terraform-plan@v1
        with:
          path: ${{ matrix.terraform-dirs }}

  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/core, terraform/prod-1, terraform/stage-1]
    name: Validate terraform configuration
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: terraform validate
        uses: dflook/terraform-validate@v1
        with:
          path: ${{ matrix.terraform-dirs }}

  fmt:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/core, terraform/prod-1, terraform/stage-1]
    name: Check formatting of terraform files
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: terraform fmt
        uses: dflook/terraform-fmt-check@v1
        with:
          path: ${{ matrix.terraform-dirs }}
