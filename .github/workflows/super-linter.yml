---
name: super-linter

# pre-commit covers the per-PR lint surface (same hooks run locally and in
# pre-commit.yml); super-linter is the belt-and-braces full-codebase sweep,
# so it runs weekly + on demand instead of on every PR.
on:
  schedule:
    - cron: '13 9 * * 1' # Mondays 09:13 UTC
  workflow_dispatch:

jobs:
  build:
    name: Run Linters
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # fetch-depth: 0 is required by super-linter v6+: it diffs against
      # the default branch (main) to figure out which files changed,
      # which means main has to be present in the local checkout.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: run-linters
        uses: super-linter/super-linter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          # weekly sweep lints everything, not just a PR diff
          VALIDATE_ALL_CODEBASE: true
          # don't post a "Super-linter summary" comment on every PR run
          # (the Actions step summary tab still gets the same content)
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false

          # Per-linter config files live under .github/linters/ (super-linter's
          # default LINTER_RULES_PATH). Most linters auto-discover their config
          # there; some need an explicit pointer.
          GITLEAKS_CONFIG_FILE: .gitleaks.toml
          MARKDOWN_CONFIG_FILE: .markdown-lint.yml
          YAML_CONFIG_FILE: .yaml-lint.yml

          # ─── languages not used in this repo ─────────────────────────
          # No Go, JS/TS, Python, Ruby, PHP, Rust, Lua, Perl, etc. in
          # infra. Disable language validators that would otherwise
          # auto-run with no targets (or with stray targets like .json).
          VALIDATE_GO: false
          VALIDATE_GO_MODULES: false
          VALIDATE_GO_RELEASER: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_JSX: false
          VALIDATE_JSX_PRETTIER: false
          VALIDATE_TSX: false
          VALIDATE_TSX_PRETTIER: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_RUFF: false
          VALIDATE_RUBY: false
          VALIDATE_RUST_2015: false
          VALIDATE_RUST_2018: false
          VALIDATE_RUST_2021: false
          VALIDATE_RUST_CLIPPY: false
          VALIDATE_PHP: false
          VALIDATE_PHP_BUILTIN: false
          VALIDATE_PHP_PHPCS: false
          VALIDATE_PHP_PHPSTAN: false
          VALIDATE_PHP_PSALM: false
          VALIDATE_PERL: false
          VALIDATE_LUA: false
          VALIDATE_R: false
          VALIDATE_SCALAFMT: false
          VALIDATE_GROOVY: false
          VALIDATE_KOTLIN: false
          VALIDATE_DART: false
          VALIDATE_CSHARP: false
          VALIDATE_CLOJURE: false
          VALIDATE_CLOUDFORMATION: false
          VALIDATE_HTML: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_CSS: false
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_LATEX: false
          VALIDATE_PROTOBUF: false
          VALIDATE_OPENAPI: false
          VALIDATE_GRAPHQL_PRETTIER: false
          VALIDATE_GRAPHQL_SCHEMA: false
          VALIDATE_ENV: false
          VALIDATE_ANSIBLE: false
          VALIDATE_DOCKERFILE_HADOLINT: false  # no Dockerfiles in repo

          # ─── deferred: opinionated formatters ────────────────────────
          # Defer all *_PRETTIER and SHELL_SHFMT — opinionated, large
          # surface, and not what we're trying to enforce here.
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_SHELL_SHFMT: false

          # ─── deferred: prose / spelling ─────────────────────────────
          # Hundreds of findings on technical README prose; would need
          # an ignore-words config to be useful.
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_SPELL_CODESPELL: false
          VALIDATE_SPELL_PROSELINT: false
          VALIDATE_SPELL_VALE: false
          VALIDATE_SPELL_CSPELL: false

          # ─── deferred: vuln/IaC scanners ────────────────────────────
          # These need separate triage workflows (and tend to be loud
          # on real terraform). Wire them in their own PRs once we
          # have an exclusion-list strategy.
          VALIDATE_TRIVY: false
          VALIDATE_CHECKOV: false
          VALIDATE_KUBERNETES_KUBECONFORM: false
          VALIDATE_KUBERNETES_HELM: false

          # ─── deferred: covered by pre-commit ─────────────────────────
          # terraform_fmt runs in pre-commit (.pre-commit-config.yaml).
          # Avoid duplicate / conflicting opinions until we consolidate
          # the toolchain.
          VALIDATE_TERRAFORM_FMT: false
          VALIDATE_TERRAFORM_TFLINT: false

          # ─── deferred: misc ──────────────────────────────────────────
          # GITHUB_ACTIONS_ZIZMOR is the strict-security actionlint
          # variant; turn on later once the regular GITHUB_ACTIONS
          # validator is clean.
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          VALIDATE_JSCPD: false
          VALIDATE_SQLFLUFF: false
          VALIDATE_EDITORCONFIG: false
