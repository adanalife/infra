name: bump-version
on:
  push:
    branches:
      - master

jobs:
  build:
    permissions:
      contents: write
      # needed to dispatch release.yml below
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: '0'
    - name: Bump version and push tag
      id: tag
      uses: anothrNick/github-tag-action@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DEFAULT_BUMP: patch
        WITH_V: true
    # Tags pushed with GITHUB_TOKEN don't trigger on:push workflows, so
    # release.yml (Discord notify) never fires from the auto-bump. Dispatch
    # it explicitly at the new tag instead.
    - name: Dispatch release workflow at the new tag
      run: gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref "${{ steps.tag.outputs.new_tag }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
