name: cdk8s

# Lints + tests the Python cdk8s authoring layer: synth must succeed, the unit +
# contract tests pass, and the committed dist/ (the GitOps source) stays in sync
# with a fresh synth. No cluster needed — `cdk8s synth` is offline.
on:
  pull_request:
    paths:
      - 'cdk8s/**'
      - '.github/workflows/cdk8s.yml'

defaults:
  run:
    working-directory: cdk8s

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Toolchain via mise (cdk8s/.mise.toml pins python / node / cdk8s-cli /
      # helm), per vault/decisions/golang-development-with-mise.md.
      - uses: jdx/mise-action@v2
        with:
          working_directory: cdk8s

      # uv handles project-local Python deps on top of mise's interpreter
      # (vault/decisions/preferred-tools.md).
      - uses: astral-sh/setup-uv@v7

      - name: Install Python deps
        run: uv sync

      - name: Generate typed k8s constructs (cdk8s import)
        run: mise exec -- uv run cdk8s import

      # Unit tests + the contract test.
      - name: Run tests
        run: mise exec -- uv run pytest -q

      # Golden-file gate: the committed dist/ deploy units (the GitOps source)
      # must match a fresh synth. Uses the same NFS placeholders the committed
      # files were generated with. Fails if dist/ is stale (forgot to re-synth).
      - name: Assert committed dist/ is up to date
        env:
          NFS_SERVER: '<NFS server address>'
          NFS_PATH: '<export path>'
        run: |
          mise exec -- uv run cdk8s synth
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is stale — run 'task cdk8s:synth' and commit the result."
            exit 1
          fi
