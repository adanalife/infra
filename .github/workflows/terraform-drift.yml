name: Check for infrastructure drift

on:
  #TODO: remove this
  pull_request:
  schedule:
    # every morning
    - cron:  "0 8 * * *"

jobs:
  check_drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dirs: [terraform/core, terraform/prod-1, terraform/stage-1]
    name: Check for drift of terraform configuration
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for drift
        uses: dflook/terraform-check@v1
        with:
          path: ${{ matrix.terraform-dirs }}
