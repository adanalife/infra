name: Apply Terraform

on:
  # trigger with PR comment
  issue_comment:
    types:
      - created
  # manually trigger build
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose the deployment environment'
        required: true
        type: choice
        default: stage-1
        options:
          - prod-1
          - stage-1
          - core

jobs:
  apply:
    runs-on: ubuntu-latest
    name: Apply terraform configuration
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Determine terraform dir
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "terraform_dir=terraform/${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          elif [[ "${{ github.event.comment.body }}" =~ ^/apply ]]; then
            terraform_dir=$(echo "${{ github.event.comment.body }}" | cut -d' ' -f2)
            echo "terraform_dir=$terraform_dir" >> $GITHUB_ENV
          else
            echo "Unsupported trigger source."
            exit 1
        #TODO: update the script so we dont _have_ to pass in a terraform path
      - run: ./.github/scripts/set-deploy-env.sh ${{ env.terraform_dir }}
        env:
          CI_CORE_AWS_ACCESS_KEY_ID: ${{ secrets.CI_CORE_AWS_ACCESS_KEY_ID }}
          CI_CORE_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_CORE_AWS_SECRET_ACCESS_KEY }}
          CI_PROD_AWS_ACCESS_KEY_ID: ${{ secrets.CI_PROD_AWS_ACCESS_KEY_ID }}
          CI_PROD_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_PROD_AWS_SECRET_ACCESS_KEY }}
          CI_STAGE_AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          CI_STAGE_AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: CITerraformRole
      - name: terraform apply
        uses: dflook/terraform-apply@v1
        with:
          path: ${{ env.terraform_dir }}
          # skip the terraform plan if running via workflow dispatch
          auto_approve: ${{ github.event_name == 'workflow_dispatch' }}
