name: cdk8s-synth

# Lints + tests the Python cdk8s authoring layer: synth must succeed and the
# unit + contract tests pass. No cluster needed — `cdk8s synth` is offline.
#
# dist/ (the GitOps source Argo reads) is kept in sync by CI itself: on PRs,
# a stale dist/ gets re-synthed and pushed back to the branch as a follow-up
# commit, so nobody has to run `task cdk8s:synth` locally. On main pushes
# the job is verify-only and fails if dist/ is stale (belt-and-braces for
# anything that slips around the PR path).
#
# The push-back authenticates as the adanalife-automation GitHub App (token
# minted per run; credentials fanned out by terraform/platform), not
# GITHUB_TOKEN — commits pushed with GITHUB_TOKEN don't trigger workflows,
# so checks would never run on the synth commit. On dependabot PRs the app
# secret is unavailable: the mint step soft-fails and checkout falls back to
# GITHUB_TOKEN (effectively verify-only).
on:
  pull_request:
    paths:
      - 'cdk8s/**'
      - '.github/workflows/cdk8s-synth.yml'
  push:
    branches:
      - main
    paths:
      - 'cdk8s/**'
      - '.github/workflows/cdk8s-synth.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The synth job pushes a re-synthed dist/ commit back to the PR branch, so it
# needs write access to repo contents. No other scopes are required.
permissions:
  contents: write

defaults:
  run:
    working-directory: cdk8s

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # continue-on-error: dependabot PRs can't read repo secrets — the mint
      # fails there and the || fallback below kicks in.
      - name: Mint automation app token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          # PR runs check out the branch tip (not the merge ref) so the
          # re-synth commit can be pushed straight back to the branch.
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}

      # Toolchain via mise (cdk8s/.mise.toml pins python / node / cdk8s-cli /
      # helm).
      - uses: jdx/mise-action@v4
        with:
          working_directory: cdk8s

      # uv handles project-local Python deps on top of mise's interpreter.
      - uses: astral-sh/setup-uv@v8.2.0 # no floating major tag published

      - name: Install Python deps
        run: uv sync

      - name: Generate typed k8s constructs (cdk8s import)
        run: mise exec -- uv run cdk8s import

      # Unit tests + the contract test.
      - name: Run tests
        run: mise exec -- uv run pytest -q

      # Re-synth with the same NFS placeholders the committed files were
      # generated with, so the diff below is signal, not placeholder noise.
      - name: Synth
        env:
          NFS_SERVER: '<NFS server address>'
          NFS_PATH: '<export path>'
        run: mise exec -- uv run cdk8s synth

      # PRs: push the regenerated dist/ back to the branch. Synth is
      # deterministic, so the re-run triggered by this commit finds dist/
      # clean and does not push again.
      - name: Commit re-synthed dist/ (PRs)
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- dist/; then
            echo "dist/ is in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "Re-synth cdk8s dist/"
          git push
          echo "::notice::dist/ was stale — pushed a re-synth commit; checks re-run on it."

      # main: verify-only. The PR path above should make this unreachable.
      - name: Assert committed dist/ is up to date (main)
        if: github.event_name == 'push'
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is stale on main — run 'task cdk8s:synth' and commit the result."
            exit 1
          fi
