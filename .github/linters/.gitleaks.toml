# gitleaks config for super-linter
#
# Inherits the default ruleset and layers on path-based allowlists for
# files that contain non-secret strings the default rules false-positive
# on. Each entry below documents *why* the path is allowlisted — anything
# new added here should keep that pattern so a future reviewer can audit.

[extend]
useDefault = true

[allowlist]
description = "infra repo path allowlists for non-secret strings"
# The public ADanaLife Discord guild snowflake (607964164220125258). It appears
# in the tripbot config source AND in the rendered cdk8s/dist manifests; allowlist
# the value itself so both are covered. Not a secret — it's visible on invite
# previews; the bot token lives in SM (k8s/tripbot/discord-bot-token).
regexes = [
  '''607964164220125258''',
]
paths = [
  # Empty/stub values; gitleaks generic-api-key rule false-positives on
  # the variable *name* `GOOGLE_MAPS_API_KEY=` (entropy ~3.78 even with
  # no value). All values in this file are stubs by design.
  '''k8s/apps/tripbot/overlays/local/secret\.env\.example''',

  # Contains the rotated-and-dead access-key-id `AKIAWAS42L6WSH6MNBF6`
  # (rotated 2026-05-04, see vault/decisions/k8s-platform-stack.md). The
  # ID is preserved here as a deliberate reference; the secret half lives
  # in SM and is reconciled via ESO. Migration to ESO-backed Secret +
  # secretRef is tracked separately.
  '''k8s/cert-manager/stage-1/cluster-issuer\.yml''',

  # Maps access-key-id → mnemonic alias as an IAM user *tag*. The
  # access-key-id is public (visible in the AWS console); the secret
  # half is not present in this file.
  '''terraform/core/user_data\.yml''',

  # Contains DISCORD_GUILD_ID=607964164220125258, the ADanaLife Discord
  # server snowflake. Public ID (visible on invite previews, documented
  # in vault/general/social/discord.md); gitleaks' generic-api-key rule
  # false-positives on the 18-digit numeric value. The bot token itself
  # is in AWS SM (k8s/tripbot/discord-bot-token) and never in this repo.
  '''k8s/apps/tripbot/overlays/stage-1/kustomization\.yaml''',
  '''k8s/apps/tripbot/overlays/prod-1/kustomization\.yaml''',

  # cdk8s Tripbot construct — sets the same public DISCORD_GUILD_ID snowflake
  # (607964164220125258) the kustomize overlays above do, in stage's config
  # block. Same false-positive (discord-client-id rule on the 18-digit ID); no
  # actual secret — the bot token lives in SM and is injected via ESO.
  '''cdk8s/adanalife_k8s/constructs/tripbot\.py''',

  # cdk8s supporting.py — ESO CR *builders*. They reference Secrets Manager keys
  # by PATH (e.g. extract="k8s/sentry-tripbot") and pass creation_policy="Owner",
  # which gitleaks' generic-api-key rule false-positives on. No secret values are
  # present anywhere in this file — it only emits ExternalSecret/SecretStore CRs.
  '''cdk8s/adanalife_k8s/supporting\.py''',
]
