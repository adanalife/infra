# Install both the pre-commit (file-content) hooks and the commit-msg hook
# (the Conventional Commits check at the bottom) on a plain `pre-commit install`.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch

      # Common errors
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: detect-private-key

  # Python lint + format for the cdk8s authoring layer. Mirrors super-linter's
  # PYTHON_RUFF / PYTHON_RUFF_FORMAT so the same issues are caught locally before
  # push — both point at .github/linters/.ruff.toml (line-length 88) so the two
  # agree. rev pinned to super-linter's ruff (0.15.8). Only cdk8s/ has Python.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--config, .github/linters/.ruff.toml]
        files: ^cdk8s/.*\.py$
      - id: ruff-format
        args: [--config, .github/linters/.ruff.toml]
        files: ^cdk8s/.*\.py$

  # Markdown lint. Mirrors super-linter's MARKDOWN pass (same
  # .github/linters/.markdown-lint.yml config) so doc nits like MD031
  # (blanks-around-fences) are caught locally before push, not in CI.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: [--config, .github/linters/.markdown-lint.yml]

  # Secrets: broad scan layered on top of the narrow detect-aws-credentials
  # / detect-private-key checks above. Sub-second. Uses the same allowlist as
  # super-linter's GITLEAKS pass (.github/linters/.gitleaks.toml) so the two
  # agree on what's a false positive.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: [--config, .github/linters/.gitleaks.toml]

  # GitHub Actions workflow linting — fast, and catches the kind of
  # workflow breakage super-linter's actionlint pass would.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Shell script linting (.github/scripts/, etc.).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        exclude: terraform/bootstrap
      #TODO: this was generating a diff in github workflow
      # - id: terraform_validate
      #   exclude: terraform/bootstrap
      #TODO: this required a number of (fairly easy) changes
      # - id: terraform_tflint
      #   exclude: terraform/bootstrap
      # never tried these before
      # - id: terraform_trivy
      # - id: infracost_breakdown

  # Conventional Commits — enforce `type(scope): summary` on commit messages so
  # history stays machine-parseable: it underpins release automation and gives
  # every contributor/agent the same commit grammar without re-explaining it.
  # Runs at the commit-msg stage; default_install_hook_types (top of file) wires
  # it up on `pre-commit install`. Guards LOCAL commits — and since PRs
  # squash-merge, the PR *title* becomes the squash subject, so keep PR titles
  # conventional too.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
