# Machine config patch for adanalife-minipc (single control-plane node).
#
# Applied on top of the generated controlplane.yaml via:
#   talosctl machineconfig patch controlplane.yaml \
#     --patch @controlplane.patch.yaml \
#     --output controlplane.patched.yaml
#
# Non-secret. Safe to commit. The base controlplane.yaml (gitignored) carries
# the PKI material this patch doesn't.
#
# NIC uses DHCP. Stable IP is enforced by a DHCP reservation at the router
# (MAC 58:47:ca:7d:7b:b0 → 192.168.1.200 on the Texas network). When the box
# moves to Maine, set up an equivalent reservation on the Maine router with
# the same target IP and no Talos-side reconfig is needed. The K8s API
# endpoint (https://192.168.1.200:6443) is baked into the generated
# controlplane.yaml; if the reservation IP ever changes, regenerate the
# config with the new endpoint.
#
# Hostname is set via the HostnameConfig sub-resource (Talos 1.13+ pattern).
# Setting machine.network.hostname in v1alpha1 conflicts with HostnameConfig.
#
# KubeSpan is a creation-time feature — it takes effect on a wipe-reinstall
# (apply-config), not when patched onto the running node. Added 2026-05-20.
# Disk encryption was attempted here too but DEFERRED (see the note below — it
# needs a SecureBoot image). Cilium (cni.name=none + proxy.disabled) is likewise
# NOT here yet — deferred to a follow-up wipe once the base rebuild is green, so
# the CNI swap is isolated as its own variable.

machine:
  install:
    disk: /dev/nvme0n1
    image: factory.talos.dev/installer/2dcd442954d67662d41c61bdb92165aaf7189aff9997bd011b6968c12ce8d9c0:v1.13.2
  network:
    interfaces:
      - interface: enp88s0
        dhcp: true
    # KubeSpan — WireGuard full-mesh between nodes, auto-keyed per node on first
    # boot. Dormant on this single-node cluster, but enabling it now means the
    # plumbing is tested before a second node lands (which could then join over
    # the public internet with no firewall config). Requires cluster.discovery.
    kubespan:
      enabled: true
  # Disk encryption DEFERRED (2026-05-20). TPM-sealed LUKS2 (systemDiskEncryption
  # with `tpm: {}`) requires a Talos SecureBoot image: it needs the PCR signing
  # key at /.extra/tpm2-pcr-public-key.pem, which only ships in SecureBoot
  # installers. On the standard image the STATE volume fails to format
  # ("failed to read pcr signing public key") and the node loops at "Installing"
  # — hit empirically on the first wipe. Re-add once we move to a SecureBoot
  # image + UEFI Secure Boot (+ key enrollment). Until then, at-rest protection
  # is physical security; the S3 postgres dump + the SOPS-stashed PKI are the
  # recovery path. Follow-up tracked in vault/infra/TODO.md.

cluster:
  allowSchedulingOnControlPlanes: true
  # Required by KubeSpan for peer discovery. Default-on in recent Talos; set
  # explicitly so the dependency is visible.
  discovery:
    enabled: true
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: adanalife-minipc
