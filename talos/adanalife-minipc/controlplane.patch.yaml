# Machine config patch for adanalife-minipc (single control-plane node).
#
# Applied on top of the generated controlplane.yaml via:
#   talosctl machineconfig patch controlplane.yaml \
#     --patch @controlplane.patch.yaml \
#     --output controlplane.patched.yaml
#
# Non-secret. Safe to commit. The base controlplane.yaml (gitignored) carries
# the PKI material this patch doesn't.
#
# NIC uses DHCP. Stable IP is enforced by a DHCP reservation at the router
# (MAC 58:47:ca:7d:7b:b0 → 192.168.1.200 on the Texas network). When the box
# moves to Maine, set up an equivalent reservation on the Maine router with
# the same target IP and no Talos-side reconfig is needed. The K8s API
# endpoint (https://192.168.1.200:6443) is baked into the generated
# controlplane.yaml; if the reservation IP ever changes, regenerate the
# config with the new endpoint.
#
# Hostname is set via the HostnameConfig sub-resource (Talos 1.13+ pattern).
# Setting machine.network.hostname in v1alpha1 conflicts with HostnameConfig.
#
# KubeSpan is a creation-time feature — it takes effect on a wipe-reinstall
# (apply-config), not when patched onto the running node. Added 2026-05-20.
# Disk encryption was attempted here too but DEFERRED (see the note below — it
# needs a SecureBoot image).
#
# Cilium CNI: cluster.network.cni.name=none + cluster.proxy.disabled=true tell
# Talos to install NEITHER its default Flannel CNI NOR kube-proxy — Cilium
# replaces both (eBPF kube-proxy replacement). These are creation-time, so they
# ride this wipe. Cilium itself is installed via helm as the FIRST platform step
# (k8s:<env>:platform:up); until it's up the node stays NotReady (no CNI), so
# `talosctl health` won't go fully green until the helm install lands — expected.
#
# Tailscale: the installer schematic bakes in the siderolabs/tailscale extension
# (schematic = i915-ucode + intel-ucode + iscsi-tools + tailscale; the GPU
# extension is UNCHANGED, so the proven VAAPI path is untouched). Its config —
# an ExtensionServiceConfig carrying the secret TS_AUTHKEY — is NOT in this
# (committed, non-secret) patch: it lives in tailscale.patch.yaml (gitignored
# plaintext) / tailscale.patch.sops.yaml (committed, SOPS-sealed), applied as an
# extra `--patch` at apply time. See tailscale.patch.yaml.example and the
# bootstrap runbook's Tailscale section. Creation-time like KubeSpan — takes
# effect on a wipe-reinstall, not a live patch.

machine:
  install:
    disk: /dev/nvme0n1
    # Schematic = i915-ucode + intel-ucode + iscsi-tools + tailscale. Was
    # 2dcd44…; tailscale added 2026-05-20 with i915-ucode kept byte-identical.
    # Regenerate via the curl block in the bootstrap runbook if extensions change.
    image: factory.talos.dev/installer/fb46591af14131d1c3ae89c8ce50f0fd6705113d0493a90cd06b8c1d669c9199:v1.13.2
  network:
    interfaces:
      - interface: enp88s0
        dhcp: true
    # KubeSpan — WireGuard full-mesh between nodes, auto-keyed per node on first
    # boot. Dormant on this single-node cluster, but enabling it now means the
    # plumbing is tested before a second node lands (which could then join over
    # the public internet with no firewall config). Requires cluster.discovery.
    kubespan:
      enabled: true
  # IP forwarding for the Tailscale subnet router (TS_ROUTES=192.168.1.0/24 in
  # tailscale.patch.yaml). Tailscale advertises the home LAN so off-LAN tailnet
  # clients reach 192.168.1.200 (and the Synology, etc.) with no cert-SAN/endpoint
  # changes; forwarding lets the node route to *other* LAN hosts. Host-level
  # (machine.sysctls), not pod-level — hostNetwork pods can't set sysctls.
  sysctls:
    net.ipv4.ip_forward: "1"
    net.ipv6.conf.all.forwarding: "1"
  # Extra cert SANs so kubectl/talosctl can reach the API by the node's Tailscale
  # identity, not just 192.168.1.200 — works from any tailnet device with no
  # subnet route, and survives the Maine move (the tailnet name/IP are
  # location-independent; the LAN IP is not). machine.certSANs covers the Talos
  # API (apid); cluster.apiServer.certSANs (below) covers kube-apiserver. The IP
  # is the current tailscale0 address; the MagicDNS name is the stable anchor.
  certSANs:
    - adanalife-minipc.tail020deb.ts.net
    - 100.71.27.106
  # Disk encryption DEFERRED (2026-05-20). TPM-sealed LUKS2 (systemDiskEncryption
  # with `tpm: {}`) requires a Talos SecureBoot image: it needs the PCR signing
  # key at /.extra/tpm2-pcr-public-key.pem, which only ships in SecureBoot
  # installers. On the standard image the STATE volume fails to format
  # ("failed to read pcr signing public key") and the node loops at "Installing"
  # — hit empirically on the first wipe. Re-add once we move to a SecureBoot
  # image + UEFI Secure Boot (+ key enrollment). Until then, at-rest protection
  # is physical security; the S3 postgres dump + the SOPS-stashed PKI are the
  # recovery path.

cluster:
  allowSchedulingOnControlPlanes: true
  # Cilium owns the dataplane — Talos installs no CNI and no kube-proxy.
  network:
    cni:
      name: none
  proxy:
    disabled: true
  # Required by KubeSpan for peer discovery. Default-on in recent Talos; set
  # explicitly so the dependency is visible.
  discovery:
    enabled: true
  # kube-apiserver serving-cert SANs for Tailscale-native kubectl (see
  # machine.certSANs above). Lets `server: https://adanalife-minipc.tail020deb.ts.net:6443`
  # verify TLS from any tailnet device.
  apiServer:
    certSANs:
      - adanalife-minipc.tail020deb.ts.net
      - 100.71.27.106
---
apiVersion: v1alpha1
kind: HostnameConfig
# auto must be overridden to "off" — the base controlplane.yaml ships
# `auto: stable`, and Talos rejects an auto-generating mode + a static
# hostname together. Quoted so YAML doesn't coerce `off` to boolean false.
auto: "off"
hostname: adanalife-minipc
